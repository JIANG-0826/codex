e the organization uses a \"Private\" model and does not use criteriabased sharing rules, the user's previous access likely relied on manual sharing or their previous\nposition in the hierarchy. While activating the record and adding them back to teams provides new\naccess, the historical \"one-off\" shares are gone. Options A and B are unlikely to be the cause of a\ntotal loss of visibility. Option D is incorrect because permission sets control what a user can do, not\nwhich specific records they can see in a private sharing model.","category":"Configuration & Setup"},{"id":46,"question":"Which task is especially suited for Agentforce?","options":{"A":"Single-step predefined processes","B":"Static document generation","C":"Multi-step processes that need adaption to change","D":"Tasks without decision-making"},"correct":["C"],"explanation":"Agentforce is designed to handle multi-step processes that require reasoning and adaptation. Unlike\ntraditional automation (like Workflow or simple Bots) that follows a linear, \"If-This-Then-That\" path,\n\n\nan Agentforce agent uses generative AI to understand user intent and choose the best sequence of\nactions to reach a goal. If a customer's request changes mid-conversation or requires the agent to\ncheck multiple systems and make a judgment call, the agentic loop allows it to adapt its behavior in\nreal-time. Single-step processes (Option A) or tasks without decision-making (Option D) are better\nhandled by standard Flow or Macros, which are more cost-effective for simple tasks. Static document\ngeneration (Option B) is a fixed output task. Agentforce's true value lies in managing the \"gray areas\"\nof business processes where human-like flexibility is needed.","category":"Agentforce AI"},{"id":47,"question":"Northern Trail Outfitters has two different sales processes: one for business opportunities\nwith four stages and one for partner opportunities with eight stages. Both processes will vary in page\nlayouts and picklist value options. What should a Platform Administrator configure to meet these\nrequirements?","options":{"A":"Different page layouts that control the picklist values for the opportunity types","B":"Separate record types and sales processes for the different types of opportunities","C":"Validation rules that ensure that users are entering accurate sales stage information","D":"Public groups to limit record types and sales processes for opportunities"},"correct":["B"],"explanation":"To manage different business requirements for a single object like Opportunities, Salesforce utilizes a\ncombination of Record Types and Sales Processes. A Sales Process is a specific feature for the\nOpportunity object that allows an administrator to select which \"Stage\" picklist values are visible. In\nthis scenario, the admin would create one Sales Process for \"Business\" (4 stages) and another for\n\"Partner\" (8 stages). Once these processes are defined, they are linked to Record Types. Record\nTypes are the engine that allows different users to see different Page Layouts and picklist options\nbased on the \"type\" of record they are creating. This architecture ensures that users working on\nPartner deals are guided through the appropriate eight stages and see the relevant fields on their\nlayout, while Business users have a streamlined four-stage experience. This separation is critical for\nmaintaining data integrity and ensuring that the reporting for each pipeline is accurate. It prevents\nconfusion by only showing users the options that are relevant to the specific context of the deal they\nare managing.","category":"Object Manager & Lightning App Builder"},{"id":48,"question":"A Platform Administrator assigned a custom profile based on the Minimum Access named\nSalesforce profile to a group of new users and assigned them several existing permission sets.\nHowever, when the users log in, they do not see the Lightning interface. Which action should the\nadministrator take to give the users access to the Lightning interface?","options":{"A":"Enable the Enhanced Interface for User Access Policies.","B":"Add Lightning component to a layout.","C":"Create a page in Lightning App Builder with the org as default.","D":"Assign a permission to enable Lightning Experience User."},"correct":["D"],"explanation":"The \"Minimum Access - Salesforce\" profile is a very restrictive standard profile designed to provide no\naccess by default, adhering to the principle of least privilege. One of the specific permissions that is\nnot included in this profile is the Lightning Experience User permission. Without this system\npermission, users will be defaulted to the Salesforce Classic interface (or potentially blocked from any\n\n\nUI if no other access is granted). To resolve this, the Platform Administrator should either edit the\ncustom profile or, preferably, create a Permission Set that includes the \"Lightning Experience User\"\ncheckbox and assign it to the affected users. This \"unlocks\" the modern Lightning interface for them.\nOptions B and C relate to the design of specific pages, but they are irrelevant if the user isn't even\nallowed to enter the Lightning environment. Option A refers to a different feature set entirely and\ndoes not address basic UI access.","category":"Configuration & Setup"},{"id":49,"question":"A sales rep has a list of 300 accounts with contacts that they want to load at one time. Which\ntool should a Platform Administrator utilize to import the records to Salesforce?","options":{"A":"Manual Import","B":"Data Import Wizard","C":"Dataloader.io","D":"Data Loader"},"correct":["B"],"explanation":"The Data Import Wizard is the most efficient and user-friendly tool for importing a relatively small\nnumber of records (up to 50,000) when those records involve standard objects like Accounts and\nContacts simultaneously. A key advantage of this tool is its built-in capability to handle \"Account and\nContact\" imports in a single pass, which includes automatic matching to prevent duplicates based on\nname or email. For a volume of 300 records, the browser-based wizard is much faster to set up than\nthe Data Loader, as it does not require a separate installation or complex CSV mapping for simple\nstandard objects. While the Data Loader (Option D) and Dataloader.io (Option C) can handle this\nvolume, they are typically preferred for much larger datasets (up to 5 million records) or more\ncomplex custom objects. The \"Wizard\" provides a guided experience that is ideal for sales reps or\nadministrators performing routine data entry tasks.","category":"Sales & Marketing Applications"},{"id":50,"question":"The Activity Timeline is missing from the Account record page. What should a Platform\nAdministrator do to correct this?","options":{"A":"Add the standard Activities component to the Account Lightning record page.","B":"Update the user's permission to allow Edit access to the Activity Timeline.","C":"Run a report to verify whether any activities have been logged for that Account.","D":"Add a button for the Activity Timeline in the Object Manager for the Account object."},"correct":["A"],"explanation":"The Activity Timeline is a standard Lightning component that displays open tasks, upcoming events,\nand past activities (like logged calls or sent emails) in a chronological view. If this timeline is missing\nfrom an Account page, it is usually because the component has been removed from the Lightning\nRecord Page layout.\nTo fix this, the Platform Administrator should open the Account record in the Lightning App Builder.\nFrom the list of standard components on the left, the admin must drag the Activities component onto\nthe page canvas-typically in the right-hand column or a dedicated tab. Once the page is saved and\nactivated, the timeline will be visible to users. Visibility of the timeline is a layout configuration, not a\nspecific \"Edit access\" permission (Option B). Running a report (Option C) might confirm if data exists,\nbut it won't fix the UI issue. There is no \"button\" for the Activity Timeline in the Object Manager\n(Option D); it is managed strictly as a component within the App Builder.","category":"Object Manager & Lightning App Builder"},{"id":51,"question":"Universal Containers wants to implement collaborative selling where multiple roles work\ntogether on customer accounts. Sales reps need full access to their assigned accounts, while\ncustomer support reps and sales engineers need access to opportunities and cases related to specific\naccounts they support. The sales manager wants to streamline the process by automatically adding\nthe same team members to multiple accounts. Which feature should a Platform Administrator\nconfigure to meet this requirement?","options":{"A":"Set up default account teams with specified access levels for different team roles.","B":"Create sharing rules to grant access to opportunities and cases for support teams.","C":"Configure role hierarchy to automatically grant account access to the appropriate teams.","D":"Use permission sets to provide additional access to account-related records."},"correct":["A"],"explanation":"Account Teamsare designed specifically for \"collaborative selling,\" allowing multiple users to work\ntogether on a single Account. By using Account Teams, an administrator can define specific roles\n(e.g., Sales Engineer, Support Rep) and grant them varying levels of access (Read/Write or Read Only)\nto the Account and its related Opportunities and Case. To meet the manager's requirement of\n\"streamlining\" and\n\"automatically adding\" members, the administrator should encourage users to set upDefault Account\nTeams.\nOnce a user defines their default team in their personal settings, they can click a single button to add\nthat entire team to any Account they own. Sharing Rules (Option B) are typically too broad for this\nrequirement because they apply to all records meeting a criteria, rather than specific collaborative\ngroups61. The Role Hierarchy (Option C) provides vertical access but doesn't easily handle the\nhorizontal, project-based access required for support reps and engineers working on specific\naccounts62. Permission Sets (Option D) grant functional permissions (what a user can do) but do not\ngrant access to specific data records in a collaborative way63.","category":"Configuration & Setup"},{"id":52,"question":"Ursa Major Solar (UMS) wants a place within Salesforce to discuss sensitive records. UMS\nwould like to be able to add new members but does not want non-members to be able to see any\ninformation about the forum.\nWhat should a Platform Administrator configure to achieve this?","options":{"A":"Chatter Unlisted Group","B":"Chatter Private Group","C":"Chatter Public Group","D":"Private Chatter Channel"},"correct":["A"],"explanation":"To facilitate the discussion of \"sensitive records\" where even the existence of the group must be\nhidden from non-members, a Chatter Unlisted Group is the appropriate solution. Unlike a Private\nGroup (Option B), which can be seen in searches and lists even if the content is hidden, an Unlisted\nGroup does not appear in search results and requires an explicit invitation to join. This ensures that\nonly members know the forum exists, meeting the highest privacy requirement. Public Groups\n(Option C) are visible to everyone and are not suitable for sensitive discussions42. \"Private Chatter\nChannel\" (Option D) is not a standard term for this type of collaboration group. Unlisted groups must\n\n\nbe enabled in Chatter Settings before they can be created by administrators.","category":"Productivity & Collaboration"},{"id":53,"question":"Ursa Major Solar's Platform Administrator is editing the page layout for a new custom object.\nA text area field is accidentally removed from the page layout, and it needs to be restored to the\npage layout. What are two methods for achieving this goal?","options":{"A":"Clone the layout from a different profile and use save as.","B":"Restore original page layout from a sandbox.","C":"Restore from the recycle bin within 15 days.","D":"From the fields palette, drag the field into the same position."},"correct":["B","D"],"explanation":"When a field is removed from a page layout, the field itself is not deleted from the database; it is\nsimply no longer displayed to the user. To restore it, the most direct method is to use the Page\nLayout Editor, find the field in the Fields Palette at the top of the editor, and drag it back onto the\nlayout (Option D). This is the standard \"undo\" action for layout changes. Alternatively, if the layout\nhas undergone many complex changes and the admin wants to revert to a known good state, they\ncould restore it from a Sandbox (Option B) by redeploying the layout metadata. Option C is incorrect\nbecause the Recycle Bin is for deleted records or fields, not for layout configurations. Option A is a\nworkaround that involves creating a new layout based on another, but it is not a direct way to\n\"restore\" the specific layout being edited.","category":"Object Manager & Lightning App Builder"},{"id":54,"question":"Ursa Major Solar wants to see collaboration and updates across various Chatter groups,\nrecords, and announcements from the CEO in a single place. What should a Platform Administrator\nconfigure to achieve this?","options":{"A":"Chatter Group","B":"Chatter Daily Digest","C":"Chatter Feed","D":"Chatter Stream"},"correct":["D"],"explanation":"A Chatter Stream is a custom feed that users (or administrators) can create to consolidate updates\nfrom multiple sources. You can combine feeds from specific groups, individual people (like the CEO),\nand specific records into a single view. This allows users to stay organized and monitor diverse sets of\ninformation in one place without having to navigate between different groups or records. A Chatter\nGroup (Option A) is for a specific set of members. A Daily Digest (Option B) is an email summary. A\nChatter Feed (Option C) is a general term for the individual lists of updates but does not natively\nallow for the targeted \"multi-source\" consolidation that a Stream provides.","category":"Productivity & Collaboration"},{"id":55,"question":"Users at DreamHouse Realty are only allowed to see opportunities they own. Leadership\nwants an enterprise- wide dashboard of all open opportunities in the pipeline so that users can see\nhow the company is performing at any point in time. How should a Platform Administrator create the\ndashboard without changing any sharing settings?","options":{"A":"Create a dashboard with the running user set as someone who can see all opportunities.","B":"Add a filter to the dashboard to filter the opportunities by owner role.","C":"Build individual dashboards for profiles that need to see the enterprise results.","D":"Update the dashboard folder settings to manager for the sales reps role."},"correct":["A"],"explanation":"In Salesforce, dashboards can be configured to run as a specific user, known as the Running User. This\nuser's security settings determine which data is visible to anyone viewing the dashboard. To allow\nusers with restricted record access (due to a Private sharing model) to see company-wide totals, the\nPlatform Administrator should set the dashboard to \"Run as a specified user\" who has \"View All\"\npermissions or is high enough in the role hierarchy to see all records. This creates a \"Static\nDashboard.\" While the viewers cannot click into individual records they don't own, they can see the\nsummarized totals and charts for the entire organization. Using a Dynamic Dashboard or filtering by\nrole (Option B) would still respect individual sharing and hide data. Changing folder settings (Option\nD) only affects who can open the dashboard, not the data displayed within it.","category":"Configuration & Setup"},{"id":56,"question":"Leadership at Cloud Kicks wants to go beyond knowing how long a case has been open for, to\nknowing how long a case has sat with different teams. Which tool gives a Platform Administrator the\nability to track the time a case sits and provide relevant reporting?","options":{"A":"Escalation Rules with Business Hours","B":"Record-Triggered Flows with Business Hours","C":"Case Assignment Rules with Business Hours","D":"Milestones with Business Hours"},"correct":["D"],"explanation":"To track specific stages of a support process and measure the time elapsed within those stages,\nSalesforce provides Entitlements and Milestones. Milestones represent required steps in a support\nprocess, such as \"First Response Time\" or \"Resolution Time\"363636. When combined with Business\nHours, Milestones allow the system to accurately calculate how long a case has been in a particular\nstatus or assigned to a specific team, excluding weekends or non-working hours. This provides\nleadership with granular reporting on \"Team Performance\" and SLA compliance. Escalation Rules\n(Option A) and Assignment Rules (Option C) are primarily routing tools; they can move a case but do\nnot natively provide the timestamp-based tracking and reporting necessary to see duration across\nmultiple \"handoffs\". Record-Triggered Flows (Option B) could theoretically be used to stamp fields,\nbut this would require significant custom development and would not offer the native, out-of-thebox reporting dashboards that come with the Milestones feature40. Therefore, Entitlement\nManagement is the standard solution for tracking time-based service metrics41.","category":"Service & Support Applications"},{"id":57,"question":"Management at Universal Containers would like to share dashboard components with their\nteam in Chatter but currently does not have access to this capability. How should a Platform\nAdministrator make this functionality available to management?","options":{"A":"Enable reporting snapshots.","B":"Select Download Chart on the component.","C":"Set View Dashboard As to the dashboard viewer.","D":"Enable dashboard feed tracking."},"correct":["D"],"explanation":"To allow users to post snapshots of dashboard components and engage in discussions about data\n\n\ndirectly on the dashboard, the Platform Administrator must enable Feed Tracking for dashboards. In\nSalesforce, Chatter Feed Tracking allows changes to records and interactions to be tracked and\nshared in the Chatter feed. For dashboards specifically, enabling this feature allows users to \"Follow\"\na dashboard and use the \"Post to Feed\" functionality on individual dashboard components. This is\nhighly effective for management teams who want to call out specific successes or areas of concern by\ntagging team members in a post that includes the visual chart. Reporting snapshots (Option A) are\nused for historical trend reporting, not social sharing. Downloading charts (Option B) is a manual filehandling process rather than an integrated social feature. Setting the \"View Dashboard As\" (Option C)\ndetermines data visibility but does not control Chatter functionality.","category":"Data & Analytics Management"},{"id":58,"question":"A sales rep typically has several open opportunities for each of their accounts. Which tool\nshould a Platform Administrator suggest to the sales rep to obtain the total number of accounts\nassociated with open opportunities in a report?","options":{"A":"Bucket Column","B":"Report Filter","C":"Unique Count","D":"Group Rows"},"correct":["C"],"explanation":"When a report contains many rows where the same Account name appears multiple times (due to\nhaving several opportunities), a simple count of rows will not accurately represent the number of\ndistinct accounts.\nTo find the specific number of individual accounts, the Platform Administrator should use the Unique\nCount feature on the Account Name or Account ID column in the report builder. Selecting \"Show\nUnique Count\" provides a total at the bottom of the report (and in summary groupings) that counts\neach unique value only once, regardless of how many times it appears in the list. Bucket Columns\n(Option A) group data into categories46. Report Filters (Option B) exclude records47. Grouping Rows\n(Option D) visually organizes the report by Account but does not inherently provide a single summary\nnumber for the count of distinct accounts in the way that Unique Count does.","category":"Data & Analytics Management"},{"id":59,"question":"A Platform Administrator deactivates an agent to add a new topic and action. What happens\nto any ongoing user conversations with the agent?","options":{"A":"The agent will pause the conversation and resume once reactivated.","B":"The agent will continue conversations using the deactivated agent until reactivated.","C":"The agent window automatically closes to prevent new messages.","D":"The agent will send a system error message as a response to any new messages."},"correct":["B"],"explanation":"In the Agentforce environment, deactivating an agent to make configuration changes (like adding a\nTopic or Action) does not immediately terminate existing sessions. To ensure a smooth user\nexperience, Salesforce allows ongoing conversations to continue using the version of the agent that\nwas active when the session started. The \"deactivation\" simply prevents new sessions from being\ninitiated. Once the administrator reactivates the agent, new sessions will utilize the updated\nconfiguration, while current users finish their interactions without interruption or \"system errors\".\nThe window does not automatically close, and the conversation is not \"paused\" in a way that\n\n\nrequires the user to wait for reactivation","category":"Agentforce AI"},{"id":60,"question":"Cloud Kicks is concerned that not everyone on the sales team is entering key data into\naccounts and opportunities that they own. Also, the team is concerned that if the key information\nchanges, it does not get updated in Salesforce. A Platform Administrator wants to get a better\nunderstanding of their data quality and record completeness. What should the administrator do to\naccomplish this?","options":{"A":"Explore AppExchange for data quality and record completeness solutions.","B":"Create a report for Accounts and Opportunities highlighting missing data.","C":"Subscribe the sales reps to a monthly report for accounts and opportunities.","D":"Configure the key fields as required fields on the page layout."},"correct":["B"],"explanation":"The administrator's goal is togain a better understandingof current data quality and record\ncompleteness issues in Accounts and Opportunities. Creating reports (or dashboards) that highlight\nblank or missing key fields-using filters like \"Field equals (blank)\" or formula fields to flag\nincompleteness-directly assesses the existing data by showing which records lack required\ninformation.\n* Why B is correct: Salesforce Trailhead modules on data quality emphasize using reports and\ndashboards (e.g., Account, Contact & Opportunity Data Quality Dashboard) to identify missing fields\nand measure completeness before implementing fixes.\n* Why not the others:\n* A: Exploring AppExchange apps is useful for advanced or ongoing solutions but skips the initial\nassessment step.\n* C: Subscribing reps to reports helps with awareness but doesn't provide the admin with an\noverview of data quality.\n* D: Making fields required prevents future issues but doesn't reveal current missing data or\noutdated records.\nThis approach aligns with Salesforce best practices: assess data quality first through reporting, then\nenforce improvements.","category":"Sales & Marketing Applications"},{"id":61,"question":"When a qualified lead is converted, what happens to its related records?","options":{"A":"Records from custom objects are attached to the resulting contact, account, and opportunity records.","B":"Open activities only are attached to the resulting contact, account, and opportunity records.","C":"All activities are attached to the resulting contact, account, and opportunity records.","D":"Campaign history is attached to the resulting contact, account, and opportunity records."},"correct":["C"],"explanation":"During the Lead Conversion process, Salesforce automatically transfers the history and interaction\ndata associated with the Lead to the newly created Account, Contact, and Opportunity. This includes\nall activities, meaning both Open Activities (like upcoming tasks or events) and Activity History (like\npast emails or logged calls) are attached to the resulting records to maintain a complete customer\ntimeline. Campaign history is also typically associated with the resulting Contact, but the question\nspecifically asks about \"related records\" in a broader sense, and the transfer of all activities is a\n\n\nprimary mechanical function of the conversion. Option A is incorrect because custom object records\ndo not automatically move unless specific custom mapping or code is in place. Option B is incorrect\nbecause the system does not limit the transfer to only open activities.","category":"Sales & Marketing Applications"},{"id":62,"question":"The call center manager at Ursa Major Solar wants to provide agents with a case dashboard\nthat can be drilled down by case origin, status, and owner. What should a Platform Administrator add\nto the dashboard to fulfill the request?","options":{"A":"Dashboard Filter","B":"Dashboard Widget","C":"Combination Chart","D":"Bucket Column"},"correct":["A"],"explanation":"To provide a single dashboard that allows users to \"drill down\" or toggle between different data\nsubsets, the administrator should add Dashboard Filters. A dashboard filter allows the manager or\nagent to select a value (e.g., \"Origin = Phone\" or \"Status = New\"), and all components on the\ndashboard will instantly refresh to show only the data matching that criteria. Salesforce allows up to\nthree filters per dashboard, which perfectly accommodates the request for origin, status, and owner.\nWhile a Bucket Column (Option D) can group data within a report, it does not provide the interactive\n\"drill down\" capability on the dashboard itself. Widgets (Option B) are the components themselves,\nand Combination Charts (Option C) display multiple data sets in one visual but do not offer filtering\nfunctionality.","category":"Data & Analytics Management"},{"id":63,"question":"Which two solutions is a Platform Administrator able to find on AppExchange to enhance\ntheir organization?","options":{"A":"Components","B":"Customers","C":"Communities","D":"Consultants"},"correct":["A","D"],"explanation":"The Salesforce AppExchange is a vast marketplace designed to extend the functionality of a\nSalesforce organization through various types of solutions.\n* Components:Administrators can find pre-built Lightning Components (A) to enhance record pages,\nsuch as custom maps, weather widgets, or specialized data entry forms. These can be dragged and\ndropped directly in the Lightning App Builder.\n* Consultants: The AppExchange also serves as a directory for certified Salesforce Consultants (D).\nThis allows organizations to find and vet professional partners who specialize in specific industries or\ntechnical implementations to help them scale their Salesforce instance.\nWhile \"Communities\" (Option C) refers to a Salesforce product (now Experience Cloud), you don't\n\"find\" them on the AppExchange to enhance an org; rather, you might find packages to enhance\nthem. \"Customers\" (Option B) are not a solution found on the marketplace. By leveraging the\nAppExchange, a Platform Administrator can quickly implement proven solutions without the need for\nextensive internal development.","category":"Object Manager & Lightning App Builder"},{"id":64,"question":"Senior leadership wants to be notified of any opportunities over $250,000 with more than a\n75% probability of closing. Which feature should a Platform Administrator set up to facilitate this?","options":{"A":"Guidance for Success","B":"Big Deal Alerts","C":"Reports and Dashboards","D":"Similar Opportunities"},"correct":["B"],"explanation":"Big Deal Alerts are a specialized, \"out-of-the-box\" notification feature specifically for the Opportunity\nobject.\nThis tool allows a Platform Administrator to define a threshold based on \"Amount\" and \"Probability.\"\nWhen an opportunity is created or updated and meets these thresholds (in this case, >$250k and\n>75%), Salesforce automatically sends an email notification to a specified user or a list of\nstakeholders. This is the most efficient way to meet the requirement because it is a native feature\ndesigned exactly for high-value deal visibility.\nWhile Reports and Dashboards (Option C) can display this data, they are \"pull\" mechanisms that\nrequire leadership to actively check them, whereas a Big Deal Alert is a \"push\" mechanism that\nensures immediate awareness. Guidance for Success (Option A) provides tips within a sales path, and\nSimilar Opportunities (Option D) helps reps find related deals, but neither is designed for automated\nleadership notifications.","category":"Sales & Marketing Applications"},{"id":65,"question":"Cloud Kicks wants users to only be able to choose the opportunity stage Closed Won if the\nLead source has been selected. How should a Platform Administrator accomplish this goal?","options":{"A":"Make Lead source a dependent picklist to the Opportunity Stage field.","B":"Change the Opportunity Stage field to Read Only on the page layout.","C":"Configure a validation rule requiring Lead source when the stage is set to Closed Won.","D":"Make the opportunity stage a dependent picklist to the Lead source."},"correct":["C"],"explanation":"A Validation Rule is the correct tool for enforcing conditional data entry requirements. When a\nbusiness rule dictates that a field (Lead Source) must be populated only when another field (Stage)\nreaches a specific value (Closed Won), a validation rule can evaluate this logic every time a record is\nsaved. The formula would check if the Stage is \"Closed Won\" and simultaneously check if the Lead\nSource field is blank. If both conditions are true, the system displays an error message and prevents\nthe user from saving the record. This ensures\n100% data compliance. Dependent picklists (Options A and D) are used to filter available options in\none list based on the selection of another, but they cannot \"require\" a value to be present based on a\nstage change in the same way a validation rule can. Making the stage \"Read Only\" (Option B) would\nprevent users from ever winning a deal. Validation rules are the standard method for maintaining\ndata quality during critical transitions in the sales lifecycle.","category":"Object Manager & Lightning App Builder"},{"id":66,"question":"Sales reps at Ursa Major Solar are having difficulty managing deals. The leadership team has\nasked a Platform Administrator to help sales reps prioritize and close more deals. What should the\nadministrator configure to help with these issues?","options":{"A":"Einstein Search Personalization","B":"Einstein Lead Scoring","C":"Einstein Opportunity Scoring","D":"Einstein Activity Capture"},"correct":["C"],"explanation":"To help sales reps prioritize their pipeline and identify which deals are most likely to close, Einstein\nOpportunity Scoring is the most effective tool. Part of Salesforce's AI suite, Opportunity Scoring uses\nmachine learning to analyze past won and lost opportunities to assign a score from 1 to 99 to every\nopen deal.\nThe score is accompanied by \"Key Factors\"-both positive and negative-that explain why the score was\ngiven (e.g., \"The deal has progressed quickly through stages\" or \"The close date has been pushed\nthree times\"). This allows reps to focus their time on high-scoring deals or take corrective action on\ndeals with low scores. Einstein Lead Scoring (Option B) helps with the intake of new prospects but not\nwith existing deals.\nEinstein Activity Capture (Option D) automates the logging of emails and events but does not provide\nprioritization logic. Einstein Search (Option A) improves search results but does not assist in deal\nmanagement strategy.","category":"Sales & Marketing Applications"},{"id":67,"question":"Users have reported that the new Lightning account record page is loading very slowly. Which\nfeature should a Platform Administrator use to determine the cause of the performance issues?2424","options":{"A":"Lightning Usage App","B":"Lightning Analytics","C":"Lightning Page Visibility Rule","D":"Lightning App Builder Analytics"},"correct":["D"],"explanation":"The Lightning App Builder includes a built-in Analysis tool (often referred to as Page Analysis or\nAnalytics) that provides administrators with a performance score for a record page. This tool\nevaluates the page's metadata and components to identify factors that contribute to slow load times,\nsuch as having too many fields in a single section, using complex related lists, or including multiple\nheavy Lightning Web Components. It provides specific suggestions, such as using \"Dynamic Forms\" to\nbreak up the page or moving less-used components into separate tabs to improve the \"time to\ninteract\" for the user. The Lightning Usage App (Option B) provides broad metrics on adoption and\nbrowser usage across the whole org but does not offer granular, component-level performance\nanalysis for a single record page. Visibility Rules (Option C) are for showing/hiding content, not for\ntechnical performance auditing.","category":"Object Manager & Lightning App Builder"},{"id":68,"question":"What is the next step an agent performs when the tasks within an agentic loop are all\nunsatisfactory?","options":{"A":"Provides the best answer possible with caveats","B":"Gives an error message","C":"Routes to a live agent","D":"Asks for additional information"},"correct":["D"],"explanation":"In an agentic loop, the AI agent iteratively tries to solve a user's request by calling actions and\nevaluating the results. If the results of those actions are unsatisfactory (e.g., the data returned\ndoesn't answer the prompt or a required input is missing), the agent's next logical step is to ask for\nadditional information. By clarifying the user's intent or requesting the missing data point, the agent\ncan initiate a new loop with better inputs. Giving up with an error message (Option B) or providing a\n\"best guess\" (Option A) are considered failures of the reasoning process. Routing to a live agent\n(Option C) is an escalation step that typically happens after the agent has failed to resolve the issue\neven after clarification, or if the user explicitly asks for human help.","category":"Agentforce AI"},{"id":69,"question":"A sales manager at Cloud Kicks would like a dashboard to emphasize some important data\nand tell a more compelling data story to the sales reps. How should a Platform Administrator achieve\nthis for the sales manager?","options":{"A":"Use a Text Widget.","B":"Assign a new Task to each rep.","C":"Use the Highlights Panel.","D":"Send out a mass email."},"correct":["A"],"explanation":"In Salesforce Lightning Dashboards, Text Widgets allow administrators to add descriptive text, titles,\nand custom narratives directly alongside data visualizations. This is a key feature for \"telling a\ncompelling data story\" because it allows the admin to provide context, explain the significance of\ncertain charts, or provide instructions and motivational messages to the team. By adding text\nwidgets, a dashboard moves from being a collection of raw charts to a guided analytical experience.\nThe Highlights Panel (Option C) is a feature of Record Pages, not Dashboards. Assigning tasks (Option\nB) or sending mass emails (Option D) are communication methods but do not enhance the visual or\nnarrative quality of the dashboard itself. Text widgets empower administrators to highlight trends\nand call out specific goals, making the data more actionable and easier to interpret for the sales reps.","category":"Data & Analytics Management"},{"id":70,"question":"Northern Trail Outfitters (NTO) wants to ensure new Contacts are validated before they can\nbe saved. If a user selects that the LeadSource picklist value is Other, NTO also wants to populate a\ncustom text field called Source__c. Which validation rule should a Platform Administrator configure\nto meet this requirement?","options":{"A":"AND(LeadSource = 'Other', Source__c = '')","B":"AND(NOT(LeadSource = 'Other'), NOT(Source__c = ''))","C":"AND(ISPICKVAL(LeadSource,'Other'), ISBLANK(Source__c))","D":"AND(NOT(ISPICKVAL(LeadSource,'Other'))), NOT(ISBLANK(Source__c))"},"correct":["C"],"explanation":"In Salesforce, validation rules use formulas to verify if the data entered by a user meets specific\ncriteria before saving the record1. To check the value of a picklist field like LeadSource, the\nISPICKVAL() function must be used, as picklist fields do not support standard text operators like \"=\" in\nvalidation formulas2. The requirement is to block the save if LeadSource is \"Other\" but the Source__c\ntext field is empty3. The ISBLANK() function effectively checks if a text field contains no data4.\nTherefore, the correct logic uses AND() to trigger the error message only when both conditions are\nmet: the picklist is set to \"Other\" AND the text field is blank5. Option A is incorrect because it treats a\n\n\npicklist like a text field6. Option B and D use NOT() logic, which would trigger errors in the wrong\nscenarios.","category":"Object Manager & Lightning App Builder"},{"id":71,"question":"Cloud Kicks wants to ensure that every client has support based on the level of service that\nhas been agreed on in the sales cycle. There are tiers to this support model, Gold, Silver, and Bronze.\nWhat should a Platform Administrator create to ensure that this is part of every client's account once\nthey become a client?","options":{"A":"A flow to assign Entitlements","B":"Routing Configuration for each client","C":"Email to Case for each service level","D":"Case Assignment Rules for each client"},"correct":["A"],"explanation":"To manage different levels of support service (Gold, Silver, Bronze), Salesforce uses the Entitlement\nManagement feature. An \"Entitlement\" defines the specific type of support a customer is eligible for.\nTo\n\"ensure that this is part of every client's account\" automatically, a Platform Administrator should use\nFlow Builder. A record-triggered flow can be set to run whenever an Account is updated to\n\"Customer\" status or when a specific \"Service Level\" field is populated. The flow can then\nautomatically create or link an Entitlement record to that Account. This ensures that when a new\ncase is opened, the support agent immediately sees the SLA (Service Level Agreement) associated\nwith that customer. Routing Configurations (Option B) and Assignment Rules (Option D) handle who\ngets the case, but they do not define the level of service. Email-to-Case (Option C) is an intake\nmethod, not a service-level tracking tool.","category":"Service & Support Applications"},{"id":72,"question":"Which Salesforce feature allows a Platform Administrator to automate3the routing of records\nto specific users for review and decision-making based on predefined criteria?","options":{"A":"Assignment Rules","B":"Validation Rules","C":"Approval Process","D":"Schema Builder"},"correct":["C"],"explanation":"An Approval Process is the dedicated Salesforce feature for managing workflows that require human\n\"review and decision-making.\" Unlike Assignment Rules (Option A), which simply change the owner\nof a record, an Approval Process locks the record to prevent further changes and routes a formal\nrequest to an \"Approver.\" This approver can then choose to Approve, Reject, or Reassign the request.\nThe process can include multiple steps, entry criteria (e.g., \"only if discount > 10%\"), and specific\nautomated actions that occur once the final decision is made. Validation Rules (Option B) are used to\nprevent saving bad data, not for routing. Schema Builder (Option D) is a visualization tool for the data\nmodel. Therefore, when a business process requires an official \"sign-off\" or \"decision,\" the Approval\nProcess engine is the correct architectural choice.","category":"Automation"},{"id":73,"question":"A Platform Administrator is designing a prompt template for a new agent. The agent's\npurpose is to help service reps troubleshoot technical issues by providing concise, step-by-step\n\n\ninstructions. Based on best practices for creating effective prompts, which approach should the\nadministrator use when writing this prompt?16","options":{"A":"Write a detailed prompt with multiple nested conditions to cover all the major troubleshooting scenarios.","B":"Use specific technical terms and abbreviations to ensure the AI understands the specialised domain.","C":"Focus on providing high-level, theoretical concepts so the AI has the flexibility to respond creatively.","D":"Use natural, easy-to understand language and clear, concise instructions to guide the AI's behavior."},"correct":["D"],"explanation":"Creating effective Agentforce prompts requires a focus on clarity and simplicity to ensure the Large\nLanguage Model (LLM) follows instructions accurately. According to Salesforce best practices,\nadministrators should use natural, easy-to-understand language and provide clear, concise\ninstructions1919. This approach helps the AI accurately reason through the task without becoming\nconfused by overly complex or nested logic (Option A). While technical accuracy is important, relying\nheavily on jargon or abbreviations (Option B) can sometimes lead to unexpected results if the LLM\ninterprets those terms differently in various contextsFurthermore, providing high-level theoretical\nconcepts (Option C) often results in vague or \"creative\" answers that may not be helpful for technical\ntroubleshooting, which requires specific and actionable steps22.\nUsing direct instructions like \"Summarize the issue in three bullet points\" is more effective than\nbroad guidelines.","category":"Agentforce AI"},{"id":74,"question":"What are three characteristics of a master-detail relationship?","options":{"A":"Permissions for the detail record are set independently of the master.","B":"The master object can be a standard or custom object.","C":"Roll-up summaries are supported in master-detail relationships.","D":"The owner field on the detail records is the owner of the master record.","E":"Each object can have up to five master-detail relationships."},"correct":["B","C","D"],"explanation":"A Master-Detail Relationship is a tight coupling between two objects that provides several unique\nfunctionalities:\n* Master Object Types:The master can be either a standard object (like Account) or a custom object\n(Option B).\n* Roll-up Summaries:This relationship type is the only one that natively supports Roll-up Summary\nfields, allowing the master record to calculate counts, sums, or averages of fields on the detail\nrecords (Option C).\n* Ownership and Security: The detail record inherits its owner and its security/sharing settings from\nthe master record. Consequently, there is no \"Owner\" field on a detail record; it is always owned by\nthe owner of the master (Option D).\nOption A is incorrect because detail records cannot have independent permissions. Option E is\nincorrect because an object can only have a maximum of two master-detail relationships. This\nrelationship is ideal for parent-child scenarios where the child's existence is entirely dependent on\n\n\nthe parent.","category":"Object Manager & Lightning App Builder"},{"id":75,"question":"Universal Containers requires that when an opportunity is closed won, all other open\nopportunities on the same account must be rendered as Closed Lost. Which automation solution\nshould a Platform Administrator use to implement this request?","options":{"A":"Flow Builder","B":"Outbound Message","C":"Flow Orchestration","D":"Quick Action"},"correct":["A"],"explanation":"Flow Builderis the recommended tool for automating updates to multiple related records based on a\nchange to a single record. A \"Record-Triggered Flow\" can be configured to execute whenever an\nOpportunity is updated to \"Closed Won\". The flow can then find all other Opportunities related to\nthe same Account where the \"IsClosed\" field is false, and use anUpdate Recordselement to set their\nstage to \"Closed Lost\". Outbound Messages (Option B) are used for notifying external systems, not\nfor internal data updates31. Flow Orchestration (Option C) is designed for multi-user, complex\nbusiness processes and would be overly complicated for this simple record update32. Quick Actions\n(Option D) require a user to click a button, which does not meet the requirement for automatic\nrendering upon the stage change33.","category":"Automation"},{"id":76,"question":"Users have reported that the new Lightning account record page is loading very slowly. Which\nfeature should a Platform Administrator use to determine the cause of the performance issues?2424","options":{"A":"Lightning Analytics","B":"Lightning Usage App","C":"Lightning Page Visibility Rule","D":"Lightning App Builder Analytics"},"correct":["D"],"explanation":"The Lightning App Builder includes a built-in Analysis tool (often referred to as Page Analysis or\nAnalytics) that provides administrators with a performance score for a record page. This tool\nevaluates the page's metadata and components to identify factors that contribute to slow load times,\nsuch as having too many fields in a single section, using complex related lists, or including multiple\nheavy Lightning Web Components. It provides specific suggestions, such as using \"Dynamic Forms\" to\nbreak up the page or moving less-used components into separate tabs to improve the \"time to\ninteract\" for the user. The Lightning Usage App (Option B) provides broad metrics on adoption and\nbrowser usage across the whole org but does not offer granular, component-level performance\nanalysis for a single record page. Visibility Rules (Option C) are for showing/hiding content, not for\ntechnical performance auditing.","category":"Object Manager & Lightning App Builder"},{"id":77,"question":"A Platform Administrator at Cloud Kicks is trying to set up a new user but receives an error\nabout a duplicate username when trying to save the user record. What is causing this error to\nhappen?","options":{"A":"The username was not configured in the format of an email address.","B":"The email address and username must be unique across all Salesforce orgs.","C":"The username must be unique across all Salesforce orgs.","D":"The username has a restricted domain name within it."},"correct":["C"],"explanation":"In the Salesforce architecture, the Username is a globally unique identifier4949. This means that once\na username (e.g., admin@cloudkicks.com) is used in any Salesforce organization (including\nproduction, sandboxes, and developer editions), it cannot be used again in any other organization\nworldwide. This often causes confusion because while an Email Address can be reused across\nmultiple Salesforce users and orgs, the Username must remain distinct51. If an administrator receives\na duplicate username error, it means the desired username is already taken by a user in another\ninstance of Salesforce. 54Option A is incorrect because usernames must be in email format, but they\ndon't have to be a valid functioning email. Option B is incorrect because only the username has this\nglobal uniqueness requirement, not the email address.","category":"Configuration & Setup"},{"id":78,"question":"Northern Trail Outfitters uses a custom Invoice object to collect customer payment\ninformation from an external billing system. The Billing System field needs to be filled in on every\nInvoice record. How should a Platform Administrator ensure this requirement?","options":{"A":"Create a flow to update the field.","B":"Require the field on the record type.","C":"Define an approval process for the field.","D":"Make the field universally required."},"correct":["D"],"explanation":"To ensure that a field is populated on every single record, regardless of how it is created (manually,\nvia API, or through an integration), the best method is to make the field universally required at the\nfield definition level. When a field is marked as \"Required\" in the Object Manager, the Salesforce\ndatabase will reject any attempt to save a record if that field is empty. While requiring a field on a\nPage Layout or Record Type (Option B) provides a good user experience for manual entry, it does not\nprevent records from being created without that data via the API or background processes25. Using a\nflow (Option A) to update the field is reactive rather than preventative26. Universal requirement is\nthe most robust way to maintain data integrity for critical fields like \"Billing System\" that are essential\nfor reporting and external system alignment.","category":"Object Manager & Lightning App Builder"},{"id":79,"question":"An agent is being developed with several actions that all retrieve information from different\ndatabases. A Platform Administrator has named the actions as follows: GetCustomerInfo,\nGetOrderDetails, GetShippingStatus. Which best practice should the administrator follow to improve\nthese names?","options":{"A":"Remove all verbs and use only nouns, such as CustomerInfo, OrderDetails, and ShippingStatus.","B":"Add the word \"Salesforce\" to the beginning of each action name to improve context for the large language model.","C":"Use a consistent naming convention by starting each action with the verb \"Get\".","D":"Use additional related verbs, such as Find, Retrieve, or Identify."},"correct":["C"],"explanation":"When naming actions for an AI agent, consistency is key to helping the Large Language Model (LLM)\n\n\ncategorize and understand the available tools. Following a consistent naming convention, such as\nstarting all retrieval actions with the verb \"Get,\" allows the agent to more easily map user intent (e.g.,\n\"I need information about...\") to the appropriate action. This reduces ambiguity during the reasoning\nphase of the agentic loop.\nUsing inconsistent verbs like Find, Retrieve, or Identify (Option D) can confuse the model regarding\nwhich action is most appropriate for a given task. Removing verbs entirely (Option A) makes it harder\nfor the model to distinguish between an action (doing something) and a data object (a thing). Adding\n\"Salesforce\" (Option B) is generally redundant as the agent's context is already within the Salesforce\nenvironment.","category":"Agentforce AI"},{"id":80,"question":"Cloud Kicks has three teams of customer service reps that use a custom field on the Case\nobject to populate the team assigned to manage the tickets. The customer support manager would\nlike a Custom Dashboard to show data specific to each team. What should a Platform Administrator\ndo to meet this requirement?55","options":{"A":"Create separate Dashboards for each Customer Support team.","B":"Create a Dashboard with widgets specific to each team.","C":"Create a Dashboard that uses Dashboard filters to show specific team data.","D":"Add Cross Filters to switch between the three customer service teams."},"correct":["C"],"explanation":"To avoid the administrative burden of creating and maintaining multiple identical dashboards for\ndifferent teams, a Platform Administrator should use Dashboard Filters. By adding a filter based on\nthe \"Team Assigned\" custom field, the administrator can create a single dashboard that the manager\ncan toggle between\n\"Team A,\" \"Team B,\" and \"Team C\". Each time a filter value is selected, all components on the\ndashboard that use that field (or a mapped equivalent) will automatically refresh to show the data\nrelevant only to that team. Creating separate dashboards (Option A) is inefficient and leads to\n\"dashboard sprawl\". Adding specific widgets for every team on one dashboard (Option B) would\nresult in a cluttered and confusing interface61.\nCross Filters (Option D) are a reporting feature used to filter records based on their relationship to\nother objects, not a dashboard-level viewing tool.","category":"Object Manager & Lightning App Builder"},{"id":81,"question":"Cloud Kicks needs to change the owner of a case when it has been open for more than 7 days.\nWhat should a Platform Administrator use to complete this requirement?47","options":{"A":"Escalation Rules","B":"Auto Response Rules","C":"Assignment Rules","D":"Validation Rules"},"correct":["A"],"explanation":"Escalation Rulesare designed specifically to perform actions when a Case record has remained in a\ncertain state (like \"Open\") for a specified period. In this scenario, the Platform Administrator would\nset an escalation rule entry with the age set to 168 hours (7 days). When this time threshold is\nreached, the rule can automaticallyreassign the caseto a new owner or a management queue51.\nAssignment Rules (Option C) are only triggered upon the initial creation of a record or when manually\n\n\ntriggered by a user, and they do not have a built-in \"timer\" capability to fire days later52. AutoResponse Rules (Option B) are only for sending automated emails to customers, not for internal\nownership changes53. Validation Rules (Option D) are used to prevent data entry errors and cannot\nchange record ownership54.","category":"Service & Support Applications"},{"id":82,"question":"The Cloud Kicks sales team has asked that two of the fields that appear on the Opportunity\ncards in Kanban view be changed to make the cards more meaningful. Which feature should a\nPlatform Administrator access to make this change?","options":{"A":"Record Type","B":"Compact Layout","C":"Page Layout","D":"Kanban Settings"},"correct":["B"],"explanation":"In the Salesforce Lightning Experience, the fields displayed in the \"header\" of a record and on the\ncards in the Kanban view are controlled by the Compact Layout. Each object has a System Default\ncompact layout, but a Platform Administrator can create custom ones to prioritize the most\nimportant information, such as \"Account Name\" and \"Close Date.\" By editing the primary compact\nlayout for the Opportunity object, the admin directly controls which fields the sales team sees as they\ndrag and drop deals through the Kanban stages.\nWhile Page Layouts (Option C) control the main record detail page and Kanban Settings (Option D)\ncontrol which field is used for columns and summaries, the individual \"card\" content is always driven\nby the Compact Layout. This ensures that users can quickly gather key context without needing to\nopen every individual record.","category":"Object Manager & Lightning App Builder"},{"id":83,"question":"A Platform Administrator at Cloud Kicks has created an approval process for time-off\nrequests. Which two automated actions are available for the administrator to add as part of the\napproval process?","options":{"A":"Field Update","B":"Email Alert","C":"Chatter Post","D":"Autolaunched Flow"},"correct":["A","B"],"explanation":"Salesforce Approval Processes allow administrators to define a series of steps to automate the\napproval of records. Within these processes, there are four specific types of automated actions that\ncan be triggered during initial submission, approval, rejection, or recall:\n* Field Update:Used to change a value on the record, such as switching a \"Status\" field from\n\"Pending\" to \"Approved.\"\n* Email Alert:Used to send a templated email to specific users, such as notifying the submitter that\ntheir request was granted.\n* Task:Used to assign a follow-up task to a user.\n* Outbound Message: Used to send technical data to an external system via API.\nWhile modern automation tools like Flow can post to Chatter or launch other flows, the native\napproval process engine is limited to these four specific actions. For a \"time-off request\" scenario, an\n\n\nEmail Alert ensures the employee is notified, and a Field Update ensures the record reflects the new\nstatus, providing a clear audit trail of the business decision.","category":"Automation"},{"id":84,"question":"A Platform Administrator at Cloud Kicks has created a screen flow to help service reps ask the\nsame set of questions when customers call in with issues. This screen should be visible from cases.\nHow should the administrator distribute the screen flow?","options":{"A":"Page Layout","B":"Home Page","C":"Lightning Page","D":"Component Filter"},"correct":["C"],"explanation":"To make a Screen Flow available to users on a specific record, such as a Case, the Platform\nAdministrator should add the Flow component to the Lightning Record Page. Using the Lightning App\nBuilder, the admin can drag the Flow component onto the page and select the specific \"Service\nQuestion\" flow from the list8888.\nThis allows the flow to be embedded directly into the workspace where the service reps are already\nlooking at case details9. While flows can be placed on a Home Page (Option B), that would not\nprovide the case-specific context needed for the reps10. Page Layouts (Option A) are used for\nstandard fields and related lists but do not natively host dynamic screen flow components11.\nComponent Filters (Option D) are used to show or hide the flow based on certain criteria, but the\ndistribution itself is handled by placing it on the Lightning Page12.","category":"Object Manager & Lightning App Builder"},{"id":85,"question":"Northern Trail Outfitters has a new flow that automatically sets field values when a new\naccount is created.\nThe flow is launched by a process, but the flow is not working properly. What should a Platform\nAdministrator do to identify the problem?","options":{"A":"View the Setup Audit Trail and review for errors.","B":"Set up email logs and review the send error logs.","C":"Use the native debug feature in Flow Builder.","D":"Review debug logs with the flow logging level."},"correct":["C"],"explanation":"The most efficient and descriptive way to troubleshoot a flow is to use the native Debug feature\nwithin the Flow Builder. This tool allows the Platform Administrator to \"run\" the flow in a safe\nenvironment, simulating the creation or update of a record. As the flow executes, the Debugger\nprovides a step-by-step panel showing exactly how variables were assigned, which paths were taken\nin \"Decision\" elements, and whether any\n\"Update\" or \"Create\" elements failed. It explicitly highlights where an error occurred and provides a\ndetailed error message. While general Debug Logs (Option D) can capture flow information, they are\nmuch harder to read and require setting specific trace flags. The Setup Audit Trail (Option A) only\nshows configuration changes, not runtime errors. Email logs (Option B) are only useful if the flow is\nfailing to send an email. The Flow Debugger is the primary tool for administrators to refine logic and\nfix issues before activating automation.","category":"Configuration & Setup"},{"id":86,"question":"Which action should a Platform Administrator configure to reverse a submitted approval\nrequest and unlock the associated record when setting up an approval process?99","options":{"A":"Final Rejection Actions","B":"Recall Actions","C":"Final Approval Actions","D":"Initial Submission Actions"},"correct":["B"],"explanation":"An Approval Process consists of several stages, each with its own set of automated actions. When a\nrecord is first submitted, it is typically locked to prevent further edits. If a user needs to \"reverse\"\nthat submission- perhaps because they realized they made a mistake or the deal terms changed-the\nadministrator must configure Recall Actions12. A recall action is specifically designed to allow the\nsubmitter or an administrator to pull the record back out of the approval queue. Common recall\nactions include a Field Update to change the status back to \"Draft\" and, most importantly, an action\nto unlock the record so it can be edited again. Final Rejection Actions (Option A) occur when an\napprover denies the request, and Final Approval Actions (Option C) occur when the request is fully\ngranted. Initial Submission Actions (Option D) are what lock the record and start the process in the\nfirst place.","category":"Configuration & Setup"},{"id":87,"question":"Which feature gives a sales team the ability to prioritize deals with recent updates in the List\nview and Kanban view?","options":{"A":"Big Deal Alerts","B":"Report Filters","C":"Deal Change Highlights","D":"Opportunity Path"},"correct":["C"],"explanation":"Deal Change Highlights is a feature in Lightning Experience that helps sales teams quickly identify\nrecent changes to opportunities. In list views and the Kanban view, changes to the \"Amount\" or\n\"Close Date\" fields are highlighted with green (for positive changes) or red (for negative changes)\narrows and text for seven days.\nThis allows reps and managers to visually prioritize deals that have recently shifted in value or timing\nwithout having to open each record. Big Deal Alerts (Option A) send emails for high-value deals.\nReport Filters (Option B) are for general data analysis. The Opportunity Path (Option D) helps guide\nusers through stages but does not highlight recent field-level data changes in a list format.","category":"Sales & Marketing Applications"},{"id":88,"question":"Northern Trail Outfitters wants emails received from customers to generate cases\nautomatically. How should a Platform Administrator ensure that the emails are sent to the correct\nqueue?","options":{"A":"Create an escalation rule to send cases to the correct queue.","B":"Use a custom email service to set the owner of the case upon creation.","C":"Utilize a flow to identify the correct queue and assign the case.","D":"Configure Email-to-Case so emails are delivered to the correct queue."},"correct":["D"],"explanation":"The most efficient and standard way to automate case creation from inbound emails is by using\nEmail-to- Case. When setting up Email-to-Case, the Platform Administrator configures \"Routing\nAddresses\". For each routing address (e.g., support@company.com or billing@company.com), the\nadministrator can specify a default owner or queue for the cases created via that specific address.\nThis ensures that when a customer sends an email to the \"Support\" address, it is automatically\nrouted to the Support Queue, and an email to the\n\"Billing\" address is routed to the Billing Queue. This configuration is handled directly within the\nEmail-to- Case setup pages and does not require additional escalation rules (Option A) or complex\ncustom flows (Option C) for the initial assignment. While a custom email service (Option B) is\npossible, it is a developer- centric approach that is generally unnecessary given the robust native\ncapabilities of the standard Email-to- Case feature. This setup streamlines the intake process and\nensures that customer issues are immediately visible to the correct service team34.","category":"Service & Support Applications"},{"id":89,"question":"A user is unable to relate a task to the Course custom object. What should a Platform\nAdministrator do to allow tasks to be related to courses?","options":{"A":"Create a sharing rule for the Course object to grant the user Read/Write access.","B":"Select Allow Activities on the Course object in Object Manager.","C":"Add the Open Activities related list to the Course page layout.","D":"Update the user's profile to grant them Edit access to the Task object."},"correct":["B"],"explanation":"For a custom object to support Tasks and Events, the \"Allow Activities\" setting must be enabled in the\nobject's properties. When a Platform Administrator creates a custom object, this checkbox is often\nleft unchecked by default35. Enabling this feature allows the \"Related To\" (WhatId) field on a Task or\nEvent to be linked to records of that custom object type36. While adding the related list to the page\nlayout (Option C) is a necessary step for visibility, it will not work if the underlying feature isn't\nenabled first37. Sharing rules (Option A) and profile permissions (Option D) manage access to existing\nrecords but do not control whether the object is technically capable of having activities associated\nwith it.","category":"Configuration & Setup"},{"id":90,"question":"A Platform Administrator at Universal Containers is asked to restrict login access for users to\nspecific hours and specific IP addresses to help minimize the risk of bad actors getting into the org.\nWhich setting should the administrator update to accomplish this?","options":{"A":"Company Settings","B":"The user's role","C":"The user's profile","D":"Custom permission sets"},"correct":["C"],"explanation":"In Salesforce, security restrictions like Login Hours and Login IP Ranges are managed at the Profile\nlevel.\nWhen these are configured on a profile, they are strictly enforced; if a user attempts to log in outside\nof the allowed hours or from an unauthorized IP address, the system will deny access entirely. This is\none of the most robust ways to secure an organization against unauthorized access. Company\n\n\nSettings (Option A) can set\n\"Trusted IP Ranges\" for the whole org, but these only bypass multi-factor authentication; they do not\nrestrict login. Roles (Option B) control record visibility, not system access. While Permission Sets\n(Option D) can grant many permissions, Login Hours and IP Ranges remain a core profile-level\nsecurity setting.","category":"Configuration & Setup"},{"id":91,"question":"Cloud Kicks wants a report to categorize accounts into small, medium, and large based on the\ndollar value found in the Contract Value field. Which feature should a Platform Administrator use to\nmeet this request?","options":{"A":"Group Rows","B":"Filter Logic","C":"Detail Column","D":"Bucket Column"},"correct":["D"],"explanation":"In Salesforce reporting, aBucket Columnis the most efficient tool for categorizing records without the\nneed for creating custom fields or complex formula logic. Bucketing allows an administrator to define\nranges of values for a field-such as the \"Contract Value\" currency field-and assign a label to each\nrange, such as\n\"Small,\" \"Medium,\" or \"Large.\" This is particularly useful for grouping data into segments that do not\nexist natively in the data model. For example, if a \"Small\" account is defined as anything under\n$50,000 and\n\"Large\" is over $200,000, the bucket tool allows the admin to visually organize these in the report\nbuilder interface. Unlike Grouping Rows, which merely clusters identical values together, a Bucket\nColumn transforms raw data into meaningful categories for visualization. This feature significantly\nenhances data storytelling by providing a summarized view of account distribution based on specific\nfinancial thresholds without impacting the actual Account record or requiring administrative\noverhead for new fields.","category":"Data & Analytics Management"},{"id":92,"question":"Cloud Kicks (CK) has a new Platform Administrator who is asked to put together a memo\ndetailing Salesforce usage to budget for upcoming license purchases. Where should the administrator\ngo to find out what type of licenses CK has purchased and how many are available?","options":{"A":"Usage-based entitlements related list in company information","B":"Search for licenses types in setup","C":"User licenses related list in company information","D":"User management settings in setup"},"correct":["C"],"explanation":"The Company Information page in the Setup menu is the \"source of truth\" for an organization's highlevel metadata and licensing. In the User Licenses related list on this page, the administrator can see\nevery license type purchased (e.g., Salesforce, Salesforce Platform, Force.com), the total number of\nseats allocated, the number of seats currently in use, and the number of remaining available licenses.\nThis is the first place an administrator should look for budgeting and capacity planning. \"Usage-based\nentitlements\" (Option A) tracks limited-resource features like Login minutes or Data Cloud credits,\nbut not standard seat-based user licenses.\n\n\nSearching for license types (Option B) or checking user management settings (Option D) will not\nprovide a consolidated summary of the total license pool.","category":"Configuration & Setup"},{"id":93,"question":"A Platform Administrator at Universal Containers is trying to deactivate a user who has left\nthe company but is unable to do so. What is preventing the administrator from deactivating this\nuser?","options":{"A":"The user is the running user of a dashboard.","B":"The user is part of an active case assignment rule.","C":"The user is part of an Opportunity team.","D":"The user is part of an Account team."},"correct":["A"],"explanation":"In Salesforce, certain dependencies prevent a user record from being deactivated. One of the most\ncommon blockers is if the user is the Running User of a Dashboard. Because the dashboard relies on\nthat user's security context to display data to others, deactivating them would break the dashboard.\nTo resolve this, the administrator must first change the running user of the dashboard to someone\nelse. Being part of an Opportunity Team (Option C) or Account Team (Option D) does not prevent\ndeactivation; the user simply remains on the team but is inactive. For Assignment Rules (Option B),\nwhile you cannot delete a user in a rule, deactivation is usually permitted, though it may result in an\nerror when the rule attempts to assign a record to the inactive user. However, the \"Running User\"\nrequirement is a hard system block.","category":"Configuration & Setup"},{"id":94,"question":"Northern Trail Outfitters has the Case object set to private. The support manager raised a\nconcern that reps have a broader view of data than expected and can see all cases on their group's\ndashboards. What is causing reps to have inappropriate access to data on dashboards?","options":{"A":"Dashboard Filters","B":"Public Dashboards","C":"Dashboard's running user","D":"Dashboard Subscriptions"},"correct":["C"],"explanation":"In Salesforce, a dashboard's running user determines which data is displayed to anyone viewing the\ndashboard. If a dashboard is configured with a \"Static\" running user (e.g., a Support Manager who\nhas \"View All\" permissions), every user who views that dashboard will see the manager's level of\ndata, regardless of their own personal sharing permissions. This bypasses the Organization-Wide\nDefault (OWD) of \"Private\" for the Case object. When the support manager observes that reps can\nsee all cases on a group dashboard, it is almost certainly because the dashboard is \"running\" as a user\nwith high-level access. To correct this and ensure users only see data they are entitled to, the\nPlatform Administrator should convert it into a Dynamic Dashboard. A dynamic dashboard is set to\n\"Run as the logged-in user,\" meaning the data reflected in the components will automatically filter\nbased on the individual viewer's specific sharing rules and record ownership. This ensures that the\ndashboard remains a useful tool for the team while strictly adhering to the company's data privacy\nand security requirements.","category":"Configuration & Setup"},{"id":95,"question":"A Platform Administrator at Cloud Kicks has a custom picklist field on Lead, which is missing\n\n\non the Contact when leads are converted. Which two steps should the administrator take to ensure\nthese values are populated?","options":{"A":"Update the picklist value with a validation rule.","B":"Create a custom picklist field on Contact.","C":"Map the picklist field on the Lead to the Contact.","D":"Set the picklist field to be required on the Lead object."},"correct":["B","C"],"explanation":"When a Lead is converted into an Account, Contact, and Opportunity, standard fields are mapped\nautomatically. However, custom fields require manual configuration to ensure d3ata flows through\nthe conversion process. First, the Platform Administrator must create a corresponding custom picklist\nfield on the Contact object (Option B) with the same values as the Lead field. Second, the\nadministrator must go to the Lead Object Manager, select \"Fields & Relationships,\" and click Map\nLead Fields (Option C). Here, the admin explicitly maps the Lead custom picklist to the newly created\nContact custom picklist. Without this mapping, the data will be lost during conversion. Validation\nrules (Option A) and making the field required (Option D) ensure data exists on the Lead but do not\nfacilitate the transfer of that data to the Contact.","category":"Sales & Marketing Applications"},{"id":96,"question":"A Platform Administrator at Cloud Kicks is setting up a new Salesforce instance. The business\nrequirements mandate that the marketers are given access to opportunities in order to maintain the\ncampaign relationships on each opportunity. The administrator decides to assign the Marketing User\nprofile. What should the administrator do next to achieve this requirement?","options":{"A":"Edit the object permissions to include Opportunity.","B":"Add a custom permission set to include Opportunity.","C":"Edit the role to enable Sales access.","D":"Configure the assigned apps to include Opportunity."},"correct":["A"],"explanation":"Profiles in Salesforce serve as the foundation for what a user can \"do\" with records, specifically\ndefining Object-Level Security (Create, Read, Edit, Delete permissions). The standard Marketing User\nprofile typically does not include full \"Edit\" access to the Opportunity object by default, as marketing\nroles are traditionally focused on Leads and Campaigns. To fulfill the requirement of allowing\nmarketers to maintain campaign relationships on Opportunities, the administrator must ensure the\nprofile has the necessary object permissions.\nIf the organization is using a custom profile based on the Marketing User template, the admin should\nedit the object permissions directly on that profile to include \"Read\" and \"Edit\" for Opportunities.\nThis allows the marketers to view the records and update the \"Primary Campaign Source\" field. While\na Permission Set could also grant this access, the question implies the admin is currently configuring\nthe profile itself. Adjusting the profile's object permissions is the direct way to align the user's\ncapabilities with the business's functional requirements.","category":"Configuration & Setup"},{"id":97,"question":"A manager wants the sales team to update their opportunities on a regular basis. Which\nfeature should a Platform Administrator implement to help with this?","options":{"A":"Similar Opportunities","B":"Opportunity Update Reminders","C":"Big Deal Alerts","D":"Scheduled Reports"},"correct":["B"],"explanation":"Opportunity Update Reminders is a specific, automated feature in Salesforce designed exactly for this\npurpose. When enabled, it allows managers to automatically send an email to their direct reports\nwith a list of their open opportunities. The email serves as a prompt for the reps to review their deals\nand ensure close dates, amounts, and stages are current. This is more effective than a general\nScheduled Report (Option D) because it is a purpose-built notification system that can be configured\nby the manager. Big Deal Alerts (Option C) are for high-value deal notifications, not general pipeline\nhygiene. Similar Opportunities (Option A) helps with sales strategy but does not encourage record\nupdates.","category":"Sales & Marketing Applications"},{"id":98,"question":"A Platform Administrator at Cloud Kicks has a request from the finance team that all won\nopportunities over a certain value must be checked for accuracy before the deal can be considered\nfully closed. The assigned finance team member, as well as the sellers' manager, both must sign off\non the deal, with the manager doing so first. Then, the finance team member must sign off, for a\ntotal of up to three sign-offs per opportunity. How should the administrator address this request?","options":{"A":"Create a screen flow that runs anytime an opportunity is closed.","B":"Add a Lightning web component to the opportunity page to capture the details in an approval record.","C":"Create a quick action to send emails to both the manager and the finance team member.","D":"Create an approval process with specific steps."},"correct":["D"],"explanation":"To manage a structured, multi-step sign-off requirement like the one described by the finance team,\nthe Approval Process is the standard and most effective tool. An approval process allows an\nadministrator to define a sequence of \"Approval Steps.\" In this scenario, Step 1 would be configured\nto route the request to the Seller's Manager. Only after the manager approves does the record move\nto Step 2, which would be configured to route the request to the specific Finance Team member. This\nensures the \"manager first\" logic is strictly enforced. Approval processes also provide a native\n\"Approval History\" related list, which serves as a vital audit trail for the finance team to verify that all\nnecessary signatures were obtained before the deal was finalized. Using a screen flow (Option A) or\nquick actions (Option C) would lack the built-in locking mechanism and formal status tracking that the\nApproval engine provides. A Lightning Web Component (Option B) would require significant custom\ncoding for a process that is easily handled by standard \"click-not- code\" configuration.","category":"Automation"},{"id":99,"question":"The sales reps at Cloud Kicks should be able to report on each other's account and\nopportunity records with the organization-wide default for Account and Opportunity both set to\nPrivate. What should a Platform Administrator do to achieve this?","options":{"A":"Create an owner-based sharing rule for Accounts with sharing between a Public Group of Sales Reps and Read Only Opportunity Access.","B":"Create an Account and Opportunity report to show any owned by each member of the Sales Team and save the report into a shared report folder.","C":"Utilize Apex sharing to programmatically share records between a group of Sales Rep users.","D":"Create manual sharing to share specific account and opportunity records between the sales reps."},"correct":["A"],"explanation":"In a Private sharing model, users cannot see records they do not own unless they are shared. An\nOwner-based Sharing Rule is the standard way to grant this access at scale. By creating a rule that\nshares records owned by members of a \"Sales Reps\" Public Group with that same Public Group, the\nadministrator allows all reps to see each other's accounts. Furthermore, because Account and\nOpportunity share a relationship, the sharing rule can be configured to grant \"Read Only\" (or higher)\naccess to the associated Opportunity records simultaneously. Option B is incorrect because simply\nplacing a report in a folder does not bypass record-level security (users will see an empty report).\nOption C and D are inefficient for granting broad, group-based access that can be handled via\nstandard configuration.","category":"Configuration & Setup"},{"id":100,"question":"Cloud Kicks needs to be able to show different picklist values for sales and marketing users.\nWhich two options meet this requirement?","options":{"A":"Two
