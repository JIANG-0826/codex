<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SF Admin">
<meta name="theme-color" content="#032d60">
<title>Salesforce Admin ADM-201 Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --sf-blue: #0176d3;
    --sf-dark: #032d60;
    --sf-light: #e8f4fd;
    --sf-bg: #f0f4f8;
    --sf-green: #2e844a;
    --sf-green-light: #eaf5ea;
    --sf-red: #ba0517;
    --sf-red-light: #fef0ef;
    --sf-gold: #c89b00;
    --sf-gold-light: #fdf8ec;
    --sf-text: #181818;
    --sf-muted: #6b7280;
    --sf-border: #dde2e8;
    --sf-card: #ffffff;
    --sf-shadow: 0 2px 12px rgba(1,118,211,0.07);
    --sf-radius: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; background: var(--sf-bg); color: var(--sf-text); display: flex; flex-direction: column; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--sf-dark) 0%, var(--sf-blue) 100%);
    padding: calc(12px + var(--safe-top)) 16px 12px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; z-index: 10;
  }
  .header-logo { font-size: 22px; }
  .header-info { flex: 1; }
  .header-title { color: white; font-size: 15px; font-weight: 700; }
  .header-sub { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 1px; }
  .stat-chip { background: rgba(255,255,255,0.18); color: white; border-radius: 20px; padding: 4px 11px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); white-space: nowrap; }

  /* SCROLL */
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding-bottom: calc(20px + var(--safe-bottom)); }
  .app { padding: 16px 14px 0; }

  /* HOME */
  .progress-row { background: var(--sf-card); border-radius: var(--sf-radius); padding: 16px; box-shadow: var(--sf-shadow); margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; border-left: 4px solid var(--sf-blue); }
  .progress-stat { text-align: center; }
  .progress-num { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: var(--sf-dark); display: block; }
  .progress-label { font-size: 10px; color: var(--sf-muted); }

  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .home-card { background: var(--sf-card); border-radius: var(--sf-radius); padding: 18px 14px 14px; box-shadow: var(--sf-shadow); cursor: pointer; border: 2px solid transparent; transition: transform 0.15s; position: relative; overflow: hidden; }
  .home-card:active { transform: scale(0.97); }
  .home-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: var(--sf-radius) var(--sf-radius) 0 0; }
  .home-card.random::before { background: linear-gradient(90deg, #0176d3, #06a59a); }
  .home-card.category::before { background: linear-gradient(90deg, #7b68ee, #a855f7); }
  .home-card.wrong::before { background: linear-gradient(90deg, #ef4444, #f97316); }
  .home-card.favorites::before { background: linear-gradient(90deg, #c89b00, #f59e0b); }
  .home-icon { font-size: 28px; margin-bottom: 8px; }
  .home-card h2 { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--sf-dark); }
  .home-card p { font-size: 11px; color: var(--sf-muted); line-height: 1.5; }
  .home-badge { display: inline-block; background: var(--sf-blue); color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 8px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
  .home-badge.warn { background: #ef4444; }
  .home-badge.gold { background: var(--sf-gold); }

  /* CATEGORY */
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .btn-back { background: white; border: 1.5px solid var(--sf-border); border-radius: 10px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; color: var(--sf-text); display: flex; align-items: center; gap: 5px; font-weight: 500; flex-shrink: 0; }
  .btn-back:active { background: var(--sf-light); }
  .section-title { font-size: 15px; font-weight: 700; color: var(--sf-dark); }
  .category-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-item { background: var(--sf-card); border-radius: 12px; padding: 14px; box-shadow: var(--sf-shadow); cursor: pointer; display: flex; align-items: center; gap: 12px; border: 2px solid transparent; transition: all 0.15s; }
  .cat-item:active { background: var(--sf-light); border-color: var(--sf-blue); }
  .cat-icon { font-size: 22px; flex-shrink: 0; }
  .cat-name { font-size: 13px; font-weight: 700; color: var(--sf-dark); }
  .cat-sub { font-size: 10px; color: var(--sf-muted); margin-top: 1px; }
  .cat-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .cat-weight { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; color: var(--sf-blue); }
  .cat-count { background: var(--sf-light); color: var(--sf-blue); border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }

  /* QUIZ */
  .quiz-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .quiz-progress-bar { flex: 1; height: 5px; background: var(--sf-border); border-radius: 3px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--sf-blue), #06a59a); border-radius: 3px; transition: width 0.35s ease; }
  .quiz-counter { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--sf-muted); white-space: nowrap; flex-shrink: 0; }

  .question-card { background: var(--sf-card); border-radius: var(--sf-radius); box-shadow: var(--sf-shadow); overflow: hidden; animation: fadeUp 0.22s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .question-meta { padding: 10px 14px; background: var(--sf-light); border-bottom: 1px solid var(--sf-border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .q-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; color: var(--sf-blue); }
  .q-cat-tag { background: white; border: 1px solid var(--sf-blue); color: var(--sf-blue); border-radius: 8px; padding: 2px 8px; font-size: 10px; font-weight: 600; }
  .q-multi-tag { background: var(--sf-gold-light); border: 1px solid var(--sf-gold); color: var(--sf-gold); border-radius: 8px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
  .fav-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 22px; padding: 2px 4px; line-height: 1; }
  .fav-btn:active { transform: scale(1.3); }

  .question-body { padding: 16px 14px 14px; font-size: 14px; line-height: 1.75; white-space: pre-wrap; color: var(--sf-text); font-weight: 500; }

  .multi-bar { margin: 0 12px 10px; background: var(--sf-gold-light); border: 1px solid var(--sf-gold); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #7a5a00; }
  .btn-submit { margin-left: auto; background: var(--sf-blue); color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 700; flex-shrink: 0; }
  .btn-submit:disabled { background: var(--sf-border); color: var(--sf-muted); }

  .options-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
  .option-btn { width: 100%; text-align: left; background: white; border: 2px solid var(--sf-border); border-radius: 12px; padding: 13px 14px; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; gap: 10px; align-items: flex-start; transition: border-color 0.15s, background 0.15s; color: var(--sf-text); line-height: 1.55; min-height: 48px; }
  .option-btn:active:not(:disabled) { background: var(--sf-light); border-color: var(--sf-blue); }
  .option-btn.selected-pending { border-color: var(--sf-blue); background: var(--sf-light); }
  .option-btn.correct { border-color: var(--sf-green); background: var(--sf-green-light); color: var(--sf-green); }
  .option-btn.wrong { border-color: var(--sf-red); background: var(--sf-red-light); color: var(--sf-red); }
  .option-btn:disabled { cursor: default; }
  .opt-letter { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 13px; min-width: 20px; color: inherit; margin-top: 1px; }

  .result-banner { margin: 0 12px 10px; border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .result-banner.correct { background: var(--sf-green-light); color: var(--sf-green); border: 1.5px solid var(--sf-green); }
  .result-banner.wrong { background: var(--sf-red-light); color: var(--sf-red); border: 1.5px solid var(--sf-red); }

  .explanation-box { margin: 0 12px 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--sf-border); }
  .explanation-en { padding: 12px 14px; background: #f8f9fa; font-size: 12px; line-height: 1.7; color: #374151; white-space: pre-wrap; border-bottom: 1px solid var(--sf-border); }
  .explanation-cn { padding: 12px 14px; background: #fffdf5; font-size: 12px; line-height: 1.7; color: #374151; white-space: pre-wrap; }
  .exp-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .exp-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--sf-muted); text-transform: uppercase; }
  .translate-btn { background: var(--sf-blue); color: white; border: none; border-radius: 6px; padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; display: flex; align-items: center; gap: 4px; margin-left: auto; min-height: 30px; }
  .translate-btn:disabled { background: var(--sf-border); color: var(--sf-muted); }

  .sticky-next { position: sticky; bottom: 0; background: linear-gradient(to top, var(--sf-bg) 70%, transparent); padding: 12px 14px calc(12px + var(--safe-bottom)); margin-top: 4px; }
  .btn-next { display: block; width: 100%; background: linear-gradient(135deg, var(--sf-blue), var(--sf-dark)); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; box-shadow: 0 4px 16px rgba(1,118,211,0.35); }
  .btn-next:active { opacity: 0.88; }

  /* SCORE */
  .score-card { background: var(--sf-card); border-radius: var(--sf-radius); box-shadow: var(--sf-shadow); padding: 32px 20px 28px; text-align: center; margin-bottom: 16px; }
  .score-ring { width: 120px; height: 120px; margin: 0 auto 20px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 700; color: var(--sf-dark); }
  .score-title { font-size: 20px; font-weight: 700; color: var(--sf-dark); margin-bottom: 6px; }
  .score-sub { color: var(--sf-muted); font-size: 13px; margin-bottom: 24px; }
  .score-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-action { background: var(--sf-blue); color: white; border: none; border-radius: 12px; padding: 14px 20px; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; width: 100%; }
  .btn-action.outline { background: white; color: var(--sf-blue); border: 2px solid var(--sf-blue); }
  .btn-action:active { opacity: 0.85; }

  .loading-spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">☁️</div>
  <div class="header-info">
    <div class="header-title">Salesforce Admin ADM-201</div>
    <div class="header-sub">Certified Administrator · 150 Questions</div>
  </div>
  <span class="stat-chip" id="headerStat">🏠 Home</span>
</div>
<div class="scroll-area">
  <div class="app" id="app"></div>
</div>

<script>
const QUESTIONS = [{"id":1,"question":"At Cloud Kicks, when a rep needs to seek additional support help, there's a series of actions the\ncompany wants to ensure are taken. The steps include sending an email and changing the status and\nowner of the case.\nWhat should a Platform Administrator use to give the reps an easy way to make these updates?","options":{"A":"Case Assignment Rules","B":"Macros with Quick Actions","C":"Quick Text with Email Templates","D":"Autolaunched Flows with Email Alerts"},"correct":["B"],"explanation":"To provide reps with an \"easy way\" to perform a repetitive sequence of manual tasks, Macros are the\nideal solution. A Macro allows a user to perform multiple steps-such as changing a Case Status,\nreassigning the Case Owner, and sending a pre-written email-with a single click. When combined with\nQuick Actions, Macros can navigate the user interface, populate fields, and submit changes\nautomatically. This significantly reduces manual data entry and ensures that the company's required\nsupport process is followed consistently.\nCase Assignment Rules (Option A) and Autolaunched Flows (Option D) are fully automated and\ntrigger on save, which might not be appropriate if the rep needs to decide when to trigger the\nsupport request. Quick Text (Option C) only assists with typing but does not automate field changes\nor ownership transfers.","category":"Automation"},{"id":2,"question":"Northern Trail Outfitters wants to initiate expense reports from Salesforce to the external HR\nsystem.\nManagers and directors need to review this process. Which two tools should a Platform\nAdministrator configure?","options":{"A":"Outbound Message","B":"Email Alert Action","C":"Quick Action","D":"Approval Process"},"correct":["A","D"],"explanation":"To meet the requirement of a \"review process\" that ends with data being sent to an \"external\nsystem,\" the administrator needs Approval Processes and Outbound Messages. The Approval Process\n(Option D) handles the internal workflow, ensuring that the manager and director sign off on the\nexpense report. Once the final approval is granted, an \"Approval Action\" can be triggered. The\nadministrator should use an Outbound Message (Option A) as that action. Outbound Messages are\ndesigned to send specific record data (XML via API) to an external URL whenever a record change\noccurs. This provides a reliable, declarative way to integrate Salesforce with an HR system. Quick\nActions (Option C) and Email Alerts (Option B) do not support the technical data transfer needed for\nexternal system integration.","category":"Automation"},{"id":3,"question":"Universal Containers' Platform Administrator has been asked to create a many-to-many\nrelationship between two existing custom objects. Which two steps should the administrator take\nwhen enabling the many-to-many relationship?","options":{"A":"Create a junction with a custom object.","B":"Create two master-detail relationships on the new object.","C":"Create URL fields on a custom object.","D":"Create two lookup relationships on the new object."},"correct":["A","B"],"explanation":"In Salesforce, a many-to-many relationship allows each record of one object to be linked to multiple\nrecords of another object and vice versa. This is achieved by using a Junction Object. A junction\nobject is a custom object that sits between the two objects you want to relate. To implement this\ncorrectly, the administrator must follow two specific steps: first, create the custom object to serve as\nthe \"junction\"; second, create two Master-Detail relationship fields on that new junction object. One\nmaster-detail field points to the first custom object, and the second points to the other. Because\nthese are master-detail relationships, the junction record's visibility and deletion behavior are\ncontrolled by its parents. This structure allows for powerful reporting and roll-up summaries on both\nparent objects. Using simple lookup relationships (Option D) would not enforce the strict data\nintegrity or the specific roll-up capabilities that define a true many-to-many relationship in the\nSalesforce architecture.","category":"Object Manager & Lightning App Builder"},{"id":4,"question":"A Platform Administrator is building an agent to nurture leads. How does Agentforce SDR help?","options":{"A":"Generate a dynamic call script and talking points for the human sales reps to use.","B":"Autonomously negotiate pricing with the lead and close the final deal.","C":"Analyze the performance of human sales reps and provide coaching tips.","D":"Answer the lead's questions with responses that are grounded in company data."},"correct":["D"],"explanation":"Agentforce SDR (Sales Development Representative) is an AI agent designed to autonomously engage\nwith prospects to nurture leads and accelerate the sales pipeline. A core functionality of this agent is\nits ability to interact with potential customers by answering their specific questions about products or\nservices. Crucially, these responses are grounded in company data, meaning the agent retrieves\nrelevant information from the Salesforce Knowledge base, product catalogs, or other internal\nresources to provide accurate, brand-aligned answers. This ensures that the agent provides highquality, trustworthy information without the\n\"hallucinations\" common in non-grounded AI. While the agent helps in lead qualification and\nnurturing, its primary value in an ecommerce or sales support context is providing immediate,\ncontext-aware assistance. It is not intended to replace humans in complex price negotiations (Option\nB) or serve purely as a coaching tool (Option C), but rather to act as a front-line digital worker that\nscales the sales team's reach by handling information-seeking queries autonomously.","category":"Service & Support Applications"},{"id":5,"question":"A group of sales reps can view each other's orders on a report; however, they would like a\nreport to view just their own orders. What should a Platform Administrator do to set up a report for\nthe sales reps?31","options":{"A":"Set the Opportunity Filter for Primary as True.","B":"Filter by Opportunity Owner equals $USER.","C":"Set Organization Wide Defaults of Order object to Private.","D":"Save the report in a private folder for the user."},"correct":["B"],"explanation":"In Salesforce reporting, administrators can use relative date and user filters to make a single report\ntemplate dynamic for every person who views it. By setting the filter to Opportunity Owner (or Order\nOwner) equals\n$USER, the report will automatically filter the results to show only those records owned by the\nindividual currently logged in and viewing the report. This is much more efficient than creating\nseparate reports for every rep. While setting the Organization-Wide Defaults to Private (Option C)\nwould restrict general visibility, it does not help if the reps need to be able to see each other's data\nfor other business reasons but simply want a \"clean\" personal view for daily tasks36. Saving the\nreport in a private folder (Option D) only restricts who can see the report itself, not the data\ncontained within it. Using the $USER variable is the standard way to provide personalized, relevant\ndata views in a shared reporting environment.","category":"Configuration & Setup"},{"id":6,"question":"Cloud Kicks is working on a rebrand. In which two areas of the Salesforce mobile app can a\nPlatform Administrator customize the branding?","options":{"A":"App header color","B":"Record background color","C":"Loading page logo","D":"Header background color"},"correct":["C","D"],"explanation":"To align the Salesforce mobile app with a company's visual identity, a Platform Administrator can\ncustomize specific branding elements through the Salesforce Mobile App Customization settings. The\ntwo primary areas available for branding are:\n* Loading Page Logo:This allows the administrator to upload a company logo that appears when a\nuser first opens the app.\n* Header Background Color: This allows the administrator to set the primary brand color for the top\nheader area of the mobile interface.\nThese settings ensure that the user experience feels consistent with the company's internal branding\nfrom the moment they log in. Option A and B are incorrect because Salesforce does not currently\nallow for granular\n\"App header\" vs \"Header background\" color separation or the modification of the \"Record\nbackground color,\" as the app maintains a standardized background for accessibility and readability.\nCustomizing the loading screen and header is the standard way to implement a mobile rebrand.","category":"Configuration & Setup"},{"id":7,"question":"DreamHouse Realty has an approval process. A manager attempts to approve a record but\nreceives an error.\nWhat should a Platform Administrator do to troubleshoot this issue?","options":{"A":"Check if the user in the next approver is inactive or missing.","B":"Review the page layout to ensure the fields updated in the process are visible.","C":"Update the field-level security to view on fields that are updated in the process.","D":"Add a delegated approver for the next approver in the process."},"correct":["A"],"explanation":"A common cause of errors in an Approval Process is a breakdown in the \"Approver\" chain. If an\n\n\napproval step is configured to route to a specific user or a manager who has been deactivated,\nSalesforce will throw an error when the current step tries to advance. The Platform Administrator\nshould check the \"Next Approver\" field on the record or the step definition in Setup to ensure the\ntarget user is active and has a valid Salesforce license. While field visibility (Options B and C) is\nimportant for the user experience, missing field access typically doesn't \"error out\" the approval\nengine itself; it just prevents the user from seeing the data. Checking for inactive users is the first\nstep in troubleshooting runtime errors in automated routing processes.","category":"Configuration & Setup"},{"id":8,"question":"Universal Containers (UC) customers have provided feedback that their support cases are not\nbeing responded to quickly enough. UC wants to send all unassigned cases that have been open for\nmore than 2 hours to an urgent Case queue and alert the support manager. Which feature should a\nPlatform Administrator configure to meet this requirement?","options":{"A":"Case Scheduled Reports","B":"Case Dashboard Refreshes","C":"Case Escalation Rules","D":"Case Assignment Rules"},"correct":["C"],"explanation":"Case Escalation Rulesare specifically designed to automate actions when a case has remained in a\ncertain state for a defined period of time. In this scenario, the requirement involves two specific\ntime-based triggers:\nmoving the case after 2 hours and alerting a manager. Escalation rules allow the administrator to\ndefine\n\"Escalation Actions\" that execute when the time threshold is reached, such as \"Reassign to Queue\"\nand\n\"Notify Manager\". Case Assignment Rules (Option D) only fire when a case is first created or manually\ntriggered, not after a time delay63. Reports (Option A) and Dashboards (Option B) provide\ninformation but do not physically move records or perform automated reassignments.","category":"Service & Support Applications"},{"id":9,"question":"Cloud Kicks has an administrator team that manages the org. The company has asked for a\nsmall subset of leadership users to have Modify All access, like the administrators have. How should\nthe administrator team accomplish this?","options":{"A":"Assign the standard Platform User profile to the leadership users and edit the permissions to Modify All access.","B":"Assign the standard System Administrator profile to the leadership users that includes the Modify All access.","C":"Assign the standard User profile to the leadership users and add a custom permission set with Modify All access.","D":"Clone the standard User profile to the leadership users and assign a Modify All role to grant access."},"correct":["C"],"explanation":"Salesforce best practices dictate the Principle of Least Privilege, which means users should only be\ngiven the minimum level of access required to do their jobs. Assigning leadership users the \"System\nAdministrator\" profile (Option B) is dangerous because it grants them the ability to change the\n\n\nsystem configuration, delete fields, and manage users. Instead, the administrator should keep the\nleadership users on their standard functional profile and grant the \"Modify All Data\" permission via a\nPermission Set. This approach provides the users with the data visibility they need (the ability to view\nand edit all records across the org) without giving them administrative control over the backend\nsetup. Option A is incorrect because you cannot edit standard profiles directly. Option D is incorrect\nbecause \"Roles\" control record visibility and hierarchy, but they do not grant administrative\npermissions like \"Modify All Data.\" Using a Permission Set is the most secure and flexible way to\nelevate data access for a specific group.","category":"Configuration & Setup"},{"id":10,"question":"At Cloud Kicks, cases are being assigned a default Case Owner and showing a Created By and\nLast Modified By that is not expected. The company wants to change this to an integration user to\nalleviate confusion with the business. What should a Platform Administrator edit to change this in\nSalesforce?","options":{"A":"Process Automation Settings","B":"Debug Logs","C":"Support Processes","D":"Support Settings"},"correct":["D"],"explanation":"In Salesforce, Support Settings is the primary configuration page for determining how the Service\nCloud handles automated case updates. This section allows a Platform Administrator to define the\n\"Default Case Owner\" and the \"Automated Case User.\" The Automated Case User is the user listed in\nthe Case History for automated actions, such as those triggered by assignment rules, escalation rules,\nor Email-to-Case. If the business sees an \"unexpected\" user name in the Created By or Last Modified\nBy fields during these automated processes, it is usually because this setting is pointing to a specific\nadministrator or a system user.\nBy updating the Automated Case User to a dedicated \"Integration User,\" the admin ensures that the\naudit trail clearly distinguishes between manual edits made by staff and automated updates made by\nthe system. This provides better clarity for the support team and prevents confusion regarding who is\nresponsible for specific record changes.","category":"Service & Support Applications"},{"id":11,"question":"A sales rep wants to be able to categorize multiple picklist values into a single value on a\nreport. Which option should a Platform Administrator suggest to the sales rep to accomplish this?","options":{"A":"Bucket Column","B":"Unique Count","C":"Report Filter","D":"Chart"},"correct":["A"],"explanation":"A Bucket Column in a Salesforce report allows a user to group multiple field values into larger, more\nmeaningful categories (buckets) without needing to create a new custom field or modify the\nunderlying data.\nFor instance, if a \"Industry\" picklist has twenty different values like \"Banking,\" \"Insurance,\" and\n\"Venture Capital,\" a sales rep can create a bucket called \"Financial Services\" and place all three values\ninside it. When the report is run, these records are displayed under the \"Financial Services\" header.\n\n\nThis is the ideal solution for ad-hoc reporting needs where the user wants to see data summarized in\na way that doesn't exactly match the existing picklist structure. Report Filters (Option C) would\nexclude data rather than categorizing it.\nUnique Count (Option B) simply tells you how many distinct values exist in a column. Charts (Option\nD) are for visualization. Bucketing is a powerful, self-service tool for users to reorganize data for\nanalysis.","category":"Data & Analytics Management"},{"id":12,"question":"Universal Containers has two sales teams, sales team A and sales team B. Each team has their\nown role in the role hierarchy. Both roles are subordinates of the same Manager role. How should a\nPlatform Administrator share records owned by sales team A with sales team B?","options":{"A":"Criteria-based sharing","B":"Owner-based sharing","C":"Hierarchical sharing","D":"Manual sharing"},"correct":["B"],"explanation":"In this scenario, the two teams are \"peers\" in the role hierarchy (both reporting to the same\nmanager). In a private sharing model, peers cannot see each other's records by default. To grant\nlateral access between these specific groups, an Owner-based Sharing Rule is the most effective\nsolution. The administrator can create a rule stating that any records owned by members of \"Role:\nSales Team A\" should be shared with members of\n\"Role: Sales Team B\" with specific access levels (e.g., Read/Write). Hierarchical sharing (Option C)\nonly grants upward visibility to the Manager role, not across to the other team34. Manual sharing\n(Option D) is inefficient for an entire team35. Criteria-based sharing (Option A) is used when record\nfield values determine access, whereas this requirement is based specifically on who owns the\nrecords36.","category":"Data & Analytics Management"},{"id":13,"question":"The client services and customer support teams share the same profile but have different\npermission sets. The custom object Retention related list needs to be restricted to the client services\nteam on the Lightning record page layout. What should a Platform Administrator use to fulfill this\nrequest?","options":{"A":"Page Layout Assignment","B":"Component Visibility","C":"Record Type Assignment","D":"Sharing Settings"},"correct":["B"],"explanation":"When users share the same profile but require different user interface experiences, Component\nVisibility is the most effective tool. In the Lightning App Builder, the administrator can select the\n\"Related List\" component (or a \"Related List - Single\" component for Retention) and add a visibility\nfilter. The filter can be set to \"User > Permission > Custom Permission\" or \"User > Profile,\" but since\nthey share a profile, the best approach is to filter based on a Permission Set or a specific user field.\nThis allows the Retention list to be visible only to the Client Services team members while remaining\nhidden for the Customer Support team, even though they are looking at the same record. Page\nLayout Assignment (Option A) and Record Type Assignment (Option C) are profile-based and would\n\n\nnot work since the teams share a profile. Sharing Settings (Option D) control access to the data itself,\nbut the request specifically asks to hide the UI element (the related list).","category":"Object Manager & Lightning App Builder"},{"id":14,"question":"Users at Cloud Kicks want to see information that is more useful for their role on the Case\npage. How should a Platform Administrator make the pages more dynamic and easier to use?","options":{"A":"Add component visibility filters to the components.","B":"Include more tab components with filters.","C":"Remove fields from the record details component.","D":"Delete the extra components from the page."},"correct":["A"],"explanation":"In the Lightning App Builder, Component Visibility Filters allow an administrator to show or hide parts\nof a record page based on specific criteria, such as the user's profile, a field value, or the record type.\nThis is the best way to make pages \"dynamic.\" For example, the administrator can configure a\n\"Financial Details\" component to only appear when the user viewing the case has the \"Finance User\"\nprofile, or hide a \"Recall Instructions\" component unless the \"Case Reason\" is set to \"Product\nDefect.\" This prevents \"information overload\" by ensuring that users only see the tools and data\nrelevant to their specific role or the current state of the record. Simply deleting components (Option\nD) or removing fields (Option C) would affect all users equally, failing to provide role-specific utility.\nComponent visibility creates a personalized, streamlined experience that improves user productivity\nand reduces clutter on complex record pages.","category":"Object Manager & Lightning App Builder"},{"id":15,"question":"A Platform Administrator at Cloud Kicks has set up a junior administrator as a delegated\nadministrator in Salesforce. What should the Platform Administrator consider regarding delegated\nadministrators?","options":{"A":"Delegated administrators can unlock users but cannot reset passwords.","B":"Delegated administrators can update field-level security on standard objects.","C":"Delegated administrators cannot modify permission sets.","D":"Delegated administrators cannot assign users to profiles."},"correct":["C"],"explanation":"Delegated Administration is a powerful feature that allows a System Administrator to pass off specific\nadministrative tasks to non-admin users without granting them the full \"Modify All Data\" permission.\nHowever, there are strict security boundaries to what a delegated admin can do. One of the most\ncritical limitations is that delegated administrators cannot modify permission sets. They are primarily\nintended to manage users within specific roles, reset passwords, and manage specific custom objects.\nWhile they can assign users to certain profiles that have been explicitly allowed in the Delegated\nAdministration group configuration, they are not permitted to manage the broader security\narchitecture of the org, such as Permission Sets or Field-Level Security (Option B). This ensures that\nwhile junior staff can handle day-to-day user maintenance (like unlocking users, contrary to Option\nA), they cannot inadvertently elevate their own permissions or those of others through permission\nset manipulation.","category":"Configuration & Setup"},{"id":16,"question":"Which two data loss considerations should a Platform Administrator keep in mind when\nchanging a custom field type from Text to Picklist?","options":{"A":"Auto updates will be made to Visualforce references to prevent data loss.","B":"Any list view based on the custom field is deleted.","C":"There will be no data loss with use of a global value set.","D":"Assignment and escalation rules may be affected."},"correct":["B","D"],"explanation":"Changing a field type is a significant configuration change that can have downstream impacts. When\nconverting from Text to Picklist, a Platform Administrator must be aware of two critical\nconsequences:\n* List View Deletion:Any list views that use that specific custom field as a filter will be automatically\ndeleted or the filter will be removed. This happens because the filter logic for a text field (which uses\noperators like \"contains\") is fundamentally different from a picklist (which uses \"equals\").\n* Automation Impact: Assignment rules, escalation rules, and validation rules that reference the field\nmay be disabled or function incorrectly. Because these automations rely on specific text strings,\nchanging the field to a picklist requires the administrator to manually review and update the logic to\nensure it aligns with the new picklist values.\nOption A is incorrect because Salesforce does not automatically update code references. Option C is\nincorrect because data loss can still occur if existing text values do not exactly match the new picklist\nentries.","category":"Object Manager & Lightning App Builder"},{"id":17,"question":"Cloud Kicks has been seeing exponential growth and will be hiring an additional 10 sales reps\nand 15 support reps to its teams. The support team will need access to the Service Console to\nmanage cases. A Platform Administrator will be assigning the users to existing custom sales and\nsupport profiles. How should the administrator ensure the support reps have the appropriate access\nto the console?","options":{"A":"Enable the Service Cloud User feature license for the support reps on the User Detail page.","B":"Create a permission set for the Service Console and assign it to the support reps.","C":"Build a Service Console using Lightning App Builder for the custom service profile.","D":"Assign the Salesforce Platform User License to the support reps."},"correct":["A"],"explanation":"Access to the Service Console and other advanced Service Cloud features (like Entitlements or\nKnowledge) requires a specific Feature License called the Service Cloud User. Even if a user's profile\nhas the \"Manage Cases\" permission, they will not be able to access the specialized Console app\nunless the \"Service Cloud User\" checkbox is selected on their individual User record. This is a\ncommon administrative step when onboarding new support staff. Permission sets (Option B) grant\nfunctional permissions but cannot grant feature licenses. Assigning a \"Platform User License\" (Option\nD) would actually restrict them, as that license type does not include access to standard CRM objects\nlike Cases or the Service Console.","category":"Service & Support Applications"},{"id":18,"question":"What is an Agentforce use case in a sales organization?","options":{"A":"Generating cold calls","B":"Automating all marketing content","C":"Providing basic web bot chats","D":"Automating Lead Qualification"},"correct":["D"],"explanation":"Agentforce is designed to handle sophisticated, multi-step business processes that traditionally\nrequire human intervention. In a sales organization, a primary use case is Automating Lead\nQualification. Unlike basic web bots (Option C) that follow a rigid, pre-defined script, an Agentforce\nagent can engage in natural language conversations with prospects. It can ask relevant discovery\nquestions, handle objections, and determine if a lead meets the company's \"Qualified\" criteria based\non the information provided. Once qualified, the agent can autonomously update the Salesforce\nrecord or even book a meeting for a human sales representative.\nWhile AI can assist with content, \"automating all marketing content\" (Option B) is overly broad and\ntypically handled by specialized marketing tools. Generating cold calls (Option A) involves voice\ntechnology and legal complexities that are not the core focus of the Agentforce platform's digital\nagent capabilities. Lead qualification represents a high-value, repeatable process that perfectly\nleverages the agent's ability to reason and interact with Salesforce data.","category":"Agentforce AI"},{"id":19,"question":"The Cloud Kicks CFO requires any opportunity over $100,000 to be automatically sent to\nthem, so they can sign off on the record before the deal closes. Which feature should a Platform\nAdministrator use to fulfill this requirement?","options":{"A":"Submit for Approval button","B":"Einstein Next Best Action","C":"Apex Triggers","D":"Flow Approvals"},"correct":["D"],"explanation":"The requirement to have a record \"signed off\" by a specific individual (the CFO) based on a dollar\nthreshold is a classic use case for an Approval Process. While the \"Submit for Approval\" button\n(Option A) allows a user to manually start the process, the prompt specifies that the process should\nhappen \"automatically\"50. To achieve this automation, the Platform Administrator should use Flow\nBuilder to trigger the approval process.\nA Record-Triggered Flow can be set to run when an Opportunity is created or updated and meets the\ncriteria (Amount > $100,000). The flow would then use the \"Submit for Approval\" action to launch\nthe record into the predefined approval process without requiring the sales rep to click a button.\nEinstein Next Best Action (Option B) is a recommendation tool, not a workflow enforcement tool54.\nApex Triggers (Option C) could perform this task, but Salesforce best practices recommend using\n\"clicks not code\" (Flow) whenever possible for such requirements. Using Flow to launch an Approval\nProcess provides the necessary automation, routing, and audit trail the CFO requires","category":"Automation"},{"id":20,"question":"Cloud Kicks uses the standard Account Type field to indicate different account tiers. Users\nfind this confusing, so management has asked that the field be changed to read \"Tier\" on the page\nlayouts. How should a Platform Administrator implement this change?","options":{"A":"Edit the Type field and change the name.","B":"Use Rename Tabs and Labels.","C":"Build a custom field called Tier and delete Type.","D":"Create a global picklist value set."},"correct":["B"],"explanation":"To change the display name of a standard field (like \"Account Type\") globally across the entire\norganization, the correct tool is Rename Tabs and Labels in the Setup menu. This tool allows an\nadministrator to modify the singular and plural labels for standard objects and the field labels for\ntheir standard fields. By renaming\n\"Type\" to \"Tier,\" the change will be reflected on page layouts, in report column headers, and in list\nviews.\nThis is the preferred method because it preserves the underlying data and logic associated with the\nstandard field. Option A is incorrect because standard field names cannot be edited in the \"Fields and\nRelationships\" menu. Option C is a destructive and complex process that would require data\nmigration and could break existing reports or integrations. Option D does not address the label of the\nfield itself.","category":"Object Manager & Lightning App Builder"},{"id":21,"question":"In an approval process, which feature allows a user to temporarily assign their approval\nresponsibilities to another user for a predefined time period?","options":{"A":"Approval Rule","B":"Queue","C":"Delegated Approver","D":"Manager"},"correct":["C"],"explanation":"A Delegated Approver is a user designated by an individual or an administrator to act on their behalf\nwhen an approval request is received. This is particularly useful for planned absences, such as\nvacations. While the delegated approver has the power to approve or reject a record, they cannot\nreassign the request to someone else. This is a temporary manual assignment and is different from a\nManager (Option D), who is part of the permanent role hierarchy, or a Queue (Option B), which\nallows a group of people to share approval tasks.\nThere is no feature called an \"Approval Rule\" (Option A) that handles temporary user reassignment in\nthis manner.","category":"Configuration & Setup"},{"id":22,"question":"A Platform Administrator needs to configure an approval process for the sales team when\nopportunities that meet particular conditions are closed. How should the administrator make sure\nthe right records are included in the process?","options":{"A":"Add Specific Entry Criteria.","B":"Use Dynamic Forms to display a button.","C":"Create a screen flow.","D":"Add a validation rule to the opportunity."},"correct":["A"],"explanation":"The fundamental way to control which records enter an Approval Process is by defining Entry Criteria\n.\nDuring the setup of an approval process, the administrator specifies field-level conditions (e.g.,\nAmount >\n50,000 AND Stage = Closed Won) that a record must meet to be eligible for approval. If a user\nattempts to submit a record that does not meet these criteria, Salesforce will display an error\n\n\nmessage and prevent the process from starting. This ensures that the finance or management teams\nare only notified of deals that actually require their sign-off. While a Screen Flow (Option C) could be\nused to launch the process, the entry criteria within the approval process itself act as the ultimate\n\"gatekeeper\" for the automation. Validation rules (Option D) prevent bad data but do not route\nrecords for approval. Dynamic Forms (Option B) can show or hide the \"Submit for Approval\" button,\nbut they do not enforce the underlying business logic of the process itself.","category":"Automation"},{"id":23,"question":"At Cloud Kicks, sales reps use discounts on the opportunity record to help win sales on\nparticular products.\nWhen an opportunity is won, they then have to manually apply the discount to the related\nopportunity products. The sales manager has asked if there is a way to automate this time-consuming\ntask. What should a Platform Administrator use to deliver this requirement?","options":{"A":"Approval Process1","B":"Formula Field2","C":"Flow Builder3","D":"Prebuilt Macro4"},"correct":["C"],"explanation":"To automate the update of related records (Opportunity Products) based on a change to a parent\nrecord (the Opportunity), Flow Builder is the most powerful and app7ropriate tool. Specifically, a\n\"Record-Triggered Flow\" can be configured to fire whenever an Opportunity is updated to the\n\"Closed Won\" stage. The flow can then use a \"Get Records\" element to find all Opportunity Product\nrecords associated with that specific Opportunity and an \"Update Records\" element to apply the\ndiscount value from the parent to each line item.\nFormula Fields are insufficient here because they are \"read-only\" and cannot physically push data\ninto other records for permanent storage. Approval Processes manage status changes but are not\ndesigned for bulk child- record updates. Flow Builder provides the logic necessary to handle this \"one\n-to-many\" update scenario, significantly reducing manual data entry for sales reps and ensuring that\nthe financial data on the products accurately reflects the agreed-upon deal terms.","category":"Automation"},{"id":24,"question":"Ursa Major Solar wants to roll out the Salesforce mobile app, and the first information it\nwants its users to see is the Top Opportunities report. What should a Platform Administrator\nconfigure to achieve this?","options":{"A":"Add the Reports tab to the Salesforce mobile app.","B":"Enable Today for the Salesforce mobile app.","C":"Enable Mobile Home for the Salesforce mobile app.","D":"Add the Dashboards tab to the Salesforce mobile app."},"correct":["C"],"explanation":"Mobile Homeis a customizable landing page for the Salesforce mobile app that acts as the default\n\"start page\" for users. It allows administrators to add various \"cards\" or \"widgets,\" including reports,\npinned records, and upcoming events. By enabling and configuring Mobile Home, a Platform\nAdministrator can place a specific Report card (such as \"Top Opportunities\") at the very top of the\nscreen, ensuring it is the first thing users see upon opening the app. While adding the Reports tab\n(Option A) or Dashboards tab (Option D) allows users to find the information, it does not\n\n\nautomatically present specific report data on the home screen. The \"Today\" feature (Option B)\nfocuses on calendar events and tasks rather than customized reporting data17.","category":"Productivity & Collaboration"},{"id":25,"question":"A Platform Administrator at Cloud Kicks would like to use Salesforce to start tracking details\naround its marketing efforts. They would like to track details around emails, trade shows, and\nwebinars. Additionally, each of these initiatives will need to track different types of information. How\nshould the administrator accomplish this?","options":{"A":"Create a custom report type with relevant fields.","B":"Create a custom field on the Campaign object for the type of initiative.","C":"Create record types and page layouts for each type of campaign.","D":"Use campaign hierarchies to organize campaign types."},"correct":["C"],"explanation":"When a single object like Campaigns needs to support different \"types\" of marketing initiatives that\nrequire different fields or picklist values, the correct architectural solution is to use Record Types and\nPage Layouts.\nBy creating distinct record types for \"Email,\" \"Trade Show,\" and \"Webinar,\" the Platform\nAdministrator can assign a unique Page Layout to each. For example, the Trade Show layout might\ninclude fields for \"Booth Number\" and \"Travel Costs,\" while the Webinar layout might include\n\"Webinar URL\" and \"Platform Provider.\" This ensures that users only see the fields that are relevant\nto the specific type of campaign they are running, improving data quality and the user experience.\nWhile adding a custom field (Option B) would allow for categorization, it wouldn't hide irrelevant\nfields for different initiatives. Campaign Hierarchies (Option D) are used for relating parent and child\ncampaigns but do not manage the specific data entry requirements for different initiative types.","category":"Object Manager & Lightning App Builder"},{"id":26,"question":"Sales reps miss key fields when filling out an opportunity record through the sales process.\nReps need to move forward in stages but are unable to enter a previous stage. Which three options\nshould a Platform Administrator use to address this need?","options":{"A":"Mark fields required on the page layout.","B":"Use Flow to mark fields required.","C":"Configure Opportunity Path.","D":"Use validation rules.","E":"Enable guided selling."},"correct":["A","C","D"],"explanation":"To ensure data integrity and guide sales reps through a structured process, a Platform Administrator\nshould use a combination of tools. Opportunity Path (Option C) provides a visual representation of\nthe stages and allows the admin to highlight \"Key Fields\" and \"Guidance for Success\" for each stage,\nmaking it clear what information is needed to progress. To enforce the entry of that data, Validation\nRules (Option D) are used to prevent a user from moving to the next stage if specific fields are blank\n(e.g., AND(IsChanged(StageName), IsBlank(Discovery_Notes__c))). Additionally, marking fields as\nrequired on the Page Layout (Option A) ensures that the most fundamental data points are always\ncaptured. While Flow (Option B) can perform many tasks, it is not the primary way to mark fields as\n\"required\" in the UI. \"Guided Selling\" (Option E) is a specific term often associated with Salesforce\nCPQ rather than standard Opportunity management. Using Path, Validation Rules, and Page Layout\n\n\nrequirements provides a robust framework for managing the sales lifecycle effectively.","category":"Object Manager & Lightning App Builder"},{"id":27,"question":"A Platform Administrator wants to limit the kinds of reports their users can create. Which tool\nshould the administrator use?","options":{"A":"Hide Report Types","B":"Report Folder Sharing","C":"Standard Report Types","D":"Joined Report"},"correct":["A"],"explanation":"When users click the \"New Report\" button, they are presented with a list of Report Types, which act\nas templates determining which objects and fields are available for the report. Often, an org has\nmany standard report types that are irrelevant or confusing to the average user. To \"limit the kinds of\nreports\" and simplify the user experience, a Platform Administrator can use the Select Report Types\nto Hide feature in the Report and Dashboard Settings. By hiding unnecessary or redundant report\ntypes, the admin ensures that users only see the specific templates that align with company reporting\nstandards. This reduces the risk of users creating inaccurate reports using the wrong data models.\nReport Folder Sharing (Option B) controls who can view or edit existing reports, but it does not\nrestrict the creation of new ones from specific templates. While creating Custom Report Types is a\nway to define what data is available, the specific act of \"limiting\" the visible list is handled by the\n\"Hide\" functionality.","category":"Configuration & Setup"},{"id":28,"question":"A Platform Administrator for Cloud Kicks needs to ensure that only the financial records\nbelonging to each individual user are visible on the report in order to meet scope of the data privacy\nrequirements. How should the administrator achieve this?","options":{"A":"Set sharing model as Public Read/Write for the respective object(s).","B":"Set sharing model as Private for the respective object(s).","C":"Create multiple reports, each filtered to show records owned by each user.","D":"Use Apex sharing to hide records."},"correct":["B"],"explanation":"The foundation of Salesforce data security is the Organization-Wide Default (OWD). To ensure that\nusers can only see their own records (and those above them in the hierarchy), the administrator must\nset the OWD for the object to Private. When an object is private, a user can only see records they\nown. When that user runs a report, the report engine automatically respects these sharing settings\nand only displays the records the user is authorized to see. This is a much more secure and scalable\nsolution than creating separate reports for every user (Option C). Option A (Public Read/Write) would\nallow everyone to see everything, violating the privacy requirement. Option D (Apex sharing) is a\ncomplex coding solution that is unnecessary when the standard\n\"Private\" sharing model fulfills the requirement through simple configuration.","category":"Configuration & Setup"},{"id":29,"question":"A Platform Administrator at Ursa Major Solar imported records into an object by mistake.\nWhich two tools should the administrator use to undo this import?","options":{"A":"Weekly Data Export","B":"Data Loader","C":"Data Import Wizard","D":"Mass Delete Records"},"correct":["B","D"],"explanation":"To \"undo\" a mistaken import, the administrator must delete the incorrectly created records. Two\nstandard tools facilitate this:\n* Mass Delete Records (Option D):This is a browser-based tool in Setup that allows administrators to\ndelete up to 250 records at a time (standard) or use criteria to identify and remove larger sets of\nrecords.\nIt is the quickest way for smaller mistakes.\n* Data Loader (Option B): For large-scale errors, the administrator can use the Success file generated\nduring the original import (which contains the new record IDs) and perform a \"Delete\" operation.\nThe Data Import Wizard (Option C) is for adding or updating data, but it does not have a \"Delete\"\nfunction.\nWeekly Data Export (Option A) is a backup tool and cannot be used to remove existing data from the\nsystem.","category":"Configuration & Setup"},{"id":30,"question":"There are multiple system administrators at Cloud Kicks that make configuration changes.\nWhich tool gives the system administrators the ability to track these changes?","options":{"A":"Health Check","B":"Setup Audit Trail","C":"History Tracking","D":"Feed Tracking"},"correct":["B"],"explanation":"The Setup Audit Trail is the primary tool for tracking administrative and configuration changes within\na Salesforce organization. It records a history of modifications made by any administrator, including\nthe date and time of the change, which user made it, and exactly what was altered (e.g., creating a\nnew field, changing a profile permission, or modifying a workflow rule). The history is available for\nthe last six months of activity. Health Check (Option A) is a security tool that compares your settings\nagainst Salesforce standards.\nHistory Tracking (Option C) and Feed Tracking (Option D) are used to track changes to records (like an\nAccount's phone number), whereas the Setup Audit Trail is dedicated to tracking metadata and\nsystem configuration.","category":"Configuration & Setup"},{"id":31,"question":"A Platform Administrator has been asked to change the data type of an auto number to a text\nfield. What should the administrator be aware of before changing the field?99","options":{"A":"Existing field values will remain unchanged.","B":"Changing Auto Number field to Text is prevented.","C":"Existing field values will be deleted.","D":"Existing field values will be converted."},"correct":["A"],"explanation":"In Salesforce, when a Platform Administrator changes a field's data type from Auto Number to Text,\nthe operation is considered \"safe\" regarding data retention. The existing values that were\n\n\nautomatically generated by the system (e.g., \"INV-1001\") will remain unchanged and stay within the\nfield as static text strings12.\nHowever, once the change is saved, the system will no longer increment or automatically generate\nnew numbers for future records; users will have to enter data manually. It is important to note that\nthe reverse operation-changing a Text field to an Auto Number-is different, as it would require the\nadministrator to decide whether to overwrite existing data or only number new records14. Options\nB, C, and D are incorrect because Salesforce explicitly supports this specific conversion without\ndeleting or fundamentally transforming the existing data into a different format other than plain text.","category":"Configuration & Setup"},{"id":32,"question":"Ursa Major Solar has its business hours set from 9:00 AM to 5:00 PM for the reps that are on\nPacific Time.\nThe reps on Eastern Time need business hours set to start 3 hours earlier to cover for support. How\nshould a Platform Administrator solve for this issue?","options":{"A":"Adjust the current business hours to accommodate the Eastern time zone.","B":"Allow the reps to set business hours manually.","C":"Set temporary business hours for each time zone.","D":"Create one set of business hours per time zone."},"correct":["D"],"explanation":"Salesforce allows for the creation of multiple Business Hours records to support global teams working\nin different time zones. To solve the requirement for Ursa Major Solar, the Platform Administrator\nshould create two distinct sets of business hours: one for \"Pacific Support\" (9 AM - 5 PM PT) and one\nfor \"Eastern Support\" (9 AM - 5 PM ET). This is essential because Business Hours are used by the\nsystem to calculate escalation rules and milestones correctly. For example, an escalation rule for an\nEastern-based case 1should start counting at 9 AM ET, not 9 AM PT. Adjusting the current record to\n\"accommodate\" both (Option A) would result in a 12-hour window that doesn't accurately reflect\neither team's true availability. Users cannot manually set their own business hours (Option B) in a\nway that affects system automation. Creating one set per time zone ensures that the support team's\nperformance metrics and automated routing are accurate and localized.","category":"Service & Support Applications"},{"id":33,"question":"Ursa Major Solar wants to assist users with a guided expense report process to simplify\nsubmissions, routing, and authorizations. Which two tools should a Platform Administrator use to\nbuild this solution?","options":{"A":"Validation Rule","B":"Quick Action","C":"Flow Builder","D":"Approval Process"},"correct":["C","D"],"explanation":"To create a \"guided\" experience combined with \"routing and authorizations,\" a Platform\nAdministrator should leverage the power of Flow Builder and the Approval Process engine. Flow\nBuilder is used to create the user- facing interface (Screen Flow) that guides the employee through\nthe expense report submission, ensuring all necessary data is collected in a structured way. This\nreplaces a static page layout with a dynamic, step-by-step wizard. Once the data is captured and the\nrecord is created, the Flow can automatically submit the record into an Approval Process. The\n\n\nApproval Process then handles the \"routing and authorizations\" by sending the report to the\nappropriate manager or director for sign-off. While Quick Actions (Option B) can launch flows, they\nare a entry point rather than the logic engine itself. Validation Rules (Option A) only prevent errors\nbut do not guide users or route records. Together, Flow and Approvals provide a seamless end-toend automation for complex business requirements like expense management.","category":"Automation"},{"id":34,"question":"A sales rep has a list of 300 accounts with contacts that they want to load at one time. Which\ntool should a Platform Administrator utilize to import the records to Salesforce?","options":{"A":"Dataloader.io","B":"Manual Import","C":"Data Import Wizard","D":"Data Loader"},"correct":["C"],"explanation":"The Data Import Wizard is the ideal tool for importing a relatively small number of records (up to\n50,000) when those records involve standard objects like Accounts and Contacts simultaneously. One\nof the unique strengths of the Data Import Wizard is its ability to handle \"Account and Contact\"\nimports in a single pass, automatically linking the contacts to the correct accounts based on name or\nsite. Because the volume in this request is only 300 records, the Data Import Wizard provides a\nsimple, browser-based interface that includes built-in duplicate checking, which is highly beneficial\nfor maintaining data quality. While the Data Loader (Option D) and Dataloader.io (Option A) can also\nhandle 300 records, they are typically reserved for much larger datasets (up to 5 million records) or\nmore complex objects. The \"Wizard\" is the most user-friendly and efficient choice for this specific\nsales rep request.","category":"Sales & Marketing Applications"},{"id":35,"question":"A Platform Administrator has reviewed an upcoming critical update. How should the\nadministrator proceed with activation of the critical update?","options":{"A":"Allow the critical update to auto-activate in a sandbox.","B":"Activate the critical update in production.","C":"Activate the critical update in a sandbox.","D":"Allow the critical update to auto-activate."},"correct":["C"],"explanation":"Salesforce Critical Updates (now often called Release Updates) can significantly change the behavior\nof the platform, potentially impacting custom code, integrations, or existing automation. The best\npractice for any Platform Administrator is to activate and test the update in a Sandbox environment\nfirst. This allows the administrator to identify and resolve any breaking changes without disrupting\nthe live business operations in Production. Only after the update has been thoroughly vetted and all\nnecessary adjustments have been made should the update be activated in the Production\nenvironment. Allowing an update to \"auto-activate\" (Options A and D) is risky because it removes the\nadministrator's control over the timing and testing of the change.\nActivating directly in Production (Option B) bypasses the essential quality assurance steps that are\nfundamental to professional org management.","category":"Automation"},{"id":36,"question":"A Platform Administrator is building an agent to help an ecommerce support team. The agent\n\n\nneeds to call an action, named updateShippingAddress, that modifies a customer's shipping address\nin the system. Which set of Action Instructions should the administrator use for the\nupdateShippingAddress action, according to best practices?","options":{"A":"\"Use this to update shipping information. It's used for any changes to a customer's address in the system.\"","B":"\"This action updates the customer's shipping address. It is to be used when a user wants to change their address. Only use this when a customer does not have an active order in the system.\"","C":"\"This action allows for the changing of a shipping address, and the goal is to make sure the address is current and accurate.\"","D":"\"Updates the shipping address for a customer order. The goal of the action is to modify the address on a customer's record. The agent should only use this action when the user explicitly requests to change their address.\""},"correct":["D"],"explanation":"According to Agentforce best practices, action instructions must be highly specific regarding the\naction's purpose, the expected goal, and the conditions under which it should be triggered. Option D\nis the strongest set of instructions because it defines the Action (Update shipping address), the Goal\n(Modify address on a record), and a clear Constraint/Guardrail (Only use when the user explicitly\nrequests it). This prevents the AI from accidentally triggering a data change based on a vague inquiry.\nOption B is also good but more restrictive than necessary unless the business logic specifically forbids\nupdates during active orders. Option D provides the best balance of context and intent, ensuring the\nLarge Language Model (LLM) understands the\n\"why\" and \"when\" of the action.","category":"Agentforce AI"},{"id":37,"question":"Ursa Major Solar wants to automatically notify a manager about any cases awaiting a\nresponse from an agent for more than 2 hours after case creation. Which feature should a Platform\nAdministrator use to fulfill this requirement?","options":{"A":"Assignment Rule","B":"Case Escalation Rule","C":"Formula field","D":"Omni-Channel Supervisor"},"correct":["B"],"explanation":"Case Escalation Rules are the dedicated tool for time-based notifications and reassignments in\nService Cloud.\nThe Platform Administrator can set an escalation rule entry that triggers when a case is \"Older than 2\nhours\" and meets specific status criteria (e.g., Status = New). The rule can then be configured to send\nan Email Notification to a manager or a specific distribution list. This ensures that management is\nalerted to potential SLA breaches. Assignment Rules (Option A) only run when a case is first created.\nFormula fields (Option C) can calculate time but cannot send notifications. Omni-Channel Supervisor\n(Option D) allows for real-time monitoring but does not provide automated email alerting based on\nspecific time-elapsed thresholds.","category":"Service & Support Applications"},{"id":38,"question":"A Platform Administrator at Ursa Major Solar wants to add prepopulated subjects for Tasks\nand Events.\n\n\nTasks should have the subjects \"Schedule Site Visit\" and \"Send Contract\", while Events should have\nthe subjects \"Site Visit\" and \"Ride Along\". What should the administrator configure to achieve this\nrequirement?","options":{"A":"Add the new values to the predefined field values for the global actions New Event and New Task.","B":"Add Schedule Site Visit and Send Contract picklist values for the Task subject field. Add Site Visit and Ride Along picklist values for the Event subject field.","C":"Create a new custom Subject picklist field on Activity and add the field values.","D":"Include Schedule Site Visit, Send Contract, Site Visit, and Ride Along picklist values for the Activity subject field."},"correct":["B"],"explanation":"Tasks and Events are both part of the Activity object, but they often require different picklist values\nfor the standard Subject field. To achieve this, the Platform Administrator must manage the picklist\nvalues for the Subject field specifically for each record type or activity type. In the Object Manager,\nunder the Activity object (or Task/Event objects individually in some setups), the admin should edit\nthe Subject field. Because Task and Event are distinct entities with their own picklist value sets for the\nSubject field, the admin can add\n\"Schedule Site Visit\" and \"Send Contract\" to the Task Subject list and \"Site Visit\" and \"Ride Along\" to\nthe Event Subject list. This ensures that when a user creates a Task, they only see task-related\nsubjects, and when they create an Event, they see event-related subjects. Option D is incorrect\nbecause it would mix all values together, causing confusion for the users. Option A (Predefined Field\nValues) is used to set a single default value for a field when an action is clicked, but it does not\nmanage the available list of options in a picklist.","category":"Object Manager & Lightning App Builder"},{"id":39,"question":"How should a Platform Administrator view Currencies, Fiscal Year settings, and Business\nHours in Salesforce?","options":{"A":"User Management Settings","B":"Company Settings","C":"Custom Settings","D":"Feature Settings"},"correct":["B"],"explanation":"In the Salesforce Setup menu, Company Settings (formerly Company Profile) is the central location\nwhere global organizational parameters are managed. This section contains several key settings.\nUnder Company Information, the admin can view the Org ID, default time zone, and primary\ncurrency. The Fiscal Year settings allow the admin to define whether the organization follows a\nstandard Gregorian calendar or a custom fiscal cycle. Business Hours are used to define the working\ntimes for the organization, which is critical for calculating milestones in Service Cloud or escalation\nrules. If Multi-Currency is enabled, this is also where exchange rates and active currencies are\nmanaged. Viewing and configuring these settings is a foundational task for any Platform\nAdministrator, as they establish the baseline for how data is interpreted and how time- based\nautomation functions across the entire instance. Ensuring these are correct is vital for accurate\nfinancial reporting and maintaining service level agreements (SLAs).","category":"Configuration & Setup"},{"id":40,"question":"A user at Northern Trail Outfitters is having trouble logging in to Salesforce. The user's login\n\n\nhistory shows that this person has attempted to log in multiple times and has been locked out of the\norganization. Which two steps should a Platform Administrator take to help the user log in to\nSalesforce?","options":{"A":"Log in as the user to unlock the user and reset the password.","B":"Use the unlock button on the user's record detail page.","C":"Reset password on the user's record detail page.","D":"Reset the password policies to allow the user to login."},"correct":["B","C"],"explanation":"When a user is locked out of Salesforce due to too many incorrect login attempts, the Platform\nAdministrator must take specific actions on the user's record detail page to restore access. First, the\nadministrator should click the Unlock button19. This clears the lockout status immediately20. Second,\nbecause the user likely forgot their credentials (causing the failed attempts), the administrator should\nuse the Reset Password button21. This sends a temporary link to the user's email, allowing them to\ncreate a new password and log in successfully. \"Logging in as the user\" (Option A) is a\ntroubleshooting tool for existing sessions but cannot bypass a lockout or change a password on the\nuser's behalf. Changing \"Password Policies\" (Option D) would affect the entire organization and is not\na valid way to help a single locked-out individual.","category":"Configuration & Setup"},{"id":41,"question":"Sales managers would like to know what could be implemented to surface important values\nbased on the stage of the opportunity? Which tool should a Platform Administrator use to meet this\nrequirement?","options":{"A":"Workflow Rules","B":"Path Key Fields","C":"Opportunity Processes","D":"Dynamic Forms"},"correct":["B"],"explanation":"The Opportunity Path is a visual tool that guides sales reps through the stages of a sales cycle. One of\nits most powerful features for administrators is the ability to define Key Fields for each individual\nstage. For example, when an opportunity is in the \"Discovery\" stage, the administrator can choose to\ndisplay fields like \"Budget\" and \"Decision Maker.\" When the deal moves to \"Negotiation,\" the Path\ncan be configured to surface\n\"Contract Terms\" and \"Discount Percentage.\" This ensures that reps are prompted to enter and\nreview the most relevant data at exactly the right time in the process. While Dynamic Forms (Option\nD) can show or hide fields on the main record page, the Path specifically organizes this information at\nthe top of the record in a way that is directly tied to the sales methodology. Workflow Rules (Option\nA) are a legacy automation tool that cannot modify the user interface. Path Key Fields empower sales\nteams to maintain focus and data accuracy throughout the deal lifecycle.","category":"Automation"},{"id":42,"question":"A Platform Administrator needs to enable Agentforce for the service team. What is the most\ncritical prerequisite for ensuring the Service Agents have a complete and accurate view of their\ncustomers?","options":{"A":"Activate Email-to-Case for the agent.","B":"Configure a new Service Console layout.","C":"Verify Data Cloud is implemented.","D":"Create new user profiles for the agent."},"correct":["C"],"explanation":"For an AI agent to provide \"complete and accurate\" support, it needs access to a unified, 360-degree\nview of the customer data. Data Cloud is the critical prerequisite because it ingests, harmonizes, and\nunifies data from multiple sources (Salesforce, external databases, legacy systems) into a single\n\"Unified Profile.\" When Agentforce is \"grounded\" in Data Cloud, it can reference real-time customer\ninteractions, purchase history, and cross-channel behavior that might not exist in a single Case or\nContact record. Without Data Cloud, the agent's knowledge is limited to siloed data, which increases\nthe risk of providing incomplete or irrelevant answers. While Console layouts (Option B) and intake\nmethods (Option A) are important for the UI, they do not provide the data foundation necessary for\nadvanced AI reasoning.","category":"Service & Support Applications"},{"id":43,"question":"A Platform Administrator created a new prompt template and is testing it. Every time the\nadministrator tests the template, it gives a different response. Why is the prompt template giving\ndifferent responses each time it' s run?","options":{"A":"Prompt Builder caches the large language model's response, so the prompt is only sent once for every template the administrator creates.","B":"Every time the administrator runs a prompt template in Prompt Builder, it creates a unique call to the large language model.","C":"The prompt is only sent to the large language model after the administrator deploys the template to a live agent, not when the prompt is run in the builder.","D":"Prompt Builder runs a simulated call to the large language model to save on costs, so the prompt is never sent to the actual model."},"correct":["B"],"explanation":"Generative AI models are inherently probabilistic, meaning they do not produce the exact same\noutput every time, even when given the same input. When a Platform Administrator uses the Prompt\nBuilder to test a template, each \"Preview\" or \"Test\" execution initiates a fresh, unique call to the\nLarge Language Model (LLM). Because the LLM considers a range of linguistic possibilities and\nprobabilities for each word it generates, the resulting text will vary slightly (or significantly) with each\niteration. This behavior is expected and is a core characteristic of generative AI. To ensure consistent\nand high-quality results, administrators must refine their instructions to be as specific as possible,\nnarrowing the LLM's range of creative interpretation. Options A, C, and D are incorrect because the\nPrompt Builder is designed to provide real-time feedback from the actual LLM to help administrators\ndebug and perfect the prompt's logic before it is deployed to end-users or agents.","category":"Agentforce AI"},{"id":44,"question":"A Platform Administrator at Cloud Kicks has a flow in production that is supposed to create\nnew records.\nHowever, no new records are being created. What is causing the issue?","options":{"A":"The flow is inactive.","B":"The flow URL is deactivated.","C":"The flow is Read Only.","D":"The flow trigger is missing."},"correct":["A"],"explanation":"In Salesforce, a flow must be Active for it to execute in a production environment. When an\nadministrator builds or updates a flow, it is saved as a new version. Even if the logic is perfect and\npasses all debug tests, the flow will not run for end-users unless the administrator explicitly clicks the\n\"Activate\" button. If a flow is intended to create records but nothing is happening, the first\ntroubleshooting step is always to verify the status in the Flow Builder or the Flows list in Setup. A flow\nversion that is simply \"Saved\" but not \"Active\" will remain dormant. Option D is unlikely because the\nFlow Builder usually prevents saving a record-triggered flow without a trigger defined. Option C\n(\"Read Only\") is not a state that would prevent a flow from running.\nOption B (\"Flow URL\") only applies to specific types of screen flows launched via custom links,\nwhereas the question implies a general failure of the automation to execute.","category":"Automation"},{"id":45,"question":"Universal Containers (UC) has a private sharing model for Opportunities and uses Opportunity\nteams. Criteria- based sharing rules are not used. A sales rep at UC leaves the company, and their user\nrecord is deactivated.\nThe rep is later rehired in the same role. A Platform Administrator activates the old user record. The\nuser is added to the same default Opportunity teams but is no longer able to see the same records\nthe user worked on before leaving the company. What is the likely cause?","options":{"A":"The stage of the opportunity records was changed to Closed Lost.","B":"The record type of the opportunity records was changed.","C":"The records were manually shared with the user.","D":"Permission sets were removed when the user was deactivated."},"correct":["C"],"explanation":"In Salesforce, there are different types of sharing: Managed Sharing (Role Hierarchy, Sharing Rules)\nand Manual Sharing. A critical behavior of the platform is that when a user is deactivated, all their\nManual Shares (records shared with them by other users using the \"Share\" button) are automatically\nand permanently deleted from the system. Even if the user record is reactivated later, those manual\nshares do not return. Becaus
