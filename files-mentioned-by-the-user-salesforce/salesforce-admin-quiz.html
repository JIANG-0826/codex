 page layouts, one record type, two picklists","B":"Two permission sets, one record type, one picklist","C":"One record type, two profiles, one picklist","D":"One page layout, two record types, one picklist"},"correct":["A","D"],"explanation":"There are two primary ways to display different picklist values to different groups of users. The first,\nand most common, is using Record Types (Option C). A single picklist field can have its available\nvalues filtered at the Record Type level. By creating a \"Sales\" record type and a \"Marketing\" record\ntype, the admin can select which values are visible for each. These record types are then assigned to\nthe respective users' profiles.\nThe second method (Option D) involves using different Page Layouts and two separate picklist fields.\nIn this scenario, the admin creates two distinct fields (e.g., \"Sales Category\" and \"Marketing\nCategory\") and places only the relevant field on the page layout assigned to that specific team. This is\nless common but effective if the data needs to be stored in entirely different buckets. Option B is\nincorrect because profiles themselves do not filter picklist values; they only control which record\ntypes a user can access.","category":"Object Manager & Lightning App Builder"},{"id":101,"question":"How should a Platform Administrator provide users with individualized views of data on a\ndashboard?","options":{"A":"Add a Dashboard Filter to change the dashboard view.","B":"Create a Dynamic Dashboard.","C":"Set View Dashboard As to Me.","D":"Set View Dashboard As to Another person."},"correct":["B"],"explanation":"A Dynamic Dashboard is a specific type of dashboard where the data displayed changes based on\nwhich user is currently viewing it. By setting the \"View Dashboard As\" property to \"The logged-in\nuser,\" the dashboard components will respect each individual user's sharing settings, role hierarchy,\n\n\nand record ownership. For example, if a sales rep views a dynamic dashboard, they might only see\ntheir own $100k pipeline, while their manager viewing the same dashboard would see the team's\ncombined $1M pipeline. This eliminates the need for an administrator to create and maintain dozens\nof identical dashboards for different individuals.\nDashboard Filters (Option A) allow users to narrow down data but do not change the fundamental\n\"running user\" security context. Setting the dashboard to run as \"Me\" (the admin) or \"Another\nperson\" (Options C and D) creates a static view where everyone sees the same data, which is the\nopposite of providing an individualized view.","category":"Configuration & Setup"},{"id":102,"question":"The sales and service teams at Cloud Kicks would like to have more visibility into their\npipeline and stay on top of every case. A Platform Administrator needs to quickly create dashboards\nfor each of the teams but does not know where to start. What should the administrator do?","options":{"A":"Use the Salesforce Labs Field Service Dashboards for service teams from AppExchange.","B":"Enable Einstein Analytics and build custom dashboards using advanced analytics tools.","C":"Use the Salesforce Labs CRM Dashboards for sales teams from AppExchange.","D":"Manually create dashboards without using any prebuilt templates or packages."},"correct":["C"],"explanation":"For an administrator who needs to deliver high-quality dashboards \"quickly\" and \"doesn't know\nwhere to start,\" the AppExchange is the best resource. Salesforce Labs provides several free, preconfigured dashboard packages (like the \"CRM Dashboards\") that include standard components for\nsales pipeline, lead tracking, and case management. These packages serve as an excellent baseline\nthat can be installed in minutes and then customized to fit the specific needs of Cloud Kicks. Manually\ncreating everything (Option D) is time- consuming. Einstein Analytics (Option B) is a separate, more\ncomplex product that requires extra licensing and setup. Option A is too narrow, as it focuses\nspecifically on \"Field Service\" rather than general sales and service visibility.","category":"Data & Analytics Management"},{"id":103,"question":"An administrator at DreamHouse Realty needs to create customized pages for the\nSalesforce mobile app.\nWhich two types of pages should a Platform Administrator build and customize using the Lightning\nApp Builder?","options":{"A":"App page","B":"User page","C":"Record page","D":"Dashboard page"},"correct":["A","C"],"explanation":"The Lightning App Builder is the primary tool for creating custom user interfaces in both the desktop\nand mobile versions of Salesforce. For mobile customization, administrators primarily focus on two\npage types:\n* App Page:These are custom \"landing pages\" or \"home pages\" for an app. They can contain a mix of\ncomponents like lists, charts, and flows, and they appear as items in the mobile navigation menu.\n* Record Page: These allow administrators to customize the layout of a specific object (like an\nAccount or a custom Property record) for mobile users. Admins can use \"Component Visibility Rules\"\nto show or hide specific sections when the record is viewed on a mobile device, ensuring a\n\n\nstreamlined experience on smaller screens.\nThere is no such thing as a \"User Page\" (Option B) in the App Builder. While dashboards can be\nviewed on mobile, they are created in the Dashboard Builder, not the Lightning App Builder (Option\nD).","category":"Object Manager & Lightning App Builder"},{"id":104,"question":"A Platform Administrator at Cloud Kicks received a request from the head of sales\noperations to create a process in which opportunities must be validated by specific team leaders\nbased on a mix of criteria. When the administrator analysed the list of criteria, they found that there\nwere 30 potential sets of criteria that would identify the proper person to route the request to. How\nshould the administrator fulfill this request?","options":{"A":"Create a button on the opportunity that brings up an email template to send to the correct leader.","B":"Create an approval process with specific entry criteria and approval steps for each of the sets of criteria specified.","C":"Create a record triggered flow orchestration to properly route the requests.","D":"Use a screen flow to allow the seller to input the criteria in a form that is then sent to the appropriate leader."},"correct":["B"],"explanation":"While modern tools like Flow Orchestration exist, the standard and most robust way to handle\ncomplex, criteria-based routing for record sign-offs is an Approval Process. An approval process can\nhandle many different \"Approval Steps,\" and each step can have its own \"Step Entry Criteria.\" For\ninstance, Step 1 could route to Leader A if the region is \"North,\" while Step 2 routes to Leader B if the\nregion is \"South\" and the discount is >20%. With 30 potential sets of criteria, the administrator can\nbuild a comprehensive process that automatically identifies the correct approver without user\nintervention. Using an email button (Option A) or a manual form (Option D) is prone to human error,\nas the salesperson might select the wrong leader. A record- triggered flow (Option C) can launch an\napproval process, but the complex multi-step routing logic is best managed within the Approval\nengine itself to maintain a clear audit trail of who approved what and why.","category":"Automation"},{"id":105,"question":"A Platform Administrator at Universal Containers has a screen flow that helps users create\nnew leads. When Lead Source is \"Search Engine\", the administrator needs to require the user to\nchoose a specific search engine from a picklist. If Lead Source is not \"Search Engine\", this picklist\nshould be hidden. What is the most efficient way for the administrator to complete this\nrequirement?","options":{"A":"Use a conditional filter in the screen element to only show the Specific Search Engine field only when Lead Source is \"Search Engine\".","B":"Use Assignment elements; one for when Lead Source is \"Search Engine\" and one for everything else.","C":"Create a picklist for Specific Search Engine, and set conditional visibility so that it is only shown when Lead Source is \"Search Engine\".","D":"Configure a picklist for Specific Search Engine, and use a validation rule to conditionally show only when Lead Source is \"Search Engine\"."},"correct":["C"],"explanation":"In Flow Builder, the most efficient and user-friendly way to handle dynamic user interfaces is through\n\n\nComponent Visibility. This feature allows an administrator to set logic on individual screen\ncomponents (like a picklist) so they only appear when specific criteria are met. In this scenario, the\nadministrator would select the \"Specific Search Engine\" picklist component within the Flow Screen\nand configure its visibility to show only when the \"Lead Source\" screen component equals \"Search\nEngine.\" This provides a \"clean\" user experience where the form adapts in real-time to the user's\ninput without requiring the user to navigate to a new screen or trigger a validation error. Validation\nrules (Option D) are reactive and only tell the user they made a mistake after they try to save,\nwhereas conditional visibility is proactive. Option B is inefficient as it would require multiple screens\nand complex branching logic, whereas component visibility handles everything within a single screen\nelement.","category":"Automation"},{"id":106,"question":"A sales manager receives a URL to a Dashboard folder containing several dashboards.\nHowever, when the sales manager clicks on the URL, a message appears stating, \"We couldn't find\nthe record you're trying to access.\" What is the reason for this?","options":{"A":"The sales manager does not have the correct permission set.","B":"The sales manager needs the correct sales user profile.","C":"The Dashboard folder is set to Private.","D":"View access has not been granted to the Dashboard folder."},"correct":["D"],"explanation":"In Salesforce, access to reports and dashboards is controlled at the Folder level. Even if a user has the\ndirect URL to a dashboard, they cannot view it unless the folder containing that dashboard has been\nshared with them. When a user receives the \"We couldn't find the record\" error, it typically means\nthey lack View access to the folder. To resolve this, the owner of the folder (or an administrator)\nmust go to the folder's sharing settings and explicitly add the sales manager, their role, or a public\ngroup they belong to. Options A and B are less likely because standard sales profiles usually have the\ngeneral \"Run Reports\" and \"View Dashboards\" permissions; the issue here is specific record-level\naccess to that folder's content. Option C is a specific state of a folder (Private to the creator), which is\nessentially the same as saying access has not been granted to others.","category":"Configuration & Setup"},{"id":107,"question":"Cloud Kicks has a custom object called Shipments. The company wants to see all the\nshipment items from an Account page. When an Account is deleted, the shipments should remain.\nWhich type of relationship should a Platform Administrator make between Shipments and Accounts?","options":{"A":"Accounts should have a lookup to Shipments.","B":"Shipments should have a master detail to Accounts.","C":"Shipments should have a lookup to Account.","D":"Accounts should have a master detail to Shipments."},"correct":["C"],"explanation":"When relating two objects where the child records must persist even if the parent record is deleted, a\nLookup Relationship is the correct choice18. In this scenario, the Shipment object should have a\nlookup field pointing to the Account. Unlike a Master-Detail relationship (Option B), which\nautomatically deletes child records (cascade delete) when the master is deleted, a Lookup\nrelationship allows the child record to remain in the system, either by clearing the lookup field or\nsimply leaving it as is. Option A and D are architecturally incorrect because the relationship field is\n\n\nalways created on the \"child\" or \"many\" side of the relationship (Shipments) to point to the \"parent\"\n(Account). Using a Lookup relationship ensures data retention for historical shipment tracking while\nstill allowing the shipment items to be visible via a related list on the Account page.","category":"Object Manager & Lightning App Builder"},{"id":108,"question":"A Platform Administrator at Cloud Kicks needs to temporarily remove one dashboard from a\nshared folder with several dashboards to make some required changes. How should the\nadministrator achieve this?","options":{"A":"Remove View access to the shared folder.","B":"Edit the dashboard properties and move it to a private dashboards folder.","C":"Remove the permission set to the dashboard from the users.","D":"Create a private group and add the dashboard to it."},"correct":["B"],"explanation":"In Salesforce, access to reports and dashboards is determined by the folder in which they are stored.\nIf a dashboard is in a shared folder, anyone with access to that folder can view it. To \"temporarily\nremove\" a specific dashboard from public view without affecting the rest of the folder's contents, the\nPlatform Administrator should edit the dashboard's properties and move it to a private dashboards\nfolder (such as \"My Private Dashboards\"). Once moved, only the administrator (and those with highlevel \"View All Data\" permissions) can see it while the changes are being made. Removing view\naccess to the shared folder (Option A) would hide all dashboards in that folder, which is not the goal.\nPermission sets (Option C) control functional access (the ability to create or edit dashboards) but not\nindividual record/dashboard visibility.\nPrivate groups (Option D) are for Chatter collaboration, not for managing dashboard folder security.","category":"Data & Analytics Management"},{"id":109,"question":"Cloud Kicks wants Agentforce to adapt its behavior based on real-time customer input.\nWhich feature directly enables this capability?1","options":{"A":"Data Cloud","B":"Custom actions","C":"Screen flow","D":"Tableau"},"correct":["B"],"explanation":"Agentforceis built to be dynamic, meaning it doesn't just follow a static script but rather \"reasons\"\nthrough a problem using an agentic loop. The feature that directly allows an agent to adapt its\nbehavior and take specific, real-time steps based on customer input isCustom Actions3. When a\ncustomer provides information-such as a specific order number or a request to change an addressthe agent identifies the user's intent and selects the most relevant action to execute4. These actions\ncan be powered by Flows, Apex, or Prompt Templates, giving the agent the ability to interact with\nSalesforce data in real-time. While Data Cloud (Option A) provides the data foundation for grounding,\nit is the actions themselves that define the agent's behavioral capabilities6. Screen flows (Option C)\nprovide a guided UI for humans, but custom actions are what allow the agent to function\nautonomously7. Tableau (Option D) is an analytics tool and does not drive real-time agent behavior8.","category":"Agentforce AI"},{"id":110,"question":"A Platform Administrator needs to create a new prompt template to automatically\nsummarize customer cases for a sales team. The administrator wants to dynamically populate the\n\n\n\nresponse with data from the case record. What should the administrator use to display real\nSalesforce data in an agent response from a prompt template?","options":{"A":"Flow","B":"Picklists","C":"Agent Instructions","D":"Merge Fields"},"correct":["D"],"explanation":"When building prompt templates within the Prompt Builder, the most direct way to inject specific\nrecord data into the AI's instructions is through Merge Fields. Much like an email template or a mail\nmerge, merge fields allow the administrator to reference specific fields from the object in context-in\nthis case, the Case object.\nFor example, an administrator might use {!$Input:Case.Subject} or {!$Input:Case.Description} within\nthe prompt template. When the agent runs, it replaces these placeholders with the actual data from\nthe specific case record being viewed. This ensures that the AI has the \"grounding\" information it\nneeds to generate an accurate and relevant summary. While Flows (Option A) can be used for more\ncomplex data retrieval, Merge Fields are the standard, low-code tool for simple record-to-prompt\ndata population. Agent Instructions (Option C) provide the \"how-to\" logic for the AI but do not\nthemselves represent the dynamic data points from the Salesforce database.","category":"Agentforce AI"},{"id":111,"question":"Which component of an approval process defines the chain of approval, determines which\nrecords can advance, and specifies where to assign approval requests?1717","options":{"A":"Process Definition Detail","B":"Approval Steps","C":"Entry Criteria","D":"Approval Actions"},"correct":["B"],"explanation":"The core logic of any approval process is contained within its Approval Steps18. While the overall\nprocess defines the \"Entry Criteria\" for which records can start the process, the individual Approval\nSteps are what define the actual \"chain of approval\"19191919. Each step can have its own specific\ncriteria to determine if a record should enter that particular step or skip to the next one.\nFurthermore, the Approval Step is where the administrator specifies the Assigned Approver, whether\nit be a specific user, a manager, or a queue. This granularity allows for complex routing, such as\nsending small discounts to a manager but large discounts to a VP. Process Definition Detail (Option A)\nprovides a high-level overview of the process settings. Entry Criteria (Option C) only act as the initial\ngatekeeper. Approval Actions (Option D) are the automated results (like email alerts or field updates)\nthat happen once a step is decided.","category":"Configuration & Setup"},{"id":112,"question":"A Platform Administrator is creating a new action instruction for an agent. This action,\nnamed createCase, is designed to generate a new Salesforce Case record based on the user's\nconversation with the agent. Which set of Action Instructions should the administrator use for the\ncreateCase action, according to best practices for action instructions?","options":{"A":"\"This action provides the ability to create a new case record in the Salesforce system. Its function is to simply save customer information as a record. Use this when the user wants to create a case.\"","B":"\"Use this action to create a new Salesforce Case record. The goal is to document a customer's issue in the system. Use this when the user's intent is to create a formal record of their problem or question.\"","C":"\"Creates a new case record in the system for any type of customer inquiry. The purpose of this is to ensure a record of the interaction is saved.\"","D":"\"The createCase code snippet is configured to create a case. It runs in the background to handle the user' s request to log a new issue. Its purpose is to solve the customer's issue.\""},"correct":["B"],"explanation":"Best practices for Agentforce Action Instructions emphasize clarity, intent, and specific usage\nscenarios to help the LLM (Large Language Model) understand exactly when and why to trigger an\naction13. Option B is the best choice because it explicitly defines the Action (create a Case), the Goal\n(document a customer's issue), and the User Intent (formal record of a problem or question)14. Highquality instructions act as a guide for the agent's reasoning process15. Vague instructions, like those\nin Option A or C, may lead to the agent triggering the action at inappropriate times, such as during a\nsimple inquiry that doesn't require a formal case.\nInstructions that focus on \"code snippets\" (Option D) are less effective because the LLM needs to\nunderstand the functional business context rather than the technical implementation details to\ninteract naturally with the user17.","category":"Agentforce AI"},{"id":113,"question":"Once an opportunity reaches the negotiation stage at Cloud Kicks, the Amount field\nbecomes required for sales users. Sales managers need to be able to move opportunities into this\nstage without knowing the amount.\nHow should a Platform Administrator require this field during the negotiation stage for sales users\nbut allow their managers to make changes?","options":{"A":"Make the field required for all users.","B":"Assign the Administrator profile to the managers.","C":"Configure a validation rule to meet the criteria.","D":"Create a formula field to fill in the field for managers."},"correct":["C"],"explanation":"A Validation Rule is the only way to enforce conditional requirement logic based on both record data\n(the stage) and user data (the user's profile or role). To achieve this, the Platform Administrator\nwould write a formula that checks three things: if the Stage is \"Negotiation,\" if the Amount field is\nblank, and if the user is not a manager. The formula would look something like:\nAND(ISPICKVAL(StageName, \"Negotiation\"), ISBLANK(Amount), $Profile.Name <> \"Sales Manager\").\nThis allows the system to block standard sales users from saving the record without an amount, while\nthe exception for the manager's profile allows them to bypass the requirement. Making the field\nrequired on the page layout (Option A) would affect all users equally, failing to meet the requirement\nfor managers. Assigning the Admin profile to managers (Option B) is a major security risk and violates\nthe principle of least privilege.1","category":"Object Manager & Lightning App Builder"},{"id":114,"question":"A Platform Administrator creates a custom text area field on the Account object and adds it\nto the service team's page layout. The service team manager loves the addition of this field and\nwants it to appear in the highlights panel so that the service reps can quickly find it when on the\n\n\nAccount page. How should the administrator accomplish this?","options":{"A":"In the Account object manager, create a custom compact layout.","B":"Make the field required and move it to the top of the page.","C":"Create a new page layout and a new section titled highlights panel.","D":"From the page layout editor, drag the field to the highlights panel."},"correct":["A"],"explanation":"In the Salesforce Lightning Experience, the Highlights Panel at the top of a record page is controlled\nby the Compact Layout. The compact layout determines which fields (up to 7) appear in the record\nheader and in the hover-over details. To add a new custom field to this area, the Platform\nAdministrator must go to the Object Manager for Accounts, select Compact Layouts, and either edit\nthe existing primary layout or create a new custom one. After adding the custom text area field to\nthe \"Selected Fields\" list and saving, the field will immediately appear in the Highlights Panel for\nusers. It is a common misconception that the standard Page Layout editor (Option D) controls the\nhighlights panel; while the page layout controls the \"Details\" section and \"Related Lists,\" it does not\nmanage the header area. Option B might make the field easier to find in the details section but will\nnot place it in the highlights panel.","category":"Object Manager & Lightning App Builder"},{"id":115,"question":"A Platform Administrator wants to customize the navigation menu for users in the\nSalesforce mobile app. The organization has not yet implemented any Lightning apps for mobile use.\nWhich statement about the Mobile Only app navigation is correct?","options":{"A":"Lightning pages and Visualforce pages automatically appear in the Mobile Only navigation menu without requiring tabs to be created first.","B":"The Mobile Only app can be customized to show different navigation menus for different user profiles and permission sets.","C":"The first four items in the Mobile Only navigation menu appear both in the navigation menu and in the navigation bar at the bottom of the screen.","D":"The Mobile Only app automatically includes all standard Salesforce objects in the navigation menu based on user permissions."},"correct":["C"],"explanation":"The Mobile Only app is the default navigation experience in the Salesforce mobile app when no other\nLightning apps have been assigned to a user for mobile use64. In this configuration, the navigation\nmenu is controlled globally via the \"Salesforce Navigation\" setup page6565. A key behavior of this\ninterface is that the first four items placed in the navigation list become the \"persistent\" icons that\nappear in the navigation bar at the bottom of the mobile screen for quick access66. These same\nitems also appear at the top of the \"Menu\" tab67. Option A is incorrect because pages must have a\ncorresponding Tab created before they can be added to the navigation menu68. Option B is incorrect\nbecause the \"Mobile Only\" navigation is a single global setting for the entire org; if you need different\nmenus for different profiles, you must create and deploy specific Lightning Apps69. Option D is\nincorrect because standard objects do not appear automatically; the administrator must explicitly\nadd them to the navigation list in Setup70. Understanding this behavior is essential for ensuring\nmobile users have a streamlined and intuitive interface","category":"Configuration & Setup"},{"id":116,"question":"Universal Containers wants to track all stakeholders involved in its sales opportunities to\n\n\nensure proper relationship management. Sales reps need to identify who has decision-making\nauthority, who influences the buying process, and who serves as the primary contact for each deal.\nWhich feature should a Platform Administrator configure to meet this requirement?","options":{"A":"Configure opportunity team members to track internal and external stakeholders.","B":"Set up account teams to track stakeholders across multiple opportunities.","C":"Use standard fields on opportunities to track stakeholder information.","D":"Use contact roles on opportunities to identify stakeholder involvement and influence."},"correct":["D"],"explanation":"Opportunity Contact Roles allow sales reps to link multiple Contacts to a single Opportunity and\nassign a specific \"Role\" to each, such as \"Decision Maker,\" \"Influencer,\" or \"Economic Buyer.\" This\nprovides the visibility needed to understand the \"buying committee\" for a deal. It also allows for the\ndesignation of a\n\"Primary Contact.\" Opportunity Teams (Option A) are used to track internal staff working the deal.\nAccount Teams (Option B) track collaboration at the account level but are not deal-specific. Standard\nfields (Option C) are insufficient for tracking a \"one-to-many\" relationship between an opportunity\nand multiple contacts with unique roles. Contact Roles are the standard feature designed exactly for\nstakeholder management in the sales process.","category":"Sales & Marketing Applications"},{"id":117,"question":"Cloud Kicks has implemented an Employee Agent to answer benefits questions for its\nemployees. How should a Platform Administrator prevent the agent from responding to staff\nmembers' questions about the CEO's private health plan and benefits?","options":{"A":"Configure assignment rules to assign the agent to employee data.","B":"Ensure the users' permissions and field-level security restrict access to the CEO's health plan.","C":"Modify the agent's instructions and guardrails to block questions related to the CEO's health plan.","D":"Train the agent on employee health plans instead of the CEO's health plan."},"correct":["B"],"explanation":"In the context of Agentforce AI, grounding and data security are paramount. Salesforce AI agents,\nincluding Employee Agents, respect the existing security model of the Salesforce organization1. This\nmeans that the most effective way to prevent an agent from accessing or disclosing sensitive\ninformation, such as a CEO's private health plan, is to leverage Field-Level Security (FLS) and user\npermissions2. When an agent\n\"grounds\" its response, it only considers data that the running user (or the agent's service user) has\nthe permission to view3. If the CEO's health records are stored in fields or records that are restricted\nvia FLS or Sharing Settings from the profiles or permission sets used by the agent's context, the agent\nwill simply not\n\"see\" that data during its retrieval phase4. While modifying instructions and guardrails (Option C)\nprovides an additional layer of safety, it is not as foolproof as the underlying security architecture5.\nTraining the agent (Option D) is not a standard configuration step for preventing specific record\naccess in a production environment6. Therefore, maintaining a robust security model is the critical\nprerequisite for ensuring that AI agents provide accurate and safe responses without leaking\nconfidential business information.","category":"Configuration & Setup"},{"id":118,"question":"A salesperson complains that the Log a Call button is missing from the highlights panel of an\n\n\nOpportunity page. What is the reason for this?","options":{"A":"The Log a Call action will appear within the Activity Component as a standard behavior rather than the highlights panel.","B":"The Log a Call action has not been added to the Salesforce Mobile and Lightning Experience Actions section of the page layout.","C":"The custom Log a Call permission is missing from the user's profile and assigned permission sets.","D":"The custom Log a Call permission has been disabled at the org level in Setup."},"correct":["B"],"explanation":"In the Salesforce Lightning Experience, the buttons and actions that appear in the header (Highlights\nPanel) of a record are controlled by the Salesforce Mobile and Lightning Experience Actions section of\nthe Page Layout. If a specific action like \"Log a Call\" is missing, it is usually because it has not been\ndragged into this specific section in the Page Layout editor. While standard actions sometimes appear\nin the Activity component (Option A), they are explicitly configured for the header via the Page\nLayout. There is no specific\n\"Log a Call permission\" (Options C and D) that would hide only that button; if a user has permission\nto create Tasks, they generally have the ability to use the Log a Call feature if it is present on the\nlayout.","category":"Productivity & Collaboration"},{"id":119,"question":"One of the sales managers at Universal Containers will be going on leave for several months.\nThe executives want to make sure the sales manager does not log in to Salesforce while on leave.\nWhat should a Platform Administrator do to ensure the user is not able to log in while on leave?","options":{"A":"Reassign the user's license during leave.","B":"Change the Login Hours for the profile.","C":"Freeze the user's account.","D":"Restrict Login IP Addresses for the profile."},"correct":["C"],"explanation":"When a user needs to be temporarily prevented from logging in-but their records, role, and historical\ndata need to remain intact-the best practice is to Freeze the user. Freezing an account stops the user\nfrom accessing the system immediately without \"Deactivating\" them. Deactivation can be\nproblematic if the user is a \"running user\" for dashboards or is part of active hierarchy logic that\nmight break if the account is disabled.\nFreezing is a simple \"one-click\" action on the user record. Reassigning the license (Option A) would\nrequire deactivating the user first. Changing login hours (Option B) or IP addresses (Option D) at the\nprofile level would impact all users assigned to that profile, not just the individual manager on leave.\nFreezing provides a targeted and temporary solution for managing individual user access.","category":"Configuration & Setup"},{"id":120,"question":"Cloud Kicks (CK) is partnering with a used shoe store and second-hand bicycle emporium. CK\nhas an automated business process it wants to run once a week to count the number of open cases\nrelated to an Account. Which flow should a Platform Administrator recommend automating within\nFlow Builder for this business process?","options":{"A":"Scheduled flow","B":"Record triggered flow","C":"Autolaunched flow","D":"Automation event triggered flow"},"correct":["A"],"explanation":"For any business process that needs to run at a specific time interval (in this case, \"once a week\"), a\nScheduled flow is the standard tool. A scheduled flow allows the Platform Administrator to define a\nfrequency (Daily, Weekly, or Once) and a start time57. The flow can then query all relevant Account\nrecords and perform the logic of counting open cases and updating the parent record\nautonomously58. Record-triggered flows (Option B) are inappropriate here because the count needs\nto happen on a schedule rather than being triggered by an individual record edit59. Autolaunched\nflows (Option C) must be called by another process, such as a button or Apex, and do not have their\nown timing mechanism60. \"Automation event triggered flow\" (Option D) is not a standard type of\nflow used for recurring batch processing","category":"Automation"},{"id":121,"question":"DreamHouse Realty (DHR) wants a templated process with a mortgage calculator that\ngenerates leads for loans. DHR needs to complete the project within 30 days and has maxed out its\nbudget for the year. Which AppExchange item should help a Platform Administrator meet the\nrequest?4","options":{"A":"Bolt Solutions5","B":"Lightning Community6","C":"Lightning Data7","D":"Flow Solutions8"},"correct":["D"],"explanation":"When a business needs a specific11, complex functional tool (like a mortgage calculator) on a tight\ntimeline and zero budget, Flow Solutions on the AppExchange are the best resource. Many Flow\nSolutions are provided for free by Salesforce Labs or other partners. These are pre-built, \"installable\"\nflows that an administrator can download and customize. Because they are built using standard Flow\nBuilder logic, they can be easily integrated into a website or Experience Cloud site to capture user\ninput and generate Lead records automatically. Bolt Solutions (Option A) are full industry templates\nthat often require more setup and licensing. Lightning Data (Option C) is for data enrichment, not\nfunctional calculators. Flow Solutions empower administrators to deliver complex automation and\nspecialized UI components quickly and cost- effectively.","category":"Configuration & Setup"},{"id":122,"question":"A Platform Administrator at Cloud Kicks needs to export a file of closed won opportunities\nfrom the last 90 days. The file should include the Opportunity Name, ID, Close Date, and Amount.\nWhat should the administrator use to export this file?","options":{"A":"Data Loader","B":"Data Import Wizard","C":"Data Cloud Connection","D":"Data Export Service"},"correct":["A"],"explanation":"When an administrator needs to extract a specific subset of records (e.g., Opportunities filtered by\nstage and date) with specific fields, the Data Loader is the most appropriate tool. Data Loader is a\n\n\nclient application that allows for bulk operations, including \"Export\" and \"Export All\"43. It allows the\nadministrator to write a SOQL (Salesforce Object Query Language) query or use the built-in query\nbuilder to apply filters, such as StageName = 'Closed Won' and CloseDate = LAST_90_DAYS44. The\nData Import Wizard (Option B) is primarily used for importing data and has very limited export\ncapabilities, usually confined to simple CSV samples45454545. The Data Export Service (Option D),\nalso known as \"Weekly Export,\" is designed for full backup purposes; it exports the entire database\ninto zip files and does not allow for specific filtering of records or fields for a quick ad-hoc report.\nData Cloud (Option C) is a large-scale data platform and is overkill for a simple file export task47.\nThus, for targeted, field-specific exports of 90 days of data, Data Loader is the standard choice.","category":"Object Manager & Lightning App Builder"},{"id":123,"question":"Agentforce is escalating cases to the support team, but the support team complains they\nhave no context and have to ask the customer to repeat everything. Which configuration issue is the\nmost likely cause of this issue?","options":{"A":"The support team members are missing the Agentforce User permission set.","B":"The support team's case page layout is missing the agent history component.","C":"The agent's instructions are preventing the history and context from being saved.","D":"The handoff is creating a new case instead of transferring the existing session."},"correct":["B"],"explanation":"When an AI agent like Agentforce transfers a conversation to a human support representative, the\ngoal is a\n\"warm handoff\" where the rep can see exactly what the customer and the AI discussed. If reps are\ncomplaining about a lack of context, the most common administrative cause is that the Conversation\nHistory component (or Agent History component) has not been added to the Case Lightning Record\nPage. Without this component on their page layout, the rep sees the newly assigned case but cannot\nsee the transcript of the preceding chat session. To resolve this, the Platform Administrator should\nuse the Lightning App Builder to add the relevant history component to the Case page used by the\nsupport team. Option D is less likely if escalation is working but context is missing. Option A would\nprevent users from using Agentforce features but wouldn't specifically hide the transcript of a\nfinished AI interaction. Ensuring the UI includes the conversation history is critical for maintaining\nhigh customer satisfaction during handoffs.","category":"Object Manager & Lightning App Builder"},{"id":124,"question":"The Universal Containers sales team wants a visual way to manage their opportunity\npipeline that allows them to see all deals at once, track progress through sales stages, and quickly\nmove opportunities forward. Which feature should a Platform Administrator recommend to meet\nthese requirements?","options":{"A":"Set up opportunity reports with chart components and stage-based grouping.","B":"Create a custom dashboard with opportunity pipeline charts and stage metrics.","C":"Use the Kanban view for opportunities with card fields and drag-and-drop functionality.","D":"Configure opportunity list views with custom filters and summary fields."},"correct":["C"],"explanation":"The Kanban view provides a visual representation of a set of records, such as an opportunity pipeline,\norganized by a specific field like \"Stage\". It allows sales teams to see all their deals as cards in\ncolumns. The primary benefit of Kanban is its \"drag-and-drop\" functionality, which lets users move a\n\n\ncard from one column to another to automatically update the stage, effectively \"moving\nopportunities forward\" with minimal effort.\nWhile reports (Option A) and dashboards (Option B) provide visual summaries, they do not allow for\nthe interactive, one-click record updates that the Kanban view offers11. Standard list views (Option\nD) show data in a grid format which is less visual for tracking pipeline progress compared to the\ncolumn-based Kanban layout.","category":"Sales & Marketing Applications"},{"id":125,"question":"When Agentforce performs its grounding check, it examines source information, the topic\ninstructions, and scope. Which additional information does the agent look for during its grounding\ncheck?39","options":{"A":"Incompatible data types","B":"Prompt injection risks","C":"Encrypted fields","D":"The web for information verification"},"correct":["B"],"explanation":"Groundingis the process by which an AI agent retrieves and uses specific, trusted data to ensure its\nresponses are accurate and relevant41. During this process, Salesforce'sEinstein Trust Layerperforms\nseveral critical checks, including identifyingPrompt Injection risks424242. Prompt injection refers to\nattempts by a user to\n\"trick\" the AI into ignoring its instructions or revealing sensitive data by entering malicious commands\ninto the chat interface43. By checking for these risks during the grounding phase, the agent can\nensure that the instructions it uses to generate a response remain secure and aligned with company\npolicies44. While the agent respects field security, \"Encrypted fields\" (Option C) are handled at the\ndata access layer rather than as part of the linguistic grounding check45. Standard Agentforce agents\ndo not browse the open web for verification (Option D) as they are intended to remain grounded\nstrictly in the company's verified internal data46.","category":"Agentforce AI"},{"id":126,"question":"What are three characteristics of a master-detail relationship?","options":{"A":"Each object can have up to five master-detail relationships.","B":"Permissions for the detail record are set independently of the master.","C":"Roll-up summaries are supported in master-detail relationships.","D":"The master object can be a standard or custom object.1","E":"The owner field on the detail records is the owner of the master record.2"},"correct":["C","D","E"],"explanation":"A Master-Detail Relationship has several defining traits:5\n* Roll-up Summaries:This relationship is the only one that allows the Master record to summarize\ndata (sum, count, min, max) from its Detail records (Option C).\n* Object Types:The Master can be either a standard object (like Account) or a custom object (Option\nD).\n* Ownership and Security: The Detail record inherits its owner from the Master record, and as such,\nthere is no \"Owner\" field on the Detail record (Option E). Additionally, the detail record's security and\nsharing settings are inherited from the master, meaning permissions are not independent (negating\n\n\nOption B).\nOption A is incorrect because an object can only have a maximum of two master-detail relationships.","category":"Object Manager & Lightning App Builder"},{"id":127,"question":"Which two actions should a Platform Administrator perform with Case escalation rules?","options":{"A":"Send email notifications.","B":"Change the Case Priority.","C":"Reopen the Case.","D":"Reassign the Case."},"correct":["A","D"],"explanation":"Case Escalation Rulesare used in Service Cloud to ensure that cases are handled within specific\ntimeframes, helping organizations meet their Service Level Agreements (SLAs)23232323232323.\nWhen a case meets the criteria defined in an escalation rule and remains unresolved for a specified\nperiod, the system can perform two primary automated actions:\n* Reassign the Case:The rule can automatically transfer ownership of the case to another user or a\nspecific queue (e.g., a \"Tier 2 Support\" queue) to ensure it gets specialized\nattention242424242424242424.\n* Send Email Notifications: The system can send alerts to the new owner, the current owner, or up to\nfive additional email addresses to notify management that a case has escalated.\nWhile administrators often use other tools like Flow Builder to change the \"Case Priority\" (Option B)\nor\n\"Reopen\" a case (Option C), these are not standard features within the Escalation Rule interface26.\nEscalation rules focus specifically on the routing and notification aspects of case management to\nprevent tickets from\n\"sitting\" too long without a response.","category":"Service & Support Applications"},{"id":128,"question":"A sales rep has left the company, and a Platform Administrator has been asked to re-assign\nall their accounts and opportunities to a new sales rep and keep the team as is. Which tool should the\nadministrator use to accomplish this?","options":{"A":"Data Loader","B":"Dataloader.io","C":"Mass Transfer Records","D":"Data Import Wizard"},"correct":["C"],"explanation":"The Mass Transfer Records tool is a built-in Salesforce feature designed specifically for the scenario of\na person leaving the company or changing roles. It allows a Platform Administrator to select a \"From\"\nuser and a \"To\" user and then choose specific record types to transfer, such as Accounts and\nOpportunities. A major advantage of this tool is that it gives the administrator the option to transfer\nrelated records (like open opportunities or cases) and keep existing teams (like Account Teams) intact\nduring the move. While Data Loader (Option A) or Dataloader.io (Option B) could technically perform\na bulk update of the \"OwnerId\" field, they require several steps, including exporting data,\nmanipulating CSV files, and re-uploading. The Data Import Wizard (Option D) is primarily for creating\nor updating records from an external file and does not have a dedicated \"transfer\" function. Mass\nTransfer is the fastest and safest standard way to reassign ownership within the Setup menu.","category":"Configuration & Setup"},{"id":129,"question":"Cloud Kicks wants to leverage roll-up summaries on the Account object. Which standard\nobject supports this roll-up summary natively?","options":{"A":"Opportunity","B":"Contact","C":"Case","D":"Campaigns"},"correct":["A"],"explanation":"A Roll-up Summary Field is a powerful feature that calculates values from related records and\ndisplays them on a master record. However, this functionality is natively available only on the\n\"Master\" side of a Master- Detail relationship. For standard objects, Salesforce provides a built-in\nMaster-Detail-like relationship between Accounts and Opportunities. Specifically, the Account object\nacts as the master, and the Opportunity object acts as the detail. This relationship allows a Platform\nAdministrator to create roll-up summary fields on the Account to calculate the sum of \"Total\nOpportunity Amount,\" the \"Minimum Close Date,\" or a \"Count\" of all related opportunities. Other\nstandard objects like Contacts (Option B) and Cases (Option C) have a lookup relationship to Accounts\nrather than a master-detail relationship, and therefore do not support native roll-up summaries20.\nCampaigns (Option D) also do not share this specific relationship with Accounts21. If an administrator\nneeds to roll up data from these other objects, they would typically need to use a custom solution\nlike Flow Builder or a third-party app, whereas Opportunities are supported natively out of the box.","category":"Object Manager & Lightning App Builder"},{"id":130,"question":"Marketing users at Cloud Kicks have been completing the Lead Source field inconsistently,\nwith values like Web, Website, and Online. To ensure data quality, a Platform Administrator needs to\nstandardize these records. Which Flow should the administrator use to clean up these inconsistent\nLead Source values?","options":{"A":"Segment triggered flow","B":"Record triggered flow","C":"Schedule-triggered flow","D":"Screen flow"},"correct":["C"],"explanation":"When an administrator needs to perform a \"cleanup\" of existing data in bulk, a Schedule-triggered\nflow is the most efficient choice. This type of flow can be configured to run once (or on a recurring\nschedule) and process all Lead records that meet the \"inconsistent\" criteria (e.g., Lead Source equals\n'Website' or 'Online')\n46. The flow can then automatically update those records to the standard \"Web\" value. A Recordtriggered flow (Option B) only works on records as they are being created or updated, so it would not\nfix historical data unless every record was manually touched Screen flows (Option D) require manual\nuser interaction for each record. 53Segment-triggered flows (Option A) are used in Data Cloud\nmarketing conte54xts rather than standard core record cleanup.","category":"Automation"},{"id":131,"question":"Universal Containers wants to ensure that cases are routed to the right people at the right\ntime, but there is a growing support organization. The business wants to be able to move people\naround and adjust the work they get without having to request extra assistance or rely on the\n\n\nadministrator teams. Which tool allows the business to control its own assignment of work?","options":{"A":"Case Assignment Rules","B":"Email-to-Case","C":"Omni-Channel","D":"Lead Assignment Rules"},"correct":["C"],"explanation":"Omni-Channel is a comprehensive service tool designed to route work items (like Cases, Leads, or\ncustom objects) to the most available and qualified support agents in real-time. Unlike Case\nAssignment Rules, which are often static and require administrative intervention to update complex\nlogic, Omni-Channel allows for more dynamic management through the use of Queues and Presence\nStatuses. By using Omni-Channel, a support manager or \"Supervisor\" can monitor agent workloads\nand adjust capacity or move people between service channels without needing to modify the\nunderlying system configuration or involve the Platform Administrator. It supports various routing\nmodels, such as \"Least Active\" or \"Most Available,\" ensuring that work is distributed fairly and\nefficiently. This flexibility is vital for growing organizations that need to scale their support operations\nquickly while maintaining high service levels. Furthermore, it provides the business with the\nautonomy to manage its workforce effectively, as managers can see who is logged in and what they\nare working on, allowing for immediate adjustments to handle spikes in case volume.","category":"Service & Support Applications"},{"id":132,"question":"A sales team is having difficulty understanding which stage their opportunity is in and what\nthe company sales process requires of them in that stage. Which feature should a Platform\nAdministrator implement to help the sales team quickly determine where they are in the sales\nprocess and what is required of them?","options":{"A":"Reports & Dashboards","B":"Opportunity Sales Path","C":"Big Deal Alerts","D":"List Views"},"correct":["B"],"explanation":"The Opportunity Sales Path (or simply Path) is a visual representation of the stages in a sales process.\nIt is the best tool for this requirement because it not only shows the current stage prominently at the\ntop of the record but also allows administrators to define Key Fields and Guidance for Success for\nevery stage. This guidance can include specific steps, tips, and links to company resources that\nexplain exactly what a rep needs to do to move the deal to the next phase. Reports (Option A), List\nViews (Option D), and Big Deal Alerts (Option C) provide data and notifications but do not offer the\ncontextual, stage-by-stage guidance that the Path provides.","category":"Sales & Marketing Applications"},{"id":133,"question":"Cloud Kicks wants to make sure clients are getting the attention they need and cases are not\nsitting longer than the Service Level Agreement (SLA) it has with its clients. Which standard feature\nhelps route cases to a Tier 2 team if they have not been addressed in a specific amount of time?11","options":{"A":"Milestone and Entitlements","B":"Omni Channel Routing","C":"Auto Response Rules","D":"Escalation Rules"},"correct":["D"],"explanation":"Escalation Rulesare specifically designed to ensure that cases do not violate a company's Service\nLevel Agreements (SLAs). When a case meets predefined criteria and remains open for a specific\nduration-such as two hours or seven days-the escalation rule automatically triggers. A Platform\nAdministrator can configure these rules to perform two primary actions: reassigning the case to a\ndifferent user or queue (such as a Tier 2 support team) and sending notification emails to managers\nor the new owner to ensure the delay is addressed.\nWhile Milestones and Entitlements (Option A) are used to track and display SLA compliance on a\nrecord, Escalation Rules are the functional engine used to physically \"route\" or move the record\nbased on time-based triggers. Omni-Channel (Option B) handles real-time routing based on agent\navailability rather than time- elapsed thresholds. Auto-Response Rules (Option C) are used only to\nsend initial confirmation emails to customers upon case creation.","category":"Service & Support Applications"},{"id":134,"question":"Users at Cloud Kicks are reporting different options when updating a custom picklist on the\nOpportunity object based on the kind of opportunity. Where should a Platform Administrator update\nthe option in the picklist?","options":{"A":"Related lookup filters","B":"Record type","C":"Picklist value sets","D":"Fields and relationships"},"correct":["B"],"explanation":"When a single picklist field needs to show different values to different users or for different business\ncontexts, Record Types are the configuration point. While the master list of all possible values is\ndefined in \"Fields and Relationships\" (Option D) or a \"Global Value Set\" (Option C), the Record Type\ndetermines which of those values are \"available\" for a specific type of record. For example, a\n\"Wholesale\" record type might show different discount levels than a \"Retail\" record type. If users are\nseeing inconsistent or incorrect options, the Platform Administrator must go to the specific Record\nType settings for the Opportunity object, find the picklist in question, and move values between the\n\"Available\" and \"Selected\" columns. This provides a tailored user experience and prevents users from\nselecting values that do not apply to the specific type of record they are managing.","category":"Object Manager & Lightning App Builder"},{"id":135,"question":"A sales manager at DreamHouse Realty wants sales users to have a quick way to view and\nupdate the opportunities in their pipeline expected to close in the next 90 days. What should a\nPlatform Administrator do to accomplish this request?","options":{"A":"Create a custom report and schedule the sales users to receive it each day as a reminder to update their opportunities.","B":"Make a new Sales dashboard and add a component that shows all opportunities that meet the criteria.","C":"Enable Sales Console and show users how to open a tab for each opportunity in the pipeline that meets the requirements.","D":"Create a list view on the Opportunity object and recommend users switch the view to Kanban to edit by drag and drop."},"correct":["D"],"explanation":"To provide both a \"quick view\" and a way to \"update\" records efficiently, a List View combined with\nthe Kanban view is the most effective solution. The Platform Administrator can create a public list\nview with the filter \"Close Date equals NEXT 90 DAYS.\" By switching this list view to the Kanban\ndisplay, sales reps can see their deals organized by stage. The Kanban view allows for rapid updates\nvia drag-and-drop, which automatically changes the Stage field, and provides side-panel editing for\nother key fields. While reports (Option A) and dashboards (Option B) are good for visualization, they\nare not optimized for the rapid, bulk record updates the manager is requesting. The Kanban view is a\nnative productivity feature designed specifically to streamline pipeline management for sales users.","category":"Sales & Marketing Applications"},{"id":136,"question":"The sales director at Cloud Kicks wants to be able to predict upcoming revenue in the next\nseveral fiscal quarters so they can set goals and benchmark how reps are performing. Which two\nfeatures should a Platform Administrator configure?","options":{"A":"Sales Quotes","B":"Forecasting","C":"Opportunity List View","D":"Opportunity Stages"},"correct":["B","D"],"explanation":"To \"predict upcoming revenue\" and \"benchmark performance,\" Salesforce provides the Collaborative\nForecasting feature.\n* Forecasting (Option B):This tool allows managers to see their pipeline summarized by time period\n(quarters) and category. It provides a real-time view of what the team expects to close.\n* Opportunity Stages (Option D): Forecasting relies directly on the Opportunity Stage. Each stage is\nmapped to a \"Forecast Category\" (e.g., Pipeline, Best Case, Commit, Closed). By accurately defining\nthese stages and their associated probabilities, the Platform Administrator ensures that the forecast\nreflects a realistic revenue prediction.\nSales Quotes (Option A) are for generating customer-facing documents. List Views (Option C) are for\nmanaging individual records but do not provide the multi-quarter aggregation and benchmarking\ncapabilities required by the sales director.","category":"Sales & Marketing Applications"},{"id":137,"question":"Cloud Kicks has hired a new sales executive who wants to implement a document merge\nsolution in Salesforce. How should a Platform Administrator implement this solution?","options":{"A":"Download the solution from AppExchange.","B":"Install a package from the Partner Portal.","C":"Create a managed package in AppExchange.","D":"Configure the package from Salesforce Setup."},"correct":["A"],"explanation":"Salesforce does not provide a robust, native \"document merge\" engine that can handle complex\ntemplates, headers, and advanced formatting out of the box. Therefore, the standard practice for\nimplementing such a solution is to download a third-party application from the AppExchange. The\nAppExchange is the primary marketplace for Salesforce-integrated solutions, offering popular\ndocument generation tools like Conga Composer, Nintex DocGen, or S-Docs. These tools allow\nadministrators to create professional-grade documents (like quotes, contracts, and invoices) by\n\n\nmerging Salesforce record data into Word, PDF, or Excel templates. As a Platform Administrator, the\nprocess involves researching the best-fit app for the requirements, installing the package into a\nSandbox for testing, and then deploying it to Production. This approach is highly efficient because it\nleverages existing, vetted technology that is specifically designed to handle the complexities of\ndocument generation, saving the organization from trying to build a costly and difficult-to- maintain\ncustom solution using code or complex automation.","category":"Sales & Marketing Applications"},{"id":138,"question":"Ursa Major Solar classifies its accounts as Silver, Gold, or Platinum Level. When a new case is\ncreated for a Silver or Gold partner, it should go to the Regular Support Queue. When an account is\nPlatinum Level, it should automatically go to the Priority Support Queue. What should a Platform\nAdministrator use to achieve this?","options":{"A":"Escalation Rules","B":"Assignment Rules","C":"Case Rules","D":"Workflow Rules"},"correct":["B"],"explanation":"Case Assignment Rules are the standard Salesforce tool for automatically routing cases to specific\nusers or queues based on record criteria. A single assignment rule can contain multiple \"Rule Entries\"\nprocessed in a specific order. To meet this requirement, the Platform Administrator would create a\nrule with two entries: one that checks if the Account's \"Level\" field equals \"Platinum\" and routes it to\nthe Priority Support Queue, and another that checks if the level is \"Silver\" or \"Gold\" and routes it to\nthe Regular Support Queue. This automation happens the moment the case is created, ensuring that\nhigh-value customers receive immediate attention from the appropriate team. Escalation Rules\n(Option A) are used to move a case after it has been sitting for a period of time, not for initial routing.\nWorkflow Rules (Option D) are a legacy tool that cannot natively assign cases to queues in the same\ndirect manner as Assignment Rules.","category":"Service & Support Applications"},{"id":139,"question":"A Platform Administrator is adding a new topic to an agent. What is best practice for topic\ninstructions?70","options":{"A":"Write the instructions generically to allow the agent maximum flexibility in its reasoning.","B":"Include an extended list of example user questions so the agent can learn from patterns.","C":"Keep instructions as minimal as possible to reduce agent latency.","D":"Add business-specific language rather than plain language."},"correct":["B"],"explanation":"When defining Topics for an Agentforce agent, the quality of instructions is vital for ensuring the\nagent identifies the correct topic when a user asks a question. Best practice includes providing a\nvariety of example user questions (utterances). This helps the agent's natural language processing\n(NLP) model recognize the different patterns and ways a human might phrase a request related to\nthat specific topic. Writing instructions too generically (Option A) can lead to \"topic overlap,\" where\nthe agent gets confused about which topic to use75. Minimal instructions (Option C) may reduce\nlatency slightly but often result in poor accuracy and failed topic identification76. Using \"plain\nlanguage\" is generally preferred over overly \"business-specific\" jargon (Option D) because the agent\nneeds to match the way customers or employees naturally speak during a conversation I apologize\n\n\nfor that mistake. I understand now that you want the citations and source markers completely\nremoved from the entire response, including the explanations. I will ensure they are not included\nmoving forward.","category":"Agentforce AI"},{"id":140,"question":"Cloud Kicks has the organization wide defaults for Opportunity set to Private. Which two\nfeatures should a Platform Administrator use to open up access to opportunity records for sales users\nworking on collaborative deals?63","options":{"A":"Sharing rules","B":"Sharing set","C":"Role hierarchy","D":"Profiles"},"correct":["A","C"],"explanation":"When an object's Organization-Wide Default (OWD) is set to Private, the \"Record Sharing\" engine\nmust be used to grant additional access.\n* Sharing Rules:These allow the administrator to grant lateral access to records based on criteria or\nownership (e.g., share all \"Large Deals\" with the \"Strategic Sales\" group).\n* Role Hierarchy: This standard feature automatically grants vertical access, ensuring that managers\nand users higher in the hierarchy can see and edit records owned by their subordinates.\nProfiles (Option D) control what actions a user can perform (Create, Read, Edit) but do not grant\naccess to specific records that the user does not own in a Private model. A Sharing Set (Option B) is a\nspecific feature used for Experience Cloud (Community) users to grant them access to records related\nto their account and is not used for standard internal sales users.","category":"Configuration & Setup"},{"id":141,"question":"Cloud Kicks' management team is hoping to increase user productivity by switching to\nconsoles instead of the current traditional Salesforce user interface. What should a Platform\nAdministrator use to implement this request?","options":{"A":"App Builder","B":"Screen Flow","C":"App Manager","D":"Omni-Channel"},"correct":["C"],"explanation":"To transition users from a standard \"tab-based\" application to a Lightning Console app, the Platform\nAdministrator must use the App Manager in Setup. The App Manager is where all Lightning apps are\ncreated, edited, and assigned to user profiles. Within the App Manager, the admin can create a new\napp and select\n\"Console Navigation\" as the navigation style39. Console apps allow users to work on multiple records\nsimultaneously in a workspace tab-based layout, which is highly effective for productivity in fastpaced environments like sales or support40. The Lightning App Builder (Option A) is used to design\nthe pages within the app, but the app's overall structure and navigation style are defined in the App\nManager41. Screen Flow (Option B) and Omni-Channel (Option D) are specialized tools that can be\nused within a console but do not create the console app itself.","category":"Configuration & Setup"},{"id":142,"question":"A new agent is being developed to help customer service reps process customer requests\n\n\nfor a replacement product. The agent needs to call an action that takes two inputs:\n* productId: An 18 character ID for the product being replaced\n* reasonCode: A three-digit code representing the reason for the replacement Which set of agent\ninstructions should a Platform Administrator use for these inputs, according to best practices for\nAgentforce instructions?","options":{"A":"Instructions for productId: \"The 18 character ID of the product.\" Instructions for reasonCode: \"A numerical code.\"","B":"Instructions for productId: \"The product ID. Retrieve this from the conversation history or the user's input.\" Instructions for reasonCode: \"The three-digit replacement reason. This is required when the product ID is present.\"","C":"Instructions for productId: \"ID from the product record.\" Instructions for reasonCode: \"Code for the reason.\"","D":"Instructions for productId: \"The 18 character ID of the product. Retrieve this from the conversation history or the user's input. Required.\" Instructions for reasonCode: \"A three-digit code that specifies the reason for replacement. This is required only when the product ID is present.\""},"correct":["D"],"explanation":"Effective Agentforce instructions must be explicit about the data format, the source of the data, and\nthe requirements for the input. Option D is the best choice because it provides the most detail for the\nLarge Language Model (LLM). It specifies the format (18 character ID / three-digit code), the source\n(conversation history or user input), and the logic/dependency (required only when the product ID is\npresent). This level of detail prevents the agent from guessing or providing incomplete data to the\nunderlying Salesforce action.\nOptions A and C are too vague and could lead to errors. Option B is better but lacks the explicit\n\"Required\" tag and format details found in Option D. High-quality instructions act as a contract\nbetween the agent's natural language understanding and the structured data requirements of the\nSalesforce system.","category":"Agentforce AI"},{"id":143,"question":"A sales rep at Ursa Major Solar has launched a series of networking events. They are hosting\none event per month and want to be able to report on Campaign ROI by month and series. How\nshould a Platform Administrator set up the Campaign to simplify reporting?","options":{"A":"Create individual Campaigns that all have the same name.","B":"Configure Campaign Member Statuses to record which event Members attended.","C":"Use Campaign Hierarchy where the monthly events roll up to a parent Campaign.","D":"Add different record types for the monthly event types."},"correct":["C"],"explanation":"To organize related marketing initiatives and simplify reporting, Salesforce utilizes Campaign\nHierarchies. A hierarchy allows an administrator to link multiple campaigns together using the\n\"Parent Campaign\" field. In this scenario, the admin should create a \"Parent\" campaign to represent\nthe entire networking series and then create individual \"Child\" campaigns for each monthly event.\nThis structure provides two major benefits: it allows the sales rep to see the specific performance\n(ROI, members, responses) of a single monthly event, and it uses \"Hierarchy Total\" fields to\nautomatically roll up all those metrics to the parent level. This provides a holistic view of the entire\nseries' success without requiring complex manual calculations. Using the same name for campaigns\n\n\n(Option A) leads to data confusion, and while member statuses (Option B) are useful, they do not\nprovide the structural \"series vs. month\" reporting required here. Campaign Hierarchy is the standard\narchitectural approach for multi-touch or recurring marketing efforts.","category":"Sales & Marketing Applications"},{"id":144,"question":"The VP of sales at AW Computing would like sales reps to check in with their top account\nevery Monday.\nThe VP would like a dashboard component to show the status of the check-ins. What should a\nPlatform Administrator configure to remind the reps to contact their top account?","options":{"A":"Create a time-based workflow task.","B":"Enable the creation of recurring tasks.","C":"Add the email action to the page layout.","D":"Use a process email alert on the account."},"correct":["B"],"explanation":"To ensure a consistent, weekly \"check-in\" occurs, the Platform Administrator should enable the\ncreation of recurring tasks. This feature allows a sales rep to create a single task (e.g., \"Monday\nCheck-in\") and set a recurring frequency of \"Weekly\" on \"Mondays.\" Salesforce then automatically\ngenerates the next task in the series once the current one is completed. This is the most effective\nway to provide reps with a constant reminder in their task list. Additionally, because these are\nstandard Task records, the administrator can easily build a report and a dashboard component to\ntrack the completion status of these check-ins for the VP. Time- based workflow (Option A) is typically\nfor one-off alerts based on a date field, not for a permanent weekly habit. Email actions (Option C)\nand alerts (Option D) notify users but do not create the trackable task record required for the\ndashboard component.","category":"Productivity & Collaboration"},{"id":145,"question":"A Platform Administrator at Universal Containers needs an automated way to delete records\nbased on field values. Which automated solution should the administrator use?","options":{"A":"Flow Builder","B":"Automation Studio","C":"Mass Delete Records","D":"Flow Orchestration"},"correct":["A"],"explanation":"Flow Builder is the standard and most versatile tool for performing automated data maintenance,\nincluding the deletion of records. A \"Schedule-Triggered Flow\" can be configured to run at specific\nintervals (e.g., daily at midnight) to find records that meet certain criteria-such as Leads that have\nbeen \"Unqualified\" for over a year-and use the \"Delete Records\" element to remove them from the\nsystem. While the \"Mass Delete Records\" tool (Option C) exists in the Setup menu, it is a manual\nadministrative tool and cannot be scheduled or fully automated based on complex field-level logic.\nAutomation Studio (Option B) is a Marketing Cloud tool, not a core Salesforce platform feature for\nrecord management. Flow Orchestration (Option D) is used for complex, multi-user business\nprocesses rather than simple data cleanup tasks. Therefore, for recurring, criteria- based record\ndeletion, Flow Builder is the recommended solution.","category":"Automation"},{"id":146,"question":"A VP of sales needs to report on records owned by individuals in various parts of the role\n\n\nhierarchy. The organization-wide default is set to Private. What should a Platform Administrator\nconfigure to achieve this?","options":{"A":"Field-Level Security","B":"Sharing Rules","C":"Permission Sets","D":"Restriction Rules"},"correct":["B"],"explanation":"When the Organization-Wide Default (OWD) for an object is set to Private, users can only see records\nthey own or those shared with them. While the Role Hierarchy automatically grants \"upward\"\nvisibility (managers see what subordinates own), it does not naturally allow for \"lateral\" visibility or\nvisibility across different branches of the hierarchy. To solve this, a Platform Administrator should use\nSharing Rules. Sharing Rules allow the admin to create exceptions to the Private OWD based on\nrecord ownership or specific criteria. For example, the admin can create an \"Owner-based Sharing\nRule\" that shares all records owned by the \"East Coast Sales\" role with the VP of Sales (or a Public\nGroup the VP belongs to). This provides a scalable way to grant the necessary visibility for reporting\nwithout making the data public to the entire company. Sharing Rules are a core security feature that\nensures the right people have access to the right data while maintaining the principle of least\nprivilege.","category":"Configuration & Setup"},{"id":147,"question":"Service reps in a call center do not have assigned desks. They sit at any available desk and\nuse the computer on that desk to access Salesforce. A Platform Administrator has been asked to\nstreamline the login process so the reps do not have to authenticate each time they log in at a\ndifferent computer. Which function should the administrator use to implement this request?","options":{"A":"Custom Profile","B":"Trusted IP Ranges","C":"Multi-factor Authentication","D":"Permission Set"},"correct":["B"],"explanation":"In Salesforce, Trusted IP Ranges (configured under Network Access in Setup) define a set of IP\naddresses from which users can log in without being prompted for a verification code (identity\nconfirmation). In a call center environment where reps use different machines but are all within the\nsame corporate network (sharing a common external IP or range), adding those corporate IPs to the\nTrusted IP Ranges list \"streamlines\" the login process. This prevents the system from seeing each new\nmachine as an \"unrecognized device\". Multi- factor Authentication (Option C) actually adds an extra\nstep to the login process, which is the opposite of streamlining28. Profiles (Option A) and Permission\nSets (Option D) can manage \"Login IP Ranges\" (which restrict access to specific IPs), but Trusted IP\nRanges are the primary tool for bypassing identity verification within a known network.","category":"Configuration & Setup"},{"id":148,"question":"Cloud Kicks needs to be able to show different picklist values for sales and marketing users.\nWhich two options meet this requirement?","options":{"A":"Two permission sets, one record type, one picklist","B":"One record type, two profiles, one picklist","C":"One page layout, two record types, one picklist","D":"Two page layouts, one record type, two picklists"},"correct":["C","D"],"explanation":"There are two primary ways to display different picklist values to different groups of users. The first,\nand most common, is using Record Types (Option C). A single picklist field can have its available\nvalues filtered at the Record Type level. By creating a \"Sales\" record type and a \"Marketing\" record\ntype, the admin can select which values are visible for each. These record types are then assigned to\nthe respective users' profiles.\nThe second method (Option D) involves using different Page Layouts and two separate picklist fields.\nIn this scenario, the admin creates two distinct fields (e.g., \"Sales Category\" and \"Marketing\nCategory\") and places only the relevant field on the page layout assigned to that specific team. This is\nless common but effective if the data needs to be stored in entirely different buckets. Option B is\nincorrect because profiles themselves do not filter picklist values; they only control which record\ntypes a user can access.","category":"Object Manager & Lightning App Builder"},{"id":149,"question":"The VP of sales at Cloud Kicks has a standard sales profile and is receiving an error message\nthat prevents them from saving an opportunity. A Platform Administrator attempted the same edit\nwithout receiving an error. How should the administrator troubleshoot this issue?","options":{"A":"Log in as a system administrator to troubleshoot.","B":"Use 'Login as' to log in as the user.","C":"Use an AppExchange product to troubleshoot.","D":"Ask the user for their password so the admin can log in as the user."},"correct":["B"],"explanation":"When a specific user encounters an error that an administrator cannot replicate, the most effective\ntroubleshooting technique is to \"Login as\" that user. This feature, which must be enabled in the\norganization's login policies, allows the administrator to see exactly what the user sees and\nexperience the system through their specific profile, role, and sharing permissions22. This is vital for\nidentifying issues related to Validation Rules, Field-Level Security, or Record-Triggered Flows that\nmight only trigger under specific user contexts.\nLogging in as a system administrator (Option A) is ineffective because administrators often bypass\ncertain restrictions that apply to standard users4. Asking for a password (Option D) is a major security\nviolation and is never required in Salesforce5. By using the \"Login as\" feature, the admin can pinpoint\nwhether the error is caused by the user's data input or a specific permission conflict assigned to their\nprofile.","category":"Configuration & Setup"},{"id":150,"question":"In an approval process, what happens when a queue is selected as the approver?","options":{"A":"The queue requires unanimous approval from all of its members before the record is approved.","B":"Any member of the queue can approve or reject the record and the queue is treated as a single entity.","C":"Only the queue owner is notified about the approval request, not its members.","D":"The queue can only be used for objects that do not support individual user approvals."},"correct":["B"],"explanation":"Salesforce allows Queues to be designated as assigned approvers in an approval process. When a\n\n\nrecord is submitted for approval and routed to a queue, an email notification is sent to all queue\nmembers (depending on queue settings). The core behavior is that any member of the queue can\n\"claim\" the request and either approve or reject it. Once one member takes action, the step is\nconsidered complete, and the queue is treated as a single decision-making entity. Unanimous\napproval (Option A) is a specific setting for multiple individual assigned approvers, but it does not\napply to queues in this way. Option C is incorrect because the purpose of a queue is to notify all\nmembers to ensure a timely response. Queues are supported for most standard and all custom\nobjects (negating Option D).","category":"Service & Support Applications"}];

const CATEGORIES = [
  { name: "Data & Analytics Management", weight: "17%", icon: "📊", nameEN: "Data & Analytics" },
  { name: "Configuration & Setup", weight: "15%", icon: "⚙️", nameEN: "Config & Setup" },
  { name: "Object Manager & Lightning App Builder", weight: "15%", icon: "🏗️", nameEN: "Object Manager & App Builder" },
  { name: "Automation", weight: "15%", icon: "⚡", nameEN: "Automation (Flow)" },
  { name: "Sales & Marketing Applications", weight: "10%", icon: "📈", nameEN: "Sales & Marketing" },
  { name: "Service & Support Applications", weight: "10%", icon: "🎧", nameEN: "Service & Support" },
  { name: "Productivity & Collaboration", weight: "10%", icon: "🤝", nameEN: "Productivity & Collab" },
  { name: "Agentforce AI", weight: "8%", icon: "🤖", nameEN: "Agentforce AI" },
];

let state = {
  screen: 'home', mode: null, selectedCategory: null,
  questions: [], currentIdx: 0, selectedOptions: [],
  answered: false, results: [], session: { correct: 0, total: 0 },
  translationCache: {}, translating: false, showTranslation: {},
};

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let wrongIds = load('adm_wrongIds', []);
let favoriteIds = load('adm_favoriteIds', []);
let allResults = load('adm_allResults', {});

function saveWrong() { save('adm_wrongIds', wrongIds); }
function saveFavorites() { save('adm_favoriteIds', favoriteIds); }
function saveResults() { save('adm_allResults', allResults); }

function shuffle(arr) {
  const a = [...arr];
