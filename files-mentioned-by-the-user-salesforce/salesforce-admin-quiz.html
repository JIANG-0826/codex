  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function scrollToTop() { document.querySelector('.scroll-area').scrollTo({ top: 0, behavior: 'smooth' }); }

function render() {
  const app = document.getElementById('app');
  const stat = document.getElementById('headerStat');
  if (state.screen === 'home') { stat.textContent = '🏠 Home'; renderHome(app); }
  else if (state.screen === 'category-pick') { stat.textContent = '📚 Categories'; renderCategoryPick(app); }
  else if (state.screen === 'quiz') { stat.textContent = `${state.currentIdx+1}/${state.questions.length}`; renderQuiz(app); }
  else if (state.screen === 'score') { stat.textContent = '🏆 Results'; renderScore(app); }
  scrollToTop();
}

function renderHome(app) {
  const total = Object.keys(allResults).length;
  const correct = Object.values(allResults).reduce((s,r) => s+r.correct, 0);
  const totalAns = Object.values(allResults).reduce((s,r) => s+r.total, 0);
  const acc = totalAns > 0 ? Math.round(correct/totalAns*100) : 0;
  app.innerHTML = `
    <div class="progress-row">
      <div class="progress-stat"><span class="progress-num">${total}</span><div class="progress-label">Answered</div></div>
      <div class="progress-stat"><span class="progress-num">${acc}%</span><div class="progress-label">Accuracy</div></div>
      <div class="progress-stat"><span class="progress-num">${wrongIds.length}</span><div class="progress-label">Review</div></div>
      <div class="progress-stat"><span class="progress-num">${favoriteIds.length}</span><div class="progress-label">⭐ Saved</div></div>
    </div>
    <div class="home-grid">
      <div class="home-card random" onclick="startRandom()">
        <div class="home-icon">🎲</div>
        <h2>Random Practice</h2>
        <p>All questions shuffled randomly</p>
        <span class="home-badge">150 Qs</span>
      </div>
      <div class="home-card category" onclick="showCategoryPick()">
        <div class="home-icon">📚</div>
        <h2>By Topic</h2>
        <p>Focus on specific exam domains</p>
        <span class="home-badge">8 Topics</span>
      </div>
      <div class="home-card wrong" onclick="startWrong()">
        <div class="home-icon">🔁</div>
        <h2>Wrong Answers</h2>
        <p>Revisit questions you missed</p>
        <span class="home-badge warn">${wrongIds.length} Qs</span>
      </div>
      <div class="home-card favorites" onclick="startFavorites()">
        <div class="home-icon">⭐</div>
        <h2>Favorites</h2>
        <p>Questions you bookmarked</p>
        <span class="home-badge gold">${favoriteIds.length} Qs</span>
      </div>
    </div>
    <div style="height:20px"></div>`;
}

function renderCategoryPick(app) {
  const qByCat = {};
  QUESTIONS.forEach(q => { qByCat[q.category] = (qByCat[q.category]||0)+1; });
  const items = CATEGORIES.map(cat => `
    <div class="cat-item" onclick="startCategory('${cat.name.replace(/'/g,"\'")}')">
      <span class="cat-icon">${cat.icon}</span>
      <div><div class="cat-name">${cat.nameEN}</div><div class="cat-sub">${cat.name}</div></div>
      <div class="cat-right"><span class="cat-weight">${cat.weight}</span><span class="cat-count">${qByCat[cat.name]||0} Qs</span></div>
    </div>`).join('');
  app.innerHTML = `
    <div class="section-header">
      <button class="btn-back" onclick="goHome()">← Back</button>
      <span class="section-title">Select Topic</span>
    </div>
    <div class="category-list">${items}</div>
    <div style="height:20px"></div>`;
}

function renderQuiz(app) {
  const q = state.questions[state.currentIdx];
  const total = state.questions.length;
  const pct = (state.currentIdx / total * 100).toFixed(1);
  const isMulti = q.correct.length > 1;
  const isFav = favoriteIds.includes(q.id);

  let optionsHtml = Object.entries(q.options).map(([letter, text]) => {
    let cls = 'option-btn';
    const isSelected = state.selectedOptions.includes(letter);
    if (state.answered) {
      if (q.correct.includes(letter)) cls += ' correct';
      else if (isSelected) cls += ' wrong';
    } else if (isSelected) cls += ' selected-pending';
    const check = isMulti && !state.answered ? (isSelected ? ' ☑' : ' ☐') : '';
    return `<button class="${cls}" ${state.answered?'disabled':''} onclick="selectOption('${letter}')">
      <span class="opt-letter">${letter}${check}</span><span>${text}</span></button>`;
  }).join('');

  let multiBar = '';
  if (isMulti && !state.answered) {
    const need = q.correct.length, sel = state.selectedOptions.length;
    multiBar = `<div class="multi-bar">⚠️ Select ${need} answers (${sel}/${need} chosen)
      <button class="btn-submit" ${sel===need?'':'disabled'} onclick="submitMulti()">Submit</button></div>`;
  }

  let resultBanner = '', expHtml = '', stickyNext = '';
  if (state.answered) {
    const lastResult = state.results[state.results.length-1];
    const isCorrect = lastResult && lastResult.correct;
    resultBanner = `<div class="result-banner ${isCorrect?'correct':'wrong'}">
      ${isCorrect ? '✅ Correct!' : '❌ Incorrect — Answer: ' + q.correct.join(', ')}
    </div>`;

    const showTr = state.showTranslation[q.id];
    const cached = state.translationCache[q.id];
    expHtml = `<div class="explanation-box">
      <div class="explanation-en">
        <div class="exp-header">
          <span class="exp-label">📝 Explanation</span>
          <button class="translate-btn" onclick="translateExplanation(${q.id})" ${state.translating?'disabled':''}>
            ${state.translating ? '<span class="loading-spinner"></span>' : '🌐 中文'}
          </button>
        </div>${q.explanation}
      </div>
      ${showTr && cached ? `<div class="explanation-cn"><div class="exp-header"><span class="exp-label">🇨🇳 Chinese Translation</span></div>${cached}</div>` : ''}
    </div>`;

    const isLast = state.currentIdx >= total-1;
    stickyNext = `<div class="sticky-next"><button class="btn-next" onclick="nextQuestion()">${isLast ? '🏁 See Results' : 'Next Question →'}</button></div>`;
  }

  const catIcon = getCatIcon(q.category);
  const catShort = getCatShort(q.category);
  app.innerHTML = `
    <div class="quiz-nav">
      <button class="btn-back" onclick="confirmBack()">← Back</button>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <span class="quiz-counter">${state.currentIdx+1}/${total}</span>
    </div>
    <div class="question-card">
      <div class="question-meta">
        <span class="q-num">Q.${q.id}</span>
        <span class="q-cat-tag">${catIcon} ${catShort}</span>
        ${isMulti ? `<span class="q-multi-tag">Multi (${q.correct.length})</span>` : ''}
        <button class="fav-btn" onclick="toggleFavorite(${q.id})">${isFav?'⭐':'☆'}</button>
      </div>
      <div class="question-body">${q.question}</div>
      ${multiBar}
      <div class="options-list">${optionsHtml}</div>
      ${resultBanner}${expHtml}
    </div>
    ${stickyNext}
    <div style="height:${state.answered?'0':'20px'}"></div>`;
}

function renderScore(app) {
  const { correct, total } = state.session;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  const pass = pct >= 65;
  const r = 54, circ = 2 * Math.PI * r;
  const dash = (pct/100 * circ).toFixed(1);
  app.innerHTML = `
    <div class="score-card">
      <div class="score-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="#dde2e8" stroke-width="10"/>
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="${pass?'#2e844a':'#0176d3'}"
            stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
        </svg>
        <div class="score-ring-num">${pct}%</div>
      </div>
      <div class="score-title">${pass ? '🎉 Passed!' : '📚 Keep Studying!'}</div>
      <div class="score-sub">${correct} / ${total} correct · Pass mark: 65%</div>
      <div class="score-actions">
        <button class="btn-action" onclick="restartMode()">🔄 Try Again</button>
        ${wrongIds.length > 0 ? `<button class="btn-action" onclick="startWrong()">🔁 Review Wrong (${wrongIds.length})</button>` : ''}
        <button class="btn-action outline" onclick="goHome()">🏠 Home</button>
      </div>
    </div><div style="height:20px"></div>`;
}

function startRandom() { state.mode='random'; state.questions=shuffle(QUESTIONS); startQuiz(); }
function showCategoryPick() { state.screen='category-pick'; render(); }
function startCategory(cat) {
  state.mode='category'; state.selectedCategory=cat;
  state.questions=shuffle(QUESTIONS.filter(q=>q.category===cat));
  if (!state.questions.length) { alert('No questions found for this topic.'); return; }
  startQuiz();
}
function startWrong() {
  if (!wrongIds.length) { alert('No wrong answers yet! Start practicing first.'); return; }
  state.mode='wrong'; state.questions=shuffle(QUESTIONS.filter(q=>wrongIds.includes(q.id))); startQuiz();
}
function startFavorites() {
  if (!favoriteIds.length) { alert('No favorites saved yet. Tap ☆ on any question to bookmark it.'); return; }
  state.mode='favorites'; state.questions=shuffle(QUESTIONS.filter(q=>favoriteIds.includes(q.id))); startQuiz();
}
function restartMode() {
  if (state.mode==='random') startRandom();
  else if (state.mode==='category') startCategory(state.selectedCategory);
  else if (state.mode==='wrong') startWrong();
  else if (state.mode==='favorites') startFavorites();
  else goHome();
}
function startQuiz() {
  state.screen='quiz'; state.currentIdx=0; state.selectedOptions=[];
  state.answered=false; state.results=[]; state.session={correct:0,total:0};
  state.showTranslation={}; render();
}

function selectOption(letter) {
  if (state.answered) return;
  const q = state.questions[state.currentIdx];
  if (q.correct.length > 1) {
    if (state.selectedOptions.includes(letter)) state.selectedOptions=state.selectedOptions.filter(l=>l!==letter);
    else state.selectedOptions.push(letter);
    render();
  } else { state.selectedOptions=[letter]; checkAnswer(); }
}
function submitMulti() { checkAnswer(); }

function checkAnswer() {
  const q = state.questions[state.currentIdx];
  const selected = [...state.selectedOptions].sort();
  const correct = [...q.correct].sort();
  const isCorrect = JSON.stringify(selected)===JSON.stringify(correct);
  state.answered=true; state.session.total++;
  if (isCorrect) { state.session.correct++; wrongIds=wrongIds.filter(id=>id!==q.id); saveWrong(); }
  else { if (!wrongIds.includes(q.id)) { wrongIds.push(q.id); saveWrong(); } }
  if (!allResults[q.id]) allResults[q.id]={correct:0,total:0};
  allResults[q.id].total++; if (isCorrect) allResults[q.id].correct++;
  saveResults();
  state.results.push({id:q.id, correct:isCorrect}); render();
}

function nextQuestion() {
  if (state.currentIdx >= state.questions.length-1) { state.screen='score'; render(); return; }
  state.currentIdx++; state.selectedOptions=[]; state.answered=false; render();
}
function toggleFavorite(id) {
  if (favoriteIds.includes(id)) favoriteIds=favoriteIds.filter(f=>f!==id);
  else favoriteIds.push(id);
  saveFavorites(); render();
}
function goHome() { state.screen='home'; state.mode=null; state.questions=[]; render(); }
function confirmBack() {
  if (!state.answered && state.currentIdx===0) { goHome(); return; }
  if (confirm('Stop this session and return home?')) goHome();
}

async function translateExplanation(qId) {
  if (state.translationCache[qId]) { state.showTranslation[qId]=true; render(); return; }
  state.translating=true; render();
  const q = QUESTIONS.find(q=>q.id===qId);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`请将以下Salesforce考试题解析从英文翻译成中文（简体），只输出翻译结果：

${q.explanation}`}]
      })
    });
    const data = await res.json();
    state.translationCache[qId] = data.content?.map(c=>c.text||'').join('')||'Translation failed';
    state.showTranslation[qId]=true;
  } catch(e) { state.translationCache[qId]='Error: '+e.message; state.showTranslation[qId]=true; }
  state.translating=false; render();
}

function getCatIcon(cat) { return (CATEGORIES.find(c=>c.name===cat)||{}).icon||'📋'; }
function getCatShort(cat) { return (CATEGORIES.find(c=>c.name===cat)||{}).nameEN||cat; }

render();
</script>
