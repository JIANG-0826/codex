  {id:53,question:"Which two report formats can be used as a source report to configure a reporting snapshot?\nChoose 2 answers",options:{"A":"Tabular format", "B":"Summary format", "C":"Joined format", "D":"Matrix format"},correct:["B", "D"],explanation:"For reporting snapshots, the source report must be capable of grouping data, which is necessary for\nsummarizing information at specific intervals. The acceptable formats for a source report in reporting\nsnapshots are:\nSummary format (B). This format groups rows of data by one or more criteria and can perform\ncalculations such as sum, average, etc., on another column at each group level.\n\nMatrix format (D). Similar to the summary format but arranges data in a grid format, allowing\nsummarization by both rows and columns.\nTabular (A) and joined (C) formats are not suitable for reporting snapshots. Tabular reports do not include\ngrouped or summarized data, and joined reports involve combining multiple report types, which are not\ncompatible with how reporting snapshots need to structure data.\nReference for more information on reporting snapshots and report formats:\nReporting Snapshots: https://help.salesforce.com/articleView?id=reports_snapshots.htm&type=5\nReport Formats: https://help.salesforce.com/articleView?id=reports_understanding_formats.\nhtm&type=5",category:"Reporting"},
  {id:54,question:"Universal containers wants to display the real time stock price for each account on the account record page.\nHow should an app builder implement this request?",options:{"A":"Add a dynamic report to the page layout", "B":"Create a lightning webcomponent", "C":"Install a solution from the appexchange", "D":"Build a visual flow that users API calls"},correct:["C"],explanation:"One of the easiest ways to display real-time stock price for each account is to install a solution from the\nAppExchange, such as Stock Price Lightning Component3. This component can be added to any record page\nusing the Lightning App Builder.",category:"User Interface"},
  {id:55,question:"A new app builder on the Cloud Kicks team is getting familiar with the data model. They want to see how\nstandard objects and custom objects relate.\nWhich functionality should the app builder use to view these relationships?",options:{"A":"Fields & Relationships", "B":"Object Manager", "C":"Lightning App Builder", "D":"Schema Builder"},correct:["D"],explanation:"Schema Builder provides a graphical representation of all standard and custom objects and their field and\nrelationship structure. It’s the best tool for visualizing how data objects are interconnected.\nWhy D (Schema Builder) is correct:Exact Extract:“Schema Builder provides a dynamic environment\nfor viewing and modifying all the objects and relationships in your organization. You can add new\ncustom objects, fields, and relationships directly in the schema.” — Salesforce Help | Schema Builder\nOverview\nWhy not A (Fields & Relationships):That section displays fields for a single object only, not overall\nrelationships.\nWhy not B (Object Manager):The Object Manager allows object configuration but doesn’t visually\ndisplay relationships.\nWhy not C (Lightning App Builder):That tool is for UI layout, not data model visualization.\nReferences:\nSalesforce Help | Schema Builder Overview\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:56,question:"Cloud Kicks wants to summarize the number of open Cases related to an Account, as well as the number of\nclosed Cases to indicate whether customer support utilization is high, medium, or low. Two number fields\nhave been created: NUM_Open_Cases__c and NUM_Closed_Cases_c\nWhich two automation solutions would meet these business requirements?\nChoose 2 answers",options:{"A":"AppExchange", "B":"Validation Rule", "C":"Approval Process", "D":"Apex"},correct:["A", "D"],explanation:"To meet the requirement of summarizing the number of open and closed cases on an Account, two potential\nautomation solutions can be used:\nOption A (AppExchange): Salesforce AppExchange offers various pre-built apps and components,\nincluding those for case management, which could provide the functionality to summarize cases and\ncategorize customer support utilization. Many apps can handle complex business requirements like case\nsummary roll-ups and could meet the needs without custom development.\nSalesforce AppExchange\nOption D (Apex): Apex is Salesforce’s programming language that allows developers to implement custom\nlogic. In this scenario, Apex could be used to create a trigger or scheduled job that calculates the number of\nopen and closed cases and updates the Account record accordingly. Apex would allow full customization of\nhow the open/closed case numbers are calculated and how customer support utilization (high, medium, low) is\ndetermined.\nReference: Apex Triggers\nOption B (Validation Rule): Validation Rules enforce data quality by ensuring that certain conditions are met\nbefore saving a record. They are not suitable for summarizing data or performing calculations across related\nrecords, so this option is not appropriate.\nOption C (Approval Process): Approval Processes are used for managing approval workflows, which is\nunrelated to the case summarization requirement. Therefore, it is not a relevant option here.\nIn summary, using AppExchange for a pre-built solution or Apex for a custom automation are the best\napproaches for summarizing open and closed cases on the Account object.\nReference:Apex Programming GuideSalesforce AppExchange",category:"Data Modeling and Management"},
  {id:57,question:"DreamHouse Realty requires that field value changes for certain fields such as Asking_Price__c and\nReal_Estate_Agent„c on their House__c custom object show up prominently on Chatter.\nWhat Chatter feature should the app builder utilize?",options:{"A":"Thanks", "B":"Publisher Actions", "C":"Topics", "D":"Feed Tracking"},correct:["D"],explanation:"Feed Tracking is the Chatter feature that allows field value changes for certain fields to show up on Chatter.\nThanks, Publisher Actions, and Topics are other Chatter features, but they do not relate to field value changes.",category:"Data Modeling and Management"},
  {id:58,question:"Cloud Kicks recently implemented the application lifecycle management process to its release management\nstrategy.\nWhich category handles bug fixes and simple changes?",options:{"A":"Patch", "B":"Minor", "C":"Major", "D":"Rollback"},correct:["A"],explanation:"The category that handles bug fixes and simple changes is minor. A minor release is a type of release that\nintroduces small enhancements or fixes to existing functionality, such as correcting spelling errors or\nimproving performance. A minor release usually has a low impact on users and does not require extensive\ntesting or training. A patch release is a type of release that addresses critical issues or defects that affect the\nfunctionality or security of an application, such as fixing broken links or resolving vulnerabilities. A patch\nrelease usually has a high impact on users and requires immediate deployment. A major release is a type of\nrelease that introduces new functionality or features to an application, such as adding new objects or\ncomponents or changing business processes. A major release usually has a high impact on users and requires\nextensive testing and training. A rollback is not a type of release, but an action that reverses a release that has\nbeen deployed to an environment, such as undoing changes or restoring previous versions. A rollback may be\nnecessary if a release causes errors or issues that affect the functionality or performance of an application.",category:"Data Modeling and Management"},
  {id:59,question:"A sales manager has noticed that reps continue to input contacts directly in\ntheir phone instead of adding them to Salesforce.\nWhat should an app builder recommend to ensure the data makes it into Salesforce?",options:{"A":"Enable in-app notifications every time a contact is created.", "B":"Allow Salesforce to import Contacts from mobile device Contact lists.", "C":"Enable offline create, edit, and delete in Salesforce for Android and iOS.", "D":"Allow users to relate a contact to multiple accounts."},correct:["C"],explanation:"To ensure sales reps input contacts into Salesforce rather than their personal devices:\nC. Enable offline create, edit, and delete in Salesforce for Android and iOS. This feature allows sales\nreps to enter contact information directly into the Salesforce Mobile App even when they are offline,\nwhich syncs back to Salesforce once connectivity is restored.\nSteps to enable offline capabilities:\nNavigate to Setup # Mobile Administration # Salesforce Mobile App # Offline Settings.\nConfigure offline settings to allow for creating, editing, and deleting records.\nEnsure that the Contact object is available for offline access.\nThis functionality encourages reps to use Salesforce directly by mitigating connectivity constraints.\nFor implementation details, refer to Salesforce Mobile App Offline.",category:"User Interface"},
  {id:60,question:"Where can an app builder edit an existing app to add components to the utility bar?",options:{"A":"App Menu", "B":"Lightning App Builder", "C":"App Manager", "D":"Lightning Record Page"},correct:["C"],explanation:"To add components to the utility bar of an existing app:\nC. App Manager. This is where Salesforce apps are configured, including the utility bar which can\nhouse components like a chat tool, recent items list, or custom Lightning components.\nSteps to edit an app's utility bar:\n\nNavigate to Setup # App Manager.\nLocate the desired app and click on the dropdown next to it # select Edit.\nIn the App Builder, navigate to the Utility Items tab.\nClick 'Add' to include new components to the utility bar.\nConfigure the properties of the utility item as needed.\nSave the app configuration.\nFor step-by-step instructions on modifying apps, see Salesforce's guide on Managing Apps in Lightning\nExperience.",category:"User Interface"},
  {id:61,question:"An app builder just added a lookup field to Account from the existing custom object, Box.\nWhich report type is automatically created?",options:{"A":"Boxes with or without Accounts", "B":"Accounts with or without Boxes", "C":"Boxes with Accounts", "D":"Accounts with Boxes"},correct:["D"],explanation:"Upon adding a lookup field to Account from a custom object, Box:\nD. Accounts with Boxes. Salesforce automatically creates a new report type that reflects the\nrelationship from the perspective of the parent object, in this case, Accounts, showing related Box\nrecords.\nThis new report type enables users to create reports that list Accounts along with their associated Boxes, if\nany.\nFor further understanding of report types and relationships, Salesforce's guide on Report Types provides\ncomprehensive information on how these are structured following modifications to object relationships.",category:"Data Modeling and Management"},
  {id:62,question:"After a deal is closed, Cloud Kicks (CK) wants to assign a user as a customer service manager (CSM) in\naddition to the account owner and would like a new field to easily track and report which CSM is assigned to\nthe Account.\nWhich solution should an app builder use for this request?",options:{"A":"Multi-select picklist Meld", "B":"Picklist field", "C":"Lookup field", "D":"Text field"},correct:["C"],explanation:"The solution that an app builder should use for this request is a lookup field. A lookup field is a type of\nrelationship field that links two objects together and allows users to select a record from another object. The\napp builder can create a lookup field on the account object that references the user object and allows users to\nassign a customer service manager (CSM) to the account. Option A is incorrect because a multi-select picklist\nfield is not suitable for this request, as multi-select picklist fields allow users to select multiple values from a\npredefined list, not from another object. Option B is incorrect because a picklist field is not suitable for this\nrequest, as picklist fields allow users to select one value from a predefined list, not from another object.\nOption D is incorrect because a text field is not suitable for this request, as text fields allow users to enter any\nalphanumeric characters, not from another object.",category:"Data Modeling and Management"},
  {id:63,question:"The DreamHouse Realty (DR) service manager has asked for some improvements in case management to\nenforce process compliance so that cases are unable to be reverted to an earlier case status, and to ensure that\ncertain fields are required when specific case criteria are met.\nWhat solution should an app builder implement to meet these requirements?",options:{"A":"Workflow Rules", "B":"Process Builder", "C":"A Validation Rules", "D":"Activities Component"},correct:["C"],explanation:"A validation rule can enforce process compliance by preventing users from saving records that do not meet\ncertain criteria. In this case, a validation rule can prevent users from reverting to an earlier case status or\nleaving certain fields blank when specific case criteria are met",category:"Data Modeling and Management"},
  {id:64,question:"An app builder is preparing to deploy a new app from the sandbox to production using change sets.\nWhat two considerations should an app builder keep in mind during this process?\nChoose 2 answers",options:{"A":"Salesforce Connect automatically establishes a link between environments.", "B":"Change sets do not include all components and may have to perform some changes manually.", "C":"Users should be logged out of production when receiving inbound change sets.", "D":"Transactions will revert if the deployment errors."},correct:["B", "C"],explanation:"The two considerations that an app builder should keep in mind during the deployment process using change\nsets are: Change sets do not include all components and may have to perform some changes manually.\nChange sets are a way to deploy metadata changes from one Salesforce org to another, but they do not support\nall types of components, such as reports, dashboards, email templates, etc. The app builder may have to use\nother methods, such as unmanaged packages or manual configuration, to deploy these components. Users\nshould be logged out of production when receiving inbound change sets. This is a best practice to avoid any\nerrors or conflicts that may occur when deploying changes to production. Users may be working on records or\ncomponents that are being updated by the change set, which may cause data loss or inconsistency. Salesforce\nConnect does not automatically establish a link between environments. Salesforce Connect is a feature that\nallows users to access data from external sources without storing it in Salesforce. It does not have anything to\ndo with deploying changes between Salesforce orgs. Transactions will not revert if the deployment errors.\nTransactions are units of work that are either completed entirely or not at all. If a deployment error occurs\nduring a transaction, the transaction will be rolled back and no changes will be made to the target org.\nHowever, this does not mean that the source org will revert to its previous state before the deployment.",category:"User Interface"},
  {id:65,question:"Cloud Kicks has three types of customer support processes: Platinum, Diamond, and Bronze. The app builder\ncreated separate record types for each process on the Case object. The customer support team should be\nunable to create new cases with the Bronze record type.\nHow should this requirement be met?",options:{"A":"Update the organization-wide defaults to private for Case.", "B":"Update the support team profile to remove the Bronze record type.", "C":"Create permission set group for Case that includes Platinum and Diamond record types.", "D":"Make the record type hidden to support users; update sharing roles to private."},correct:["B"],explanation:"The solution that should meet this requirement is updating the support team profile to remove the Bronze\nrecord type. This way, the support team users will not be able to create new cases with the Bronze record\ntype, as it will not appear in their record type selection list. Option A is incorrect because updating the\norganization-wide defaults to private for Case does not affect the record type availability, but rather the record\naccess level. Option C is incorrect because creating permission set group for Case that includes Platinum and\nDiamond record types does not prevent the support team users from creating new cases with the Bronze\nrecord type, as they may still have access to it through their profile. Option D is incorrect because making the\nrecord type hidden to support users and updating sharing roles to private does not prevent the support team\nusers from creating new cases with the Bronze record type, as they may still have access to it through their\nprofile.",category:"Data Modeling and Management"},
  {id:66,question:"Universal Containers (UC) has a custom Invoice object and a custom Invoice Line Item object. TTie Invoice\nLine-Item object has a lookup relationship to the Invoice. UC would like to convert the lookup relationship to\na master-detail relationship but is unable to do so.\nWhich two reasons could be preventing this relationship conversion?\nChoose 2 answers",options:{"A":"Custom objects are unable to be on the detail side of a master-detail relationship.", "B":"There are already two master-detail relationships on the Invoice Line Item.", "C":"Invoice Line-Item records exist without having the Invoice lookup field populated.", "D":"There is a roll-up summary field on the Invoice object."},correct:["B", "C"],explanation:"The two reasons that could be preventing this relationship conversion are that there are already two masterdetail relationships on the Invoice Line Item and that Invoice Line Item records exist without having the\nInvoice lookup field populated. A custom object can have up to two master-detail relationships, so adding\nanother one would exceed the limit. Also, a master-detail relationship requires that the detail records have a\nvalue in the master lookup field, so any records with a blank Invoice lookup field would prevent the\nconversion.",category:"Data Modeling and Management"},
  {id:67,question:"Sales reps at Universal Containers use Salesforce on their mobile devices. They want a way to odd new\ncontacts quickly and then follow up later to complete the additional Information necessary.\nWhat mobile solution should an App Builder recommend?",options:{"A":"Customize the mobile menu to move Contacts to the top.", "B":"Build a global action to create Contacts.", "C":"Add a compact layout to Contacts.", "D":"Use Path and set pre-defined values"},correct:["B"],explanation:"The app builder should recommend building a global action to create Contacts. A global action allows users\nto create records quickly from any page in Salesforce on their mobile devices. The app builder can also\nspecify predefined values for some fields in the global action, such as Account Name or Phone Number, to\nmake data entry easier for users. Option A is incorrect because customizing the mobile menu to move\nContacts to the top does not help users create new contacts quickly or follow up later. Option C is incorrect\nbecause adding a compact layout to Contacts does not help users create new contacts quickly or follow up\nlater, but rather shows them more fields on record detail pages or list views. Option D is incorrect because\nusing Path and setting pre-defined values does not help users create new contacts quickly or follow up later,\nbut rather guides them through different stages of a record.",category:"User Interface"},
  {id:68,question:"At Universal Containers, each admin and developer use a separate developer pro sandbox. Configuration and\ncode are then migrated to a partial data sandbox for combination and initial testing. Once approved the\nconfiguration and code are then migrated to a full sandbox for final toad and regression testing before going to\nproduction.\nWhen should the full sandbox be refreshed?",options:{"A":"After user acceptance testing is complete.", "B":"After each push from the partial data sandbox.", "C":"After each major release to production.", "D":"After a new user is added to production."},correct:["C"],explanation:"The full sandbox should be refreshed after each major release to production. This way, the full sandbox will\nhave the most updated data and metadata from the production org, and can be used for final load and\nregression testing before the next release. Option A is incorrect because refreshing the full sandbox after user\nacceptance testing is complete is not necessary, as user acceptance testing can be done in the partial data\nsandbox or the production org. Option B is incorrect because refreshing the full sandbox after each push from\nthe partial data sandbox is not necessary, as the full sandbox can receive configuration and code changes from\nthe partial data sandbox without refreshing. Option D is incorrect because refreshing the full sandbox after a\nnew user is added to production is not necessary, as adding a new user does not affect the data and metadata\nin the full sandbox.",category:"App Deployment"},
  {id:69,question:"The case handling process at Universal Containers includes multiple steps Including approvals, notifications,\nand fields updates. To manage and evaluate all of these changes in a single save operation, an app builder\nwants to use Process Builder and the Advanced option to let the process evaluate a record multiple times has\nbeen selected.\nWhich two options should the app builder avoid to prevent recursion?\nChoose 2 answers",options:{"A":"IF statements", "B":"Setting a criteria node to No criteria-just execute the procedure", "C":"Invocable processes", "D":"The ISCHANGED function"},correct:["C", "D"],explanation:"The two options that the app builder should avoid to prevent recursion are setting a criteria node to No criteriajust execute the procedure and invocable processes. Setting a criteria node to No criteria-just execute the\nprocedure means that the process will always execute the actions regardless of the record values, which can\ncause recursion if the process updates the same record that triggered it. Invocable processes are processes that\ncan be invoked from another process or a flow, which can cause recursion if the invocable process updates the\nsame record that triggered the parent process or flow. Option A is incorrect because IF statements are not an\noption in Process Builder, but rather a function that can be used in formulas or conditions. Option D is\nincorrect because the ISCHANGED function is not an option in Process Builder, but rather a function that can\nbe used in formulas or conditions to check if a field value has changed.",category:"Data Modeling and Management"},
  {id:70,question:"DreamHouse Realty wants to make sure an Opportunity has a field Expected_Close_Date_c populated before\nit is allowed to enter the qualified stage.\n\nHow should an app builder solution this request?",options:{"A":"Record Type", "B":"Validation Rule", "C":"Activity History", "D":"Page Layout"},correct:["B"],explanation:"A validation rule is a formula that evaluates the data in one or more fields and returns a value of “True” or\n“False”. Validation rules verify that the data a user enters in a record meets the standards you specify before\nthe user can save the record. In this case, a validation rule can be used to check if the Expected_Close_Date_c\nfield is populated before the Opportunity stage is set to qualified",category:"Data Modeling and Management"},
  {id:71,question:"Cloud Kicks has created accustom object called Interests which is joined to Accounts by way of a junction\nobject called Account Interest.\nWhat is the impact to users attempting to view an Account and the associated Account Interest records if they\nare without read access to the Interest object?",options:{"A":"Users will be able to view the Account Interest records and will have read-only access to the Interest records.", "B":"Users will be unable to view Account records that have a related Account Interest record.", "C":"Users will be unable to view the Account Interest records or the Interest records.", "D":"Users will be able to view the Account Interest record, but unable to view the field or any information relating back to the Interest record."},correct:["C"],explanation:"Users will be unable to view the Account Interest records or the Interest records because they do not have\nread access to the Interest object. This is a standard behavior of Salesforce when a user does not have access\nto a related object.",category:"Data Modeling and Management"},
  {id:72,question:"What are the limitations of Schema Builder when creating a custom object?",options:{"A":"\"Save\" should be clicked each time a new object, field, or relationship is created.", "B":"Fields and relationships can be created, but they will be unable to add the fields to the page layout from the canvas.", "C":"Relationships can be made to any custom objects, but any relationships to standard objects should be built in Lightning Object Manager.", "D":"Custom fields can be added to any custom objects, excluding formula field types."},correct:["B"],explanation:"It lacks setting up field-level security and adding fields to the page layout, so you have to choose the manual\nway of field creation. Adds another layer of risk with changes in Schema Builder since it is deployed in realtime.\nSalesforce Schema Builder is a powerful tool for visualizing and creating objects, fields, and relationships in\nSalesforce, but it has certain limitations when building custom objects.\nOption B (Fields and relationships can be created, but they will be unable to add the fields to the page\nlayout from the canvas): In Schema Builder, while you can create new custom objects, fields, and\nrelationships, you cannot directly add fields to the page layout from within the Schema Builder\ninterface. After creating a field, you need to navigate to the Page Layout Editor to manually place the\nnew field on the layout.\nSchema Builder Overview\nOption A: This is incorrect because you can perform multiple actions within Schema Builder without needing\nto click Save each time. Salesforce will save these changes when you click Save once at the end.\nOption C: While relationships can be created in Schema Builder for both standard and custom objects, there is\nno requirement to use Lightning Object Manager to create relationships with standard objects.\nOption D: Schema Builder supports the creation of formula fields along with other types of fields. There is no\nexclusion for formula fields.\nIn summary, Option B is the correct limitation of Schema Builder: you cannot add fields to page layouts\ndirectly from the Schema Builder interface.\nReference:Schema Builder Limitations",category:"Data Modeling and Management"},
  {id:73,question:"Universal Containers uses a custom object called Reviews to capture information generated by interviewers\nduring the candidate process. The Review records are visible to any user that has access to the related custom\nCandidate record. The VP of Human Resources wants the comment field on the Review to be private to\nanyone outside of the MR department\n\nHow should the app builder meet this requirement?",options:{"A":"Create a page layout with the field and use field-level security to hide the field from all other users.", "B":"Create an Apex sharing rule to share the field with users that have \"MR'' in their role.", "C":"Create a sharing rule to share the field with the VP of HR with Role and Subordinates.", "D":"Create a page layout with the field for HR users and another page layout without the field for all other users."},correct:["A"],explanation:"Create a page layout with the field and use field-level security to hide the field from all other users is how the\napp builder should meet the requirement of making the comment field on Review private to anyone outside of\nHR department. Field-level security can control which profiles can view or edit a field on a record. Create an\nApex sharing rule, create a sharing rule to share the field with VP of HR with Role and Subordinates, and\ncreate a page layout with the field for HR users and another page layout without the field for all other users\nare not valid or feasible solutions for this requirement.",category:"Data Modeling and Management"},
  {id:74,question:"An app builder wants to use Process Builder to automate some of the work being done by the sales team.\nWhat are three capabilities ofProcess Builder that can improve productivity?\nChoose 3 answers",options:{"A":"Send an email alert.", "B":"Update a related record.", "C":"Send an outbound message.", "D":"Delete a related record.", "E":"Create a child record."},correct:["A", "B", "E"],explanation:"Send an email alert, update a related record, and create a child record are three capabilities of Process Builder\nthat can improve productivity for the sales team. Process Builder can automate these actions based on criteria\nor events that occur on records or objects. Send an outbound message and delete a related record are not\ncapabilities of Process Builder, but of other tools such as Workflow Rules or Apex.",category:"Business Logic and Process Automation"},
  {id:75,question:"A new custom object is being created with a private sharing setting. The business wants to share individual\nrecords with specific people or group of people on a case-by-case basis. What options does the business user\nhave to manually share individual records? Choose 3 answers",options:{"A":"Public Groups", "B":"Permission Sets", "C":"Roles", "D":"Profiles", "E":"Users"},correct:["A", "C", "E"],explanation:"To manually share individual records with specific people or group of people on a case by case basis, users\ncan use public groups, roles, or users. Public groups are collections of users, roles, or other groups that can be\nused to share access to records. Roles define the level of access that users have to their organization’s data\nbased on their position in the hierarchy. Users are individual people who log in to Salesforce and have access\nto records based on their profile, role, and sharing settings.",category:"Data Modeling and Management"},
  {id:76,question:"The Service Manager provided the app builder with color code requirements for case age on open cases.\nNew cases populate a green circle\nDay-old cases populate a yellow circle\nThree-day-old cases populate a red circle\nHow should an app builder implement this requirement?",options:{"A":"Formula Field", "B":"Quick Action", "C":"Custom Button", "D":"Lightning Web Component"},correct:["A"],explanation:"A formula field is a read-only field that derives its value from a formula expression you define. The formula\nfield is updated when any of the source fields change. You can use formula fields to display images based on\ncertain conditions. In this case, a formula field can be used to display a green, yellow, or red circle image\nbased on the case age.",category:"User Interface"},
  {id:77,question:"On the Account Lightning record page, users need to see ten fields and the ability to sort and wrap text on\ntheir Related Lists.\nWhat Related List type would the app builder select for the Related List Lightning component?",options:{"A":"Enhanced List", "B":"Basic List", "C":"ListVlew", "D":"List Class"},correct:["A"],explanation:"The app builder should select Enhanced List for the Related List type for the Related List Lightning\ncomponent. Enhanced List allows users to see ten fields and sort and wrap text on their Related Lists. Option\nB is incorrect because Basic List only allows users to see four fields and does not support sorting or wrapping\ntext on their Related Lists. Option C is incorrect because ListView does not show Related Lists on record\npages, but rather shows list views on object home pages or tabs. Option D is incorrect because List Class is\nnot a valid Related List type.",category:"Data Modeling and Management"},
  {id:78,question:"Universal Containers (UC) needs a picklist field called Status on three separate custom objects. UC has a\nrequirement to share the list of values for this field across each object.",options:{"A":"Related Picklist", "B":"Shared Custom Field", "C":"Global Picklist Value Set", "D":"Dependent Picklist"},correct:["C"],explanation:"When multiple objects require the same picklist values, the correct approach is to create a Global Picklist\nValue Set (also called a Global Value Set). This allows an organization to maintain one centralized list of\npicklist values that can be reused across multiple picklist fields on different objects.\nWhy C is correct:Exact Extract:“Global value sets let you share the same picklist values with more than\none picklist field. A global value set is a set of shared values that you define once and use in multiple\ncustom picklist fields.” — Salesforce Help | Global Value SetsThis ensures consistent data values,\nsimplifies maintenance, and makes changes automatically available wherever the global picklist is used.\nWhy C is correct:Exact Extract:“Global value sets let you share the same picklist values with more than\none picklist field. A global value set is a set of shared values that you define once and use in multiple\ncustom picklist fields.” — Salesforce Help | Global Value SetsThis ensures consistent data values,\nsimplifies maintenance, and makes changes automatically available wherever the global picklist is used.\nWhy not A (Related Picklist):“Related Picklist” is not a valid Salesforce feature.\nWhy not B (Shared Custom Field):Salesforce does not provide a “Shared Custom Field” functionality.\nEach field belongs to a specific object.\nWhy not D (Dependent Picklist):Dependent picklists control available values based on another field’s\nvalue. They do not allow reuse of a single value list across multiple objects.\nReferences (Salesforce Platform App Builder documentation / Study Guide topics):\nSalesforce Help | Global Value Sets\nSalesforce Help | Picklist Fields\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:79,question:"Universal Container's sales reps can modify fields on an opportunity until it is closed.\nThe sales operations team has access to modify the Post-Close Follow-up Date and Post-Close Follow-up\nComments fields after the opportunity is closed. After the\nopportunity is closed, the rest of the fields are read only.\nHow should these requirements be met?",options:{"A":"Use record types with field sets and restrict editing fields using field-level security.", "B":"Use field-level security on page layouts to restrict editing fields.", "C":"Use field-level security on page layouts with record types to restrict editing fields,", "D":"Use field-level security to mark fields as read-only on the Sales profile."},correct:["C"],explanation:"To manage field editability based on the opportunity status:\nC. Use field-level security on page layouts with record types to restrict editing fields. This combination\nallows for different layouts and editable fields based on the status of the record (e.g., closed or open).\nSteps to implement:\nCreate or adjust record types for open and closed opportunities.\nFor each record type, create a specific page layout.\nOn the page layout for closed opportunities, set the majority of fields to read-only using field-level\nsecurity, except for the 'Post-Close Follow-up Date' and 'Post-Close Follow-up Comments' fields.\nAssign the appropriate page layouts to the respective record types.\nUpdate profiles or permission sets to use these record types and page layouts accordingly.\nThis setup ensures that sales reps can modify fields only when the opportunity is open, and the sales\noperations team can edit specific fields after closure.\nFor more information on using record types and page layouts, check Salesforce's documentation on Record\nTypes.",category:"Data Modeling and Management"},
  {id:80,question:"Universal Containers is expecting impacts to operations due to increased demand. The executive team will be\nreaching out to current customers and want to see the number of open cases for the account and parent\naccount.\nWhich two tools could an app builder combine to display the number of open cases on the account page?\nChoose 2 answers",options:{"A":"Flow", "B":"Workflow", "C":"Approval Process", "D":"Process Builder"},correct:["A", "D"],explanation:"The two tools that an app builder could combine to display the number of open cases on the account page are\nFlow and Process Builder. Flow is a tool that allows the app builder to create a declarative automation that\ncan query, manipulate, and display data from multiple objects. Process Builder is a tool that allows the app\nbuilder to create a trigger-based automation that can invoke a Flow when a record is created or updated. By\nusing these two tools, the app builder can create a solution that can query the number of open cases for the\naccount and parent account and display them on the account page using a screen element. Workflow is not a\nsuitable tool, as it cannot query or display data from multiple objects. It can only perform actions such as field\nupdates, email alerts, tasks, or outbound messages. Approval Process is not a suitable tool, as it is used to\nautomate the approval of records based on certain criteria and predefined steps. It cannot query or display data\nfrom multiple objects.",category:"User Interface"},
  {id:81,question:"An app builder installs an unmanaged package in a full copy sandbox that is an exact match for production,\nand now they are ready to install it m production. When the app builder attempts to install the package in\nproduction, it fails.\nWhy did the package fail to install?",options:{"A":"Incorrect license types", "B":"Package features not compatible", "C":"Object limits exceeded", "D":"Apex unit test failures"},correct:["D"],explanation:"Apex unit test failures can cause a package installation to fail. According to the Salesforce documentation, “If\nyour package contains Apex code, all tests must complete successfully for your package to install.” Incorrect\nlicense types, package features not compatible, and object limits exceeded are not valid reasons for a package\ninstallation failure.",category:"User Interface"},
  {id:82,question:"Universal Containers has created two custom objects called Seminars and Attendees. Organization-wide\ndefaults for these objects have been set to Private. Universal Containers wants to set up a new Junction object\nbetween these custom objects. A select group of users should be able to edit records in the Junction object.\nWhich two steps should an app builder take to configure the proper security?",options:{"A":"Set Sharing Settings to Road Only on both Master-Detail relationship fields.", "B":"Create owner-based sharing rules that give Read access to the master objects.", "C":"Sat lookup filters on both Junction object relationship field.", "D":"Create an owner-based sharing rule that gives Road action to the junction object."},correct:["A", "D", "A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Data Modeling and Management"},
  {id:83,question:"Universal Containers wants to track installation information once it container has been purchased on a custom\nobject. Sales reps should have visibility of all the installation with their opportunities.\nvisibility of all the installations associated with their opportunities.\nWhat kind of relationship should this new object have to the Opportunity?",options:{"A":"Lookup", "B":"Hierarchical", "C":"Master-Detail", "D":"Many to Many"},correct:["A"],explanation:"The new object should have a lookup relationship to the Opportunity object. A lookup relationship creates a\nlink between two objects and allows related records to be viewed in a related list. This can be used to track\ninstallation information for each opportunity and give sales reps visibility of all the installations associated\nwith their opportunities. Option B, C, and D are not appropriate for this requirement.",category:"Data Modeling and Management"},
  {id:84,question:"UC has a requirement that an opportunity should have a field showing the value of its associated account's\nbilling state. This value should not change after the opportunity has been created. Is there a recommended\nsolution to configure this automated behavior?",options:{"A":"Formula field", "B":"Apex", "C":"Workflow", "D":"Roll-up summary field"},correct:["C"],explanation:"Apex. This is correct because Apex is a programming language that can perform complex logic and\nmanipulate data in Salesforce. Apex can be used to create a trigger on the opportunity object that copies the\nvalue of the billing state from the related account record when the opportunity is created, and prevents it from\nbeing changed afterwards. The other options are not suitable for this requirement because they either cannot\ncopy data from a related object (formula field, roll-up summary field) or cannot prevent data from being\nchanged (workflow).",category:"Data Modeling and Management"},
  {id:85,question:"Universal Containers uses Contracts for agreements with customers. A sales manager is required to provide\napproval for contracts and director approval for any contract over $10,000.\nWhich two options should an app builder use to ensure all contracts route for the correct approval and also\nprevent the sales rep from making changes to the record while it is being approved?\nChoose 2 answers",options:{"A":"Create an approval process on the Contract object with criteria set on a second approval step set as 'Amount__c > 10,000' and set the approver as director.", "B":"Create an approval process on the Contract object and set the field for 'Next Automated Approver Determined By' as Manager'.", "C":"Create a validation rule on the Contract object that prevents updates to the contract record while it is being reviewed.", "D":"Create an approval process on the Contract object with one step for each sales manager that sets the approver as the director."},correct:["A", "C"],explanation:"The app builder should use two options to ensure all contracts route for the correct approval and also prevent\nthe sales rep from making changes to the record while it is being approved:\nCreate an approval process on the Contract object with criteria set on a second approval step set as\n‘Amount__c > 10,000’ and set the approver as director. An approval process is a type of process that\nautomates how Salesforce records are approved in an organization. An approval process can have\nmultiple steps with different criteria and approvers. In this case, the app builder can create an approval\nprocess on the Contract object with two steps: one for the sales manager approval and one for the\ndirector approval if the contract amount is over $10,0001.\n\nCreate a validation rule on the Contract object that prevents updates to the contract record while it is\nbeing reviewed. A validation rule is a type of rule that checks data quality by verifying that the data in a\nrecord meets certain standards before it can be saved. A validation rule can prevent users from making\nchanges to a record that is in a certain status or stage. In this case, the app builder can create a\nvalidation rule on the Contract object that prevents updates to the contract record if its Approval Status\nfield is not equal to Not Submitted2. Option B and D are not options that can ensure all contracts route\nfor the correct approval and also prevent the sales rep from making changes to the record while it is\nbeing approved.",category:"User Interface"},
  {id:86,question:"Universal Containers has a requirement that an opportunity should have a field showing the value of its\nassociated account's billing state. This value should be static after the opportunity has been created.",options:{"A":"Roll-up summary field", "B":"Formula field", "C":"Flow", "D":"Apex"},correct:["C"],explanation:"The requirement is to copy the parent Account’s Billing State onto a custom field on Opportunity at the\nmoment the Opportunity is created, and keep that value static thereafter.\nWhy not Formula (B): A formula would always recalculate, so the value would change if the Account’s\nBilling State later changes.Exact Extract: “Formula fields are read-only fields that automatically\nrecalculate their values when any referenced fields change.” — Salesforce Help | Formula Fields\nWhy not Roll-Up Summary (A): Roll-up summary fields only summarize child records onto a master\n(parent) record; they do not copy values from a parent (Account) down to a child (Opportunity), and\nthey can’t summarize a text/state value.Exact Extract: “A roll-up summary field calculates values from\nrelated records, such as those in a related list, on a master record.” — Salesforce Help | Roll-Up\nSummary Fields\nWhy Flow (C) is correct: A Record-Triggered Flow on Opportunity (when a record is created) can set a\nfield value by referencing the related Account (e.g., Opportunity.Account.BillingState) and writing it\ninto a dedicated “snapshot” field (e.g., Billing State at Create__c). Because this is a one-time\nassignment on create, the value remains static unless intentionally updated by further automation.Exact\nExtract 1: “Use Flow Builder to automate business processes by collecting data and performing actions\nin your Salesforce org.” — Salesforce Help | Flow BuilderExact Extract 2: “Record-triggered flows\nlaunch when a record is created, updated, or deleted, and can update fields on the triggering record.” —\nSalesforce Help | Record-Triggered Flows\n\nWhy Apex (D) is not preferred: While Apex could do the same copy-on-create, Salesforce’s\nrecommended approach is to use declarative automation (Flow) when possible.Exact Extract: “Before\nconsidering Apex, evaluate whether your solution can be implemented with declarative tools such as\nFlow.” — Salesforce Architect Guidance | Clicks, Not Code\nImplementation note (for clarity): Create a custom text field on Opportunity, e.g., Billing State at Create\n(Billing_State_at_Create__c). Build a Record-Triggered Flow:\nTrigger: Opportunity — “A record is created”\nGet or use the related Account from the $Record.AccountId relationship\nUpdate the new Opportunity field with Account.BillingState\nDo not run the flow on updates\nReferences (Salesforce Platform App Builder documents / Study Guide topics):\nSalesforce Help — Formula Fields\nSalesforce Help — Roll-Up Summary Fields\nSalesforce Help — Flow Builder\nSalesforce Help — Record-Triggered Flows\nSalesforce Architect Guidance — Clicks, Not Code\nSalesforce Platform App Builder Exam Guide — Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:87,question:"An app builder installed a custom Lightning component from AppExchange and has deployed My Domain.\nWhat should be done next in order to configure the component for use in a record page?",options:{"A":"Edit a record page using Lightning App Builder > Drag the component onto the page.", "B":"Edit a record page using the Page Layout editor > Drag the component onto the page.", "C":"Edit a record page using the Page Layout editor > Drag the Visualforce component onto the page.", "D":"Edit a record page using App Manager > Drag the component onto the page."},correct:["A"],explanation:"To configure a custom Lightning component for use in a record page, the app builder needs to edit a record\npage using the Lightning App Builder and drag the component onto the page. The Page Layout editor and the\nApp Manager are not used for this purpose",category:"User Interface"},
  {id:88,question:"Duplicate management for Leads has been implemented at Universal Containers but it seems duplicate leads\nare still being created. The Org Wide Default (OWD) is set to \"Private\" for Leads.\nWhich two actions help prevent duplicate Leads from being created?\nChoose 2 answers",options:{"A":"Change the lead Hatching Rule to Block on create.", "B":"Change OWD for Leads to Public Read.", "C":"Change the Lead Duplicate Rule details to Bypass Sharing Rules.", "D":"Change the Lead Assignment Rule to check for duplicates."},correct:["A", "C", "A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Security"},
  {id:89,question:"What are two reason to create an unmanaged package? Choose 2 answers",options:{"A":"Distributing open-source projects on the AppExchange.", "B":"Publishing an application for sale on the AppExchange", "C":"Deploying from a Developer Edition environment", "D":"Distributing upgradeable components to another Salesforce org"},correct:["A", "C"],explanation:"The two reasons to create an unmanaged package are to distribute open-source projects on the AppExchange\nand to deploy from a Developer Edition environment. An unmanaged package is a collection of components\n\nthat can be installed in any Salesforce org but cannot be upgraded or controlled by the developer. An\nunmanaged package can be used to share open-source projects or to deploy components from a Developer\nEdition environment to another org.",category:"Data Modeling and Management"},
  {id:90,question:"DreamHouseRealty (DR) is expanding into subsidized housing by partnering with local government entitles.\nDR uses Sales Cloud and has enabled field history tracking on the Opportunity object. Due to increased\nInformation requirements, the App Dev team is changing Text Area (Long) fields to Rich Text fields to allow\nfor up to 1,000 characters and better descriptions.\nWhich two considerations should be made by the team?\nChoose 2 answers",options:{"A":"Rich text field values of all lengths are displayed fully in reports.", "B":"Data loss may occur when changing custom field types.", "C":"Field History Tracking records value changes of 255 characters or less.", "D":"Audit Trail is available through REST API extracts."},correct:["B", "C"],explanation:"Changing custom field types may result in data loss if the new field type is incompatible with the old one. For\nexample, changing a text field to a number field may cause text values to be deleted. Field history tracking\nrecords value changes of 255 characters or less. If a rich text field value exceeds this limit, only the first 255\ncharacters are tracked.",category:"Data Modeling and Management"},
  {id:91,question:"An app Builder creates an Account validation rule on the Industry field that will throw an error if the length of\nthe field is longer than 6 characters. Another App Builder creates a workflow rule with a field update that sets\nthe Industry field to Technology whenever the Billing City field is set to San Francisco. What will happen the\nnext time a sales person saves an Account with a Billing City of San Francisco?",options:{"A":"The record will save and the Industry field will change to Technology", "B":"The record will not save and the validation rule’s error messagewill be displayed", "C":"The record will not save and no error message will be displayed", "D":"The record will save but the Industry field will not change to Technology"},correct:["B"],explanation:"The record will not save and the validation rule’s error message will be displayed because the field update\nwill violate the validation rule. The validation rule will prevent the record from being saved if the Industry\nfield is longer than 6 characters, and Technology is 10 characters long.",category:"Data Modeling and Management"},
  {id:92,question:"An app builder has created a change set and deployed a report from their development sandbox for User\nAcceptance Testing. When the app builder runs the report, no data is returned.\nWhat can be a reason for this?",options:{"A":"Reports have to be deployed with Salesforce DX.", "B":"Reports have to be manually re-created in each environment.", "C":"Data is deployed when added to a change sets.", "D":"Data is unable to be deployed with change sets."},correct:["D"],explanation:"Data is unable to be deployed with change sets. Change sets are used to deploy metadata components such as\ncustom objects, fields, workflows, reports, etc. from one Salesforce org to another. However, change sets do\nnot include any data or records from the source org. Users will need to use other tools such as Data Loader or\nData Import Wizard to migrate data between orgs. [Source]",category:"User Interface"},
  {id:93,question:"Universal Containers wants to streamline its data capture process by linking fields together. They wish to do\nthis so that the available value on dependents fields are driven by value selected on controlling fields. Which\nconsideration supports the stated requirements? Choose 3 answers",options:{"A":"The import wizard only allows value to be imported into a dependent picklist if they match the appropriate controlling field", "B":"Custom picklist field can be either controlling or dependent field", "C":"Multi select picklist can be dependent picklist but not controlling fields", "D":"Standard and custom picklist fields can be dependent fields.", "E":"Checkbox fields can be controlling fields but not dependent fields"},correct:["A", "B", "E"],explanation:"The import wizard only allows values to be imported into a dependent picklist if they match the appropriate\ncontrolling field. This ensures data integrity and prevents invalid values from being imported. Custom picklist\nfields can be either controlling or dependent fields. This allows the app builder to create custom dependencies\nbetween custom picklists. Checkbox fields can be controlling fields but not dependent fields. This allows the\napp builder to create dependencies based on checkbox values, such as true or false. Multi-select picklist fields\ncan be dependent picklist fields but not controlling fields. This allows the app builder to create dependencies\nbased on multiple values selected in a multi-select picklist field. Standard and custom picklist fields can be\ndependent fields, but not all standard picklist fields can be controlling fields. Some standard picklist fields,\nsuch as Lead Status or Opportunity Stage, cannot be controlling fields because they are used in other\nprocesses, such as lead conversion or sales path",category:"Data Modeling and Management"},
  {id:94,question:"Ursa Major Solar is ramping up the sales team to meet increased demand. As part of the short ramp up for\nthese new reps, the manager wants to provide a help guide to enable reps to easily get help where needed\nduring the different sales processes.\nWhich solution should an app builder recommend?",options:{"A":"Flow", "B":"Journey Builder", "C":"Chatter Publisher", "D":"Path"},correct:["D"],explanation:"To provide a help guide to enable reps to easily get help where needed during the different sales processes, an\napp builder should recommend Path. Path is a component that displays the key fields and guidance for each\nstage of a sales process on an object’s record page. Users can see where they are in the process, update the\nstage and fields, and access resources such as tips and links. [Source]",category:"User Interface"},
  {id:95,question:"A customer service representative at a call center wants to be able to collect\ninformation from customers using a series of question prompts.\nWhat should an app builder use to accomplish this?",options:{"A":"Approval Process", "B":"Flow", "C":"Validation Rule", "D":"Path"},correct:["B"],explanation:"For a customer service representative to collect information through a series of question prompts:\nB. Flow. Salesforce Flows allow for the creation of guided interactions that can prompt users for\ninformation in a step-by-step manner.\nSteps to create a flow for this purpose:\nNavigate to Setup # Flows.\nClick on 'New Flow' and select a Screen Flow to interactively prompt users.\nDesign the flow with Screen elements for each question.\nAdd logic to process responses as necessary.\nSave and activate the flow.\nEmbed or link the flow in a relevant location accessible to the service representative, such as on a\nrecord page or in the utility bar.\nFlows provide a flexible and powerful way to interactively gather and process customer data in real time.\nFor detailed guidance on creating Flows, see Salesforce's Flow Builder documentation.",category:"User Interface"},
  {id:96,question:"Northern Trail Outfitters wants to change a master-detail relationship on\nAccount to a lookup relationship with a custom object Park. The app builder tries to\nreconfigure this but is unable to do so.\nWhat could be causing this?",options:{"A":"The Account is included in a flow process on the Park object.", "B":"The Park object needs at least one Master-Detail field for reporting.", "C":"The Account record includes Parks roll-up summary fields.", "D":"The park records have existing formulas on the Account."},correct:["C"],explanation:"When attempting to change a master-detail relationship to a lookup relationship, Salesforce imposes specific\nrestrictions to maintain data integrity:\nC. The Account record includes Parks roll-up summary fields. Master-detail relationships allow roll-up\nsummary fields to aggregate data from child records onto the parent record. If any roll-up summary\nfields are present on the master object (Account in this case) that depend on the detail records (Parks),\nthe relationship cannot be changed to lookup until these roll-up summary fields are removed.\nTo resolve this, follow these steps:\nIdentify and delete all roll-up summary fields on the Account object that reference the Park object.\nConvert the master-detail relationship to a lookup relationship.\nRecreate any necessary roll-ups using declarative tools like Process Builder or Flow if needed, as\nlookups do not support native roll-up summaries.\nFor more guidance, review Salesforce's documentation on Changing Field Types.",category:"Data Modeling and Management"},
  {id:97,question:"Cloud Kicks (CK) wants to begin socializing and collaborating within Salesforce around customer accounts to\ndiscuss various topics. CK would like all company employees to see these conversations.\nWhich two features of Chatter would meet CK's business needs?\nChoose 2 answers",options:{"A":"Set up new private Chatter groups.", "B":"Set up new public Chatter groups.", "C":"Use post action on the Account object.", "D":"Use Chatter actions to create tasks to complete."},correct:["B", "C"],explanation:"The two features of Chatter that would meet CK’s business needs are: Set up new public Chatter groups. A\npublic Chatter group is a way to create a collaborative space for users to share information, files, polls, and\nideas around a common topic or interest. A public Chatter group can be joined by any user in the organization\nand can be seen by anyone who has access to Chatter. By setting up new public Chatter groups, CK can\nenable users to socialize and collaborate around customer accounts and discuss various topics. Use post action\n\non the Account object. A post action is a type of quick action that allows users to create a post on a record’s\nfeed or on their own feed. A post can include text, mentions, hashtags, topics, links, files, or images. By using\npost action on the Account object, CK can enable users to share updates, feedback, or questions about\ncustomer accounts and engage with other users who follow the accounts. Set up new private Chatter groups is\nnot a valid feature, as it does not meet CK’s business needs. A private Chatter group is a way to create a\ncollaborative space for users to share information, files, polls, and ideas around a confidential or sensitive\ntopic or interest. A private Chatter group can only be joined by invitation and can only be seen by the group\nmembers. By setting up new private Chatter groups, CK would limit the visibility and accessibility of the\nconversations around customer accounts. Use Chatter actions to create tasks to complete is not a valid feature,\nas it does not meet CK’s business needs. A Chatter action is a type of quick action that allows users to create a\ntask from a record’s feed or from their own feed. A task can include subject, due date, priority, status,\nassigned to, etc. By using Chatter actions to create tasks to complete, CK would enable users to track and\nmanage their work related to customer accounts, but not to socialize and collaborate with other users.",category:"Mobile and Collaboration"},
  {id:98,question:"A user is unable to use inline editing on a list view. A quick check verifies the user should be able to perform\ninline editing as they have been assigned the appropriate permissions.\nWhich two conditions should the app builder review?\nChoose 2 answers",options:{"A":"If the list view restricts sharing for the user", "B":"If the list view selected is the recently viewed list view", "C":"If the list view contains a chart created by the user", "D":"If the list view contains more than one record type"},correct:["B", "D"],explanation:"Two conditions that can prevent inline editing on a list view are if the list view selected is the recently viewed\nlist view, or if the list view contains more than one record type. The recently viewed list view does not\nsupport inline editing, as it is not based on a single object. The list view must have a single record type to\nenable inline editing, as different record types may have different fields and values",category:"User Interface"},
  {id:99,question:"Cloud Kicks has leads owned by users and queues. The sales manager wants the status to change to working\nwhen a user takes ownership.\nWhat does an app builder need to have in the criteria to ensure the process runs without error?",options:{"A":"BEGINS([Lead].OwnerId, ,,005\")", "B":"[Lead].Owner:User.Role Is Null = False", "C":"[Lead].Owner:Queue.OwnerId Is Null = True", "D":"NOT(ISBLANK([Lead].OwnerId))"},correct:["D"],explanation:"The app builder needs to have NOT(ISBLANK([Lead].OwnerId)) in the criteria to ensure the process runs\nwithout error. This formula checks if the OwnerId field on the Lead object is not blank, which means that the\nlead is owned by a user or a queue. This will prevent the process from running on leads that are not owned by\nanyone, which could cause an error. Option A, B, and C are not formulas that can ensure the process runs\nwithout error.",category:"User Interface"},
  {id:100,question:"AW Computing has a custom object for service plans.\nA service plan needs to be associated to one and only one contact. The support manager noticed if the wrong\ncontact is associated, the reps are unable to change the contact. The app builder already confirmed the user\nhas correct access to the field and there are no validations associated with the service\nplans.\nWhat could be causing the issue?",options:{"A":"The Read Only radio button, Allows users with at least Read access to the Master record to create, edit, or delete related Detail records, is selected.", "B":"The Allow reparenting checkbox, Child records can be reparented to other parent records after they are created, is unchecked.", "C":"The Read/Write radio button, Allows users with at least Read/Write access to the Master record to create, edit, or delete related Detail records, is selected.", "D":"The Allow reparenting checkbox, Child records can be reparented to other parent records after they are created, is checked."},correct:["B"],explanation:"The issue described occurs due to the settings in the master-detail relationship. Specifically:\nThe Allow reparenting checkbox, Child records can be reparented to other parent records after they are\ncreated, is unchecked (B). This setting prevents changing the parent record (contact) of a child record\n(service plan) once it has been set. If 'Allow reparenting' is unchecked, it restricts the ability to change\nthe associated contact, leading to the issue observed.\n\nThe other options do not directly address the inability to change the associated contact on a service plan\nrecord. The 'Read Only' and 'Read/Write' settings (A and C) pertain to access rights to the detail records based\non the master record's access but do not affect the ability to reparent a record.\nFor a detailed understanding of master-detail relationships and their settings, including reparenting, see the\nSalesforce documentation on relationships:\nMaster-Detail Relationships: https://help.salesforce.com/articleView?id=relationships_considerations.\nhtm&type=5",category:"Data Modeling and Management"},
  {id:101,question:"Cloud Kicks has five years of sales data and would like to track when customers made their first purchase.\nHow should an app builder use a roll-up summary to meet the requirements?",options:{"A":"Create a new roll-up summary field called First Order Date, using Type MIN on the Opportunity Close Date with a filter where IsWon = TRUE.", "B":"Create a new date field called First Order Date, create a new Workflow to set the date, and roll up the value with a filter where IsWon = TRUE.", "C":"Create a new roll-up summary field called First Order Date, using Type SUM on Opportunity Close Date.", "D":"Create a new date field called First Order Date, then create a roll-up summary to update the field using Type MIN."},correct:["A"],explanation:"The app builder should create a new roll-up summary field called First Order Date, using Type MIN on the\nOpportunity Close Date with a filter where IsWon = TRUE. A roll-up summary field is a type of field that\ncalculates values from related records and displays them on the parent record. In this case, the app builder can\ncreate a roll-up summary field on the Account object that calculates the minimum (earliest) value of the\nOpportunity Close Date field from the related opportunities where IsWon = TRUE. This will show when\ncustomers made their first purchase. Option B, C, and D are not correct ways to use a roll-up summary field to\nmeet the requirement.",category:"Data Modeling and Management"},
  {id:102,question:"An app builder is creating a custom object called Testimonial__c and wants toconnect Testimonial__c records\nwith both the submitter's\nContact record and Account record. If the Account is deleted, the Testimonial__c should also be deleted. If\nthe Contact is deleted, but the\nAccount remains, the Testimonial__c should remain.\n\nHow should this be accomplished?",options:{"A":"Make both the Contact and Account fields required on the Testimonial__c object and create lookup relationships fromTestimonial__c to Contact and to Account.", "B":"Create a master-detail relationship from Testimonial__c to Accountand a lookup relationship from Testimonial__c to Contact.", "C":"Make Testimonial__c a junction object between Account and Contact using master-detail relationships.", "D":"Create a lookup relationship from Testimonial__c to Account and a master-detail relationship from Testimonial__c to Contact."},correct:["B"],explanation:"To connect Testimonial__c records with both the submitter’s Contact record and Account record, an app\nbuilder should create a master-detail relationship from Testimonial__c to Account and a lookup relationship\nfrom Testimonial__c to Contact. A master-detail relationship creates a parent-child relationship between two\nobjects and allows for roll-up summary fields, sharing settings, and cascading actions. A lookup relationship\ncreates a loose association between two objects and allows users to relate records from one object to\nanother. Source",category:"Data Modeling and Management"},
  {id:103,question:"universal containers has 20 different workflows on the opportunity object. To ensure that updates are\nprocessing properly for all field updates uc has the re-evaluete workflow rules after field change checkbox\nchecked. Recently after adding a new workflow, users have reported receiving errors about workflow limits.\nWhat should a app builder look at so address this?",options:{"A":"Talk to a developer about apex code issues", "B":"Number of workflows per object limits", "C":"Workflows that cause each other to fire back and forth recursively", "D":"Workflows on other objects that are being re triggered"},correct:["C"],explanation:"Workflows that cause each other to fire back and forth recursively can result in workflow limits errors. For\nexample, if workflow A updates a field that triggers workflow B, and workflow B updates a field that triggers\nworkflow A, this can create an infinite loop of workflows that exceed the maximum number of workflow time\ntriggers per hour.",category:"Data Modeling and Management"},
  {id:104,question:"An App Builder at UVC would like to prevent users from creating new records on an Account related list by\noverriding standard buttons. Which two should the App Builder consider before overriding standard buttons?",options:{"A":"Standard buttons can be changed on lookup dialogs, list views, and search result layouts", "B":"Standard buttons can be overridden with a Visualforce page", "C":"Standard buttons that are not available for overrides can still be hidden on page layouts", "D":"Standard buttons can be overridden, relocated on the detail page, and relabeled"},correct:["B", "C"],explanation:"Standard buttons can be overridden with a Visualforce page to provide custom functionality or user\ninterface. For example, you can override the New button on an object to display a custom Visualforce page\ninstead of the standard page layout3. Standard buttons that are not available for overrides can still be hidden\non page layouts to prevent users from accessing them. For example, you can hide the Delete button on an\nobject to prevent users from deleting records",category:"User Interface"},
  {id:105,question:"Due to the complexity of the Universal Containers sandbox release schedule and requirements, it is advised\nthat change sets are used as often as possible to migrate from one environment to another.\nWhich three common items can an app builder move when using a change set?\nChoose 3 answers",options:{"A":"Web-to-lead", "B":"Standard fields", "C":"Custom object", "D":"Apex class", "E":"Custom field"},correct:["C", "D", "E"],explanation:"The common items that can be moved using a change set are custom object, Apex class, and custom field.\nThese are metadata components that can be deployed from one environment to another using change sets.\nWeb-to-lead and standard fields are not metadata components that can be moved using change sets.",category:"User Interface"},
  {id:106,question:"Cloud Kicks received a new requirement to calculate summaries from child objects of a standard object. The\nteam would prefer to solve this declaratively.\nWhat are two considerations an app builder should evaluate?\nChoose 2 answers",options:{"A":"An app builder is unable to change a look up to a master-detail relationship.", "B":"An object can have up to two master-detail relationships.", "C":"A trigger on save or update can kick off calculations.", "D":"A value is required in all records of the lookup field prior to converting to a master-detail relationship."},correct:["B", "D"],explanation:"When Cloud Kicks needs to calculate summaries from child objects of a standard object declaratively, a few\nkey considerations about master-detail relationships come into play. Master-detail relationships are critical in\nSalesforce when working with roll-up summary fields, which allow you to calculate values from child records.\nOption B: An object can have up to two master-detail relationships.\nSalesforce allows an object to have two master-detail relationships. This is important because if\nyou want to aggregate child record data using roll-up summary fields, you need to have a masterdetail relationship in place. Each master-detail relationship links a child object to a parent, and\nyou can create roll-up summary fields on the parent object to summarize the child record data.\nReference: Master-Detail Relationship Overview\nOption D: A value is required in all records of the lookup field prior to converting to a master-detail\nrelationship.\nOne important consideration when converting a lookup relationship into a master-detail relationship is that the\nlookup field must contain values for all existing child records. This is because master-detail relationships have\ntighter coupling between parent and child records, and a child cannot exist without a parent in a master-detail\nscenario. Thus, the field cannot be null during the conversion process.\nReference: Convert a Lookup Relationship to a Master-Detail Relationship\nOption A: An app builder can convert a lookup relationship to a master-detail relationship if the above\ncondition (that all lookup fields are populated) is met, so this option is incorrect.\nOption C: Triggers are part of custom development using Apex, and the question specifies the solution should\nbe declarative. Therefore, triggers would not be a relevant declarative tool for this scenario.",category:"Data Modeling and Management"},
  {id:107,question:"An app builder wants to update a field on the parent record when a child record connected via lookup is\ndeleted.\nWhat automation should the app builder use?",options:{"A":"Screen flow", "B":"Process Builder", "C":"Apex code", "D":"Workflow rule"},correct:["C"],explanation:"The app builder should use Apex code to update a field on the parent record when a child record connected\nvia lookup is deleted. Apex code is a programming language that allows developers to execute complex logic\non the Salesforce platform. Apex code can be triggered by certain events, such as insert, update, delete, or\nundelete of records. In this case, the app builder can write an Apex trigger that runs after a child record is\ndeleted and updates a field on the parent record accordingly. Option A, B, and D are not automation tools that\ncan perform this task.",category:"Data Modeling and Management"},
  {id:108,question:"An app builder wants to create a new field using Schema Builder.\nWho will get access to the new field by default?",options:{"A":"Standard profiles", "B":"No profiles", "C":"Internal profiles", "D":"All profiles"},correct:["D"],explanation:"All profiles will get access to the new field by default when it is created using Schema Builder. The app\nbuilder can modify the field-level security settings later to restrict access for certain profiles. Standard\nprofiles, no profiles, and internal profiles are not correct options.",category:"Data Modeling and Management"},
  {id:109,question:"Cloud Kicks (CK) wants to simultaneously delete a Supplier’s record and all Supplier ltem__c records if a\npartnership ends with a supplier.\nWhat solution could an app builder use to meet the requirement?",options:{"A":"Many-to-many", "B":"Indirect lookup", "C":"Hierarchical", "D":"Master-detail"},correct:["D"],explanation:"The solution that an app builder should use to meet this requirement is master-detail relationship. A masterdetail relationship is a type of relationship that creates a parent-child relationship between two objects, where\nthe child records inherit the sharing and security settings of their parent record. The app builder can create a\nmaster-detail relationship between Supplier__c and SupplierItem__c objects, where Supplier__c is the parent\nobject and SupplierItem__c is the child object. This way, when a Supplier__c record is deleted, all related\nSupplierItem__c records are also deleted automatically. Option A is incorrect because many-to-many\nrelationship is not suitable for this requirement, as many-to-many relationship allows two objects to be linked\nin both directions through a junction object, but does not support cascading delete. Option B is incorrect\nbecause indirect lookup relationship is not suitable for this requirement, as indirect lookup relationship allows\nan external object to link with another object using an external ID field, but does not support cascading delete.\nOption C is incorrect because hierarchical relationship is not suitable for this requirement, as hierarchical\nrelationship allows users to use a lookup field that links an object with itself, but does not support cascading\ndelete.",category:"User Interface"},
  {id:110,question:"Nickname__c is a custom text field on a contact record that is utilized to override the contact’s name\nappearing on an email template. This field is not required and is not always filled in.\nWhich formula should an app builder use to select the contact's preferred name for email communications?",options:{"A":"IF(NOT(ISBLANK(Nickname__c)), Nickname_c,FirstName)", "B":"IF(TEXT(Nfckname__c), Nickname_c,FirstName)", "C":"IF (ISNUUL(Nteknarne _..c),Nicknamec,Firstftame)", "D":"IF(NOT(BLANKVALUE(Nickname__c)), Nickname__c, FirstName)"},correct:["D"],explanation:"The formula that should be used to select the contact’s preferred name for email communications is IF(NOT\n(BLANKVALUE(Nickname__c)),Nickname__c, FirstName). This formula checks if the Nickname__c field\nis blank or null, and if not, it returns the value of the Nickname__c field. Otherwise, it returns the value of the\nFirstName field.",category:"Data Modeling and Management"},
  {id:111,question:"Universal Containers has a new custom object for Invoices that includes an Invoice Number field, Before the\nInvoice object can be used, invoices will be migrated from an external system maintaining their current\nInvoice Number. After the migration, salesforce will be the system of record and each new Invoice created in\nSalesforce must have a unique Invoice Number.\nHow should the app builder configure the Invoice Number field?",options:{"A":"Create a Text filed for the original Invoice Number and an AutoNumber field for the Salesforce Invoice Number.", "B":"Create a Text field and mark it as a unique external ID field.", "C":"Create a Text field, then change it to AutoNumber after the migration.", "D":"Create an AutoNumber field and migrate the Invoices"},correct:["B"],explanation:"The Invoice Number field should be a Text field and marked as a unique external ID field. This will allow the\nmigration of invoices from an external system while maintaining their original Invoice Number. It will also\nensure that each new Invoice created in Salesforce has a unique Invoice Number.",category:"Data Modeling and Management"},
