<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="App Builder">
<meta name="theme-color" content="#032d60">
<title>Salesforce Platform App Builder Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --sf-blue: #0176d3;
    --sf-dark: #032d60;
    --sf-light: #e8f4fd;
    --sf-bg: #f0f4f8;
    --sf-green: #2e844a;
    --sf-green-light: #eaf5ea;
    --sf-red: #ba0517;
    --sf-red-light: #fef0ef;
    --sf-gold: #c89b00;
    --sf-gold-light: #fdf8ec;
    --sf-text: #181818;
    --sf-muted: #6b7280;
    --sf-border: #dde2e8;
    --sf-card: #ffffff;
    --sf-shadow: 0 2px 12px rgba(1,118,211,0.07);
    --sf-radius: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; background: var(--sf-bg); color: var(--sf-text); display: flex; flex-direction: column; }

  .header {
    background: linear-gradient(135deg, var(--sf-dark) 0%, var(--sf-blue) 100%);
    padding: calc(12px + var(--safe-top)) 16px 12px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; z-index: 10;
  }
  .header-logo { font-size: 22px; }
  .header-info { flex: 1; }
  .header-title { color: white; font-size: 15px; font-weight: 700; }
  .header-sub { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 1px; }
  .stat-chip { background: rgba(255,255,255,0.18); color: white; border-radius: 20px; padding: 4px 11px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); white-space: nowrap; }

  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding-bottom: calc(20px + var(--safe-bottom)); }
  .app { padding: 16px 14px 0; }

  .progress-row { background: var(--sf-card); border-radius: var(--sf-radius); padding: 16px; box-shadow: var(--sf-shadow); margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; border-left: 4px solid var(--sf-blue); }
  .progress-stat { text-align: center; }
  .progress-num { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: var(--sf-dark); display: block; }
  .progress-label { font-size: 10px; color: var(--sf-muted); }

  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .home-card { background: var(--sf-card); border-radius: var(--sf-radius); padding: 18px 14px 14px; box-shadow: var(--sf-shadow); cursor: pointer; border: 2px solid transparent; transition: transform 0.15s; position: relative; overflow: hidden; }
  .home-card:active { transform: scale(0.97); }
  .home-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: var(--sf-radius) var(--sf-radius) 0 0; }
  .home-card.random::before { background: linear-gradient(90deg, #0176d3, #06a59a); }
  .home-card.category::before { background: linear-gradient(90deg, #7b68ee, #a855f7); }
  .home-card.wrong::before { background: linear-gradient(90deg, #ef4444, #f97316); }
  .home-card.favorites::before { background: linear-gradient(90deg, #c89b00, #f59e0b); }
  .home-icon { font-size: 28px; margin-bottom: 8px; }
  .home-card h2 { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--sf-dark); }
  .home-card p { font-size: 11px; color: var(--sf-muted); line-height: 1.5; }
  .home-badge { display: inline-block; background: var(--sf-blue); color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 8px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
  .home-badge.warn { background: #ef4444; }
  .home-badge.gold { background: var(--sf-gold); }

  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .btn-back { background: white; border: 1.5px solid var(--sf-border); border-radius: 10px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; color: var(--sf-text); display: flex; align-items: center; gap: 5px; font-weight: 500; flex-shrink: 0; }
  .btn-back:active { background: var(--sf-light); }
  .section-title { font-size: 15px; font-weight: 700; color: var(--sf-dark); }
  .category-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-item { background: var(--sf-card); border-radius: 12px; padding: 14px; box-shadow: var(--sf-shadow); cursor: pointer; display: flex; align-items: center; gap: 12px; border: 2px solid transparent; transition: all 0.15s; }
  .cat-item:active { background: var(--sf-light); border-color: var(--sf-blue); }
  .cat-icon { font-size: 22px; flex-shrink: 0; }
  .cat-name { font-size: 13px; font-weight: 700; color: var(--sf-dark); }
  .cat-sub { font-size: 10px; color: var(--sf-muted); margin-top: 1px; }
  .cat-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .cat-weight { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; color: var(--sf-blue); }
  .cat-count { background: var(--sf-light); color: var(--sf-blue); border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }

  .quiz-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .quiz-progress-bar { flex: 1; height: 5px; background: var(--sf-border); border-radius: 3px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--sf-blue), #06a59a); border-radius: 3px; transition: width 0.35s ease; }
  .quiz-counter { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--sf-muted); white-space: nowrap; flex-shrink: 0; }

  .question-card { background: var(--sf-card); border-radius: var(--sf-radius); box-shadow: var(--sf-shadow); overflow: hidden; animation: fadeUp 0.22s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .question-meta { padding: 10px 14px; background: var(--sf-light); border-bottom: 1px solid var(--sf-border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .q-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; color: var(--sf-blue); }
  .q-cat-tag { background: white; border: 1px solid var(--sf-blue); color: var(--sf-blue); border-radius: 8px; padding: 2px 8px; font-size: 10px; font-weight: 600; }
  .q-multi-tag { background: var(--sf-gold-light); border: 1px solid var(--sf-gold); color: var(--sf-gold); border-radius: 8px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
  .fav-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 22px; padding: 2px 4px; line-height: 1; }
  .fav-btn:active { transform: scale(1.3); }

  .question-body { padding: 16px 14px 14px; font-size: 14px; line-height: 1.75; white-space: pre-wrap; color: var(--sf-text); font-weight: 500; }

  .multi-bar { margin: 0 12px 10px; background: var(--sf-gold-light); border: 1px solid var(--sf-gold); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #7a5a00; }
  .btn-submit { margin-left: auto; background: var(--sf-blue); color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 700; flex-shrink: 0; }
  .btn-submit:disabled { background: var(--sf-border); color: var(--sf-muted); }

  .options-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
  .option-btn { width: 100%; text-align: left; background: white; border: 2px solid var(--sf-border); border-radius: 12px; padding: 13px 14px; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; gap: 10px; align-items: flex-start; transition: border-color 0.15s, background 0.15s; color: var(--sf-text); line-height: 1.55; min-height: 48px; }
  .option-btn:active:not(:disabled) { background: var(--sf-light); border-color: var(--sf-blue); }
  .option-btn.selected-pending { border-color: var(--sf-blue); background: var(--sf-light); }
  .option-btn.correct { border-color: var(--sf-green); background: var(--sf-green-light); color: var(--sf-green); }
  .option-btn.wrong { border-color: var(--sf-red); background: var(--sf-red-light); color: var(--sf-red); }
  .option-btn:disabled { cursor: default; }
  .opt-letter { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 13px; min-width: 20px; color: inherit; margin-top: 1px; }

  .result-banner { margin: 0 12px 10px; border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .result-banner.correct { background: var(--sf-green-light); color: var(--sf-green); border: 1.5px solid var(--sf-green); }
  .result-banner.wrong { background: var(--sf-red-light); color: var(--sf-red); border: 1.5px solid var(--sf-red); }

  .explanation-box { margin: 0 12px 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--sf-border); }
  .explanation-en { padding: 12px 14px; background: #f8f9fa; font-size: 12px; line-height: 1.7; color: #374151; white-space: pre-wrap; border-bottom: 1px solid var(--sf-border); }
  .explanation-cn { padding: 12px 14px; background: #fffdf5; font-size: 12px; line-height: 1.7; color: #374151; white-space: pre-wrap; }
  .exp-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .exp-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--sf-muted); text-transform: uppercase; }
  .translate-btn { background: var(--sf-blue); color: white; border: none; border-radius: 6px; padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; display: flex; align-items: center; gap: 4px; margin-left: auto; min-height: 30px; }
  .translate-btn:disabled { background: var(--sf-border); color: var(--sf-muted); }

  .sticky-next { position: sticky; bottom: 0; background: linear-gradient(to top, var(--sf-bg) 70%, transparent); padding: 12px 14px calc(12px + var(--safe-bottom)); margin-top: 4px; }
  .btn-next { display: block; width: 100%; background: linear-gradient(135deg, var(--sf-blue), var(--sf-dark)); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; box-shadow: 0 4px 16px rgba(1,118,211,0.35); }
  .btn-next:active { opacity: 0.88; }

  .score-card { background: var(--sf-card); border-radius: var(--sf-radius); box-shadow: var(--sf-shadow); padding: 32px 20px 28px; text-align: center; margin-bottom: 16px; }
  .score-ring { width: 120px; height: 120px; margin: 0 auto 20px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 700; color: var(--sf-dark); }
  .score-title { font-size: 20px; font-weight: 700; color: var(--sf-dark); margin-bottom: 6px; }
  .score-sub { color: var(--sf-muted); font-size: 13px; margin-bottom: 24px; }
  .score-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-action { background: var(--sf-blue); color: white; border: none; border-radius: 12px; padding: 14px 20px; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; width: 100%; }
  .btn-action.outline { background: white; color: var(--sf-blue); border: 2px solid var(--sf-blue); }
  .btn-action:active { opacity: 0.85; }

  .loading-spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Wrong count badge */
  .q-wrong-count {
    display: inline-flex; align-items: center; gap: 3px;
    border-radius: 8px; padding: 2px 7px; font-size: 10px; font-weight: 700;
    font-family: 'IBM Plex Mono', monospace; flex-shrink: 0;
    animation: badgePop 0.25s ease;
  }
  @keyframes badgePop { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .q-wrong-count.lvl-1 { background: #fff3e0; color: #e65100; border: 1px solid #ffb74d; }
  .q-wrong-count.lvl-2 { background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }
  .q-wrong-count.lvl-3 { background: #b71c1c; color: #fff; border: 1px solid #7f0000; }

  /* Wrong count list in "wrong answers" card on home */
  .wrong-top-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .wrong-top-item { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--sf-muted); }
  .wrong-top-item .wt-label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:6px; }
  .wrong-top-item .wt-badge { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; background:#fce4ec; color:#c62828; border:1px solid #ef9a9a; border-radius:6px; padding:1px 6px; flex-shrink:0; }

  /* Home — ranking entry button */
  .home-rank-btn { width:100%; margin-top:10px; background:var(--sf-card); border:2px solid #e8d0d0; border-radius:var(--sf-radius); padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; box-shadow:var(--sf-shadow); transition:transform 0.15s; position:relative; overflow:hidden; }
  .home-rank-btn::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#b71c1c,#ef5350,#ff8a65); border-radius:var(--sf-radius) var(--sf-radius) 0 0; }
  .home-rank-btn:active { transform:scale(0.98); }
  .home-rank-btn .hrb-icon { font-size:26px; flex-shrink:0; }
  .home-rank-btn .hrb-body { flex:1; text-align:left; }
  .home-rank-btn .hrb-title { font-size:13px; font-weight:700; color:var(--sf-dark); }
  .home-rank-btn .hrb-sub { font-size:11px; color:var(--sf-muted); margin-top:2px; }
  .home-rank-btn .hrb-badge { background:#b71c1c; color:white; font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; padding:3px 10px; border-radius:10px; flex-shrink:0; }

  /* Wrong rank screen */
  .rank-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .rank-summary { background:var(--sf-card); border-radius:12px; padding:12px 14px; box-shadow:var(--sf-shadow); margin-bottom:12px; display:flex; gap:16px; border-left:4px solid #b71c1c; }
  .rank-stat { text-align:center; flex:1; }
  .rank-stat-num { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:700; color:#b71c1c; display:block; }
  .rank-stat-label { font-size:10px; color:var(--sf-muted); }

  .rank-list { display:flex; flex-direction:column; gap:8px; }
  .rank-item { background:var(--sf-card); border-radius:12px; box-shadow:var(--sf-shadow); padding:12px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; border:2px solid transparent; transition:border-color 0.15s,transform 0.12s; position:relative; overflow:hidden; }
  .rank-item:active { transform:scale(0.98); border-color:var(--sf-blue); }
  .rank-item.rank-1 { border-left:4px solid #b71c1c; }
  .rank-item.rank-2 { border-left:4px solid #e53935; }
  .rank-item.rank-3 { border-left:4px solid #ef5350; }
  .rank-item.rank-other { border-left:4px solid #ffcdd2; }

  .rank-pos { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:700; min-width:26px; text-align:center; flex-shrink:0; }
  .rank-pos.top1 { color:#b71c1c; }
  .rank-pos.top3 { color:#e53935; }
  .rank-pos.rest  { color:var(--sf-muted); }

  .rank-body { flex:1; min-width:0; }
  .rank-q-num { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--sf-blue); font-weight:700; }
  .rank-q-text { font-size:12px; color:var(--sf-text); font-weight:500; line-height:1.55; margin-top:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .rank-q-answer { font-size:10px; color:var(--sf-green); font-weight:600; margin-top:4px; }

  .rank-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
  .rank-count-badge { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:700; padding:3px 9px; border-radius:8px; }
  .rank-count-badge.lvl-1 { background:#fff3e0; color:#e65100; border:1px solid #ffb74d; }
  .rank-count-badge.lvl-2 { background:#fce4ec; color:#c62828; border:1px solid #ef9a9a; }
  .rank-count-badge.lvl-3 { background:#b71c1c; color:white; border:1px solid #7f0000; }
  .rank-drill-btn { font-size:10px; color:var(--sf-blue); font-weight:600; background:var(--sf-light); border:none; border-radius:6px; padding:3px 8px; cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; }
  .rank-drill-btn:active { background:#c8e3f8; }
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">☁️</div>
  <div class="header-info">
    <div class="header-title">Salesforce Platform App Builder</div>
    <div class="header-sub">Certified Platform App Builder · 311 Questions</div>
  </div>
  <span class="stat-chip" id="headerStat">🏠 Home</span>
</div>
<div class="scroll-area">
  <div class="app" id="app"></div>
</div>

<script>
const QUESTIONS = [
  {id:1,question:"DreamMouse Realty has a mentorship program that pairs experienced Realtors with new Realtors. Each\nexperienced Realtor can mentor one or several new Realtors, and each new Realtor is required to work with a\nsingle experienced Realtor they report to for a probationary period.\nWhat type of relationship would an app builder set up to meet this specification?",options:{"A":"Indirect lookup", "B":"Many-to-many", "C":"Master-detail", "D":"Lookup"},correct:["D"],explanation:"Lookup is the type of relationship that would be set up to meet the specification of pairing experienced\nRealtors with new Realtors. According to the Salesforce documentation, “A lookup relationship creates a\nloose association between objects. The lookup field allows users to select a record from another object.”\nIndirect lookup is used for junction objects on different platforms. Many-to-many is not a type of relationship,\nbut a result of using junction objects. Master-detail is used for creating parent-child relationships.",category:"Data Modeling and Management"},
  {id:2,question:"Northern Trail Outfitters has two custom objects that are part of a master-detail relationship.\nWhat determines the ownership and sharing access of the detail record?",options:{"A":"The default owner is set in the parent object's settings.", "B":"The Owner field on the Detail record.", "C":"The Owner field on the Master record.", "D":"The owner is set independently on the detail object's settings."},correct:["C"],explanation:"The Owner field on the Master record determines the ownership and sharing access of the detail record in a\nmaster-detail relationship. According to the Salesforce documentation, “The detail record inherits the sharing\nand security settings of its master record.” The default owner is not set in the parent object’s settings, the\nOwner field on the Detail record does not exist, and the owner is not set independently on the detail object’s\nsettings.",category:"Data Modeling and Management"},
  {id:3,question:"DreamHouse Realty is building a custom Lightning app to track its expanding solar water collection business.\nThe Lightning app currently contains a custom Lightning record page with standard components.\nFrom which two resources should an app builder get custom components to bring into the new Lightning app?\nChoose 2 answers",options:{"A":"AppExchange", "B":"Apex Code", "C":"Import Wizard", "D":"Visualforce"},correct:["A", "B"],explanation:"AppExchange and Apex Code are two resources that can provide custom components for a Lightning app.\nAppExchange is a marketplace where developers can publish and sell their custom components or apps. Apex\nCode is a programming language that can be used to create custom components or logic for a Lightning app.\nImport Wizard and Visualforce are not resources for custom components, but tools for data import and web\npage development respectively.",category:"User Interface"},
  {id:4,question:"Service Agents are required to confirm a user's identity before providing support information over the phone.\nWhich feature can an app builder use to help agents meet this requirement?",options:{"A":"Guided Action Flows on the record page", "B":"Add Path to the top of the Case layout", "C":"Include Surveys as a Case related list", "D":"Case Validation Rules"},correct:["A"],explanation:"Guided Action Flows (Screen Flows embedded in Lightning record pages) can walk agents through required\nsteps — such as verifying identity — before proceeding.\nWhy A (Guided Action Flows) is correct:Exact Extract:“Use Guided Action Flows in Lightning App\nBuilder to help agents complete processes in a step-by-step format directly on a record page.” —\nSalesforce Help | Guided Action FlowsThe app builder can embed a Screen Flow that prompts the agent\nto verify identity (e.g., asking security questions), then allows access or marks verification complete.\nWhy A (Guided Action Flows) is correct:Exact Extract:“Use Guided Action Flows in Lightning App\nBuilder to help agents complete processes in a step-by-step format directly on a record page.” —\nSalesforce Help | Guided Action FlowsThe app builder can embed a Screen Flow that prompts the agent\nto verify identity (e.g., asking security questions), then allows access or marks verification complete.\nWhy not B:Path helps users track record stages, not enforce procedural steps.\nWhy not C:Surveys are used for feedback collection after cases, not real-time identity verification.\nWhy not D:Validation Rules enforce data quality on record save, not process guidance.\nReferences:\nSalesforce Help | Guided Action Flows\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:5,question:"The Director of Customer Service wants to receive a notification when a case stays in the New status for more\nthan four business hours.\nWhich two automation processes should be used to accomplish this?",options:{"A":"Validation Rule", "B":"Escalation Rules", "C":"Scheduled Apex", "D":"Flow Builder"},correct:["B", "D"],explanation:"The requirement is time-based (Case in New status > 4 business hours) and requires a notification.\nEscalation Rules can monitor case age and trigger escalation or notifications after a specified period.\nFlow Builder (Scheduled Path or Scheduled Trigger Flow) can be used to evaluate business hours and\nsend alerts.\nWhy B (Escalation Rules) is correct:Exact Extract:“Escalation rules automatically escalate cases when\nthey meet certain criteria, such as the age of the case, and can notify users or change ownership.” —\nSalesforce Help | Case Escalation RulesEscalation rules are ideal for service teams and time-based\nescalation scenarios.\nWhy B (Escalation Rules) is correct:Exact Extract:“Escalation rules automatically escalate cases when\nthey meet certain criteria, such as the age of the case, and can notify users or change ownership.” —\nSalesforce Help | Case Escalation RulesEscalation rules are ideal for service teams and time-based\nescalation scenarios.\nWhy D (Flow Builder) is correct:Exact Extract:“Use scheduled paths in record-triggered flows to\nperform actions after a certain amount of time has passed since the record was created or updated.” —\nSalesforce Help | Scheduled Paths in Flow BuilderA Scheduled Path in a record-triggered flow can\nevaluate the Case’s age in hours and send an email alert if the Status remains “New.”\nWhy D (Flow Builder) is correct:Exact Extract:“Use scheduled paths in record-triggered flows to\nperform actions after a certain amount of time has passed since the record was created or updated.” —\nSalesforce Help | Scheduled Paths in Flow BuilderA Scheduled Path in a record-triggered flow can\nevaluate the Case’s age in hours and send an email alert if the Status remains “New.”\nWhy not A:Validation Rules prevent saving invalid data but cannot evaluate elapsed time.\nWhy not C:Scheduled Apex would work technically but is a code-based solution; declarative\nautomation (Flow or Escalation) is preferred for App Builder certification.\nReferences:\nSalesforce Help | Case Escalation Rules\nSalesforce Help | Scheduled Paths in Flow Builder\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:6,question:"Manage at Universal Containers want a quick to create additional accounts to form a hierarchy from a parent\naccount record. They want to auto-populate five fields based on the parent to make it easier for users to create\nthe child accounts quickly.",options:{"A":"Custom Global Quick Action", "B":"Custom Global Quick Account.", "C":"Custom action on Account", "D":"Custom link on Account"},correct:["C"],explanation:"A custom action on Account can be used to create additional accounts from a parent account record. A custom\naction can have predefined values for certain fields based on the parent record. A custom global action can be\nused to create records that do not have any relationship with other objects. A custom link on Account can be\nused to execute JavaScript or link to an external URL.",category:"Data Modeling and Management"},
  {id:7,question:"An App Builder has been asked to integrate Salesforce with an external web service. The web service must be\nnotified every time an Opportunity is Won. Which two can satisfy this requirement?",options:{"A":"Use a workflow rule and an outbound message", "B":"Use a flow and an outbound message", "C":"Use a process and Apex Code", "D":"Use a process and an outbound message"},correct:["A", "C"],explanation:"Workflow rule and an outbound message or Process Builder and Apex Code are two ways to integrate\nSalesforce with an external web service. Workflow rule can define criteria and actions for triggering an\noutbound message, which is an XML message sent to a designated endpoint URL. Process Builder can invoke\nApex Code, which is a programming language that can make callouts to external web services using HTTP\nrequests. Flow Builder and an outbound message or Process Builder and an outbound message are not\npossible combinations.",category:"User Interface"},
  {id:8,question:"Cloud Kicks wants to display 10 key fields at once in a separate section at the top of opportunity records on\nthe desktop.\nWhich component should an app builder add to the record page to enable this functionality?",options:{"A":"Path", "B":"Highlights Panel", "C":"Custom Lightning Web Component", "D":"Accordion"},correct:["B"],explanation:"Highlights Panel. This is correct because the highlights panel component displays key fields from a record at\nthe top of the page, and it can be configured to show up to 10 fields.",category:"Data Modeling and Management"},
  {id:9,question:"Containers have the Account object's Organization-Wide Default set to Private. The marketing team owns\nAccounts; however, they also need to be able to see the sales team's Accounts. Both the sales and marketing\nteams are in completely different branches of the rote hierarchy.\nWhat feature should be used to enable marketing to see sales-owned accounts.",options:{"A":"Public Group", "B":"Flow", "C":"Workflow", "D":"Sharing Rules"},correct:["D"],explanation:"Sharing rules can be used to extend access to records owned by certain users or roles to other users or roles. In\nthis case, a sharing rule can grant read-only or read/write access to sales-owned accounts to the marketing\nteam",category:"Data Modeling and Management"},
  {id:10,question:"Sales reps at Universal Containers create multiple quotes per opportunity.\nWhich automation tool should an app builder recommend to delete rejected quotes?",options:{"A":"Validation rule", "B":"Einstein Next Best Action", "C":"Approval process", "D":"Flow"},correct:["D"],explanation:"The goal is to automatically delete rejected quotes, which requires an automation tool capable of performing\nrecord deletion actions.\nOnly Flow can perform this function declaratively.\nWhy D (Flow) is correct:Exact Extract:“Use Flow Builder to automate complex business processes by\ncollecting data and performing actions such as creating, updating, or deleting records.” — Salesforce\nHelp | Flow Builder OverviewA Record-Triggered Flow can be configured to delete a quote\nautomatically when its status is updated to “Rejected.”\nWhy D (Flow) is correct:Exact Extract:“Use Flow Builder to automate complex business processes by\ncollecting data and performing actions such as creating, updating, or deleting records.” — Salesforce\nHelp | Flow Builder OverviewA Record-Triggered Flow can be configured to delete a quote\nautomatically when its status is updated to “Rejected.”\nWhy not A (Validation Rule):Validation rules prevent record saving; they don’t perform deletions.\nWhy not B (Einstein Next Best Action):NBA recommends actions but does not execute deletions\nautomatically.\nWhy not C (Approval Process):Approval processes manage approvals but don’t delete records after\nrejection.\nReferences:\nSalesforce Help | Flow Builder Overview\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:11,question:"After utilizing the Lightning Object Creator to create a new object, its fields, and to insert all of the data, an\napp builder now needs to set up the\nLightning Record Page.\nWhich component should the app builder have on their Lightning Record Page to see all of the fields from the\npage layout?",options:{"A":"Highlights Panel", "B":"Recommendations", "C":"Record Detail", "D":"Path"},correct:["C"],explanation:"For an app builder who needs to ensure all fields from the page layout are visible on a Lightning Record Page\nafter using the Lightning Object Creator, the correct component to use is:\nRecord Detail (C). The Record Detail component automatically displays all fields that are included on\nthe assigned page layout for the object. It is designed to reflect the layout configuration and is the\nsimplest way to ensure all fields are presented as configured in the layout editor.\nHighlights Panel (A) is used primarily to display key fields at the top of the record page, providing a summary\nview rather than full field visibility. Recommendations (B) is used for displaying prompts or suggestions and\ndoes not display record fields. Path (D) is useful for displaying stages in a process (like sales stages or service\nprocesses) and does not show field data directly.\nReference for setting up Lightning Record Pages and using components effectively:\nLightning Record Pages: https://help.salesforce.com/articleView?id=sf.lightning_page_components.\nhtm&type=5",category:"Data Modeling and Management"},
  {id:12,question:"Universal Containers is setting up salesforce for the first time. Management wants the sales and marketing\nteams to have different navigation names in the salesforce1 mobile app. Which option is available to an app\nbuilder to satisfy the requirement?",options:{"A":"Create sales and marketing profiles to ensure read access to different objects", "B":"Create roles for sales and marketing and assign a custom homepage layout for each role.", "C":"Create mobile navigation menus for both the sales and marketing profiles.", "D":"Create public groups for sales and marketing and create mobile navigation menus for each group."},correct:["C"],explanation:"Create mobile navigation menus for both the sales and marketing profiles. This is correct because mobile\nnavigation menus allow users to customize the items that appear in the navigation bar of the Salesforce\nmobile app, and they can be assigned to different profiles.",category:"User Interface"},
  {id:13,question:"DreamHouse Realty is rethinking its sandbox utilization strategy after acquiring Cloud Kicks. The Salesforce\nCOE already utilizes a partial and a full sandbox, which it refreshes on their own regular schedules. Teams are\nexpanding and have to begin each of their small projects in a sandbox before committing to the larger pool for\ncollaborative testing while still keeping costs down.\nWhat type of sandbox should each team member use?",options:{"A":"Full sandbox", "B":"Developer sandbox", "C":"Developer pro sandbox", "D":"Partial sandbox"},correct:["B"],explanation:"The best type of sandbox for each team member to use is a developer sandbox. A developer sandbox is a copy\nof production that includes only the metadata, such as objects, fields, layouts, etc. It does not include any data,\nsuch as records or attachments. A developer sandbox is ideal for small projects that do not require data\ntesting, such as developing new features or customizations. A developer sandbox has a storage limit of 200\nMB and can be refreshed once per day. A developer sandbox is also cheaper than other types of sandboxes. A\nfull sandbox is a copy of production that includes all the metadata and data. It is ideal for large projects that\nrequire data testing, such as performance testing or integration testing. A full sandbox has the same storage\nlimit as production and can be refreshed every 29 days. A full sandbox is also the most expensive type of\nsandbox. A developer pro sandbox is similar to a developer sandbox, but it has a larger storage limit of 1 GB\nand can be refreshed every 5 days. It is ideal for projects that require some data testing, such as data migration\nor quality assurance testing. A partial sandbox is similar to a full sandbox, but it has a smaller storage limit of\n5 GB and can be refreshed every 5 days. It is ideal for projects that require selective data testing, such as user\nacceptance testing or staging testing",category:"App Deployment"},
  {id:14,question:"Universal Containers uses a private sharing model for opportunities. This model CANNOT be changed due to\na regional structure A new sales operations team has been created. This team needs to perform analysis on\nOpportunity data, all should have read arid write access to all Opportunities.\nWhat are two recommended solutions for the app builder to give the users appropriate access? Choose 2\nanswers",options:{"A":"Create a criteria-based sharing rule to all opportunities with the sales operations public group.", "B":"Add a manual share for all opportunities with each user on the sales operations team.", "C":"Add a permission set with 'View All\" and 'Modify All'' opportunity permissions enabled.", "D":"Create a criteria-based sharing rule to share all opportunities with the sales operations private group"},correct:["A", "C"],explanation:"The two recommended solutions for the app builder to give the users appropriate access are creating a criteria\nbased sharing rule to all opportunities with the sales operations public group and adding a permission set with\n‘View All\" and ‘Modify All’’ opportunity permissions enabled. A criteria based sharing rule can grant read\nand write access to all opportunities that meet certain criteria to a specified group of users. A permission set\ncan grant additional object-level permissions to users without changing their profiles. Option B is incorrect\nbecause adding a manual share for all opportunities with each user on the sales operations team is not scalable\nor maintainable. Option D is incorrect because creating a criteria-based sharing rule to share all opportunities\nwith the sales operations private group is redundant, as private groups are used to manually share records with\nindividual users or other groups.",category:"User Interface"},
  {id:15,question:"The services manager wants to make sure the team enters case priority consistently.\nWhat feature can an app builder use to accomplish this?",options:{"A":"Path", "B":"Flow", "C":"Next Best Action", "D":"In-App Guidance"},correct:["A"],explanation:"The best feature to use to ensure consistent case priority entry is Path. Path allows users to see key fields and\nguidance for each stage of a process, such as a case lifecycle. Path can also enforce data quality by making\ncertain fields required at each stage. See [this article] for more information on Path.",category:"User Interface"},
  {id:16,question:"Northern Trail Outfitters wants to initiate a daily backup of its Salesforce org.\nWhich tool should an app builder recommend for this task?",options:{"A":"Report export", "B":"Refresh full copy sandbox", "C":"AppExchange package", "D":"Data Export Service"},correct:["D"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:17,question:"Accounts at Universal Containers are currently readable by all users but editable only by their owners.\nManagement wants to designate some Accounts as VIP Accounts. Only Account owners should have read\naccess to these VIP accounts.\nWhich two actions should an app builder take to meet the requirements?\nChoose 2 answers",options:{"A":"Implement a sharing rule.", "B":"Configure a permission set.", "C":"Set up an Account Team.", "D":"Change organization-wide defaults."},correct:["A", "D"],explanation:"The two actions that an app builder should take to meet the requirements are: Implement a sharing rule. A\nsharing rule is a way to grant additional access to records based on certain criteria, such as record owner, role,\nprofile, or field value. The app builder can create a sharing rule that grants read access to all accounts with the\nVIP Account field value to all users. This way, all users can view these accounts, but only the owners can edit\nthem. Change organization-wide defaults. Organization-wide defaults are the baseline level of access that\nusers have to records they do not own. The app builder can change the organization-wide default for accounts\nfrom Public Read Only to Private. This way, only the owners can view and edit their own accounts, unless\nadditional access is granted by other means, such as sharing rules. Configuring a permission set is not a valid\naction, as it does not affect record-level access. A permission set is a way to grant additional permissions and\naccess settings to users on top of their profile settings, such as object permissions, field permissions, app\npermissions, etc. Setting up an Account Team is not a valid action, as it does not restrict record-level access.\nAn Account Team is a way to share an account and its related records with a group of users who work\ntogether on the account, such as sales reps, managers, or support agents. An Account Team grants additional\naccess to team members based on predefined roles and access levels.",category:"User Interface"},
  {id:18,question:"Which two solutions prevent a formula field from being referenced by a Roll-Up Summary Field?",options:{"A":"A cross-object workflow updating a field referenced by the formula field", "B":"A cross-object field reference in the formula field", "C":"The CASE () function in the formula field", "D":"The NOW () function in the formula field"},correct:["B", "D"],explanation:"A formula field cannot be referenced by a roll-up summary field if it contains a cross-object field reference or\na time-based function. A cross-object field reference is a reference to a field from a different object, such as\nAccount. Name on a Contact object. A time-based function is a function that returns the current date or time,\nsuch as NOW() or TODAY(). Option A and C do not prevent a formula field from being referenced by a rollup summary field.",category:"Data Modeling and Management"},
  {id:19,question:"Universal Containers assigns system access via permission sets and permission set groups to ensure each user\nhas proper access. One department with varying levels of support staff has five consistent permission sets they\nrequire in order to complete their duties. Some higher-level staff have additional permission sets that are only\nrequired for them.\nHow should an app builder recommend assigning permission sets to users?",options:{"A":"Utilize the manage assignments button to assign a permission set group and additional individual permission sets to each user.", "B":"Utilize the manage assignments button to assign each user with the same set of permission set groups and permission sets.", "C":"Utilize the Data Import Wizard to mass update the desired users with their full list of permission sets and permission set groups.", "D":"Utilize the Data Loader to mass update the desired users with their full list of permission sets and permission set groups."},correct:["A"],explanation:"The app builder should recommend utilizing the manage assignments button to assign a permission set group\nand additional individual permission sets to each user. This way, the app builder can assign the five consistent\npermission sets to all users in one permission set group, and then assign additional permission sets to higherlevel staff as needed. Option B is incorrect because it will not account for the varying levels of support staff\nand their different permission sets. Option C is incorrect because the Data Import Wizard cannot be used to\nassign permission sets or permission set groups to users. Option D is incorrect because the Data Loader\ncannot be used to assign permission set groups to users.",category:"User Interface"},
  {id:20,question:"The Director of Marketing at Northern Trail Outfitters wants the app builder to create a formula field that\ntracks how many days have elapsed since a contact was sent a marketing communication. The director is only\ninterested in whole units.\nWhich function should be used to return a date for calculating the difference?",options:{"A":"DATFTIMEVALUE()", "B":"TODAY()", "C":"DATEVALUE()", "D":"NOW()"},correct:["B"],explanation:"TODAY() is the function that should be used to return a date for calculating the difference between today and\nthe date a marketing communication was sent. According to the Salesforce documentation, “TODAY()\nreturns the current date as a Date value.” DATETIMEVALUE() converts a text value into a Date/Time value.\nDATEVALUE() converts a Date/Time value into a Date value. NOW() returns the current Date/Time value.",category:"Data Modeling and Management"},
  {id:21,question:"Universal Containers manages leads in a Lead qualification queue where sales reps can accept ownership of\nthe Lead. Campaign members are required to have a sales owner.\nWhat validation rule should an app builder configure?",options:{"A":"AND( ISBLANK(Lead.Owner.Id) )", "B":"NOT(ISNEW() && ISBLANK(Lead.Owner:Queue.Id))", "C":"AND(ISNEW(), ISBLANK(Lead.Owner:User.Id))", "D":"NOT(ISBLANK(Lead.Owner:Queue.Id))"},correct:["C"],explanation:"The validation rule should be AND(ISNEW(), ISBLANK(Lead.Owner:User.Id)). This rule will prevent\nsaving a new lead record if the owner is not a user. This will ensure that campaign members have a sales\nowner. Option A is incorrect because it will prevent saving any lead record if the owner is blank, which is not\nthe requirement. Option B is incorrect because it will prevent saving an existing lead record if the owner is a\n\nqueue, which is not the requirement. Option D is incorrect because it will prevent saving any lead record if the\nowner is a queue, which is not the requirement.",category:"Business Logic and Process Automation"},
  {id:22,question:"An app builder needs to change the data type of some custom fields.\nWhich two limitations should the app builder be aware of when changing the data type of a custom field?\nChoose 2 answers",options:{"A":"It is not possible to change the data type of a formula field to any data type.", "B":"It is not possible to change the data type of field referenced by Apex code,", "C":"It is not possible to change the data type of a field used as an External ID from number to text.", "D":"It is not possible to change the data type of a Text Area (Long) field to Text."},correct:["A", "D"],explanation:"Changing the data type of custom fields in Salesforce has specific limitations that need to be considered to\nensure system integrity and prevent errors:\nA. It is not possible to change the data type of a formula field to any data type. Formula fields are\ncalculated based on other field values and cannot be converted into a storage data type because they do\nnot store data themselves.\nD. It is not possible to change the data type of a Text Area (Long) field to Text. Text Area (Long) fields\nsupport up to 131,072 characters, which far exceeds the 255 character limit of standard Text fields.\nConverting such a field to a smaller capacity field would potentially lead to data truncation or loss.\nFor official guidance on data type changes, refer to Salesforce's Custom Field Considerations.",category:"Data Modeling and Management"},
  {id:23,question:"Sales manager at universal containers would like to standardize what information sales rep are gathering.\nSales rep want recommendations, sales strategies and to know what key fields need to be completed at each\nstep of the sales process on the opportunity record. What feature should an app builder use to provide this\nfunctionally?",options:{"A":"Workflow", "B":"Path", "C":"Chatter feed", "D":"Global Action"},correct:["B"],explanation:"The app builder should use the Path feature to provide the functionality that the VP of Sales wants. The Path\nfeature allows an app builder to create a visual representation of the stages in a business process, such as the\nOpportunity sales process. The app builder can also add key fields, guidance, and resources for each stage to\nhelp sales reps gather information and complete tasks4. Option A, C, and D are not features that can provide\nthis functionality.",category:"Data Modeling and Management"},
  {id:24,question:"At Universal Containers, the Account object has a Master-Detail relationship with an Invoice custom object.\nThe App Builder would like to change to a lookup field, but is not able to do so. What could be causing this?",options:{"A":"The invoice must have at least one Master-Detail field for reporting.", "B":"The Account record includes Invoice roll-up summary fields.", "C":"The Invoice records have existing values in the Account.", "D":"The Account is included in the workflow on the Invoice object."},correct:["B"],explanation:"The Account record includes Invoice roll-up summary fields. This is correct because roll-up summary fields\nare only available on the master object in a master-detail relationship, and changing the field type to lookup\nwould delete the roll-up summary fields",category:"Data Modeling and Management"},
  {id:25,question:"An app builder is creating a Lightning record page and has added Mobile & Lightning Actions to the page\nlayout.\nWhat two components could be included on the layout to display the actions?\nChoose 2 answers",options:{"A":"Highlights panel", "B":"Chatter", "C":"Activities", "D":"Path"},correct:["A", "D"],explanation:"The two components that could be included on the layout to display the actions are the Highlights panel and\nthe Path. The Highlights panel is a component that shows key information and actions for a record. It can\ndisplay up to 10 actions from the Mobile & Lightning Actions section of the page layout. The Path is a\ncomponent that shows the stages of a process, such as a sales process or a service process. It can display up to\n5 actions from the Mobile & Lightning Actions section of the page layout. The Chatter and Activities\ncomponents do not display actions from the Mobile & Lightning Actions section of the page layout. They\ndisplay other types of actions, such as posting, commenting, liking, logging a call, creating a task, or sending\nan email.",category:"User Interface"},
  {id:26,question:"An App Builder wants to deploy a new version of an auto launched flow to production in an active state so\nthat the new functionality Is immediately available to users\nWhat should the App Builder rake into consideration when planning the deployment?",options:{"A":"Verify there is an Apex test that provides test coverage for the Flow.", "B":"Grant user access to the Flow.", "C":"Manually activate the Flow after deployment", "D":"Include the Process Builder calling the Flow In the deployment"},correct:["A"],explanation:"The app builder should verify that there is an Apex test that provides test coverage for the Flow. An Apex test\nis a unit test that verifies the functionality and quality of Apex code. Apex tests are required to deploy any\nchange that contains Apex code or references Apex code, such as an auto launched flow3. The app builder\nshould ensure that there is an Apex test that covers at least 75% of the Flow logic before deploying it to\nproduction in an active state4. Option B, C, and D are not things that the app builder should take into\nconsideration when planning the deployment.",category:"Business Logic and Process Automation"},
  {id:27,question:"The marketing director is concerned that too many car parts were given away for free last year.\nWhich functionality should be used to ensure all free parts receive the marketing directors' sign-off?",options:{"A":"Stack post", "B":"Chatter approval", "C":"Automated email message", "D":"Approval process"},correct:["D"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Data Modeling and Management"},
  {id:28,question:"An app builder needs a custom solution and is considering using either AppExchange or their local developer\ncommunity. The app builder wants to minimize the need for manual maintenance.\nWhat should the app builder consider?",options:{"A":"An open-source custom development", "B":"An unmanaged package from AppExchange", "C":"An open-source unmanaged package", "D":"A managed package from AppExchange"},correct:["D"],explanation:"Managed packages from the AppExchange are designed to provide automatic updates, upgrades, and vendor\nsupport, minimizing the need for ongoing manual maintenance by the customer.\nWhy D (Managed Package from AppExchange) is correct:Exact Extract:“Managed packages are\nmaintained by the provider and can be automatically upgraded. They’re ideal for apps distributed and\nmaintained through AppExchange.” — Salesforce Help | Managed and Unmanaged Packages\nOverviewManaged packages allow publishers to push automatic updates and ensure compatibility with\nfuture Salesforce releases — minimizing maintenance effort.\nWhy D (Managed Package from AppExchange) is correct:Exact Extract:“Managed packages are\nmaintained by the provider and can be automatically upgraded. They’re ideal for apps distributed and\nmaintained through AppExchange.” — Salesforce Help | Managed and Unmanaged Packages\nOverviewManaged packages allow publishers to push automatic updates and ensure compatibility with\nfuture Salesforce releases — minimizing maintenance effort.\nWhy not A (Open-source custom development):Open-source code must be maintained internally by\ndevelopers.\n\nWhy not B (Unmanaged package):Unmanaged packages are customer-controlled and do not receive\nautomatic updates.\nWhy not C:Open-source unmanaged packages combine the same issue — no automated support or\nmaintenance.\nReferences:\nSalesforce Help | Managed and Unmanaged Packages Overview\nSalesforce Platform App Builder Exam Guide | App Deployment",category:"App Deployment"},
  {id:29,question:"At Ursa Major Solar there is a requirement for a new field called Planet Details on the Planet object where\nusers can write detailed descriptions that can include pictures and links.\nWhat field type should the app builder utilize to fulfill this requirement?",options:{"A":"Long Text Area", "B":"Rich Text Area", "C":"Multi-Select Picklist", "D":"URL"},correct:["B"],explanation:"Ursa Major Solar requires a new field called Planet Details on the Planet object, where users can write\ndetailed descriptions that can include pictures and links. The Rich Text Area field type is the best fit for this\nrequirement.\nOption B (Rich Text Area): A Rich Text Area field allows users to enter text with formatting options\nsuch as bold, italics, bullets, and numbering. Additionally, it supports inserting images and hyperlinks,\nwhich matches the requirement of including pictures and links in the description.\nRich Text Area Fields\nOption A (Long Text Area): A Long Text Area field allows for lengthy text input but does not support\nformatting or embedding of images and links, which are necessary in this case.\nOption C (Multi-Select Picklist): A Multi-Select Picklist allows users to select multiple values from a list but\nis not suitable for detailed descriptions or embedding images and links.\n\nOption D (URL): A URL field is used to store and display a link but does not support text input or embedding\nimages.\nIn summary, the Rich Text Area field type should be used because it allows formatted text, images, and links,\nwhich are required for the Planet Details field.\nReference:Rich Text Area Field Documentation",category:"Data Modeling and Management"},
  {id:30,question:"AW Computing uses a private sharing model for opportunities. Whenever\nan opportunity with a type of Service Agreement is created, all users in the Service\nManager role should be able to view the opportunity.\nWhich tool should AW Computing use to accomplish this?",options:{"A":"Owner-based sharing rules", "B":"Criteria-based sharing rules", "C":"Apex sharing rules", "D":"Manual sharing"},correct:["B"],explanation:"Criteria-based sharing rules are the best tool to use for automatically sharing records based on specific\ncriteria, such as the opportunity type being \"Service Agreement.\" This rule can share opportunities with all\nusers in a particular role, such as the Service Manager role, when the criteria are met, thereby adhering to the\nprivate sharing model while still providing necessary access.\nA: Owner-based sharing rules focus on the record owner's role or group, not the record type.\nC: Apex sharing is used for more complex scenarios not easily handled by declarative sharing settings.\nReference: Using Criteria-Based Sharing Rules on Salesforce Help",category:"Security"},
  {id:31,question:"A sales rep at AW Computing is unable to find what they are looking for while scrolling through their Chatter\nfeed.\nHow can a filter be utilized to show only posts from their key account and opportunity records?",options:{"A":"Create a Chatter group.", "B":"Create Chatter bookmarks", "C":"Create a Chatter stream.", "D":"Create a Chatter notification."},correct:["C"],explanation:"Create a Chatter stream. This is correct because a Chatter stream allows users to follow multiple records and\npeople in one feed, and filter the feed by selecting a stream.",category:"Reporting"},
  {id:32,question:"Which three Salesforce functionalities are ignored when processing field updates in workflow rules and\napproval processes?",options:{"A":"Multiple currencies", "B":"Field-Level Security", "C":"Validation Rules", "D":"Record type picklist value assignments", "E":"Decimal places and character limits"},correct:["B", "C", "E"],explanation:"The three Salesforce functionalities that are ignored when processing field updates in workflow rules and\napproval processes are:\nField-Level Security: This means that the field update will occur regardless of the user’s profile or\npermission set settings that determine whether they can see or edit the field1.\nValidation Rules: This means that the field update will bypass any validation rules that might otherwise\nprevent the record from being saved1.\nDecimal places and character limits: This means that the field update will round or truncate the value to\nfit the field’s format, without throwing an error",category:"Data Modeling and Management"},
  {id:33,question:"The sales team receives a list of approximately 800 leads each morning from the marketing team. The\nmarketing team does not know if any of the leads are\ncurrently in the pipeline and sends the entire list each morning.\nWhich tool should be used to import these leads into Salesforce while preventing the duplicates from being\ninserted?",options:{"A":"Dataloaderio", "B":"Data Import Wizard", "C":"Data Loader", "D":"Manual entry"},correct:["B"],explanation:"To import leads while preventing duplicates:\nB. Data Import Wizard is the appropriate tool. The Data Import Wizard in Salesforce includes\nfunctionality to check for duplicates based on matching records by certain criteria (like email or lead\nID) during the import process, thus preventing duplicate lead records from being created.\nMore details on using the Data Import Wizard can be found in the Salesforce Data Import Wizard guide.",category:"Data Modeling and Management"},
  {id:34,question:"Universal Containers wants to create a report to show job applications with or without resumes.\nWhat considerations should the app builder be aware of when creating the custom report type?",options:{"A":"An app builder is unable to create custom report types for objects they do not have permissions for.", "B":"Once the report type has been deployed it is unable to be deleted.", "C":"A primary object selection is locked once the custom report type has been saved.", "D":"When a custom or external object is deleted the report type and reports remain but cause an error when the report is run."},correct:["C"],explanation:"The primary object selection is locked once the custom report type has been saved. This means that the app\nbuilder cannot change the primary object later. The other options are not true.",category:"User Interface"},
  {id:35,question:"Universal Containers expects impacts to operations due to increased demand. The executive team will reach\nout to current customers and wants to see the number of open cases for the account and parent account.\nWhat should an app builder use to display the number of open cases on the account page?",options:{"A":"Flow", "B":"Approval Process", "C":"Roll-up summary", "D":"Cuctom object"},correct:["C"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:36,question:"Universal containers (uc) want to delete data in several fields for 5000 lead records. UC export the selected\nrecord IDs and fields that need to have data deleted in a csv file. Which two steps should an app builder\nsuggest to meet these requirements? Choose 2 answers",options:{"A":"Select the correct record type", "B":"Use import Wizard to update leads using the CSV file", "C":"Select insert null values in settings.", "D":"Use Data Loader to update leads using the CSV file"},correct:["C", "D"],explanation:"The two steps that should be suggested to meet these requirements are to select insert null values in settings\nand to use Data Loader to update leads using the CSV file. Selecting insert null values in settings will allow\nData Loader to overwrite existing values with null values. Data Loader is a tool that can import, export,\nupdate, or delete large amounts of data.",category:"Data Modeling and Management"},
  {id:37,question:"DreamHouse Realty (DR) employees started using company-owned airplanes for work travel after Ursa\nMajor Solar was acquired. DR executives want to automate the submission travel request forms to enforce the\nInternal policy.\nHow should an app builder automate travel requests based on these criteria?",options:{"A":"Process Builder", "B":"Workflow rule", "C":"Approval process", "D":"Apex"},correct:["C"],explanation:"Approval process is the best way to automate travel requests based on internal policy. Approval process can\ndefine the steps, criteria, and actions for approving records. The app builder can create an approval process for\ntravel requests that requires approval from managers or executives before they are submitted. Workflow rule,\nProcess Builder, and Apex are not suitable for this requirement.",category:"User Interface"},
  {id:38,question:"An app builder would like to streamline the user experience by reflecting summarized calculations of specific\nfields on various objects. Which field types could be used in roll-up summary fields to accomplish this?\nChoose 3 answers",options:{"A":"Currency", "B":"Percent", "C":"Date", "D":"Checkbox", "E":"Time"},correct:["A", "B", "D"],explanation:"Roll-up summary fields can only be created on master-detail relationships, and they can only calculate\nnumeric fields, such as currency, percent, and number. Date and time fields are not supported for roll-up\nsummary fields. Checkbox fields can be used in roll-up summary filters, but not in the field to aggregate",category:"Data Modeling and Management"},
  {id:39,question:"Universal Containers wants to create a custom checkbox formula field on the Opportunity object. This\nformula should evaluate to TRUE if the following conditions are met:\nStage is set to Negotiation/Review\nClose Date is less than 1 week away\nWhich formula meets these requirements?",options:{"A":"AND(ISPICKVAL(StageName, 'Negotiation/Review'), CloseDate - 7 < TODAY())", "B":"AND(StageName = \"Negotiation/Review\", CloseDate - 7 < TODAY())", "C":"AND(StageName = 'Negotiation/Review', CloseDate - DAY(7) < TODAY())", "D":"AND(ISPICKVAL(StageName, 'Negotiation/Review'), CloseDate - DAY(7) < TODAY())"},correct:["A"],explanation:"To test a picklist field in a formula, ISPICKVAL must be used. To check if the CloseDate is within 7 days of\nthe current date, you can use simple date arithmetic (CloseDate - 7 < TODAY()).\nWhy A is correct:Exact Extract:“Use ISPICKVAL to determine if a picklist field has a specific value.”\n— Salesforce Help | ISPICKVAL Function“Date formulas can use arithmetic to compare a date to\nTODAY(). For example, CloseDate - 7 < TODAY() returns TRUE if CloseDate is within the next\nweek.” — Salesforce Help | Date Functions and Operators\nWhy not B:Picklist fields cannot be compared with =; this formula would fail to compile.\nWhy not C or D:The function DAY() returns the day of the month from a date — not a duration. DAY\n(7) is invalid in this context.\nReferences:\nSalesforce Help | ISPICKVAL Function\nSalesforce Help | Formula Operators and Functions\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:40,question:"Sales reps want the ability to see who can view their account records and how the people have access.\nWhich button should the app builder add to the Account page layout to enable this?",options:{"A":"Sharing Hierarchy", "B":"New Task", "C":"Sharing", "D":"Fait"},correct:["C"],explanation:"The \"Sharing\" button should be added to the Account page layout to allow sales reps to view the sharing\ndetails of an account record. This button enables users to see how access to the record is granted via roles,\ngroups, and manual sharing.\nA: Sharing Hierarchy provides a view of the role hierarchy but does not specifically detail record access.\nB: New Task is unrelated to sharing visibility.\nD: \"Fait\" is not recognized in Salesforce context as a valid component or feature. Reference: Sharing an\nAccount in Salesforce Help Documentation",category:"User Interface"},
  {id:41,question:"The marketing team at UVC has a list of 400 leads it wants to upload to Salesforce. The team need to avoid\ncreating duplicate records. Which two actions should be taken to meet this requirement? Choose 2 answers",options:{"A":"Utilize a Lead Matching Rule and corresponding Duplicate Rule to block newly created duplicate leads.", "B":"Upload the lead list using the import wizard and select a Matching type to prevent duplicate lead creation.", "C":"Use Data Loader’s update function to import lead and match to existing records based on e-mail address.", "D":"Enable Duplicate Matching in the Data Management section in Setup and activate the Lead-to_Lead scenario."},correct:["A", "B"],explanation:"The best actions to take to avoid creating duplicate leads when uploading a list of 400 leads are to utilize a\nLead Matching Rule and corresponding Duplicate Rule to block newly created duplicate leads, and to upload\nthe lead list using the import wizard and select a Matching type to prevent duplicate lead creation. The Lead\nMatching Rule defines the criteria for identifying duplicate leads, and the Duplicate Rule defines the actions\nto take when a duplicate is detected. The import wizard allows users to choose a Matching type based on the\nLead Matching Rule and block or allow duplicates. Using Data Loader’s update function or enabling\nDuplicate Matching in the Data Management section will not prevent duplicate lead creation.",category:"Data Modeling and Management"},
  {id:42,question:"Universal Containers utilizes opportunities and a custom object called Detaited.Sales__c. The company would\nlike to roll sales metrics up to an opportunity for only Detailed.Sales__c records that have their picklist status\nset to Active.\nWhat is the recommended method for the app builder to achieve this request?",options:{"A":"Utilize the AppExchange to download a third-party application that can roll_up the sales dollars with the appropriate filter.", "B":"Create a master-detail relationship between the parent and child object with a roll-up summary field that fitters on the status held.", "C":"Create a lookup relationship between the parent and child object with a roll-up summary held that filters on the status field.", "D":"Utilize Apex code to roll up the desired amounts."},correct:["B"],explanation:"Create a master-detail relationship between the parent and child object with a roll-up summary field that\nfilters on the status field is the recommended method for the app builder to achieve the request of rolling up\nsales metrics to an opportunity for only Detailed.Sales__c records that have their picklist status set to Active.\nAccording to the Salesforce documentation, “Roll-up summary fields calculate values from related records,\nsuch as those in a master-detail relationship.” A roll-up summary field can filter on a field value of the child\nrecords and sum up only those records that match the criteria. Utilize the AppExchange to download a thirdparty application that can roll up the sales dollars with the appropriate filter, create a lookup relationship\nbetween the parent and child object with a roll-up summary field that filters on the status field, and utilize\nApex code to roll up the desired amounts are not valid or necessary methods for this request.",category:"Data Modeling and Management"},
  {id:43,question:"DreamHouse Realty (DHR) recently acquired Cloud Kicks (CK), a company that is still on Salesforce\nClassic. DHR is keeping the CK Salesforce org; however, it will migrate this org to Lightning Experience.\nWhere should the app builder find prebuilt resources to help with this project and overall adoption?",options:{"A":"Import Wizard", "B":"Lightning Object Creator", "C":"AppExchange", "D":"Flow Builder"},correct:["C"],explanation:"AppExchange is a marketplace where app builders can find prebuilt resources to help with migration and\nadoption projects. AppExchange offers apps, components, solutions, and consulting services that can assist\nwith moving from Classic to Lightning Experience. Import Wizard, Lightning Object Creator, and Flow\nBuilder are not sources of prebuilt resources, but tools for data import, object creation, and automation\nrespectively.",category:"User Interface"},
  {id:44,question:"Universal Containers implemented an application process that uses custom objects Internships and\nApplications. The organization-wide default for Internships has been set to private and is the master in the\nmaster-detail relationship with Applications. The VP of HR wants to allow edit access to Applications to\nrecruiters.\nHow should an app builder configure the proper access?",options:{"A":"Set the organization-wide default on the Applications object to Read/Write.", "B":"Add a sharing rule that grants the users Read/Write access to the Internship records.", "C":"Create a queue for the web applications and assign access to the users who will be editing the records.", "D":"Create a sharing rule that grants the users Read/Write access to the Application records."},correct:["D"],explanation:"The app builder should create a sharing rule that grants the users Read/Write access to the Application\nrecords. A sharing rule is a type of rule that can extend record access to groups of users based on certain\ncriteria. In this case, the app builder can create a sharing rule that grants Read/Write access to the Application\nobject to the recruiters based on their role, public group, or queue. This will allow them to edit the Application\nrecords related to any Internship record, regardless of the ownership. Option A, B, and C are not ways to\nconfigure the proper access.",category:"Data Modeling and Management"},
  {id:45,question:"Universal Containers uses the Asset object to track products that are installed at customer locations. A new\nobject, Asset Inventory, has been created to capture details about the asset.\nWhich approach should the app builder take to show Asset Inventory as a related list on Asset?",options:{"A":"Create a roll-up on Asset. Add the Asset Inventory related list to the Asset page layout.", "B":"Create a junction object to relate Asset Inventory and Asset. Add the Asset Inventory relatedlist to the Asset page layout.", "C":"Create a lookup relationship on Asset Inventory to Asset. Add the Asset Inventory related list to the Asset page layout.", "D":"Create a master-detail relationship on Asset-to-Asset Inventory Add the Asset Inventory related list to the Asset page layout."},correct:["C"],explanation:"The best way to show Asset Inventory as a related list on Asset is to create a lookup relationship on Asset\nInventory to Asset. This will allow one-to-many relationship between Asset and Asset Inventory, and display\nthe related records on the Asset page layout.",category:"Data Modeling and Management"},
  {id:46,question:"An app builder wants to create a formula field on an Account to include data from related Contacts but is\nunable to find the relationship in the formula editor.\nWhat is a limitation of formulas that could be causing the issue?",options:{"A":"Unable to reference the child records.", "B":"A master-detail relationship should be created.", "C":"Formula field limit reached on the Account object.", "D":"More than 5,000 characters in the formula."},correct:["A"],explanation:"The app builder wants to create a formula field on an Account to include data from related Contacts but\ncannot find the relationship in the formula editor. This limitation occurs because formula fields in Salesforce\ncannot reference child records directly.\nOption A (Unable to reference the child records): In Salesforce, formula fields can reference parent\nobjects but not child objects. In this case, Contacts are child records of Accounts in a lookup\nrelationship, and Account is the parent. This is why the formula editor does not provide access to the\nchild records (Contacts) from the Account.\nFormula Field Considerations\nOption B (A master-detail relationship should be created): While master-detail relationships allow for roll-up\nsummaries, creating a master-detail relationship is not applicable here since the standard Account-Contact\nrelationship is a lookup, and changing it to master-detail is not possible.\nOption C (Formula field limit reached on the Account object): This would limit the number of formulas but is\nnot the root cause of the issue described.\n\nOption D (More than 5,000 characters in the formula): This limit refers to formula field complexity, but it\ndoes not explain the inability to reference child records.\nIn summary, the limitation is due to Salesforce not allowing formula fields to reference child records.\nReference:Formula Field and Relationship Limits",category:"Data Modeling and Management"},
  {id:47,question:"An app builder at DreamHouse Realty created a custom object which has fields containing data from two\ndifferent objects via related lookups.\nWhat is needed to create \"with\" or \"without* reports on the new custom object?",options:{"A":"Row-Level Formula", "B":"Report Bucket Field", "C":"Report Filters", "D":"Custom Report Type"},correct:["D"],explanation:"To create “with” or “without” reports on the new custom object, a custom report type is needed. A custom\nreport type defines the relationship between one or more standard or custom objects for reporting purposes. It\nallows users to select which fields they want to display in their reports and filter by related objects.",category:"Data Modeling and Management"},
  {id:48,question:"Ursa Major Solar wants to automate a welcome email to new clients and include a customized survey about\ntheir buying experience. An app builder is tasked with this project and has very little time to build the solution\nfrom scratch, but still needs to be able to fully customize the solution.\nWhat should the app builder do to meet the deadline and custom requirements?",options:{"A":"Work with a developer to create custom Apex code and a Lightning web component survey to meet the criteria,", "B":"Use Salesforce flow to build the survey declaratively to meet the criteria and send it to the customer as an email.", "C":"Choose a managed package from AppExchange that closely meets the requirements of the project, restricts programmatic development, but allows declarative development", "D":"Choose an unmanaged package from Appexchange that closely meets the requirements of the project and allows programmatic development."},correct:["B"],explanation:"Given the need to automate a welcome email including a customized survey with customization requirements\nand a tight timeline, the best approach is:\nUse Salesforce Flow to build the survey declaratively to meet the criteria and send it to the customer as\nan email (B). Flow is a powerful tool for automation in Salesforce, allowing the creation of complex\nworkflows and user interactions without needing to write custom code. It can be used to build a survey\nand integrate it with email services for automated dispatch.\nWorking with a developer to create custom Apex and LWC (A) might meet the criteria but would not align\nwith the limited time frame. Managed (C) and unmanaged packages (D) from AppExchange can provide prebuilt solutions, but they may not offer the needed customization or could require more setup time than\nbuilding directly in Flow.\nReference for automating processes with Salesforce Flow:\nSalesforce Flow: https://help.salesforce.com/articleView?id=sf.flow_considerations_design.\nhtm&type=5",category:"User Interface"},
  {id:49,question:"When a deal is closed- won, it has to be approved by the owner's manager prior to being added to the\nleaderboard for a quarterly sales competition. An opportunity is won on the last day of the quarter and the\nmanager is on vacation.\nWhat is recommended to ensure all of the appropriate deals are reviewed and the leaderboard is up to date?",options:{"A":"Forward the approval request to the manager's assistant.", "B":"Set up a delegated approver for the manager", "C":"Have the manager log on and reassign the approval request", "D":"Use Process Builder to assign a delegated approver."},correct:["B"],explanation:"Set up a delegated approver for the manager is the recommended solution to ensure all of the appropriate\ndeals are reviewed and the leaderboard is up to date. According to the Salesforce documentation, “A\ndelegated approver can approve records that are submitted for approval by users below them in the role\n\nhierarchy.” Forwarding the approval request to the manager’s assistant, having the manager log on and\nreassign the approval request, and using Process Builder to assign a delegated approver are not valid or\nfeasible options.",category:"Data Modeling and Management"},
  {id:50,question:"Universal Containers has a Lightning record page that supports both the mobile app and desktop. An app\nbuilder has downloaded a custom Lightning component from AppExchange, but users are unable to view the\ncomponent on mobile devices.\nWhat can be the issue?",options:{"A":"The record page needs to be activated.", "B":"The component has been developed for Desktop Pages.", "C":"The component needs to be activated.", "D":"The record page template is unable to support mobile devices."},correct:["B"],explanation:"The most likely reason why users are unable to view the custom Lightning component on mobile devices is\nthat the component has been developed for Desktop Pages only. Some components are not supported on\nmobile devices or have different behavior on mobile devices. An app builder should check the component\ndocumentation or metadata to see if it is compatible with mobile devices.",category:"User Interface"},
  {id:51,question:"A business user at Universal Containers wants to update an Account directly from an Opportunity record.\nWhat should the app builder create to allow the business user to make these edits?",options:{"A":"An update record action with a related record component.", "B":"An update record action with a details component", "C":"Formula fields displaying the Account fields.", "D":"Opportunity fields updated by a process."},correct:["A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:52,question:"Universal Containers wants to deliver purchased containers to remote construction address. In these cases, the\ncustomers will supply UC with the coordinates to the location.\nWhat type of field should the app builder use to capture this information?",options:{"A":"Number", "B":"Geo location", "C":"Text", "D":"External Lookup"},correct:["B"],explanation:"A geolocation field can be used to capture the coordinates of a location in latitude and longitude. This field\ntype can also be used in reports, formulas, validation rules, and Apex",category:"Data Modeling and Management"},
