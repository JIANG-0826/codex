  {id:306,question:"Ursa Major Solar wants to create a relationship between the standard Contact object and a custom Solar\nProject object Contacts potentially be related to multiple Solar Project objects, and a Solar Project can have\nmultiple Contacts associated with it.\nHow should an app builder configure the data model?",options:{"A":"One Master-detail relationship on Conduct and one Master-detail relationship on Solar Project", "B":"Two Lookup relationships on a new custom object", "C":"One Lookup relationship on Contact and one Lookup relationship on Solar Project", "D":"Two Master-detail relationships on a new custom object"},correct:["C"],explanation:"Two Master-detail relationships on a new custom object is how an app builder should configure the data\nmodel to create a relationship between Contact and Solar Project objects where each Contact can be related to\nmultiple Solar Project objects, and each Solar Project can have multiple Contacts associated with it. This is an\nexample of a many-to-many relationship that requires a junction object with two master-detail relationships.\nOne Master-detail relationship on Contact and one Master-detail relationship on Solar Project, two Lookup\nrelationships on a new custom object, and one Lookup relationship on Contact and one Lookup relationship\non Solar Project are not valid or correct ways to create a many-to-many relationship.",category:"Data Modeling and Management"},
  {id:307,question:"DreamHouse Realty wants to import its property records from an external system into Salesforce. The app\nbuilder will use an external ID field to house the property ID from the external system.\nWhich two field types are allowed as an external ID?",options:{"A":"Number field", "B":"URL field", "C":"Test field", "D":"Phone field"},correct:["A", "C"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Data Modeling and Management"},
  {id:308,question:"What are two capabilities of Schema Builder? Choose 2 answers",options:{"A":"Editing custom settings", "B":"Creating a new record type", "C":"Showing selected objects on a page", "D":"Viewing page layouts in a new window"},correct:["A", "C"],explanation:"Schema Builder is a tool that allows app builders to view and modify the data model of their Salesforce org.\nSome of the capabilities of Schema Builder are:\nCreating and editing custom objects and fields\nCreating and editing relationships between objects\nShowing selected objects on a page\nEditing custom settings\nSchema Builder cannot be used to create a new record type or view page layouts in a new window.",category:"Data Modeling and Management"},
  {id:309,question:"Properly installing managed packages helps prevent conflicts with customizations made by customers and\npartners.\nWhat functionality should be used to set up packages?",options:{"A":"Description", "B":"Allow sharing", "C":"Help setting", "D":"Namespace"},correct:["D"],explanation:"The functionality that should be used to set up packages is namespace. A namespace is a unique identifier that\ndistinguishes one package from another and prevents naming conflicts with other packages or customizations.\nA namespace also allows developers to expose their code or components for use by other developers through\nAPIs or web services. A description is not a functionality that should be used to set up packages, but a text\nfield that provides information about the package contents or purpose. A description does not prevent\nconflicts with other packages or customizations. Allow sharing is not a functionality that should be used to set\nup packages, but a setting that controls whether users can share records owned by other users within their role\nhierarchy. Allow sharing does not prevent conflicts with other packages or customizations. Help setting is not\na functionality that should be used to set up packages, but a setting that determines whether users can access\nhelp documentation for standard Salesforce features or custom features within a package. Help setting does\nnot prevent conflicts with other packages or customizations.",category:"Data Modeling and Management"},
  {id:310,question:"Northern Trail Outfitters wants the field sales team to only see the accounts that they own Separate North\nAmerican and European marketing teams should only see accounts m their respective regions. The inside\nsales team needs to see all accounts in Salesforce.\nHow can this be accomplished?",options:{"A":"Set the Organization-Wide Default to Public for accounts. Create criteria- based sharing rules for each marketing team, and create an Inside Sales Team permission set with the \"View Air setting for accounts,", "B":"Set the Organization-Wide Default to Public for accounts. Create profiles for each marketing team, and create an Inside Sales Team role that is at the top of the Role Hteran", "C":"Set the Organization-Wide Default to Private for accounts. Create criteria- based sharing rules for each marketing team, and create an Inside Sales Team profile with the \"View All\" setting for accounts.", "D":"Set the Organization-Wide Default to Private for accounts. Create permission sets for each marketing team, and create an Inside Sales Team profile with the \"View All\" setting for accounts."},correct:["C"],explanation:"Set the Organization-Wide Default to Private for accounts and create criteria-based sharing rules for each\nmarketing team are the actions that can accomplish the requirement of restricting access to accounts based on\nregion and role. Setting the Organization-Wide Default to Private will limit access to accounts to only owners\nand administrators. Creating criteria-based sharing rules will grant additional access to accounts based on\nregion for each marketing team. Creating an Inside Sales Team profile with the “View All” setting for\naccounts will grant access to all accounts for the inside sales team. Update the Sales profile, update the\norganization-wide defaults to Public for accounts, create profiles for each marketing team, create permission\nsets for each marketing team, and create an Inside Sales Team role are not necessary or sufficient actions for\nthis requirement.",category:"Data Modeling and Management"},
  {id:311,question:"The VP of Sales wants a Chatter post to the All-Sales private group when an opportunity goes to the closed\nwon stage.\nWhat two tools should the app builder use to automate this process? Choose 2 answers",options:{"A":"Flow", "B":"Process Builder", "C":"Big Deal Alert", "D":"Workflow"},correct:["B", "D"],explanation:"The app builder should use two tools to automate this process:\nProcess Builder: This is a type of automation tool that can execute actions based on certain criteria. In\nthis case, the process builder can have a criteria that evaluates if an opportunity goes to the closed won\nstage, and then execute an action that posts a message to a Chatter group.\nWorkflow: This is another type of automation tool that can execute actions based on certain criteria. In\nthis case, the workflow can have a criteria that evaluates if an opportunity goes to the closed won stage,\nand then execute an action that posts a message to a Chatter group. Option A and C are not tools that\ncan automate this process.",category:"User Interface"}
];

const CATEGORIES = [
  { name: "Data Modeling and Management", weight: "54%", icon: "🗄️", nameEN: "Data Modeling & Mgmt" },
  { name: "User Interface", weight: "31%", icon: "🖥️", nameEN: "User Interface" },
  { name: "Business Logic and Process Automation", weight: "9%", icon: "⚡", nameEN: "Business Logic & Automation" },
  { name: "Security", weight: "2%", icon: "🔒", nameEN: "Security" },
  { name: "App Deployment", weight: "2%", icon: "🚀", nameEN: "App Deployment" },
  { name: "Mobile and Collaboration", weight: "1%", icon: "📱", nameEN: "Mobile & Collaboration" },
  { name: "Reporting", weight: "1%", icon: "📊", nameEN: "Reporting" },
];

let state = {
  screen: 'home', mode: null, selectedCategory: null,
  questions: [], currentIdx: 0, selectedOptions: [],
  answered: false, results: [], session: { correct: 0, total: 0 },
  translationCache: {}, translating: false, showTranslation: {},
};

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let wrongIds = load('appbuilder_wrongIds', []);
let favoriteIds = load('appbuilder_favoriteIds', []);
let allResults = load('appbuilder_allResults', {});
let wrongCounts = load('appbuilder_wrongCounts', {}); // {qId: totalWrongTimes} — only increments, never resets

function saveWrong() { save('appbuilder_wrongIds', wrongIds); }
function saveFavorites() { save('appbuilder_favoriteIds', favoriteIds); }
function saveResults() { save('appbuilder_allResults', allResults); }
function saveWrongCounts() { save('appbuilder_wrongCounts', wrongCounts); }

// Returns CSS level class for the badge based on wrong count
function getWrongLevel(n) {
  if (n <= 0) return '';
  if (n === 1) return 'lvl-1';
  if (n <= 3) return 'lvl-2';
  return 'lvl-3';
}
// Renders a wrong-count badge HTML string, empty string if never wrong
function wrongBadgeHtml(qId) {
  const n = wrongCounts[qId] || 0;
  if (!n) return '';
  return `<span class="q-wrong-count ${getWrongLevel(n)}">✗${n}</span>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function scrollToTop() { document.querySelector('.scroll-area').scrollTo({ top: 0, behavior: 'smooth' }); }

function render() {
  const app = document.getElementById('app');
  const stat = document.getElementById('headerStat');
  if (state.screen === 'home') { stat.textContent = '🏠 Home'; renderHome(app); }
  else if (state.screen === 'category-pick') { stat.textContent = '📚 Categories'; renderCategoryPick(app); }
  else if (state.screen === 'wrong-rank') { stat.textContent = '📊 Wrong Rank'; renderWrongRank(app); }
  else if (state.screen === 'quiz') { stat.textContent = `${state.currentIdx+1}/${state.questions.length}`; renderQuiz(app); }
  else if (state.screen === 'score') { stat.textContent = '🏆 Results'; renderScore(app); }
  scrollToTop();
}

function renderHome(app) {
  const total = Object.keys(allResults).length;
  const correct = Object.values(allResults).reduce((s,r) => s+r.correct, 0);
  const totalAns = Object.values(allResults).reduce((s,r) => s+r.total, 0);
  const acc = totalAns > 0 ? Math.round(correct/totalAns*100) : 0;

  // Build top wrong questions (sorted by wrong count desc, top 3)
  const topWrong = Object.entries(wrongCounts)
    .filter(([id, n]) => n > 0)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([id, n]) => {
      const q = QUESTIONS.find(q => q.id === parseInt(id));
      const label = q ? `Q.${q.id} ${q.question.slice(0,30)}…` : `Q.${id}`;
      return `<div class="wrong-top-item"><span class="wt-label">${label}</span><span class="wt-badge">✗${n}</span></div>`;
    }).join('');

  const maxWrong = Object.values(wrongCounts).reduce((m, n) => Math.max(m, n), 0);

  const totalWrongEver = Object.keys(wrongCounts).length;
  const sumWrong = Object.values(wrongCounts).reduce((s,n)=>s+n,0);

  app.innerHTML = `
    <div class="progress-row">
      <div class="progress-stat"><span class="progress-num">${total}</span><div class="progress-label">Answered</div></div>
      <div class="progress-stat"><span class="progress-num">${acc}%</span><div class="progress-label">Accuracy</div></div>
      <div class="progress-stat"><span class="progress-num">${wrongIds.length}</span><div class="progress-label">Review</div></div>
      <div class="progress-stat"><span class="progress-num">${favoriteIds.length}</span><div class="progress-label">⭐ Saved</div></div>
    </div>
    <div class="home-grid">
      <div class="home-card random" onclick="startRandom()">
        <div class="home-icon">🎲</div>
        <h2>Random Practice</h2>
        <p>All questions shuffled randomly</p>
        <span class="home-badge">311 Qs</span>
      </div>
      <div class="home-card category" onclick="showCategoryPick()">
        <div class="home-icon">📚</div>
        <h2>By Topic</h2>
        <p>Focus on specific exam domains</p>
        <span class="home-badge">8 Topics</span>
      </div>
      <div class="home-card wrong" onclick="startWrong()">
        <div class="home-icon">🔁</div>
        <h2>Wrong Answers</h2>
        <p>Revisit questions you missed${maxWrong > 0 ? ` · max <b>✗${maxWrong}</b>` : ''}</p>
        <span class="home-badge warn">${wrongIds.length} Qs</span>
        ${topWrong ? `<div class="wrong-top-list">${topWrong}</div>` : ''}
      </div>
      <div class="home-card favorites" onclick="startFavorites()">
        <div class="home-icon">⭐</div>
        <h2>Favorites</h2>
        <p>Questions you bookmarked</p>
        <span class="home-badge gold">${favoriteIds.length} Qs</span>
      </div>
    </div>
    <button class="home-rank-btn" onclick="showWrongRank()">
      <span class="hrb-icon">📊</span>
      <div class="hrb-body">
        <div class="hrb-title">错题排行榜</div>
        <div class="hrb-sub">${totalWrongEver > 0 ? `${totalWrongEver} 道题共答错 ${sumWrong} 次 · 按错误次数降序` : '暂无错题记录，开始练习后显示'}</div>
      </div>
      ${totalWrongEver > 0 ? `<span class="hrb-badge">TOP ${Math.min(totalWrongEver,99)}</span>` : ''}
    </button>
    <div style="height:20px"></div>`;
}

function renderCategoryPick(app) {
  const qByCat = {};
  QUESTIONS.forEach(q => { qByCat[q.category] = (qByCat[q.category]||0)+1; });
  const items = CATEGORIES.map(cat => `
    <div class="cat-item" onclick="startCategory('${cat.name.replace(/'/g,"\\'")}')">
      <span class="cat-icon">${cat.icon}</span>
      <div><div class="cat-name">${cat.nameEN}</div><div class="cat-sub">${cat.name}</div></div>
      <div class="cat-right"><span class="cat-weight">${cat.weight}</span><span class="cat-count">${qByCat[cat.name]||0} Qs</span></div>
    </div>`).join('');
  app.innerHTML = `
    <div class="section-header">
      <button class="btn-back" onclick="goHome()">← Back</button>
      <span class="section-title">Select Topic</span>
    </div>
    <div class="category-list">${items}</div>
    <div style="height:20px"></div>`;
}

function showWrongRank() { state.screen='wrong-rank'; render(); }

function renderWrongRank(app) {
  // Build sorted list: all questions with wrongCount > 0, desc by count
  const ranked = Object.entries(wrongCounts)
    .filter(([, n]) => n > 0)
    .map(([id, n]) => ({ q: QUESTIONS.find(q => q.id === parseInt(id)), n }))
    .filter(item => item.q)
    .sort((a, b) => b.n - a.n);

  const totalQuestions = ranked.length;
  const totalWrongTimes = ranked.reduce((s, item) => s + item.n, 0);
  const maxN = ranked.length > 0 ? ranked[0].n : 0;

  if (ranked.length === 0) {
    app.innerHTML = `
      <div class="rank-header">
        <button class="btn-back" onclick="goHome()">← Back</button>
        <span class="section-title">错题排行榜</span>
      </div>
      <div style="text-align:center;padding:60px 20px;color:var(--sf-muted);">
        <div style="font-size:48px;margin-bottom:16px;">🎉</div>
        <div style="font-size:15px;font-weight:700;color:var(--sf-dark);margin-bottom:8px;">暂无错题记录</div>
        <div style="font-size:12px;">开始练习后，答错的题目会在这里按错误次数排序显示</div>
      </div>`;
    return;
  }

  const items = ranked.map((item, idx) => {
    const { q, n } = item;
    const pos = idx + 1;
    const posClass = pos === 1 ? 'top1' : pos <= 3 ? 'top3' : 'rest';
    const posLabel = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : `#${pos}`;
    const rankClass = pos === 1 ? 'rank-1' : pos === 2 ? 'rank-2' : pos === 3 ? 'rank-3' : 'rank-other';
    const badgeLvl = n === 1 ? 'lvl-1' : n <= 3 ? 'lvl-2' : 'lvl-3';
    const answerText = q.correct.join(', ');
    // Bar width relative to max
    const barW = maxN > 0 ? Math.round((n / maxN) * 100) : 0;
    return `
      <div class="rank-item ${rankClass}" onclick="startSingleQuestion(${q.id})">
        <span class="rank-pos ${posClass}">${posLabel}</span>
        <div class="rank-body">
          <div class="rank-q-num">Q.${q.id} · ${getCatShort(q.category)}</div>
          <div class="rank-q-text">${q.question.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <div style="margin-top:5px;height:3px;background:var(--sf-border);border-radius:2px;overflow:hidden;">
            <div style="height:100%;width:${barW}%;background:${n>=4?'#b71c1c':n>=2?'#e53935':'#ff8a65'};border-radius:2px;transition:width 0.4s ease;"></div>
          </div>
          <div class="rank-q-answer">✔ 正确答案: ${answerText}</div>
        </div>
        <div class="rank-right">
          <span class="rank-count-badge ${badgeLvl}">✗${n}</span>
          <button class="rank-drill-btn" onclick="event.stopPropagation();startSingleQuestion(${q.id})">练习</button>
        </div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <div class="rank-header">
      <button class="btn-back" onclick="goHome()">← Back</button>
      <span class="section-title">错题排行榜</span>
    </div>
    <div class="rank-summary">
      <div class="rank-stat"><span class="rank-stat-num">${totalQuestions}</span><div class="rank-stat-label">错题数</div></div>
      <div class="rank-stat"><span class="rank-stat-num">${totalWrongTimes}</span><div class="rank-stat-label">总错误次</div></div>
      <div class="rank-stat"><span class="rank-stat-num">${maxN}</span><div class="rank-stat-label">最高错次</div></div>
      <div class="rank-stat"><span class="rank-stat-num">${(totalWrongTimes/totalQuestions).toFixed(1)}</span><div class="rank-stat-label">平均错次</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="btn-action" style="font-size:12px;padding:10px 14px;border-radius:10px;flex:1;" onclick="startRankQuiz()">▶ 按排名顺序练习全部</button>
      <button class="btn-action" style="font-size:12px;padding:10px 14px;border-radius:10px;flex:1;background:#b71c1c;" onclick="startTopWrongQuiz()">🔥 只练 Top 10 高错题</button>
    </div>
    <div class="rank-list">${items}</div>
    <div style="height:20px"></div>`;
}

// Practice all wrong-ranked questions in descending wrong-count order (no shuffle)
function startRankQuiz() {
  const ranked = Object.entries(wrongCounts)
    .filter(([, n]) => n > 0)
    .map(([id, n]) => ({ q: QUESTIONS.find(q => q.id === parseInt(id)), n }))
    .filter(item => item.q)
    .sort((a, b) => b.n - a.n)
    .map(item => item.q);
  if (!ranked.length) { alert('暂无错题记录。'); return; }
  state.mode = 'rank'; state.questions = ranked; startQuiz();
}

// Practice only top 10 most-wrong questions
function startTopWrongQuiz() {
  const ranked = Object.entries(wrongCounts)
    .filter(([, n]) => n > 0)
    .map(([id, n]) => ({ q: QUESTIONS.find(q => q.id === parseInt(id)), n }))
    .filter(item => item.q)
    .sort((a, b) => b.n - a.n)
    .slice(0, 10)
    .map(item => item.q);
  if (!ranked.length) { alert('暂无错题记录。'); return; }
  state.mode = 'rank-top10'; state.questions = ranked; startQuiz();
}

// Practice a single specific question by id (from rank list)
function startSingleQuestion(qId) {
  const q = QUESTIONS.find(q => q.id === qId);
  if (!q) return;
  state.mode = 'single'; state.questions = [q]; startQuiz();
}

function renderQuiz(app) {
  const q = state.questions[state.currentIdx];
  const total = state.questions.length;
  const pct = (state.currentIdx / total * 100).toFixed(1);
  const isMulti = q.correct.length > 1;
  const isFav = favoriteIds.includes(q.id);

  let optionsHtml = Object.entries(q.options).map(([letter, text]) => {
    let cls = 'option-btn';
    const isSelected = state.selectedOptions.includes(letter);
    if (state.answered) {
      if (q.correct.includes(letter)) cls += ' correct';
      else if (isSelected) cls += ' wrong';
    } else if (isSelected) cls += ' selected-pending';
    const check = isMulti && !state.answered ? (isSelected ? ' ☑' : ' ☐') : '';
    return `<button class="${cls}" ${state.answered?'disabled':''} onclick="selectOption('${letter}')">
      <span class="opt-letter">${letter}${check}</span><span>${text}</span></button>`;
  }).join('');

  let multiBar = '';
  if (isMulti && !state.answered) {
    const need = q.correct.length, sel = state.selectedOptions.length;
    multiBar = `<div class="multi-bar">⚠️ Select ${need} answers (${sel}/${need} chosen)
      <button class="btn-submit" ${sel===need?'':'disabled'} onclick="submitMulti()">Submit</button></div>`;
  }

  let resultBanner = '', expHtml = '', stickyNext = '';
  if (state.answered) {
    const lastResult = state.results[state.results.length-1];
    const isCorrect = lastResult && lastResult.correct;
    resultBanner = `<div class="result-banner ${isCorrect?'correct':'wrong'}">
      ${isCorrect ? '✅ Correct!' : '❌ Incorrect — Answer: ' + q.correct.join(', ')}
    </div>`;

    const showTr = state.showTranslation[q.id];
    const cached = state.translationCache[q.id];
    expHtml = `<div class="explanation-box">
      <div class="explanation-en">
        <div class="exp-header">
          <span class="exp-label">📝 Explanation</span>
          <button class="translate-btn" onclick="translateExplanation(${q.id})" ${state.translating?'disabled':''}>
            ${state.translating ? '<span class="loading-spinner"></span>' : '🌐 中文'}
          </button>
        </div>${q.explanation}
      </div>
      ${showTr && cached ? `<div class="explanation-cn"><div class="exp-header"><span class="exp-label">🇨🇳 Chinese Translation</span></div>${cached}</div>` : ''}
    </div>`;

    const isLast = state.currentIdx >= total-1;
    stickyNext = `<div class="sticky-next"><button class="btn-next" onclick="nextQuestion()">${isLast ? '🏁 See Results' : 'Next Question →'}</button></div>`;
  }

  const catIcon = getCatIcon(q.category);
  const catShort = getCatShort(q.category);
  app.innerHTML = `
    <div class="quiz-nav">
      <button class="btn-back" onclick="confirmBack()">← Back</button>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <span class="quiz-counter">${state.currentIdx+1}/${total}</span>
    </div>
    <div class="question-card">
      <div class="question-meta">
        <span class="q-num">Q.${q.id}</span>
        <span class="q-cat-tag">${catIcon} ${catShort}</span>
        ${isMulti ? `<span class="q-multi-tag">Multi (${q.correct.length})</span>` : ''}
        ${wrongBadgeHtml(q.id)}
        <button class="fav-btn" onclick="toggleFavorite(${q.id})">${isFav?'⭐':'☆'}</button>
      </div>
      <div class="question-body">${q.question}</div>
      ${multiBar}
      <div class="options-list">${optionsHtml}</div>
      ${resultBanner}${expHtml}
    </div>
    ${stickyNext}
    <div style="height:${state.answered?'0':'20px'}"></div>`;
}

function renderScore(app) {
  const { correct, total } = state.session;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  const pass = pct >= 65;
  const r = 54, circ = 2 * Math.PI * r;
  const dash = (pct/100 * circ).toFixed(1);
  app.innerHTML = `
    <div class="score-card">
      <div class="score-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="#dde2e8" stroke-width="10"/>
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="${pass?'#2e844a':'#0176d3'}"
            stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
        </svg>
        <div class="score-ring-num">${pct}%</div>
      </div>
      <div class="score-title">${pass ? '🎉 Passed!' : '📚 Keep Studying!'}</div>
      <div class="score-sub">${correct} / ${total} correct · Pass mark: 65%</div>
      <div class="score-actions">
        <button class="btn-action" onclick="restartMode()">🔄 Try Again</button>
        ${(state.mode==='rank'||state.mode==='rank-top10'||state.mode==='single') ? `<button class="btn-action" style="background:#b71c1c;" onclick="showWrongRank()">📊 返回排行榜</button>` : ''}
        ${wrongIds.length > 0 ? `<button class="btn-action" onclick="startWrong()">🔁 Review Wrong (${wrongIds.length})</button>` : ''}
        <button class="btn-action outline" onclick="goHome()">🏠 Home</button>
      </div>
    </div><div style="height:20px"></div>`;
}

function startRandom() { state.mode='random'; state.questions=shuffle(QUESTIONS); startQuiz(); }
function showCategoryPick() { state.screen='category-pick'; render(); }
function startCategory(cat) {
  state.mode='category'; state.selectedCategory=cat;
  state.questions=shuffle(QUESTIONS.filter(q=>q.category===cat));
  if (!state.questions.length) { alert('No questions found for this topic.'); return; }
  startQuiz();
}
function startWrong() {
  if (!wrongIds.length) { alert('No wrong answers yet! Start practicing first.'); return; }
  state.mode='wrong'; state.questions=shuffle(QUESTIONS.filter(q=>wrongIds.includes(q.id))); startQuiz();
}
function startFavorites() {
  if (!favoriteIds.length) { alert('No favorites saved yet. Tap ☆ on any question to bookmark it.'); return; }
  state.mode='favorites'; state.questions=shuffle(QUESTIONS.filter(q=>favoriteIds.includes(q.id))); startQuiz();
}
function restartMode() {
  if (state.mode==='random') startRandom();
  else if (state.mode==='category') startCategory(state.selectedCategory);
  else if (state.mode==='wrong') startWrong();
  else if (state.mode==='favorites') startFavorites();
  else if (state.mode==='rank') startRankQuiz();
  else if (state.mode==='rank-top10') startTopWrongQuiz();
  else goHome();
}
function startQuiz() {
  state.screen='quiz'; state.currentIdx=0; state.selectedOptions=[];
  state.answered=false; state.results=[]; state.session={correct:0,total:0};
  state.showTranslation={}; render();
}

function selectOption(letter) {
  if (state.answered) return;
  const q = state.questions[state.currentIdx];
  if (q.correct.length > 1) {
    if (state.selectedOptions.includes(letter)) state.selectedOptions=state.selectedOptions.filter(l=>l!==letter);
    else state.selectedOptions.push(letter);
    render();
  } else { state.selectedOptions=[letter]; checkAnswer(); }
}
function submitMulti() { checkAnswer(); }

function checkAnswer() {
  const q = state.questions[state.currentIdx];
  const selected = [...state.selectedOptions].sort();
  const correct = [...q.correct].sort();
  const isCorrect = JSON.stringify(selected)===JSON.stringify(correct);
  state.answered=true; state.session.total++;
  if (isCorrect) { state.session.correct++; wrongIds=wrongIds.filter(id=>id!==q.id); saveWrong(); }
  else {
    if (!wrongIds.includes(q.id)) { wrongIds.push(q.id); saveWrong(); }
    // Increment permanent wrong count — never resets
    wrongCounts[q.id] = (wrongCounts[q.id] || 0) + 1;
    saveWrongCounts();
  }
  if (!allResults[q.id]) allResults[q.id]={correct:0,total:0};
  allResults[q.id].total++; if (isCorrect) allResults[q.id].correct++;
  saveResults();
  state.results.push({id:q.id, correct:isCorrect}); render();
}

function nextQuestion() {
  if (state.currentIdx >= state.questions.length-1) { state.screen='score'; render(); return; }
  state.currentIdx++; state.selectedOptions=[]; state.answered=false; render();
}
function toggleFavorite(id) {
  if (favoriteIds.includes(id)) favoriteIds=favoriteIds.filter(f=>f!==id);
  else favoriteIds.push(id);
  saveFavorites(); render();
}
function goHome() { state.screen='home'; state.mode=null; state.questions=[]; render(); }
function confirmBack() {
  const isRankMode = state.mode==='rank'||state.mode==='rank-top10'||state.mode==='single';
  if (!state.answered && state.currentIdx===0) { isRankMode ? showWrongRank() : goHome(); return; }
  if (confirm('Stop this session and return?')) { isRankMode ? showWrongRank() : goHome(); }
}

async function translateExplanation(qId) {
  if (state.translationCache[qId]) { state.showTranslation[qId]=true; render(); return; }
  state.translating=true; render();
  const q = QUESTIONS.find(q=>q.id===qId);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`请将以下Salesforce考试题解析从英文翻译成中文（简体），只输出翻译结果：\n\n${q.explanation}`}]
      })
    });
    const data = await res.json();
    state.translationCache[qId] = data.content?.map(c=>c.text||'').join('')||'Translation failed';
    state.showTranslation[qId]=true;
  } catch(e) { state.translationCache[qId]='Error: '+e.message; state.showTranslation[qId]=true; }
  state.translating=false; render();
}

function getCatIcon(cat) { return (CATEGORIES.find(c=>c.name===cat)||{}).icon||'📋'; }
function getCatShort(cat) { return (CATEGORIES.find(c=>c.name===cat)||{}).nameEN||cat; }

render();
</script>
