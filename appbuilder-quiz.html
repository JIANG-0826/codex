  {id:179,question:"Universal Containers wants to display the real-time stock price for each Account on the Account record page.\nHow should an app builder implement this request?",options:{"A":"Create a Lightning Web Component.", "B":"Install a solution from the AppExchange.", "C":"Build a Flow that uses API calls.", "D":"Use a scheduled Apex job."},correct:["A"],explanation:"The best way to implement this request is to create a Lightning Web Component that can fetch the real-time\nstock price from an external API and display it on the Account record page. Installing a solution from the\nAppExchange may not be feasible as it may not match the exact requirements or may have additional costs.\nBuilding a Flow that uses API calls may not be efficient as it may consume API limits and may not be able to\nupdate the stock price in real-time. Using a scheduled Apex job may not be suitable as it may not be able to\nrun frequently enough to reflect the real-time stock price",category:"User Interface"},
  {id:180,question:"The CRM Manager at Universal Containers has requested that a custom text field be converted to a picklist in\norder to promote better data hygiene. What needs to be considered before changing the field type? Choose 2\nanswers",options:{"A":"Existing list views that reference the field may be deleted.", "B":"Field references will be removed in Visualforce pages", "C":"All data should be backed up before converting a text field.", "D":"Changing a field type will remove existing field history."},correct:["C", "D"],explanation:"All data should be backed up before converting a text field to a picklist, as some data may be lost or truncated\nduring the conversion. Changing a field type will remove existing field history, as the history tracking values\nare not converted",category:"Data Modeling and Management"},
  {id:181,question:"What option is available to an App Builder when defining an object-specific Create Record custom action?\nChoose 2 answers",options:{"A":"Pre-Defining field values on the target object.", "B":"Redirecting the end user to the detail page of the target object", "C":"Specifying the fields and layout of the action.", "D":"Allowingthe end user to choose the record type"},correct:["A", "C"],explanation:"The app builder has two options available when defining an object-specific Create Record custom action:\nPre-Defining field values on the target object. This means that the app builder can specify default\nvalues for certain fields on the target object when creating a new record using the custom action.\nSpecifying the fields and layout of the action. This means that the app builder can choose which fields\nto include in the action and how they are arranged on the screen. Option B and D are not options\navailable when defining an object-specific Create Record custom action.",category:"Data Modeling and Management"},
  {id:182,question:"Universal Containers has a private sharing model for Accounts and Opportunities and uses Territory\nManagement to grant access to records.\n• Sales rep A manually shares an opportunity record with sales rep B.\n• Sales rep B has access to the Account even though the Account Is NOT In sales rep B's territory.\n• Sales rep C CANNOT see either record.\nBased on the information given, why can sales rep B see the Account related to the Opportunity?",options:{"A":"Sales rep B has implicit access to the Account.", "B":"Sales rep B was added to the Account team.", "C":"Sharing set is granting access to the Account.", "D":"Account was also manually shared."},correct:["A"],explanation:"Sales rep B has implicit access to the Account because of the manual sharing of the Opportunity. Implicit\nsharing grants access to parent records when a user has access to a child record. Sales rep B was not added to\nthe Account team, sharing set is not applicable for private sharing model, and Account was not manually\nshared.",category:"Security"},
  {id:183,question:"Universal Containers wants to give sales managers the ability to quickly provide sign off on an Opportunity\nvia the Opportunity record page when a sales rep\nhas discounted a deal by 20% to 30%.\nWhich two features should be used for this requirement?\nChoose 2 answers",options:{"A":"Validation Rule", "B":"Dynamic Actions", "C":"Schema Builder", "D":"Approval Process"},correct:["B", "D"],explanation:"To facilitate quick managerial sign-off on discounted opportunities:\nB. Dynamic Actions: Allows the display of specific actions on the Opportunity record page based on\ncertain conditions, like the discount percentage.\nD. Approval Process: Configures a formal sign-off process for records meeting specific criteria, such as\ndiscount ranges between 20% to 30%.\nSteps to set up:\nConfigure an approval process for opportunities where the discount is between 20% and 30%.\nUse Dynamic Actions to conditionally show the approval action directly on the Opportunity record\npage based on the discount percentage.\n\nThis setup allows sales managers to efficiently review and approve discounted deals directly from the\nOpportunity record page.\nFor guidance on setting up approval processes and dynamic actions, refer to Dynamic Actions in Salesforce.",category:"User Interface"},
  {id:184,question:"Cloud Kicks wants to start tracking how many shoe subscriptions have been sold for each shoe catalog. A\nmaster-detail relationship exists between the Subscription__c and the Shoe__c objects.\nWhich type of field should an app builder create?",options:{"A":"Roll-up summary field", "B":"Lookup field", "C":"Master-detail relationship field", "D":"Number field"},correct:["A"],explanation:"To start tracking how many shoe subscriptions have been sold for each shoe catalog, a roll-up summary field\nshould be created. A roll-up summary field calculates values from related records on a master-detail\nrelationship. It can count, sum, min, or max numeric values from child records on a parent record.",category:"Data Modeling and Management"},
  {id:185,question:"Universal Containers wants to collaborate with its customers within Salesforce and has decided to enable the\nAllow Customer Invitations in the Chatter settings.\nWhich permission is granted to customers when invited to a Chatter group?",options:{"A":"The ability to interact with members of their groups.", "B":"The ability to @mention accounts of which they are a contact.", "C":"The ability to invite members to groups of which they are a member.", "D":"The ability to request access to public groups."},correct:["A"],explanation:"When the Allow Customer Invitations setting is enabled, customers (external users) can be invited to specific\nChatter groups as external members, allowing collaboration and communication within those groups only.\nWhy A (The ability to interact with members of their groups) is correct:Exact Extract:“External users\ninvited to Chatter groups can post, comment, and interact with members of the groups they belong to,\nbut can’t access information outside those groups.” — Salesforce Help | External Users in Chatter\nGroups\nWhy not B:External users cannot @mention accounts; they can only mention members of their groups.\nWhy not C:External users cannot invite others to groups — only internal members or group owners can.\nWhy not D:External users cannot request to join public groups unless invited.\nReferences:\nSalesforce Help | External Users in Chatter Groups\nSalesforce Help | Enable Customer Invitations\nSalesforce Platform App Builder Exam Guide | Mobile and Collaboration",category:"Mobile and Collaboration"},
  {id:186,question:"Universal Containers allows all employees to submit reviews for leadership using a custom object called\nReview. These Reviews should only be visible to the HR department and the employee who submitted the\nrecord.\nWhich three steps should an app builder take to properly control access to Reviews?\nChoose 3 answers",options:{"A":"Disable Grant Access Using Hierarchies.", "B":"Add a Master-Detail (User; field on the Review object.", "C":"Create a criteria-based Sharing Rule for the HR Department.", "D":"Remove Review Read permission from non-HR Department user Profiles.", "E":"Set organization-wide default to Private."},correct:["A", "C", "E"],explanation:"To control access to the Review custom object such that only the HR department and the submitting\nemployee can see the reviews, the following steps should be taken:\n\nA. Disable Grant Access Using Hierarchies:By default, Salesforce allows users higher in the role\nhierarchy to access records owned by users lower in the hierarchy. Since reviews should only be visible\nto HR and the submitting employee, you need to disable Grant Access Using Hierarchies on the Review\nobject to prevent anyone else in the hierarchy from automatically gaining access to these records.\nRecord Access and Role Hierarchies\nC. Create a criteria-based Sharing Rule for the HR Department:With the organization-wide default (OWD) set\nto Private, you’ll need to create a criteria-based sharing rule to ensure that HR users can view the Review\nrecords. This rule would give HR access to the records based on a specified condition, such as all records of\nthe Review object.\nReference: Sharing Rules\nE. Set organization-wide default to Private:Setting the organization-wide default (OWD) for the Review\nobject to Private ensures that no user, other than the record owner (the submitting employee) and those\nexplicitly granted access (HR), can see the Review records by default.\nReference: Organization-Wide Defaults\nWhy the other options are incorrect:\nOption B: Add a Master-Detail (User) field on the Review object:This is not necessary in this scenario\nbecause the primary relationship is about controlling access through sharing rules, not creating a master-detail\nrelationship. Moreover, this would complicate access control, which is better managed via sharing settings.\nOption D: Remove Review Read permission from non-HR Department user Profiles:This step is redundant if\nthe organization-wide default is set to Private. Profile permissions control the general ability to access the\nobject, while the visibility of specific records is controlled by sharing rules and OWD. Removing read access\nvia profiles would block all users, including the ones submitting the reviews, from accessing the object.\nIn summary, by disabling Grant Access Using Hierarchies, setting OWD to Private, and implementing a\ncriteria-based sharing rule for HR, you can ensure that only HR and the submitting employee can view\nReview records.\nReference:Record Sharing Overview",category:"Data Modeling and Management"},
  {id:187,question:"An app builder wanes to show Groups as the last navigation menu item in the mobile app. However, (he app\nbuilder is unable to select Groups as one of the items on the drop-down menu.\nWhat could cause this?",options:{"A":"Groups is available in the recent section of the navigation menu.", "B":"Groups is included m the Smart Search items butunavailable on the navigation menu.", "C":"Groups is unavailable in the selected list for the navigation menu.", "D":"Groups is available in the Chatter section of the navigation menu."},correct:["D"],explanation:"Groups is available in the Chatter section of the navigation menu, not in the selected list for the navigation\nmenu. According to the Salesforce documentation, “Groups appear in Chatter, not in Navigation Menu.”\nGroups is not available in the recent section of the navigation menu, nor is it included in the Smart Search\nitems but unavailable on the navigation menu. Groups is unavailable in the selected list for the navigation\nmenu.",category:"User Interface"},
  {id:188,question:"Ursa Major Solar (UMS) has a custom object where they track Galactic Vendors. The object has four custom\nfields for the Galactic Vendors's location:\nThe UMS's leadership wants these fields to be concatenated into a single formula field on two lines.\nWhich formula fulfills this requirement?\nA)\nB)\nC)\nD)",options:{"A":"Option A", "B":"Option B", "C":"Option C", "D":"Option D"},correct:["C"],explanation:"This formula concatenates the four custom fields for the Galactic Vendor’s location into a single text value,\nseparated by commas and spaces. The formula also uses the BR function to insert a line break after the second\nfield, creating two lines of text. Option A, B, and D are not formulas that fulfill the requirement.",category:"Data Modeling and Management"},
  {id:189,question:"Which two features can be used to allow users to access Flows?\nChoose 2 answers",options:{"A":"Quick Action", "B":"Approval Process", "C":"Flow Launcher", "D":"Apex"},correct:["A", "C"],explanation:"To allow users access to Flows, Salesforce offers multiple integration points:\nA. Quick Action: Flows can be initiated from record pages, the app utility bar, or global actions using\nQuick Actions. This allows users to execute flows relevant to specific records or global processes.\nC. Flow Launcher: A component available in Lightning App Builder that enables users to start flows\ndirectly from a Lightning page.\nSteps to set up these features:\nFor Quick Actions, navigate to Setup # Object Manager # select object # Buttons, Links, and Actions #\nNew Action # Action Type (Flow).\nFor Flow Launcher, navigate to Lightning App Builder # select the page # drag the Flow component to\nthe desired section of the page # configure it to launch the specific flow.\nFor more information on integrating Flows, check the Salesforce documentation on Flow Distribution.",category:"Business Logic and Process Automation"},
  {id:190,question:"universal containers has several large customers that sell their products through dealers. Each customer and\ndealer have an individual rep who works directly with uc and each is billed separately. How can an app\nbuilder implement these requirements?",options:{"A":"Create a single account record, add each rep as a contact and create a custom dealer object", "B":"Create both customer and dealer as accounts, add each rep as a contact on the corresponding account and create an account hierarchy.", "C":"Create a single parent record, add each rep as a contact to the parent account and add each dealer as a child record", "D":"Create both customer and dealer as accounts, create account teams on each account and associate the dealer records with the parent account."},correct:["D"],explanation:"Creating both customer and dealer as accounts, creating account teams on each account and associating the\ndealer records with the parent account would allow UC to track each customer and dealer separately, as well\nas their relationships and reps. Account hierarchy is not suitable for this scenario, as it is used to show the\nrelationships among parent and child accounts within a single company",category:"User Interface"},
  {id:191,question:"Universal Containers wants some enhancements on its Opportunity page layout to improve efficiency and\ncollaboration.\nWhich two solutions should an app builder suggest to help meet these requirements?\nChoose 2 answers",options:{"A":"Mark stage dependent fields as required on the Opportunity page layout.", "B":"Use two Tabs components to separate record information from activities.", "C":"Add a Path component with fields and instructions aligning to stages on the Opportunity.", "D":"Set up an approval process requiring manager consent at each stage of the Opportunity."},correct:["A", "C"],explanation:"Marking stage dependent fields as required on the Opportunity page layout is a good solution to improve\nefficiency and data quality, as it ensures that users enter the necessary information for each stage of the sales\nprocess. Adding a Path component with fields and instructions aligning to stages on the Opportunity is\nanother good solution to improve efficiency and collaboration, as it provides guidance and best practices for\nusers to move the Opportunity along the sales cycle. Using two Tabs components to separate record\ninformation from activities may not be an optimal solution, as it may reduce the visibility and accessibility of\nimportant data. Setting up an approval process requiring manager consent at each stage of the Opportunity\nmay not be a feasible solution, as it may introduce unnecessary delays and complexity in the sales process",category:"User Interface"},
  {id:192,question:"An app builder at Universal Containers has been asked to add the Chatter feed to a custom object record page.\nWhich approach should the app builder use?",options:{"A":"Add the standard Chatter feed component.", "B":"Add the standard related list component", "C":"Add a custom Chatter feed component", "D":"Add the Chatter feed component from the AppExchange."},correct:["A"],explanation:"Add the standard Chatter feed component is how an app builder can add the Chatter feed to a custom object\nrecord page. According to the Salesforce documentation, “The Chatter Feed component displays updates\nabout records in your org.” Add the standard related list component, add a custom Chatter feed component,\nand add the Chatter feed component from the AppExchange are not valid or necessary options.",category:"Data Modeling and Management"},
  {id:193,question:"What is the process to upgrade an unmanaged package that is currently installed in production?",options:{"A":"Uninstall the current version and install the new version.", "B":"Use the Install Wizard to install the upgrade to production.", "C":"Install the new version to a Developer org then deploy to production.", "D":"Click the update link on the Installed Packages page."},correct:["D"],explanation:"The correct method to upgrade an unmanaged package that is installed in a production environment is to use\nthe update link provided on the Installed Packages page. This process ensures that any modifications or\nadditions in the package are properly integrated without the need to uninstall the previous version, thus\npreserving existing customizations and data.\nA: Uninstalling removes all associated data and customizations, which is not advisable.\nB: The Install Wizard is used for initial installations, not upgrades.\nReference: Upgrading Unmanaged Packages on Salesforce Help",category:"Data Modeling and Management"},
  {id:194,question:"A Cloud Kicks employee submitted an opportunity for approval by their manager.\nWhat would happen if the employee attempts to edit the description field after submission?",options:{"A":"User will be presented with a 'Record Lock' notification.", "B":"User will be able to edit the description field only.", "C":"User will see the record is now owned by their manager.", "D":"User will be able to edit the name, but unable to edit the description."},correct:["A"],explanation:"If an employee attempts to edit the description field after submitting an opportunity for approval, they will be\npresented with a ‘Record Lock’ notification. This means that the record is locked for editing while it is in the\napproval process and only users with the “Modify All” permission or users above them in the role hierarchy\ncan edit it. [Source]",category:"Data Modeling and Management"},
  {id:195,question:"Universal Containers wants to create a custom checkbox formula field on the Opportunity object. This\nformula should evaluate to true if the\nfollowing conditions are met:\n* Stage is set to Negotiation/Review\n* Close Date is less than 1 week away\nWhich formula meets these requirements?\nA)\nB)\nC)\nD)",options:{"A":"Option A", "B":"Option B", "C":"Option C", "D":"Option D"},correct:["B"],explanation:"For a formula to evaluate to true when the stage is set to \"Negotiation/Review\" and the close date is less than\none week away, the correct formula is:\nOption B. This formula uses the ISPICKVAL function to check the text value of a picklist and\ncompares the CloseDate to a week from today:\nAND( I AND(\nISPICKVAL(StageName, \"Negotiation/Review\"),\nCloseDate - 7 < TODAY()\n)SPICKVAL(StageName, \"Negotiation/Review\"), CloseDate - 7 < TODAY() )\nThis formula checks that both conditions are met: it confirms the stage name is \"Negotiation/Review\" and that\nthe CloseDate is within the next 7 days from the current date.\nOption A lacks the ISPICKVAL function necessary for evaluating picklist fields. Option C uses DAY(7)\nwhich is not a valid Salesforce formula expression. Option D also uses DAY(7) incorrectly and fails to use the\nISPICKVAL function.\nReference for creating formula fields in Salesforce:\nFormula Field Reference: https://help.salesforce.com/articleView?id=sf.customize_functions.\nhtm&type=5",category:"Data Modeling and Management"},
  {id:196,question:"An app builder needs a custom solution and is considering using community. Ease of updates is the primary\nconsideration.\nWhat should the app builder consider?",options:{"A":"A managed package from AppExchange", "B":"An unmanaged package from AppExchange", "C":"An open-source unmanaged package", "D":"An open-source custom development"},correct:["A"],explanation:"A managed package from AppExchange is a custom solution that is developed by a third-party provider and\ncan be installed in Salesforce. A managed package can be easily updated by the provider without affecting the\nexisting functionality or customizations. This makes it suitable for the app builder’s requirement of ease of\nupdates. Option B, C, and D are not as easy to update as a managed package.",category:"User Interface"},
  {id:197,question:"How should an app builder configure access to a contact's Twitter profile for Salesforce mobile app users?",options:{"A":"Add a formula field to the Contact page layout.", "B":"Add an AppExchange Lightning Component to the mobile app.", "C":"Add the Twitter component to mobile view Lightning pages.", "D":"Add a Twitter Quick Action to the mobile navigation."},correct:["C"],explanation:"The Twitter component is a standard Lightning component that can be added to mobile view Lightning pages\nusing the Lightning App Builder. It displays a contact’s Twitter profile and recent tweets",category:"User Interface"},
  {id:198,question:"Universal Containers (UC) maintains information for over 2 million assets in an external system. UC needs to\naccess these assets in real-time data in Salesforce and is nearing the data storage limits.\nWhat feature could an app builder recommend UC use?",options:{"A":"Data Loader", "B":"Salesforce Connect", "C":"Salesforce to Salesforce", "D":"Data Export Wizard"},correct:["B"],explanation:"The app builder should recommend UC use Salesforce Connect to access the assets in real-time data in\nSalesforce. Salesforce Connect is a feature that allows users to view, search, and modify data that is stored\noutside Salesforce, such as in an external system. Salesforce Connect uses external objects and external data\n\nsources to integrate data from various sources without copying or synchronizing it2. This can help UC access\ntheir assets in real-time without consuming data storage limits in Salesforce. Option A, C, and D are not\nfeatures that can meet this requirement.",category:"User Interface"},
  {id:199,question:"Ursa Major Solar's service department gets requests for several types of services, such as installation, repair,\nand maintenance. Service managers need to be able to tell when maintenance was last done on on asset to help\ndetermine If they are meeting contract agreements, but the last maintenance date can be difficult to determine\nwhen there are many work orders related to the asset. They think it would be helpful to have a field autopopulated on the Asset record when a maintenance work order gets closed.\nWhat tool should an app builder recommend to help meet this requirement?",options:{"A":"Visualforce", "B":"Roll-up Summary", "C":"Apex Trigger", "D":"Flow"},correct:["D"],explanation:"A flow is an application that automates a business process by collecting data and performing operations in\nyour org or an external system. Flows can also manipulate data in your org by creating, updating, deleting, or\nsubmitting records for approval. You can use flows to update fields on related records when a certain event\noccurs, such as closing a work order. In this case, a flow can be used to update the last maintenance date field\non the Asset record when a maintenance work order gets closed.",category:"Data Modeling and Management"},
  {id:200,question:"Universal Containers wants to improve the process to create Opportunity records related to an Account. Many\nfields can be populated based on the Account record. Some fields require input from the user.\nWhat should an app builder configure to meet the requirement?",options:{"A":"Process Builder triggered from Opportunity update", "B":"Quick Action on the Account object", "C":"Quick Action on the Opportunity object", "D":"Process Builder triggered from Account update"},correct:["B"],explanation:"A quick action on the Account object can be used to create Opportunity records related to an Account. The\nquick action can pre-populate some fields based on the Account record, and also allow the user to input some\nfields. This would improve the process of creating Opportunity records",category:"Data Modeling and Management"},
  {id:201,question:"Universal Containers uses a custom object called Projects. When managers assign projects they set a custom\nfield on the project called Estimated Hours. Once set, users should be able to decrease but not increase the\nvalue\nHow can an app builder meet this requirement?",options:{"A":"Create a formula default value for the custom field.", "B":"Create a formula held that uses the PREVGROUPVAL function", "C":"Create a validation rule that uses the ISCHANGED function", "D":"Create a validation rule that uses the PRIOR VALUE function."},correct:["D"],explanation:"Create a validation rule that uses the PRIORVALUE function is how an app builder can meet the requirement\nof preventing users from increasing the value of Estimated Hours after it is set. According to the Salesforce\ndocumentation, “PRIORVALUE returns the previous value of a field.” The validation rule can compare the\ncurrent value and the prior value of Estimated Hours and display an error message if the current value is\ngreater than the prior value. Creating a formula default value for the custom field, creating a formula field that\nuses the PREVGROUPVAL function, and creating a validation rule that uses the ISCHANGED function are\nnot valid or correct solutions for this requirement.",category:"Data Modeling and Management"},
  {id:202,question:"DreamHouse Realty wants to import its property records from an external system into Salesforce. The app\nbuilder will use an external ID field to house the property ID from the external system.\nWhich two details should the app builder know when using external ID fields?\nChoose 2 answers",options:{"A":"An external ID field can be a number field.", "B":"An external ID field can be a URL field.", "C":"An external ID field can be a phone field.", "D":"An external IDfield can be a text field."},correct:["A", "D"],explanation:"An external ID field can be a number field or a text field, but not a URL field or a phone field. A URL field\nis used to store web addresses and a phone field is used to store phone numbers. An external ID field is used\nto store unique identifiers from an external system and it can be used for upsert operations",category:"Data Modeling and Management"},
  {id:203,question:"Sales Managers want to be automatically notified any time there is a change to an Opportunity Close Date and\nwant these changes to be tracked on the Opportunity.\nWhich two configurations should an app builder recommend?\nChoose 2 answers",options:{"A":"Create an Opportunity outbound message.", "B":"Use Process Builder on Opportunities and a Chatter post action.", "C":"Activate Historical Trending for Opportunities.", "D":"Enable Feed Tracking on Opportunities."},correct:["B", "D"],explanation:"Using Process Builder on Opportunities and a Chatter post action, and enabling Feed Tracking on\nOpportunities are two configurations that an app builder can recommend to meet the requirement of notifying\nand tracking changes to an Opportunity Close Date. Process Builder can create a process that triggers a\nChatter post action when the Close Date field is changed on an Opportunity. Feed Tracking can enable\ntracking of field history for the Close Date field on the Opportunity feed. Creating an Opportunity outbound\nmessage and activating Historical Trending for Opportunities are not valid configurations for this requirement.",category:"User Interface"},
  {id:204,question:"Universal Containers would like to collaborate with its customers within Salesforce, and has decided to enable\nthe \"Allow Customer Invitations\" Chatter setting. What permission is granted to Customers when invited to\nChatterGroup?",options:{"A":"The ability to invite members to groups of which they are a member", "B":"The ability to @mention accounts of which they are a contact.", "C":"The ability to request access to public groups", "D":"The ability to interact with members of their groups"},correct:["D"],explanation:"Customers who are invited to Chatter groups can only interact with members of their groups. They cannot\ninvite other members, @mention accounts, or request access to public groups",category:"Mobile and Collaboration"},
  {id:205,question:"Cloud Kicks wants to display the number of Opportunity records associated with each Account.\nWhich solution should be used?",options:{"A":"Formula field", "B":"Roll-up Summary field", "C":"AppExchange offering", "D":"Lookup field"},correct:["B"],explanation:"Opportunities are in a master-detail-like relationship with Accounts (standard lookup behaves with special\nroll-up capabilities). Salesforce provides a standard roll-up summary feature on the Account object to count\nrelated Opportunities.\nWhy B (Roll-up Summary) is correct:Exact Extract:“Use a roll-up summary field to automatically\ndisplay a value from related detail records on a master record. You can count related records, or\ncalculate the sum, min, or max of a field on those records.” — Salesforce Help | Roll-Up Summary\nFieldsOn Account, you can create a roll-up summary field to COUNT related Opportunities.\nWhy B (Roll-up Summary) is correct:Exact Extract:“Use a roll-up summary field to automatically\ndisplay a value from related detail records on a master record. You can count related records, or\ncalculate the sum, min, or max of a field on those records.” — Salesforce Help | Roll-Up Summary\nFieldsOn Account, you can create a roll-up summary field to COUNT related Opportunities.\nWhy not A:Formula fields cannot count related records.\nWhy not C:AppExchange is not required; Salesforce provides native functionality.\nWhy not D:A lookup only links records—it does not perform aggregation.\nReferences:\n\nSalesforce Help | Roll-Up Summary Fields\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:206,question:"Universal Containers has two types of applicants, hourly and salary. There are separate record types for each.\nWhile all members of the human resource department need to be able to view all applicant records, only the\nhiring Manager and VP of HR should be able to create salary applicant records.\nWhat should the app builder recommend to meet this requirement?",options:{"A":"Update the org-wide default to private and create a sharing rule for the role of recruiting manager.", "B":"Create a permission set containing the salary record type and assign it to the appropriate users.", "C":"Remove \"create\" permission for the salary applicant object for everyone except the manager and VP.", "D":"Configure the hourly record type as the default and instruct non-management users to accept the default record type."},correct:["B"],explanation:"A permission set containing the salary record type and assigning it to the appropriate users would allow only\nthose users to create salary applicant records, while still allowing all users to view all applicant records. This\nis the most granular and flexible way to meet the requirement",category:"Data Modeling and Management"},
  {id:207,question:"Universal Containers has a custom object that holds over 100 fields. The app builder wants to break up the\nfields into separate tabs on the lightning page.\nWhich Lightning component is most appropriate to fulfill this requirement?",options:{"A":"Highlights panel", "B":"Record detail", "C":"Field section", "D":"Accordian"},correct:["D"],explanation:"The \"Accordion\" Lightning component is designed to break up content into collapsible sections. This\ncomponent would be suitable for managing the visibility of large numbers of fields by grouping them into\nseparate tabs or sections that can expand and collapse. This makes navigation easier and declutters the\ninterface.\nA: Highlights panel is used for displaying key record information at the top of the page and is not\ndesigned for managing multiple fields.\nB: Record detail displays all fields on a single layout, which does not suit the requirement to break up\nthe fields.\nC: Field section does not exist as a standard Lightning component. Reference: Accordion Component in\nthe Lightning Component Library",category:"Data Modeling and Management"},
  {id:208,question:"Universal Because of the small screen, they currently have to scroll down the page to view the information for\nan account based on criteria about the related contact.\nWhich solution should an app builder use to fulfill this requirement?",options:{"A":"Set the filter type on the component visibility to display based on user permissions. using custom permission to define the dynamic criteria.", "B":"Add a related record component to the page layout", "C":"Set the component visibility to display based or an advanced filter type, using the contact field's) to define the dynamic criteria.", "D":"Hide the component behind a tab on the page layout."},correct:["C"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:209,question:"An app builder has downloaded a component from the AppExchange successfully; however, they are unable\nto add it to the Lightning home page.\nWhich two reasons can be preventing the app builder from being able to add the custom component?\nChoose 2 answers",options:{"A":"My Domain must be deployed to add custom components to the page with the App Builder.", "B":"A custom tab must be created to add custom components to the page with the App Builder.", "C":"The component requires a developer permission to add it to the page with the App Builder.", "D":"The component is tagged for record pages instead of home pages and is not showing up in the App Builder."},correct:["A", "D"],explanation:"Two reasons that can prevent an app builder from adding a custom component to the Lightning home page are\nif My Domain is not deployed, or if the component is tagged for record pages instead of home pages. My\nDomain must be deployed to add custom components to the page with the App Builder, as it enables\nLightning components and other features. The component must be tagged for home pages in its configuration\nfile, otherwise it will not show up in the App Builder for home pages",category:"User Interface"},
  {id:210,question:"Cloud Kicks wants to display the number of opportunities that are Closed Won with a Close Date within the\nlast year on the Account detail page.\nWhich tool should an app builder use to implement this?",options:{"A":"Process Builder", "B":"Activity Timeline", "C":"Roll-Up Summary Field", "D":"Workflow Rule"},correct:["C"],explanation:"A roll-up summary field is a field that calculates values from related records. A roll-up summary field can be\nused to display the number of opportunities that are closed won with a close date within the last year on the\naccount detail page by using a filter criteria on the field.",category:"User Interface"},
  {id:211,question:"Universal Containers generates leads from three different sources: web, trade shows, and partners. Some of\nthe information collected is applicable to all sources, there is also information that is unique to each type of\nlead. What should an app builder configure to meet these requirements?",options:{"A":"Create three lead record types each with its own page layout containing the relevant fields", "B":"Create a partner community and a record type for web and trade show leads", "C":"Create three sections on the lead layout and instruct users to collapse the non-relevant fields", "D":"Create custom page payouts for each type of lead only containing the relevant fields"},correct:["A"],explanation:"The solution that the app builder should configure to meet these requirements is creating three lead record\ntypes each with its own page layout containing the relevant fields. This way, the app builder can customize\nthe fields and sections that appear on each record type based on the source of the lead. Option B is incorrect\nbecause creating a partner community and a record type for web and trade show leads does not address the\nrequirement of collecting information that is unique to each type of lead, as partner community users may\nhave different fields and layouts than internal users. Option C is incorrect because creating three sections on\nthe lead layout and instructing users to collapse the non-relevant fields does not address the requirement of\ncollecting information that is unique to each type of lead, as users may still see or enter data in the wrong\nfields. Option D is incorrect because creating custom page layouts for each type of lead only containing the\nrelevant fields does not address the requirement of collecting information that is applicable to all sources, as\nusers may miss some common fields.",category:"User Interface"},
  {id:212,question:"Cloud Kicks is redefining its entire business process to convert the Manager Notes field from a long text area\nfield. The goal is to encourage managers to be more concise in their comments and stayat 255 characters or\nless. There is preexisting information in the Manager Notes field that often is well beyond the character limit.\nWhat would happen to any existing information if the app builder tries to convert a preexisting long text area\nfield to text area?",options:{"A":"Preexisting information will truncate to the first 255 characters.", "B":"Preexisting information will remain even if it was over 255 characters.", "C":"Preexisting information will cause a- e-r0- -essace to poo up.", "D":"Preexisting information in the field will be completely lost."},correct:["A"],explanation:"If the app builder tries to convert a preexisting long text area field to text area, preexisting information will\ntruncate to the first 255 characters. This means that any information beyond 255 characters will be lost.\nOption B is incorrect because preexisting information will not remain if it was over 255 characters. Option C\nis incorrect because preexisting information will not cause an error message to pop up. Option D is incorrect\nbecause preexisting information in the field will not be completely lost, only truncated.",category:"Data Modeling and Management"},
  {id:213,question:"Universal Containers (UC) requires that all users specify a contract is sent on each Opportunity prior to\nmarking it as \"Closed Won\". UC wants to be able to report on how many Opportunities have sent Contracts\ncompared to how many have a missing contract when the Opportunities closed.\nWhich field type should an app builder configure to fulfill this requirement?",options:{"A":"Text", "B":"Text Area", "C":"Picklise", "D":"Checkbox"},correct:["D"],explanation:"For tracking whether contracts have been sent for Opportunities:\nD. Checkbox. This field type allows users to clearly indicate (Yes/No) whether a contract has been sent.\nThis binary nature of checkboxes makes it simple to filter and report on Opportunities based on whether\na contract was sent.\nSteps to configure this field:\nNavigate to Setup # Object Manager # Opportunity.\nClick Fields & Relationships # New # Checkbox.\nDefine the field with a label (e.g., Contract Sent).\nSet the default value to false (unchecked).\nAdd the field to the relevant page layouts.\nThis setup facilitates accurate reporting and ensures that opportunities cannot be marked as \"Closed Won\"\nwithout indicating whether a contract was sent.\nFor guidance on creating fields, see Salesforce's documentation on Custom Field Creation.",category:"Data Modeling and Management"},
  {id:214,question:"Universal Containers (UC) utilizes two custom picklist fields called sales_Organization__c and\nPricing_Tier__c.\nWhich validation rule should an app builder use to ensure pricing_Tier__c is required for customers with a\nSales_Organization__c value of Canada?",options:{"B":"B.", "C":"C.", "D":"D."},correct:["A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Data Modeling and Management"},
  {id:215,question:"Cloud Kicks (CK) wants to track orders against inventory, ensuring its ability to fulfill order requests. CK\ncreated a junction object called Request Inventory to enable many-to-many relationships with the Inventory\nand Order objects.\nWhat does the app builder need to provide to ensure users can view Request Inventory records?",options:{"A":"Read access to both master objects.", "B":"Apex-based sharing on the first master object.", "C":"Sharing rules on Request Inventory object.", "D":"Read access to the first master object."},correct:["A"],explanation:"To view a junction object record, a user must have at least read access to both master objects. This is because\nthe junction object inherits the sharing and security settings from both master objects",category:"Data Modeling and Management"},
  {id:216,question:"A sales manager at Cloud Kicks wants the team to spend more time in the field and less time manually\nentering the information found on the business cards they collect.\nWhat should an app builder do to help achieve this goal without sacrificing data quality?",options:{"A":"Research and evaluate data enrichment products on the AppExchange to automate data entry.", "B":"Post daily to the Chatter feed any relevant fields that need to be populated.", "C":"Use Flow to create a data entry wizard to automate data entry.", "D":"Use a combination of workflow rules and formula fields to populate key fields for the sales user."},correct:["A"],explanation:"The best way to help the sales manager achieve their goal of reducing manual data entry from business cards\nis to research and evaluate data enrichment products on the AppExchange that can automate data entry. Data\nenrichment products can scan business cards, extract relevant information, and populate fields in Salesforce\nrecords. This can save time, improve data quality, and enhance productivity. Option B, C, and D are not\neffective solutions for this goal.",category:"Data Modeling and Management"},
  {id:217,question:"An app builder wants to create a report to compare the number of support cases in each status (New, Inprogress, or Closed) and by priority (Critical, High, Medium, or Low).\nWhat solution should be used for the report?",options:{"A":"Grouping", "B":"Bucket Columns", "C":"Custom Report Type", "D":"Filters"},correct:["A"],explanation:"The best solution to create a report to compare the number of support cases in each status and by priority is to\nuse grouping. Grouping allows the app builder to summarize data by one or more fields, such as status and\npriority, and display them in rows and columns. Grouping also enables the app builder to use different chart\ntypes, such as stacked bar charts or matrix charts, to visualize the data. Bucket columns are not a suitable\nsolution, as they are used to categorize data into predefined groups, such as high, medium, or low. Custom\nreport types are not a suitable solution, as they are used to define the objects and fields available for a report,\nnot how to display them. Filters are not a suitable solution, as they are used to limit the data shown in a report\nbased on certain criteria, not how to compare them",category:"User Interface"},
  {id:218,question:"DreamHouse Realty (DR) has a policy that requires the phone number on Contact to be deleted when the\nDoNotCall checkbox is checked.\nWhat automation tool should the app builder recommend?",options:{"A":"Quick action", "B":"Approval process", "C":"Validation rule", "D":"Workflow rule"},correct:["D"],explanation:"The app builder should recommend a workflow rule to automate this process. A workflow rule is a type of\nautomation tool that can execute actions based on certain criteria. In this case, the workflow rule can have a\ncriterion that evaluates if the DoNotCall checkbox is checked on a Contact record, and then execute a field\nupdate action that sets the Phone field to null. Option A, B, and C are not automation tools that can perform\nthis task.",category:"Business Logic and Process Automation"},
  {id:219,question:"An app builder has created a custom Lightning App and wants to make it available to the internal users at\nUniversal Containers.\nWhich two steps are necessary to accomplish this task?\nChoose 2 answers",options:{"A":"Add the app to a Visualforce page.", "B":"Upload the app to Static Resources.", "C":"Create a subdomain using My Domain.", "D":"Build a Custom Tab for the app."},correct:["C", "D"],explanation:"The app builder needs to do two steps to make the custom Lightning App available to the internal users at\nUniversal Containers:\nCreate a subdomain using My Domain: My Domain is a feature that allows an organization to set up a\ncustom domain name for their Salesforce instance. This is required to use custom Lightning\ncomponents and apps in Salesforce1.\nBuild a Custom Tab for the app: A custom tab is a tab that displays any custom object or web page in\nSalesforce. This is required to make the custom Lightning App accessible from the navigation menu or\napp launcher2. Option A and B are not necessary steps to make the custom Lightning App available to\nthe internal users.",category:"User Interface"},
  {id:220,question:"Universal Containers has a single Contact Lightning record page. A component takes up a lot of room on the\npage and is NOT needed by users with a Marketing profile.\nWhat should the app builder use to solve this Issue?",options:{"A":"Detail page layouts", "B":"Component visibility filter", "C":"Field-level security", "D":"AppExchange"},correct:["B"],explanation:"The feature that the app builder should use to solve this issue is component visibility filter. A component\nvisibility filter is a setting that can be applied to a Lightning component on a record page to control when the\ncomponent is hidden or displayed based on certain conditions. The app builder can use a component visibility\nfilter to hide the component from users with a Marketing profile. Option A is incorrect because detail page\nlayouts are not related to Lightning components, but rather the fields and related lists that appear on record\ndetail pages. Option C is incorrect because field-level security is not related to Lightning components, but\nrather the access level of fields for different profiles or permission sets. Option D is incorrect because\nAppExchange is not related to Lightning components, but rather an online marketplace where users can find\nand install apps and components.",category:"User Interface"},
  {id:221,question:"Universal Containers uses a custom picklist field Account Region on the account record. They want this\nregion to be reflected on all related contact records and stay in sync if the value of this field changes on the\nAccount.\nHow should an app builder meet this requirement?",options:{"A":"Create a picklist field called 'Account Region' on Contact object > Create a workflow rule to update this picklist field if the Account Region field on the Account is changed.", "B":"Create a formula field on the Contact object > Set the value of the formula to ISPICKVAL(Account. Account_Region__c).", "C":"Create a formula field on the Contact object > Set the value of the formula to TEXT(Account. Account_Region__c).", "D":"Create a text field called 'Account Region' on Contact object > Create a workflow ruleto update this picklist field if the Account Region field on the Account is changed."},correct:["C"],explanation:"Creating a formula field on the Contact object and setting the value of the formula to TEXT(Account.\nAccount_Region__c) would reflect the region of the related account on the contact record and stay in sync if\nthe value changes on the account. This is the most efficient and maintainable way to meet the\nrequirement. Creating a workflow rule or a picklist field would require additional configuration and\ncomplexity",category:"Data Modeling and Management"},
  {id:222,question:"At Universal Containers, the VP of Service has requested a visual indicator flag on each case, based on the\ncase priority. High-priority cases should be flagged red, medium-priority should be flagged yellow, and lowpriority cases should be flagged green. Which formula would accomplish this requirement? Choose 2 answers",options:{"A":"CASE(Priority, “Low”, “img/samples/flag_green.gif”, “Medium”, “img/samples/flag_yellow.gif”, “High”, “img/samples/flag_red.gif”, “/s.gif”)", "B":"IMAGE(IF(ISPICKVAL(Priority, “Low”), “img/samples/flag_green.gif”, IF(ISPICKVAL(Priority, “Medium”), “img/samples/flag_yellow.gif”, IF(ISPICKVAL(Priority, “High”), “img/samples/flag_red. gif”))), “Priority Flag”)", "C":"IF (ISPICKVAL(Priority, “Low”), “img/samples/flag_green.gif”, IF(ISPICKVAL(Priority, “Medium”), “img/samples/flag_yellow.gif”, IF(ISPICKVAL(Priority,“High”), “img/samples/flag_red.gif”, “/s. gif”)))", "D":"IMAGE (CASE( Priority, “Low”, “img/samples/flag_green.gif”, “Medium”, “img/samples/flag_yellow. gif”, “High”, “img/samples/flag_red.gif”, “Priority Flag”)"},correct:["A", "D"],explanation:"The formula for creating a visual indicator flag on each case based on the case priority should use the IMAGE\nand CASE functions. The IMAGE function returns an image for a given URL, and the CASE function\nevaluates an expression and returns a value based on that expression. Option A and D use these functions\ncorrectly, while option B and C do not.",category:"Business Logic and Process Automation"},
  {id:223,question:"Ursa Major Solar's sales team has been struggling to enter data on mobile since rollout; the team dislikes\nscrolling through all of the fields to input only the necessary data.\nHow could the app builder solve this with minimal impact to desktop users?",options:{"A":"Filter components by device using Form Factor.", "B":"Reorder the fields to make sense for the reps when in the field.", "C":"Update the training documentation with better screenshots.", "D":"Deselect the phone radio button on the Lightning record page assignment."},correct:["A"],explanation:"The best way to solve this problem is to filter components by device using Form Factor. Form Factor is an\nattribute that can be applied to components on a Lightning record page to control their visibility based on the\ndevice type, such as desktop, phone, or tablet. By using Form Factor, the app builder can hide some\ncomponents that are not relevant for mobile users, such as charts or reports, and show only the components\nthat are necessary for data entry, such as fields or actions. This way, the mobile users do not have to scroll\nthrough all the components and can enter data more easily. Reordering the fields may not solve the problem\ncompletely, as there may still be too many components on the page for mobile users. Updating the training\ndocumentation may not help either, as it does not address the root cause of the problem, which is the layout of\nthe page. Deselecting the phone radio button on the Lightning record page assignment may not be desirable,\nas it will prevent mobile users from accessing the record page at all, which may affect their productivity and\nfunctionality.",category:"Data Modeling and Management"},
  {id:224,question:"Which three options art availably when activating a Lightning page from the Lightning App Builder?\nChoose 3 answers",options:{"A":"Assign the page to a combination of apps and profiles.", "B":"Assign the page to a combination of apps and permission sets.", "C":"Make the page the org default.", "D":"Make the page the default homepage for specific roles.", "E":"Make the page the default homepage for specific apps."},correct:["A", "C", "E"],explanation:"When activating a Lightning page from the Lightning App Builder, three options are available:\nAssign the page to a combination of apps and profiles. This option allows users to specify which apps\nand profiles will see the custom Lightning page instead of the default page.\nMake the page the org default. This option makes the custom Lightning page the default for all users in\nthe org regardless of their app or profile.\nMake the page the default homepage for specific apps. This option allows users to set different\nhomepages for different apps in Lightning Experience. [Source]",category:"User Interface"},
  {id:225,question:"Universal Containers is piloting new features in an existing sandbox and wants to prevent outbound email\nsends during testing.\nWhat should the app builder do to meet the requirement?",options:{"A":"Email deliverability set to system email only.", "B":"Email configured for SMTP authentication.", "C":"Email relay to the configured host enabled.", "D":"Email deliverability set to no access."},correct:["D"],explanation:"Setting email deliverability to no access would prevent outbound email sends during testing in a sandbox.\nThis would ensure that no emails are sent to any users or external email addresses from the sandbox. Setting\nemail deliverability to system email only would still allow some emails to be sent, such as password reset\nemails or new user emails. Configuring SMTP authentication or email relay would not affect email\ndeliverability in a sandbox",category:"User Interface"},
  {id:226,question:"Universal Container wants customers to be able to open cases from a public-facing website.\nWhat should the app builder use to enable visitors to the website?",options:{"A":"Outbound message", "B":"Web-to-case", "C":"Screen flow", "D":"Email-to-case"},correct:["B"],explanation:"The app builder should use Web-to-Case to enable visitors to the website to open cases. Web-to-Case is a\nfeature that allows users to create an HTML form that can be embedded into a public-facing website. When\nvisitors fill out and submit the form, a new case is automatically created in Salesforce with the information\nfrom the form fields. Web-to-Case can also assign cases to queues or users based on predefined rules and\ncriteria. Outbound message is not a valid tool, as it does not enable visitors to open cases. An outbound\nmessage is a type of workflow action that sends a secure XML message to a designated endpoint URL when a\nrecord meets certain criteria. An outbound message can be used to integrate Salesforce with external systems\n\nor applications. Screen flow is not a valid tool, as it does not enable visitors to open cases from a publicfacing website. A screen flow is a type of flow that allows users to create an interactive guided process that\ncan collect, display, and update data from multiple objects within Salesforce. A screen flow can be embedded\ninto Lightning pages or Visualforce pages, but it cannot be exposed to unauthenticated users on a public\nwebsite. Email-to-Case is not a valid tool, as it does not enable visitors to open cases from a website. Email-toCase is a feature that allows users to create cases from email messages sent to a specific email address. Emailto-Case can also capture email attachments and thread information and associate them with the case.",category:"User Interface"},
  {id:227,question:"Universal Containers wants to understand return on investment for the latest advertising buy. They currently\nuse a private security model for all objects.\nWhat should an app builder recommend?",options:{"A":"Utilize Account Hierarchies and Roil-Up Summary fields", "B":"Run an opportunities pipeline report", "C":"Change to a public security model", "D":"Configure Campaign Hierarchies and Campaign statistics"},correct:["D"],explanation:"For Universal Containers to understand the return on investment (ROI) for their latest advertising buy while\nusing a private security model, the best recommendation is to use Campaign Hierarchies and Campaign\nstatistics.\nCampaign Hierarchies and Campaign Statistics: Campaign hierarchies allow Universal Containers to\ntrack the effectiveness and ROI of marketing efforts by grouping related campaigns (e.g., advertising\nbuys) under a parent campaign and rolling up key metrics like responses, converted leads, and won\nopportunities. Campaign statistics provide detailed insights into individual and aggregate campaign\nperformance, helping calculate ROI.\nThis method works well within a private security model since it respects existing sharing rules\nand access controls, ensuring that only authorized users can see the campaign data.\nCampaign Management Overview\nOption A (Account Hierarchies and Roll-Up Summary fields): Account hierarchies and roll-up summary\nfields focus on aggregating account-level data, which doesn’t directly support measuring the ROI of\nadvertising campaigns.\nOption B (Opportunities Pipeline Report): While an opportunities pipeline report can provide insights into\nsales, it doesn’t track campaign-related data or advertising ROI directly.\n\nOption C (Change to a Public Security Model): Changing to a public security model isn’t necessary and could\nexpose sensitive data. Campaign hierarchies and statistics work well with a private security model.\nIn summary, Campaign Hierarchies and Campaign Statistics are the recommended approach to track the ROI\nof advertising buys.\nReference:Campaign Hierarchies and Campaign ROI",category:"Data Modeling and Management"},
  {id:228,question:"An app builder wants to create a custom object and 10 fields.\nWhat should they use to create the object, fields, and relationships quickly from one place?",options:{"A":"Schema Builder", "B":"Developer Console", "C":"Manage Field Permissions", "D":"Lightning Object Creator"},correct:["A"],explanation:"To create a custom object along with multiple fields and relationships efficiently from a single interface, the\nSchema Builder is the ideal tool:\nA. Schema Builder. This graphical tool provides a drag-and-drop interface for creating and modifying\nobjects and fields in Salesforce, allowing for a visual layout of database schema.\nSteps to use Schema Builder:\nGo to Setup # Schema Builder.\nDrag the 'Object' element into the schema area to create a new custom object.\nDefine the object's properties (e.g., label, API name).\nDrag field elements like Text, Number, or Lookup into the object to create fields.\nConfigure each field's properties according to your requirements.\nConnect objects via lookup or master-detail relationships by dragging the relationship fields between\nthem.\nSave the layout to create all elements in Salesforce.\n\nFor more information, review Salesforce's Schema Builder documentation.",category:"Data Modeling and Management"},
  {id:229,question:"Ursa Major Solar wants to see the Type field from the parent object Galaxy listed on the child recordStar. The\napp builder is receiving an error stating \"Picklist values are only supported in certain functions\".\nWhat formula should an app builder use to achieve the desired result?",options:{"A":"ISPICKVAL(Galaxy__r.Type__c)", "B":"VALUE(Galaxy_r.Type__c)", "C":"TEXT(Galaxy_r.Type_c)", "D":"FIND(Galaxy__r.Type__c)"},correct:["C"],explanation:"TEXT() is a formula function that converts a picklist value to text. This can be used to display the Type field\nfrom the parent object Galaxy on the child record Star. ISPICKVAL() is used to check if a picklist value is\nequal to a specified value. VALUE() is used to convert text that represents a number to a number. FIND() is\nused to locate one text string within another text string.",category:"Data Modeling and Management"},
  {id:230,question:"Ursa Major Solar (UMS) is planning to hire some new employees. UMS wants to allow a job candidate\n(Job_Candidate__c) to apply for multiple open positions (Open_Position__c) and then be able to view the\napplications (Application__c) on the job candidate record. UMS also wants to view all the applications for a\nspecific open position.",options:{"A":"Create a master-detail relationship on Open_Position__c to Application__c.", "B":"Create a master-detail relationship field on Job_Candidate__c to Application__c.", "C":"Create a master-detail relationship field on Application__c to Job_Candidate__c.", "D":"Create a master-detail relationship field on Application__c to Open_Position__c."},correct:["C", "D"],explanation:"UMS wants each Application to connect both to a Job Candidate and an Open Position, where:\nOne Job Candidate can apply for multiple Open Positions.\n\nOne Open Position can receive multiple Applications.This is a many-to-many relationship, which in\nSalesforce is implemented by using a junction object.\nIn this case, Application__c serves as the junction object between Job_Candidate__c and Open_Position__c.\nExact Extract:\n“To create a many-to-many relationship, create two master-detail relationships on the junction object. Each\nmaster-detail relationship links the junction object to one of the objects you want to relate.” — Salesforce\nHelp | Create a Many-to-Many Relationship\nStep 1: On Application__c, create a Master-Detail relationship to Job_Candidate__c (Answer C).\nStep 2: On Application__c, create a Master-Detail relationship to Open_Position__c (Answer D).\nThis setup allows:\nViewing all Applications related to a given Job Candidate.\nViewing all Applications related to a given Open Position.\nExact Extract:\n“A junction object is a custom object with two master-detail relationships, and it is the key to building manyto-many relationships between two objects.” — Salesforce Help | Junction Object Concepts\nReferences (Salesforce Platform App Builder documentation / Study Guide topics):\nSalesforce Help | Create a Many-to-Many Relationship\nSalesforce Help | Junction Object Concepts\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:231,question:"When an opportunity has a closed date that is pushed more than 30 days, manager approval is required. An\napproval process is in place but reps frequently forget to submit for approval to run the process.\nHow can an app builder ensure that these opportunities are submitted into the approval process?",options:{"A":"Give the manager the \"API Enabled\" permission to permit approval responses by email.", "B":"Use a validation rule and an email alert to the manager requesting approval.", "C":"Submit the record for approval from an automated process.", "D":"Change the entry criteria on the approval process to criteria are met and lock the record on initial submission."},correct:["C"],explanation:"Sales reps are forgetting to manually submit the record for approval. The correct declarative solution is to\nautomate the submission when conditions are met — in this case, when the Opportunity Close Date is pushed\nmore than 30 days.\nThis can be achieved using Flow Builder or Process Builder (deprecated) to automatically submit the record\ninto the existing approval process.\nWhy C (Submit the record for approval from an automated process) is correct:Exact Extract:“You can\nautomatically submit a record for approval from a process or flow when specified criteria are met.” —\nSalesforce Help | Automate Record Approval with FlowThis ensures the approval process runs\nautomatically whenever the rule is triggered, eliminating user dependency.\nWhy C (Submit the record for approval from an automated process) is correct:Exact Extract:“You can\nautomatically submit a record for approval from a process or flow when specified criteria are met.” —\nSalesforce Help | Automate Record Approval with FlowThis ensures the approval process runs\nautomatically whenever the rule is triggered, eliminating user dependency.\nWhy not A:The “API Enabled” permission allows programmatic access; it has no impact on triggering\napprovals.\nWhy not B:A validation rule and email alert only notify; they do not submit the record into the approval\nprocess.\nWhy not D:Changing entry criteria doesn’t auto-submit; it only defines which records can enter if\nsubmitted.\nReferences:\nSalesforce Help | Automate Record Approval with Flow\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:232,question:"Managers at Universal Containers want a quick way to create additional accounts to form a hierarchy from a\nParent Account record They want to auto-populate five fields based on the parent to make it easier for users to\ncreate the child accounts quickly.\nWhat should the app builder recommend?",options:{"A":"Add Path on Account hierarchy", "B":"Add a custom link on Account", "C":"Customize a Global Quick Action", "D":"A Create a custom action"},correct:["D"],explanation:"Create a custom action is the recommended solution to meet the requirement of creating additional accounts\nto form a hierarchy from a Parent Account record. According to the Salesforce documentation, “Actions let\nusers quickly create or update records, log calls, send emails, and more, in the context of a particular object.”\nA custom action can auto-populate fields based on the parent account and make it easier for users to create\nchild accounts. Add Path on Account hierarchy, add a custom link on Account, and customize a Global Quick\nAction are not valid or feasible options.",category:"Data Modeling and Management"},
  {id:233,question:"Cloud Kicks has a sales rep who is stating that their Contact is unavailable for other users to see within\nSalesforce.\nIn which three ways can an app builder troubleshoot this issue?\nChoose 3 answers",options:{"A":"Create an Account Sharing Rule to give the users access to all records.", "B":"Confirm whether Default Organization-Wide Sharing Settings provide access to the Account.", "C":"Review the Contact record and ensure it is linked to an Account.", "D":"Verify the users with the issue have access to the Contact object.", "E":"Create a new Contact and have the users try again."},correct:["B", "C", "D"],explanation:"To troubleshoot the issue of a contact being unavailable for other users to see, an app builder should check the\nfollowing things:\nConfirm whether Default Organization-Wide Sharing Settings provide access to the Account. This\nsetting determines the baseline level of access that users have to each other’s records.\nReview the Contact record and ensure it is linked to an Account. Contacts that are not linked to an\naccount are private and only visible to the owner and administrators.\nVerify the users with the issue have access to the Contact object. Users need to have at least read\npermission on the Contact object to view contact records. Option A and E are not relevant for\ntroubleshooting this issue.",category:"User Interface"},
  {id:234,question:"Cloud Kicks works on an annual subscription model. When a sale rep marks an opportunity as closed won, a\nnew opportunity should automatically be created for the renewal. The contracts team works outside of\nsalesforce but also needs to be notified about closed deals in order to initial the contract process with the\ncustomer.\nWhich automation solution would meet these requirements?",options:{"A":"Approval Process", "B":"Outbound Message", "C":"Validation Rule", "D":"Record-triggered flow"},correct:["D"],explanation:"A record-triggered flow can be used to automate actions when a record is created or updated. In this case, a\nrecord-triggered flow can be configured to create a new opportunity and send an email to the contracts team\nwhen an opportunity is marked as closed won.",category:"Business Logic and Process Automation"},
  {id:235,question:"Universal Containers has several new fields they've requested for the Opportunity Product object.\nWhat should an app builder be able to configure using a formula field?",options:{"A":"A hyperlink to the parent Account of the parent Opportunity.", "B":"A Rich Text area field that uses HTML to bold certain characters.", "C":"A combination of the Opportunity's Text and a Description fields.", "D":"A mix of functions and concatenation of 10 Account fields and 10 Opportunity fields."},correct:["C"],explanation:"Formula fields in Salesforce can use various functions including text, mathematical, and logical functions to\ncreate simple or complex expressions. They can handle data from fields of the same record. Option C, \"A\ncombination of the Opportunity's Text and a Description fields,\" is a valid configuration for a formula field as\nit involves simple concatenation of text fields, which is supported.\nOptions A, B, and D exceed the capabilities of formula fields:\n\nA: Hyperlinks to other objects using formula fields do not directly support navigation to parent records\nof a different object.\nB: Rich Text and HTML formatting are not supported in formula fields.\nReference: Formula Field Overview on Salesforce Developer Guide",category:"Data Modeling and Management"},
  {id:236,question:"A business user wants a quick way to edit a record's status and enter a custom due date field from the record's\nfeed in Salesforce Mobile App.\nWhat should be used to accomplish this?",options:{"A":"Custom action", "B":"Custom button", "C":"Custom quick access link", "D":"Custom URL formula Field"},correct:["A"],explanation:"To allow quick editing of a record's status and entering a due date from the record's feed in the Salesforce\nMobile App:\nA. Custom action. This option enables users to perform specific tasks directly from the record page in\nthe Salesforce Mobile App, such as editing fields.\nSteps to create a custom action:\nNavigate to Setup # Object Manager # select the relevant object.\nClick Buttons, Links, and Actions # New Action.\nSet Action Type to 'Update a Record'.\nConfigure the action layout to include the Status and Custom Due Date fields.\nAdd the action to the Salesforce Mobile layout.\nThis setup provides an efficient way for users to update key fields without navigating away from the record\nfeed.\nFor detailed setup instructions, see Salesforce's documentation on Creating Quick Actions.",category:"Data Modeling and Management"},
  {id:237,question:"UVC's CFO has asked that all deals with more than a 40%discount get automatically sent to the VP of\nFinance. He will review these deals without the sales rep needing to take action. Which two ways can this be\naccomplished without building code? Choose two answers",options:{"A":"Launch a new approval process that has automatic submission enabled as an initial submission action", "B":"Create a new process with a submit for approval action to automatically submit deals for approval", "C":"Create a new approval process that has automatic submission enabled in the entry criteria", "D":"Launch a flow that uses the submit for approval action to submit deals for approval"},correct:["A", "C"],explanation:"Launch a new approval process that has automatic submission enabled as an initial submission action, and\nCreate a new approval process that has automatic submission enabled in the entry criteria. These are correct\nbecause both options allow the deals to be automatically submitted for approval without requiring any action\nfrom the sales rep. The automatic submission can be configured either as an initial submission action or as\npart of the entry criteria",category:"Data Modeling and Management"},
  {id:238,question:"Ursa Major Solar (UMS) uses a public sharing model for accounts. UMS would like to move to a more\nrestrictive sharing model but wants the Sales team to continue to have access to all account records with the\nsales record type.\nWhich two actions should an app builder complete to implement this change?\nChoose 2 answers",options:{"A":"Update the Sales profile.", "B":"Update the organization-wide defaults", "C":"Create a criteria-based sharing rule.", "D":"Create an owner-based sharing rule."},correct:["B", "C"],explanation:"Update the organization-wide defaults and create a criteria based sharing rule are two actions that an app\nbuilder should complete to implement the change of moving to a more restrictive sharing model while\nallowing the Sales team to access all account records with the sales record type. Updating the organizationwide defaults can set the baseline level of access for accounts, and creating a criteria based sharing rule can\n\ngrant additional access based on record type. Updating the Sales profile and creating an owner-based sharing\nrule are not necessary or sufficient actions for this change.",category:"Data Modeling and Management"},
  {id:239,question:"Universal Containers (UC) wants to test code against a subset of production data that is under 5 GB.\nAdditionally, UC wants to refresh this sandbox every weekend.\nWhich type of sandbox should be used to accomplish this?",options:{"A":"Developer Pro", "B":"Partial Copy", "C":"Full Copy", "D":"Developer"},correct:["B"],explanation:"To test code against a subset of production data under 5 GB and to refresh the sandbox environment weekly,\nthe most suitable type of sandbox is:\nPartial Copy (B). A Partial Copy sandbox includes a copy of your production org’s metadata and a\nsubset of your production data as defined by the sandbox template. It allows up to 5 GB of data and can\nbe refreshed every 5 days, making it ideal for scenarios where a representative sample of production\ndata is needed for testing without the storage and refresh limitations of a Full Copy sandbox.\nDeveloper Pro (A) and Developer (D) sandboxes also allow for testing and development but do not include a\nsubset of production data—they either have no data or only limited sample data. A Full Copy sandbox (C)\nprovides a full replica of production data, far exceeding the 5 GB requirement and generally is refreshed less\nfrequently due to larger data volume and longer copy times.\nReference for sandbox types and their capabilities:\nSandbox Types and Templates: https://help.salesforce.com/articleView?id=sf.\ndata_sandbox_implementation_tips.htm&type=5",category:"App Deployment"},
  {id:240,question:"Cloud Kicks asked the app builder to insert a list of 25,000 records using deduplication for the\nRace_Track__c customobject.\nWhich tool should be used?",options:{"A":"Import Wizard", "B":"Lightning Object Creator", "C":"Data Loader", "D":"Schema Builder"},correct:["C"],explanation:"Cloud Kicks needs to insert 25,000 records with deduplication for the Race_Track__c custom object. Here's\nthe reasoning for choosing Data Loader:\nData Loader: This is the appropriate tool for importing large volumes of data (up to 5 million records)\ninto Salesforce. It also provides deduplication options through Salesforce’s native matching rules or by\nimplementing external checks. Data Loader is highly scalable, and for 25,000 records, it is well-suited\nbecause it can handle more than the Import Wizard's record limits.\nOption A (Import Wizard): The Import Wizard is not a good choice here because it supports up to\n50,000 records, which may seem acceptable. However, it is generally recommended for smaller data\nimports, and deduplication options are limited compared to what Data Loader offers. Additionally, for\nbulk operations like 25,000 records, Data Loader is more efficient and robust.\nImport Wizard Limitations\nOption B (Lightning Object Creator): This tool is used to create custom objects from spreadsheets and is not\ndesigned for bulk data loading or deduplication. It’s not appropriate for large data imports.\nOption D (Schema Builder): Schema Builder is a tool used to view and modify the structure of objects and\nfields in Salesforce, not for data import or deduplication purposes.\nIn summary, Data Loader is the most appropriate tool for importing a large number of records with\ndeduplication needs.\nReference:Data Loader OverviewImport Wizard vs Data Loader",category:"Data Modeling and Management"},
  {id:241,question:"The VP of Sales at Universal Containers has asked the app builder to let sales reps create opportunity records\ndirectly from the account, with a number of fields pre-populated.\nWhich feature should the app builder use to allow users to create the opportunity?",options:{"A":"A quick action", "B":"A default action", "C":"A custom button", "D":"A custom link"},correct:["A"],explanation:"The feature that the app builder should use to allow users to create the opportunity is a quick action. A quick\naction is a type of custom button or link that can create or update records, log calls, send emails, or launch\nflows from a record page or a global menu. The app builder can create a quick action on the account object\nthat creates an opportunity record with pre-populated fields. Option B is incorrect because a default action is\nnot a valid term, but rather a standard action that appears on every record page by default, such as Edit or\nDelete. Option C is incorrect because a custom button is not suitable for this requirement, as custom buttons\ncan only display a URL or execute JavaScript when clicked. Option D is incorrect because a custom link is\nnot suitable for this requirement, as custom links can only display a URL or execute JavaScript when clicked.",category:"Data Modeling and Management"},
  {id:242,question:"Northern Trail Outfitters uses a custom object to track travel requests. Rangers want to have automatic posts\non a record whenever a travel request has been approved.\nWhich feature should be used to accomplish this?",options:{"A":"Auto-response rule", "B":"Workflow rule", "C":"Feed tracking", "D":"Feed quick action"},correct:["C"],explanation:"To have automatic posts on a record whenever a travel request has been approved, feed tracking should be\nused. Feed tracking enables field updates to be displayed in the Chatter feed of a record or a user profile.\nUsers can follow records or users to see updates in their own feed. Feed tracking can be enabled for standard\nor custom objects and selected fields.",category:"Data Modeling and Management"},
  {id:243,question:"An app builder has created a new report type but users are unable to select it from the Report Type list when\nmaking a new report for records they own.\nWhat could be causing this issue?",options:{"A":"Access to the necessary object is unavailable.", "B":"The report type is in a status of Deployed.", "C":"Access to Create and Customize Reports is disabled.", "D":"The report type is in a status of in Development."},correct:["D"],explanation:"A report type that is in a status of In Development is not available for users to select when creating a new\nreport. The app builder needs to change the status to Deployed to make it visible to users",category:"User Interface"},
