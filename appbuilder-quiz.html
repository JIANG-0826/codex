  {id:244,question:"Cloud Kicks wants to efficiently Increase the company's adoption of Salesforce while simultaneously moving\naway from their reliance on spreadsheets. An app builder is given a spreadsheet everyone is sharing that needs\nto be added to Salesforce. The object with fields needs to be created and the data inserted simultaneously.\nWhich tool should be used?",options:{"A":"Import Wizard", "B":"Lightning Object Creator", "C":"Data Loader", "D":"Schema Builder"},correct:["B"],explanation:"Lightning Object Creator is a tool that allows app builders to create an object with fields and import data from\na spreadsheet simultaneously. Import Wizard and Data Loader are tools for importing data into existing\nobjects, not creating new objects. Schema Builder is a tool for creating and modifying objects and fields, but\nnot importing data.",category:"Data Modeling and Management"},
  {id:245,question:"Cloud Kicks (CK) tracks the support level of its customers on the account record page. CK wants to show a\ntext notification on a case record page when the related account is a platinum-level customer.\nHow could an app builder meet this requirement?",options:{"A":"Add a rich text area to the Case Lighting page > Set the component visibility of the rich text area to show when the account support level is platinum.", "B":"Create a text-only Visualforce page > Drag the Visualforce component into the Case page layout > Set its visibility to show when the account support level is platinum.", "C":"Create a text-only Visualforce page > Clone the case page layout > Drag the Visualforce component into the page, and assign the layout to platinum cases.", "D":"Clone the Case Lightning page > Add a rich text area to the new page, and assign this page to platinum accounts."},correct:["B"],explanation:"A text-only Visualforce page can be used to show a text notification on a case record page based on a\ncondition. The Visualforce component can be dragged into the Case Lightning page and its visibility can be\nset to show when the account support level is platinum. This is the simplest and most flexible way to meet the\nrequirement",category:"User Interface"},
  {id:246,question:"An app builder at Northern Trail Outfitters created a sandbox template for Accounts, Projects, and Project\nMilestones to reconfigure some flows for the project management app.\nWhich type of testing environment should the app builder create?",options:{"A":"Developer Pro", "B":"Partial Copy", "C":"Developer", "D":"Scratch Org"},correct:["B"],explanation:"A Partial Copy Sandbox is designed for testing and development with a subset of production data based on a\nsandbox template. Since the question mentions that a sandbox template was created for certain objects\n(Accounts, Projects, Project Milestones), the environment must support template-based sampling, which only\nPartial Copy and Full sandboxes do.\nWhy B (Partial Copy) is correct:Exact Extract:“A Partial Copy sandbox includes your organization’s\nmetadata and a sample of your production data as defined by a sandbox template. Use it for quality\nassurance tasks, integration testing, and user training.” — Salesforce Help | Sandbox Types and\nTemplatesDeveloper and Developer Pro sandboxes do not support sandbox templates.\nWhy B (Partial Copy) is correct:Exact Extract:“A Partial Copy sandbox includes your organization’s\nmetadata and a sample of your production data as defined by a sandbox template. Use it for quality\nassurance tasks, integration testing, and user training.” — Salesforce Help | Sandbox Types and\nTemplatesDeveloper and Developer Pro sandboxes do not support sandbox templates.\n\nWhy not A or C:Developer and Developer Pro contain metadata only — no data templates or sample\ndata.\nWhy not D:Scratch Orgs are for source-driven development and are not created from sandbox templates.\nReferences:\nSalesforce Help | Sandbox Types and Templates\nSalesforce Platform App Builder Exam Guide | App Deployment",category:"App Deployment"},
  {id:247,question:"Which opportunity standard field is available to be configured directly? Choose3",options:{"A":"Forecast category", "B":"Stage", "C":"Lead source", "D":"Type"},correct:["B", "C", "D"],explanation:"The opportunity standard fields that are available to be configured directly are Stage, Lead Source, and Type.\nThese fields can be modified by editing their picklist values, adding or removing values, or changing their\ndefault values. Option A is incorrect because Forecast Category is not a standard field on the opportunity\nobject, but rather a system field that is automatically derived from the Stage field.",category:"Data Modeling and Management"},
  {id:248,question:"Universal Containers (UC) has a time-sensitive need for a custom component to be built in 4 weeks; UC\ndevelopers require additional enablement to complete the work and are backlogged by several months.\nWhich option should an app builder suggest to meet this requirement?",options:{"A":"Use an AppExchange solution.", "B":"Build a screen flow page.", "C":"Build a Lightning record page.", "D":"Use a Boit solution"},correct:["A"],explanation:"An AppExchange solution is a pre-built application or component that can be installed from the Salesforce\nAppExchange, which is an online marketplace for Salesforce products. AppExchange solutions can help you\nmeet your business needs quickly and efficiently, without requiring much development effort or expertise.\nYou can browse and search for AppExchange solutions by category, industry, rating, price, and more.",category:"User Interface"},
  {id:249,question:"Universal Containers has a custom picklist called Support Level on the Account object. They would like to\nshow the real-time value of Support Level on all case records.\nHow should an app builder implement this requirement?",options:{"A":"Create a formula field on the Case object using the TEXT function.", "B":"Create a formula field on the Account object using the ISPICKVAL function.", "C":"Create a Process Builder and use a field update on the Case object.", "D":"Create a roll-up summary field using Support Level on the Account object."},correct:["A"],explanation:"The best way to implement this requirement is to create a formula field on the Case object using the TEXT\nfunction. A formula field can display the value of another field from a related object, such as the Account\nobject. The TEXT function can convert a picklist value into text, which can be displayed on the Case record.\nCreating a formula field on the Account object using the ISPICKVAL function is not a valid solution, as it\ndoes not show the value of Support Level on the Case record. The ISPICKVAL function is used to check if a\npicklist field has a certain value, not to display it. Creating a Process Builder and using a field update on the\nCase object is not an optimal solution, as it requires more configuration and maintenance than a formula field.\nA Process Builder may also introduce delays or errors in updating the field value. Creating a roll-up summary\nfield using Support Level on the Account object is not a valid solution, as it does not show the value of\nSupport Level on the Case record. A roll-up summary field is used to aggregate numeric values from child\nrecords, not to display picklist values.",category:"Data Modeling and Management"},
  {id:250,question:"Universal Containers wants to track installation information once a container has been purchased on a custom\nobject. Sales reps should have visibility of all the installations associated with their opportunities.\nWhich kind of relationship should this new object have to Opportunity?",options:{"A":"Many to Many", "B":"Master-Detail", "C":"Hierarchical", "D":"Lookup"},correct:["B"],explanation:"The new custom object (“Installation__c”) must store installation details that are related to an Opportunity.\nSince each installation should be tied directly to a single opportunity, and inherit ownership and visibility\nfrom that opportunity (as per “sales reps should have visibility”), a Master-Detail relationship is appropriate.\nWhy B (Master-Detail) is correct:Exact Extract:“In a master-detail relationship, the detail record\ninherits the sharing and security settings of its master record.” — Salesforce Help | Relationships\nOverviewBecause Opportunities already have ownership and sharing settings that determine sales reps’\nvisibility, making Installation__c the detail record ensures that sales reps automatically see related\ninstallations.Exact Extract:“The master-detail relationship closely links objects so that the master record\ncontrols certain behaviors of the detail record, such as record ownership, sharing, and deletion.” —\nSalesforce Help | Master-Detail Relationships\nWhy B (Master-Detail) is correct:Exact Extract:“In a master-detail relationship, the detail record\ninherits the sharing and security settings of its master record.” — Salesforce Help | Relationships\nOverviewBecause Opportunities already have ownership and sharing settings that determine sales reps’\nvisibility, making Installation__c the detail record ensures that sales reps automatically see related\ninstallations.Exact Extract:“The master-detail relationship closely links objects so that the master record\ncontrols certain behaviors of the detail record, such as record ownership, sharing, and deletion.” —\nSalesforce Help | Master-Detail Relationships\nWhy not A (Many to Many):Many-to-many relationships are only used when multiple records on both\nsides need to relate (e.g., Opportunities linked to multiple Installations and vice versa). That is not\ndescribed here.\nWhy not C (Hierarchical):Hierarchical relationships are only available on the User object.\nWhy not D (Lookup):Lookup relationships do not automatically grant visibility or inherit ownership, so\nsales reps might not see all related installations.\nReferences (Salesforce Platform App Builder documentation / Study Guide topics):\nSalesforce Help | Relationships Overview\nSalesforce Help | Master-Detail Relationships\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:251,question:"DreamHouse Realty (DR) has many properties for sale and wants to identify the highest value of all Offer__c\nrecords on each Property__c record.\nWhich solution should the app builder use to meet DR's needs provided that there is a master-detail\nrelationship between the objects?",options:{"A":"Roll-up Summary", "B":"Rich Text Area", "C":"Text Area (Long)", "D":"Multi-select Picklist"},correct:["A"],explanation:"Since there is a master-detail relationship between Property__c (master) and Offer__c (detail), Salesforce\nnatively supports using Roll-up Summary fields on the master object to summarize values from the related\nchild records.\nWhy A (Roll-up Summary) is correct:Exact Extract:“A roll-up summary field calculates values from\nrelated records, such as those in a related list, on a master record. You can count the number of related\nrecords, determine the sum, minimum, or maximum value of a field in the related records.” —\nSalesforce Help | Roll-Up Summary FieldsTherefore, DR can create a Roll-up Summary field on\nProperty__c that uses the MAX function on the “Offer Value” field from Offer__c.\nWhy A (Roll-up Summary) is correct:Exact Extract:“A roll-up summary field calculates values from\nrelated records, such as those in a related list, on a master record. You can count the number of related\nrecords, determine the sum, minimum, or maximum value of a field in the related records.” —\nSalesforce Help | Roll-Up Summary FieldsTherefore, DR can create a Roll-up Summary field on\nProperty__c that uses the MAX function on the “Offer Value” field from Offer__c.\nWhy not B, C, or D:\nRich Text Area and Text Area (Long) store text, not calculated numeric data.\nMulti-select Picklist is used for multiple selectable text options, not calculations.\nReferences:\nSalesforce Help | Roll-Up Summary Fields\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:252,question:"A custom field on an account is used to track finance information about a customer. Only members of the\nFinance Team have access to this field. However, the business wants to allow one customer service agent,\nwho is assigned the customer service profile, read-only access to this field for special circumstances. What is\nthe recommended solution to grant the customer service agent access to the field?",options:{"A":"Create a permission set that allows read-only access to the field via Field Level Security and assign it to the agent.", "B":"Create a new profile to allow for read-only access to the field via Field Level Security and assign it to the agent", "C":"Update the Customer Service Profile already assigned to the agent to allow for read-only access to the field via Field Level Security", "D":"Update the custom field’s Field Level Security in setup to allow the agent read-only access to the field."},correct:["A"],explanation:"The recommended solution to grant the customer service agent access to the field is creating a permission set\nthat allows read-only access to the field via Field Level Security and assigning it to the agent. A permission\nset is a collection of settings and permissions that give users access to various tools and functions. Field Level\nSecurity (FLS) is a setting that controls the access level of fields for different profiles or permission sets. The\napp builder can create a permission set that grants read-only access to the custom field on the account object\nvia FLS and assign it to the agent. Option B is incorrect because creating a new profile to allow for read-only\naccess to the field via FLS and assigning it to the agent is not recommended, as profiles are used to define the\nbaseline permissions and settings for a group of users, and creating multiple profiles for individual users can\nbe hard to maintain. Option C is incorrect because updating the Customer Service Profile already assigned to\nthe agent to allow for read-only access to the field via FLS is not recommended, as this will affect all users\nwho have the same profile, which may violate the security policy. Option D is incorrect because updating the\ncustom field’s FLS in setup to allow the agent read-only access to the field is not possible, as FLS can only be\nset at the profile or permission set level, not at the user level.",category:"Data Modeling and Management"},
  {id:253,question:"Cloud Kicks wants to know the total value of all won Opportunities for Accounts and display it on the record.\nWhat type of summary should the app builder use in the roll-up summary field?",options:{"A":"Count", "B":"Q Max", "C":"Sum", "D":"Min"},correct:["C"],explanation:"The app builder should use Sum as the type of summary in the roll-up summary field. A Sum type of\nsummary allows the app builder to calculate the total value of a numeric field from the child records related to\na parent record by a master-detail relationship. The app builder can create a roll-up summary field on the\nAccount object that sums the Amount field from the won Opportunities related to each Account. Count is not\na valid type of summary, as it does not calculate the total value of a numeric field. A Count type of summary\nallows the app builder to count the number of child records related to a parent record by a master-detail\nrelationship. Max is not a valid type of summary, as it does not calculate the total value of a numeric field. A\nMax type of summary allows the app builder to display the largest value of a numeric or date field from the\nchild records related to a parent record by a master-detail relationship. Min is not a valid type of summary, as\nit does not calculate the total value of a numeric field. A Min type of summary allows the app builder to\ndisplay the smallest value of a numeric or date field from the child records related to a parent record by a\nmaster-detail relationship.",category:"Data Modeling and Management"},
  {id:254,question:"A recently refreshed partial sandbox at Cloud Kicks has no data In the custom object Shipping. Checking In\nproduction, there are two million rows of data in the object.\nWhat could be the reason the data Is missing?",options:{"A":"The sandbox was refreshed too early.", "B":"The selected objects in the sandbox template.", "C":"The Partial sandbox is at capacity.", "D":"The sandbox is still populating data."},correct:["B"],explanation:"The selected objects in the sandbox template. This is correct because a partial sandbox only copies a subset of\ndata from production, and the data to be copied is determined by the sandbox template. If the Shipping object\nwas not selected in the template, then its data would not be copied to the sandbox",category:"Data Modeling and Management"},
  {id:255,question:"The brokers at DreamHouse Realty (DR) are having an Issue when using the Salesforce mobile app on their\n(Phones. There are several key fields on the contact record they need access to at a glance. Because of the\nsmall screen, they currently have to scroll down the page to view the information.\nWhat should the app builder at DR use to configure the Salesforce mobile app to show these key fields at the\ntop of the screen?",options:{"A":"Compact layout", "B":"Record Detail component", "C":"Object specific action", "D":"Mobile navigation"},correct:["A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Data Modeling and Management"},
  {id:256,question:"Cloud Kicks (CK) switched to Lightning Experience and started using Chatter across its global workforce to\nsupport its fast-paced sales cycle. CK loves Chatter but struggle with gathering feedback from core team\nmembers, including understanding who is available to respond.\nWhich two ways could CK use Chatter to solve this problem?\nChoose 2 answers",options:{"A":"Streams", "B":"Polls", "C":"Out of Office", "D":"Topics"},correct:["B", "C"],explanation:"Polls and Out of Office are two ways that CK can use Chatter to gather feedback and understand availability.\nPolls allow users to create surveys and collect opinions from other users. Out of Office lets users set a status\nmessage and an end date to inform others when they are away or busy. Streams and Topics are not related to\nthe problem.",category:"Mobile and Collaboration"},
  {id:257,question:"Universal Containers created a 'New Task' custom action on the Opportunity object. The action was added to\nall page layouts in the Mobile & Lightning Actions section.\nWhich Lightning component should the app builder add to the layout to display the action?",options:{"A":"Related record", "B":"Related lists", "C":"Highlights panel", "D":"Activities"},correct:["C"],explanation:"The best Lightning component to add to the layout to display the ‘New Task’ custom action is Highlights\npanel. This component shows key information and actions for a record, such as its name, owner, and custom\nactions. Related record, related lists, and activities are not Lightning components that display custom actions.\nSee [this article] for more information on Highlights panel.",category:"Data Modeling and Management"},
  {id:258,question:"At Ursa Major Solar, there is a single Lightning record page for the Celestial Bodies custom object; however,\nthere is a Lightning component the app builder wants to restrict to mobile app users.\nWhich feature on the Lightning app builder should be utilized?",options:{"A":"Chatter feed", "B":"Highlights panel", "C":"Component visibility filter", "D":"Related list quick links"},correct:["C"],explanation:"Component visibility filter is the feature on the Lightning app builder that should be utilized to restrict a\nLightning component to mobile app users. According to the Salesforce documentation, “Use component\nvisibility filters to show or hide components on a record page based on field values or user profile.” Chatter\nfeed, highlights panel, and related list quick links are not features for controlling component visibility, but\nstandard components that can be added to a record page.",category:"Data Modeling and Management"},
  {id:259,question:"A Cloud Kicks employee submitted an opportunity for approval by their manager.\nWhat will happen if the employee attempts to edit the description field after submission?",options:{"A":"User will be presented with a 'Record Lock' notification.", "B":"User will be able to edit the description field only.", "C":"User will be able to edit the name, but unable to edit the description.", "D":"User will see the record is now owned by their manager."},correct:["A"],explanation:"When a record is submitted for approval, Salesforce automatically locks it, preventing further edits until it is\napproved, rejected, or recalled.\nWhy A (Record Lock) is correct:Exact Extract:“When a record is submitted for approval, Salesforce\nautomatically locks the record to prevent users from editing it unless they have ‘Modify All Data’\npermission or are designated as an approver.” — Salesforce Help | Approval Processes OverviewThus,\nthe user will receive a message indicating that the record is locked and cannot be edited.\nWhy A (Record Lock) is correct:Exact Extract:“When a record is submitted for approval, Salesforce\nautomatically locks the record to prevent users from editing it unless they have ‘Modify All Data’\npermission or are designated as an approver.” — Salesforce Help | Approval Processes OverviewThus,\nthe user will receive a message indicating that the record is locked and cannot be edited.\nWhy not B or C:Once locked, no field (including Description) is editable by the submitter.\nWhy not D:Ownership does not change upon approval submission.\nReferences:\nSalesforce Help | Approval Processes Overview\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:260,question:"What should an app builder consider when choosing a template for a new Lightning record page?",options:{"A":"The template is unable to be changed after the initial save.", "B":"To view the record page, users need \"View All Data\" permissions for the object.", "C":"A Page structure will automatically adapt to the device being used to view the record page.", "D":"Select a new template for each type of device users use to view the record page."},correct:["C"],explanation:"A template for a new Lightning record page determines how the page is divided into regions. The template is\nresponsive and will automatically adapt to the device being used to view the record page. The template can be\nchanged after the initial save, and users do not need “View All Data” permissions for the object",category:"User Interface"},
  {id:261,question:"Cloud Kicks (CK) wants to quickly insert a list of over 60,000 net new Accounts. The template based on CK's\ndata model was used to populate the list.\nWhich tool should be used?",options:{"A":"Data Loader", "B":"A Lightning Object Creator", "C":"Import Wizard", "D":"Schema Builder"},correct:["A"],explanation:"The app builder should use Data Loader to quickly insert a list of over 60,000 net new Accounts. Data Loader\nis a tool that allows users to insert, update, delete, or export large amounts of data from Salesforce using CSV\nfiles or database connections. Data Loader can handle up to 5 million records at a time and supports features\nsuch as bulk API, batch operations, mapping files, etc. Data Loader is ideal for loading large data sets into\nSalesforce quickly and efficiently. Lightning Object Creator is not a valid tool, as it cannot insert data into\nexisting objects. Lightning Object Creator is a tool that allows users to create custom objects from spreadsheet\ndata by uploading a file and mapping columns to fields. It cannot load data into existing objects or handle\nmore than 500 records at a time. Import Wizard is not a valid tool, as it cannot handle more than 50,000\nrecords at a time. Import Wizard is a tool that allows users to insert, update, or delete data from Salesforce\nusing CSV files or Excel files. Import Wizard supports standard objects and some custom objects and\nprovides features such as field mapping, duplicate detection, data validation, etc. Import Wizard is ideal for\nloading small data sets into Salesforce with more control and accuracy.",category:"Data Modeling and Management"},
  {id:262,question:"Universal Containers (UC) has created a picklist field called Status on three separate custom objects. UC has a\nrequirement to share the list of values for this field across each object.\nWhich feature would an app builder use?",options:{"A":"Field Update", "B":"Global Picklist Value Set", "C":"Dynamic Action", "D":"Dependent Picklist"},correct:["B"],explanation:"The app builder should use a global picklist value set to share the list of values for the Status field across each\nobject. A global picklist value set is a set of values that can be used by multiple picklist fields on different\nobjects. This can ensure data consistency and reduce maintenance efforts. Option A, C, and D are not features\nthat can share picklist values across objects.",category:"Data Modeling and Management"},
  {id:263,question:"The sales Operations team at AWS Computing deletes accounts for a variety of a reasons. The sales ops\ndirector is worried that the Sales team may delete accounts that sales reps are actively selling into.\nNow should the app builder keep accounts with open opportunities from being deleted?",options:{"A":"Create an Apex Trigger on the Account object", "B":"Create a validation rule on the Account object.", "C":"Remove the delete button on the account layout", "D":"Remove the Delete permission from the Sales Rep profile."},correct:["B"],explanation:"Create a validation rule on the Account object is how the app builder can keep accounts with open\nopportunities from being deleted. According to the Salesforce documentation, “Validation rules verify that\ndata entered by users in records meet the standards you specify before they can save it.” A validation rule can\ncheck if an account has any open opportunities and display an error message if someone tries to delete it.\nCreate an Apex trigger on the Account object, remove the delete button on the account layout, and remove the\nDelete permission from the Sales Rep profile are not valid or sufficient solutions for this requirement.",category:"User Interface"},
  {id:264,question:"Service agents at Ursa Major Solar want a more condensed case view. Service agents also want to be able to\nmodify the associated contact and account records from the case page layout on the Lightning record page.\nWhich two components should an app builder use to meet these requirements?\nChoose 2 answers",options:{"A":"Path", "B":"Rich text", "C":"Related record", "D":"Tabs"},correct:["C", "D"],explanation:"Related record and Tabs. These are correct because the related record component allows service agents to\nview and edit fields from a related record on the same page, and the tabs component allows service agents to\nswitch between different views of related lists or other components on the same page.",category:"User Interface"},
  {id:265,question:"Universal Containers would like to embed a chart of all related Opportunities, by stage, on the Account detail\npage. Which type of report should the App Builder create to add to the Account page layout?",options:{"A":"A summary report on the Opportunity object.", "B":"A summary report on the Account object.", "C":"A tabular report on the Account object.", "D":"A tabular report on the Opportunity object."},correct:["A"],explanation:"A summary report on the opportunity object should be created to add to the account page layout. A summary\nreport groups rows of data by common values and allows users to create charts based on aggregate values. A\nsummary report on the opportunity object can group opportunities by stage and display a chart of all related\nopportunities on the account detail page.",category:"User Interface"},
  {id:266,question:"Northern Trail Outfitters (NTO) has created the custom objects Trail and Park in Salesforce to track trails and\nparks respectively. NTO wants to track the total number of trails a park has on the Park record without writing\nany code.\nWhich two actions should an app builder take to accomplish this requirement?",options:{"A":"Use a roll-up summary field on the Park record to show the total number of Trails.", "B":"Use a formula field on the Park record to show the total number of trails.", "C":"Use a lookup relationship between the Park and Trail objects.", "D":"Use a master-detail relationship between the Park and Trail objects."},correct:["A", "D"],explanation:"To count child records (Trails) on a parent record (Park) without code, a Roll-up Summary field is required.\nHowever, Roll-up Summary fields only work when a Master-Detail relationship exists.\nWhy A (Roll-up Summary) is correct:Exact Extract:“A roll-up summary field calculates values from\nrelated records, such as those in a related list, on a master record. You can count the number of related\nrecords or summarize fields.” — Salesforce Help | Roll-Up Summary Fields\nWhy D (Master-Detail Relationship) is correct:Exact Extract:“Roll-up summary fields are available\nonly for master-detail relationships.” — Salesforce Help | Relationships OverviewTherefore, the Trail\nobject must be the detail and the Park object the master to enable the roll-up count.\nWhy D (Master-Detail Relationship) is correct:Exact Extract:“Roll-up summary fields are available\nonly for master-detail relationships.” — Salesforce Help | Relationships OverviewTherefore, the Trail\nobject must be the detail and the Park object the master to enable the roll-up count.\nWhy not B:Formula fields can’t count related records.\nWhy not C:Lookup relationships don’t support roll-up summaries natively.\nReferences:\nSalesforce Help | Roll-Up Summary Fields\nSalesforce Help | Relationships Overview\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:267,question:"Universal Containers has a customer base where many customers have the same or similar company names.\nWhich functionality should be configured to improve an end user`s search experience?\nChoose 2 answers",options:{"A":"Update the account search layout’s view filter settings.", "B":"Update the account search layouts search results columns displayed.", "C":"Update the account search filter fields.", "D":"Update the account search layouts accounts tab columns displayed."},correct:["B", "C"],explanation:"Updating the account search layouts search results columns displayed and updating the account search filter\nfields can improve an end user’s search experience by showing more relevant information and allowing more\nrefined filtering. The view filter settings and the accounts tab columns displayed are not related to the search\nfunctionality",category:"Data Modeling and Management"},
  {id:268,question:"At Ursa Solar Major, only users with the Outer Planets profile need to see\nthe Jupiter field on the Solar System object.\nHow should the app builder satisfy this requirement?",options:{"A":"Classic encryption", "B":"Filtered view", "C":"Field-level security", "D":"Sharing rules"},correct:["C"],explanation:"To restrict visibility of the Jupiter field on the Solar System object specifically to users with the Outer Planets\nprofile:\nC. Field-level security (FLS). This allows the app builder to control access to fields based on user\nprofiles.\nSteps to set up field-level security:\nNavigate to Setup # Object Manager # Solar System.\nSelect Fields & Relationships # Jupiter field.\nClick Field-Level Security.\nFor all profiles except Outer Planets, set the Visible option to unchecked, ensuring these users cannot\nsee the field.\nFor the Outer Planets profile, check Visible to grant access.\nThis configuration ensures that only users with the Outer Planets profile can view the Jupiter field.\n\nFor more information on field-level security, check Salesforce's guide on Field-Level Security.",category:"Data Modeling and Management"},
  {id:269,question:"Universal Containers would like to automatically assign a specific permission set to new users. How can this\nrequirement bemet? Choose 2 Answers",options:{"A":"Create an approval process on the User object to assign a permission set", "B":"Create a flow on the user object to assign a permission set.", "C":"Create a lightning process on the user object to launch a flow.", "D":"Create a workflow rule on the User object to assign a permission set."},correct:["B", "C"],explanation:"A flow or a process can be used to assign a permission set to new users. A flow can be triggered by a record\nchange or an invocable action, while a process can launch a flow as an immediate or scheduled action",category:"Security"},
  {id:270,question:"At Cloud Kicks, when an opportunity close date is delayed by more than 60 days, the manager and the VP of\nSales want to review the change.\nWhich two solutions will meet the requirement?",options:{"A":"Build a validation rule that does not allow a user to save the opportunity record.", "B":"Create a flow that submits the record for an approval process.", "C":"Build an approval process that requires unanimous approval from the manager and VP of Sales.", "D":"Create a formula field that calculates if the close date is less than 60 days and then send an email alert."},correct:["B", "C"],explanation:"The requirement specifies that when the Close Date is delayed by more than 60 days, the record must go\nthrough review by both the manager and VP of Sales — this implies an approval process or Flow-initiated\napproval is needed, not just a restriction.\nWhy B (Flow) is correct:A Record-Triggered Flow can be configured to detect when the Opportunity\nClose Date changes by more than 60 days and then automatically submit the record for approval.Exact\nExtract:“You can use a flow to automatically submit records for approval when they meet certain\ncriteria.” — Salesforce Help | Flow and Approval Processes\n\nWhy C (Approval Process) is correct:The approval process enforces the review by both the manager\nand VP, ensuring a controlled approval sequence.Exact Extract:“An approval process automates how\nrecords are approved in Salesforce. Each approval process specifies the steps necessary for a record to\nbe approved and who must approve it.” — Salesforce Help | Approval ProcessesYou can configure\nmultiple approvers and specify that both must approve (“Unanimous Approval”).\nWhy not A (Validation Rule):A validation rule would only block saving but would not trigger a review\nor approval.\nWhy not D (Formula Field):Formula fields are read-only and cannot trigger workflow or approval\nactions directly.\nReferences (Salesforce Platform App Builder documentation / Study Guide topics):\nSalesforce Help | Flow Builder and Approval Processes\nSalesforce Help | Approval Processes\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:271,question:"At Universal containers, all US Sales reps should be able to view the US Team dashboard, however, only the\nUS sales directors should be able to see the data in the component and view its source report. How can an app\nbuilder ensure the proper access is granted?",options:{"A":"Make the US Sales Director the running user and share the dashboard folder with the role US Sales Rep", "B":"Make the dashboard dynamic and give US Sales Reps the view my teams dashboard permission", "C":"Share the dashboard folder with roles and subordinates of the US Sales Director and share the report folder with the role of US Sales Director", "D":"Share the dashboard with the public group US Sales Reps and share the dashboard source reports folder with the US Sales Director profile"},correct:["C"],explanation:"Sharing the dashboard folder with roles and subordinates of the US Sales Director and sharing the report\nfolder with the role of US Sales Director will ensure that only the US sales directors can see the data in the\ncomponent and view its source report, while all US sales reps can view the US Team dashboard. Making the\nUS Sales Director the running user will show only his or her data in the component, not the whole team’s\ndata. Making the dashboard dynamic will show different data depending on who is viewing it, not based on\ntheir role. Sharing the dashboard with the public group US Sales Reps and sharing the dashboard source\nreports folder with the US Sales Director profile will not prevent other profiles from accessing the reports if\nthey have access to the report folder.",category:"User Interface"},
  {id:272,question:"Universal Containers (UC) tracks Account locations in Zip Code, a custom text field with a validation rule to\nenforce proper formatting of the US ZIP+4 code for UC's orders.\nWhat formula should the app builder create on Order to display only the first five digits of Zip Code from the\nparent Account?",options:{"A":"BEGINS(Account.Zip_Code_r, 5)", "B":"TEXT(Account.Zip_Code_c, 5)", "C":"LEFT(Account.Zip_Code_c, 5)", "D":"LPAD(Account.Zip_Code__r, 5)"},correct:["C"],explanation:"LEFT(Account.Zip_Code_c, 5) is the correct formula to display only the first five digits of Zip Code from the\nparent Account. LEFT function returns the specified number of characters from the left side of a text string.\nAccount.Zip_Code_c is the custom text field that stores the Zip Code on Account object. 5 is the number of\ncharacters to return from the left side of the Zip Code. The other options are not valid formulas or functions.",category:"Data Modeling and Management"},
  {id:273,question:"An app builder at Ursa Major Solar has been working on a new custom app in a sandbox that has been\nupgraded to the next major Salesforce version, and their production instance is still on the current Salesforce\nversion. The development is complete and they are ready to deploy a change set.\nWhat should the app builder consider when planning the deployment?",options:{"A":"It will fall if there is a feature only available in the next version.", "B":"The change set components will be upgraded to the next version in production.", "C":"The change set will be automatically deployed when production is upgraded.", "D":"The deployment is not possible due to different versions."},correct:["A"],explanation:"It will fail if there is a feature only available in the next version. According to the Salesforce documentation,\n“If your sandbox is on a newer version than your production org, you can’t deploy any components that are\n\nnew in the sandbox version.” The change set components will not be upgraded to the next version in\nproduction, the change set will not be automatically deployed when production is upgraded, and the\ndeployment is possible if there are no new features involved.",category:"User Interface"},
  {id:274,question:"Cloud Kicks (CK) keeps track of its shoe inventory in Salesforce. When an order's status is changed to\nActivated, the inventory for the ordered shoe is reduced. At that point, a SOAP web service on the CK\nwebsite must be called so that the website is updated to display the correct inventory amount for the shoe.\nWhat should an app builder use to communicate to the CK web service when a shoe's inventory has changed?",options:{"A":"After-Save Record-Triggered flow", "B":"Before-Save Record-Triggered flow", "C":"Process Builder", "D":"Workflow rule"},correct:["A"],explanation:"To communicate to the CK web service when a shoe’s inventory has changed, an app builder should use an\nafter-save record-triggered flow. An after-save record-triggered flow is a type of flow that runs after a record\nis saved and can perform actions such as updating related records, sending emails, calling external services,\netc. An after-save record-triggered flow can use an Apex action to invoke a SOAP web service using a WSDL\nfile. [Source]",category:"User Interface"},
  {id:275,question:"Cloud Kicks wants to set up a new opportunity approval process and execute various action items based on\nthe initial submission.\nWhich three action types should an app builder use in the approval process?",options:{"A":"Outbound Message", "B":"Invocable Flow", "C":"Task", "D":"Email Alert", "E":"Decision Element"},correct:["A", "C", "D"],explanation:"When configuring an approval process, the available initial submission actions (triggered when a record is\nfirst submitted for approval) include sending notifications, creating tasks, and sending outbound messages.\nWhy A (Outbound Message) is correct:Exact Extract:“Outbound messages can be configured as\napproval actions to send information to external systems when a record is submitted or approved.” —\nSalesforce Help | Approval Processes Overview\nWhy C (Task) is correct:Exact Extract:“Approval processes can create tasks for users as part of\napproval actions to ensure follow-up on record changes.” — Salesforce Help | Approval Actions\nWhy D (Email Alert) is correct:Exact Extract:“Email alerts can be sent automatically when a record is\nsubmitted, approved, rejected, or recalled.” — Salesforce Help | Approval Processes Overview\nWhy not B (Invocable Flow):Invocable Flows are not selectable as approval actions — they are used in\nProcess Builder or Flow itself, not Approval Process configuration.\nWhy not E (Decision Element):Decision elements are Flow components, not part of the Approval\nProcess action set.\nReferences:\nSalesforce Help | Approval Processes Overview\nSalesforce Help | Approval Actions\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:276,question:"Ursa Major Solar wants to convert the relationship between Galaxy and Star from a lookup relationship to a\nmaster-detail relationship so each Galaxy record can be equipped with a roll-up summary count of Star\nrecords.\nWhich two considerations should be made?\nChoose 2 answers",options:{"A":"The Star records are all required to have an existing value in their Galaxy field.", "B":"The Galaxy object has fewer than two existing master-detail relationships.", "C":"The Galaxy object is required to contain existing roll-up summary fields.", "D":"The Star object has fewer than two existing master-detail relationships."},correct:["A", "B"],explanation:"The two considerations that should be made are: The Star records are all required to have an existing value in\ntheir Galaxy field. This is a prerequisite for converting a lookup relationship to a master-detail relationship. A\nlookup relationship is an optional relationship that links two objects together, but does not enforce referential\nintegrity or cascade delete. A master-detail relationship is a required relationship that links two objects\ntogether and enforces referential integrity and cascade delete. To convert a lookup relationship to a masterdetail relationship, all child records must have a value in their lookup field that references an existing parent\nrecord. The Galaxy object has fewer than two existing master-detail relationships. This is another prerequisite\nfor converting a lookup relationship to a master-detail relationship. An object can have up to two masterdetail relationships with other objects and can act as both the parent and child in different relationships. To\nconvert a lookup relationship to a master-detail relationship, the parent object must have fewer than two\nexisting master-detail relationships with other objects. The Galaxy object is required to contain existing rollup summary fields is not a valid consideration, as it is not related to converting a lookup relationship to a\nmaster-detail relationship.",category:"Data Modeling and Management"},
  {id:277,question:"Ann app builder has been to display an overdue date that is two months after a tasks due date. Which\napproach should the app builder take?",options:{"A":"Use process builder and set overdue date equal to Due Date + ((365/12)*2)", "B":"Create a formula field using Due Date + 60", "C":"Use process builder and set overdue Date equal to Due Date + 60", "D":"Create a formula field using the ADDMONTHS () function"},correct:["D"],explanation:"The best way to calculate an overdue date that is two months after a task due date is to use a formula field\nwith the ADDMONTHS() function. This function adds a specified number of months to a date value, and\nreturns a new date value. See [this article] for more information on formula fields.",category:"User Interface"},
  {id:278,question:"To increase adoption, Universal Containers is proposing changes to its Salesforce data model to allow easier\nvisibility for sales reps into key metrics. The proposal has three custom objectsrelated to the Account object,\none with a master-detail, and two that are not. Each of these objects has 15 fields they would like to\nsummarize on the Account object.\nWhat are two considerations for this proposal?\nChoose 2 answers",options:{"A":"Roll-up summaries allow MAX, MIN, SUM, COUNT, and AVG.", "B":"An object can have 20 object references.", "C":"An object can have 25 roll-up summaries.", "D":"Roll-up summaries are limited to master-detail relationships."},correct:["A", "D"],explanation:"Roll-up summaries allow MAX, MIN, SUM, COUNT, and AVG functions on numeric fields from child\nrecords related by a master-detail relationship. Roll-up summaries are limited to master-detail relationships\nand cannot be used with lookup relationships. An object can have up to 40 roll-up summary fields, not 25. An\nobject can have up to 25 relationship fields (master-detail or lookup), not 20.",category:"Data Modeling and Management"},
  {id:279,question:"Universal Containers asked the app builder to ensure when an account type changes to 'Past-Customer' the\ncontacts directly related to that account get an updated status of 'Re-Market'.\nWhich automation should the app builder use to accomplish this task?",options:{"A":"Screen flow", "B":"Lightning component", "C":"Validation rule", "D":"Record triggered flow"},correct:["D"],explanation:"For automatically updating contact statuses when an account type changes:\nD. Record triggered flow. This type of automation can monitor changes in account types and\naccordingly update related records, such as contacts.\nSteps to implement:\nNavigate to Setup # Flows.\nCreate a new Flow and choose the record-triggered flow type.\nConfigure the flow to trigger when the Account record is updated to 'Past-Customer'.\nAdd an Update Records element to modify all related contacts, setting their status to 'Re-Market'.\nActivate the flow.\n\nThis automation ensures that contact statuses are updated in real-time when their related account's type\nchanges, maintaining data consistency and relevancy.\nFor more on record-triggered flows, check out Salesforce's Record-Triggered Flows documentation.",category:"Business Logic and Process Automation"},
  {id:280,question:"Universal Containers has Public Read/Write as the Account organization-wide default (OWD) setting.\nVisitors to the customer community site report that they can see all of the company's account records.\nHow should an app builder configure Account sharing so that community users only see their own Account?",options:{"A":"Create an account record type for external accounts.", "B":"Define an owner-based sharing rule for external accounts.", "C":"Define a permission set for external accounts.", "D":"Set the account external OWD to private."},correct:["D"],explanation:"The best way to configure Account sharing so that community users only see their own Account is to set the\naccount external OWD to private. This will restrict the access to Account records for external users based on\nthe sharing rules and criteria. Creating an account record type, defining an owner-based sharing rule, or\ndefining a permission set will not prevent community users from seeing other accounts.",category:"User Interface"},
  {id:281,question:"Cloud Kicks wants to make sure that users without the Marketing role are unable to update the Contact Retail\nOpt In picklist field to Yes.\nWhat validation rule would an app builder use to prevent other users from making this update?",options:{"A":"AND( $UserRole.Name != 'Marketing',ISCHANGED(Retail_Opt_In__c), ISPICKVAL (Retail_0pt_In_c,\"Yes\") )", "B":"AND( $UserRole.Name != 'Marketing', Retail_Opt_In_c = \"Yes\" )", "C":"AND( $UserRole.Name = 'Marketing', ISPICKVAL(Retail_Opt_In_c,\"Yes\") )", "D":"AND( $UserRole.Name = 'Marketing', Retail_Opt_In__c= \"Yes\" )"},correct:["A"],explanation:"The validation rule should check if the user role is not Marketing, and if the Retail Opt In field has been\nchanged to Yes. The ISCHANGED function returns true if the field value has been changed, and the\nISPICKVAL function returns true if the field value matches a specified picklist value.",category:"Data Modeling and Management"},
  {id:282,question:"Universal Containers has deployed custom tabs to Production via changes sets, without including the profile\nsettings or permission sets.\nWhat is the settings for the visibility of custom tabs?",options:{"A":"Custom tabs are default off for all users.", "B":"Custom tabs are default on for all uses.", "C":"Custom tabs are hidden for all users.", "D":"Custom tabs are NOT deployed."},correct:["A"],explanation:"The setting for the visibility of custom tabs is default off for all users when they are deployed via change sets\nwithout including the profile settings or permission sets. This means that the custom tabs are not visible in any\napps or navigation menus for any users unless they are manually added by each user or by an administrator3.\nOption B, C, and D are not correct settings for the visibility of custom tabs.",category:"User Interface"},
  {id:283,question:"Universal Containers (UC) has large data volumes and is nearing data storage limits. The planned solution is\nto archive historical data to reduce data storage in Salesforce; however, UC would still like to use reports,\nqueries, and lookups on the archived information.\nWhich two options could meet this requirement?\nChoose 2 answers",options:{"A":"Big objects", "B":"Custom objects", "C":"Related objects", "D":"External objects"},correct:["A", "D"],explanation:"Big objects and external objects can be used to archive historical data and reduce data storage in Salesforce,\nwhile still allowing users to access the archived data using reports, queries, and lookups. Big objects store\ndata within Salesforce, while external objects store data outside Salesforce and integrate it with Salesforce\nusing an external data source",category:"Data Modeling and Management"},
  {id:284,question:"Cloud Kicks (CK) Is finding sales reps are Inconsistent in data entry when deals are won. CK requires that\ncustom shoes are shipped within two weeks after the close date. A custom field called Scheduled Ship Date\non the opportunity records the ship date.How should the app butler ensure this field is properly filed out\nbefore setting the opportunity to closed won?",options:{"A":"OR(ISPICKVAL( StageName ,\"Closed Won\") && ( Scheduled_Ship_Date_cCloseDate)>14,ISBLANK (Scheduled_Ship_Date_c))", "B":"OR(ISPICKVAL( StageName =\"Closed Won\") && ( Scheduled_Ship_Date__c- CloseDate ) > 14, ISBLANK(Scheduled_Ship_Date__c))", "C":"ISPICKVAL( StageName ,\"Closed Won\") && ( Scheduled _Ship_Date_c-CloseDate ) > 14", "D":"ISPICKVAL( StageName= CloseDate ) > 14,losed Won\") && ( CloseDateScheduled_Ship_Date_c) >14"},correct:["A"],explanation:"The correct validation rule formula to ensure that the Scheduled Ship Date field is properly filled out before\nsetting the Opportunity to Closed Won is:\nOR(ISPICKVAL( StageName ,“Closed Won”) && ( Scheduled_Ship_Date_cCloseDate)>14,ISBLANK\n(Scheduled_Ship_Date_c))\nThis formula checks two conditions: if the StageName is Closed Won and the Scheduled Ship Date is more\nthan 14 days after the Close Date, or if the Scheduled Ship Date is blank. If either condition is true, the\nvalidation rule will fire and prevent saving the record. The other formulas are incorrect because they either\nuse incorrect syntax (such as “=” instead of “,” or missing parentheses) or incorrect logic (such as checking if\nthe Scheduled Ship Date is less than 14 days after the Close Date)",category:"Data Modeling and Management"},
  {id:285,question:"Universal Containers wants sales reps to get permission from their managers before deleting Opportunities,\nWhat can be used to meet these requirements?",options:{"A":"Process Builder with Submit for Approval action.", "B":"Approval Process with a triggered Flow process.", "C":"Approval Process with Time-Dependent Workflow action.", "D":"Two-step Approval Process."},correct:["D"],explanation:"The feature that can be used to meet these requirements is two-step approval process. An approval process\ndefines the steps and criteria for approving records. A two-step approval process requires two levels of\napproval before a record can be deleted. The app builder can configure an approval process for opportunities\nthat requires sales reps to submit their delete requests for approval from their managers. Option A is incorrect\nbecause Process Builder with Submit for Approval action is not a valid feature, as Process Builder cannot\nsubmit records for approval. Option B is incorrect because Approval Process with a triggered Flow process is\nnot a valid feature, as Approval Process cannot trigger Flow processes. Option C is incorrect because\nApproval Process with Time-Dependent Workflow action is not a valid feature, as Approval Process cannot\nuse Time-Dependent Workflow actions.",category:"Data Modeling and Management"},
  {id:286,question:"Ursa Major Solar's service department gets requests for several types of services, such as installation, repair,\nand maintenance. Service managers need to be able to tell when maintenance was last done on an asset to help\ndetermine if they are meeting contract agreements, but the last maintenance date can be difficult to determine\nwhen there are many work orders related to the asset. They think it would be helpful to have a field autopopulated on the Asset record when a maintenance work order gets closed.\nWhich tool should an app builder recommend to help meet this requirement?",options:{"A":"Einstein Next Best Action", "B":"Roll-up Summary", "C":"Apex Trigger", "D":"Flow"},correct:["D"],explanation:"The requirement is to auto-populate the “Last Maintenance Date” field on the Asset record whenever a\nMaintenance-type Work Order is closed. This can be achieved declaratively using Flow — specifically, a\nRecord-Triggered Flow that updates the parent record (Asset).\nWhy D (Flow) is correct:Exact Extract:“Record-triggered flows can update related records when\nspecific changes occur, such as when a Work Order’s status is updated to Closed.” — Salesforce Help |\nRecord-Triggered FlowsIn this scenario, the flow can:\n\nWhy D (Flow) is correct:Exact Extract:“Record-triggered flows can update related records when\nspecific changes occur, such as when a Work Order’s status is updated to Closed.” — Salesforce Help |\nRecord-Triggered FlowsIn this scenario, the flow can:\nTrigger when a Work Order is updated to “Closed.”\nCheck if Type = “Maintenance.”\nUpdate the related Asset record’s Last Maintenance Date field with the Work Order’s Closed\nDate.\nWhy not B (Roll-up Summary):Roll-up summary fields can only summarize numeric or date values\nusing MIN, MAX, COUNT, or SUM, but only on Master-Detail relationships. Work Order # Asset is a\nLookup relationship, so roll-up summaries are not supported natively.\nWhy not A (Einstein Next Best Action):NBA provides recommendations, not field updates.\nWhy not C (Apex Trigger):Apex could achieve this, but Salesforce recommends Flow first as a best\npractice.\nReferences:\nSalesforce Help | Record-Triggered Flows\nSalesforce Help | Flow Builder Overview\nSalesforce Platform App Builder Exam Guide | Business Logic and Process Automation",category:"Business Logic and Process Automation"},
  {id:287,question:"The app builder at Ursa Major Solar has just created a master-detail relationship between a parent object\nGalaxy__c and child object\nStar__c.\nWhat would be the effect of creating this type of relationship if users want to report on Galaxy__c with\nStar__c?",options:{"A":"A Star__c report typewith Galaxy__c as a field will be automatically created.", "B":"A new custom report type will need to be created for Star__c with lookup fields from Galaxy__c.", "C":"A Galaxy__c with Star__c report type will be automatically created.", "D":"A new custom report type will need to be created for Galaxy__c with Star__c."},correct:["C"],explanation:"A master-detail relationship between two objects automatically creates a report type that includes both\nobjects. The app builder does not need to create a custom report type for this scenario. The report type will\nhave the format of Parent object with Child object",category:"Data Modeling and Management"},
  {id:288,question:"An app builder created multiple custom fields, page layouts, and reports in the sandbox and added them to a\nchange set was deployed to production, the reports were NOT deployed.\nWhat should the app builder do?",options:{"A":"Move the reports to the Untried Public Reports folder and add them to a new change set.", "B":"Move the reports from the Unfiled Public Reports folder and add them to a new change set", "C":"Recreate the reports in production. Reports are not supported in change sets", "D":"Add the reports to an unmanaged package and install the unmanaged package into production."},correct:["B"],explanation:"Moving the reports from the Unfiled Public Reports folder and adding them to a new change set is what the\napp builder should do to deploy the reports to production. According to the Salesforce documentation,\n“Reports in the Unfiled Public Reports folder aren’t available for deployment.” Moving the reports to the\nUntried Public Reports folder, recreating the reports in production, and adding the reports to an unmanaged\npackage are not necessary or recommended actions.",category:"Data Modeling and Management"},
  {id:289,question:"The finance manager at Universal Containers wants to receive a new business notification email each time a\nnew client is won. The sales manager wants to receive a task letting them know to onboard the new client\nunless it is a top-tier client.\nWhich automation tool should an app builder use to best address all these requests?",options:{"A":"Record-triggered flow", "B":"Screen flow", "C":"Apex", "D":"Approval process"},correct:["A"],explanation:"Record-triggered flow is the automation tool that the app builder should use to best address all these requests\nof sending an email to the finance manager and creating a task for the sales manager when a new client is\nwon. According to the Salesforce documentation, “Record-triggered flows automate processes for you. They\nstart when a record is created or updated, or when a platform event occurs.” A record-triggered flow can\nperform actions such as sending an email alert or creating a record based on criteria or conditions. Screen\nflow, Apex, and Approval process are not automation tools that can handle all these requests.",category:"Business Logic and Process Automation"},
  {id:290,question:"Sales reps at Cloud Kicks (CK) forget to submit for approval when CK needs orders reviewed before close\nwon. CK wants to automatically submit\nopportunities into the Secure Commitment Stage to eliminate manual submission.\nWhich feature meets the business requirements?",options:{"A":"Record-Triggered flow optimized for Fast Field Updates", "B":"Custom button and screen flow", "C":"Platform Event-Triggered flow", "D":"Record-Triggered flow optimized for Actions and Related Records"},correct:["D"],explanation:"To automate the submission of opportunities into the \"Secure Commitment\" stage and eliminate manual\nsubmission for approval, the best feature to use is:\nRecord-Triggered flow optimized for Actions and Related Records (D). This type of flow allows for\ncomplex automation that can include submitting records for approval based on specific criteria being\nmet, such as reaching a particular stage in the opportunity lifecycle. It's particularly suitable for\nhandling related record updates and other actions like submissions for approval, which are integral\nwhen an opportunity reaches a certain stage.\nRecord-Triggered Flow optimized for Fast Field Updates (A) is focused primarily on quick updates to fields\nand may not handle the complexity of submission for approval processes adequately. Custom button and\nscreen flow (B) could be used to manually trigger processes but does not automate the submission. Platform\nEvent-Triggered flow (C) is typically used for integrations and reacting to system-wide events, not for\nstandard record lifecycle management.\nReference for using Flows in Salesforce, particularly for automating business processes like approval\nsubmissions:\nRecord-Triggered Flows: https://help.salesforce.com/articleView?id=sf.\nflow_considerations_trigger_record.htm&type=5",category:"Data Modeling and Management"},
  {id:291,question:"Cloud Kicks's management team frequently travels and wants to approve requests from their team on the go\nvia Chatter.\nWhere would an app builder enable this ability?",options:{"A":"Chatter Feed Tracking", "B":"Object Settings", "C":"Chatter Settings", "D":"Approval Process Settings"},correct:["C"],explanation:"The app builder would enable this ability in Chatter Settings. Chatter Settings is a setup menu that allows an\napp builder to configure various aspects of Chatter functionality, such as feeds, groups, email notifications,\nand more. One of the options in Chatter Settings is Enable Approvals via Chatter, which allows users to\napprove or reject requests from their team via Chatter posts or comments. Option A, B, and D are not places\nwhere an app builder would enable this ability.",category:"User Interface"},
  {id:292,question:"Ursa Major Solar has a lookup relationship between a custom Galaxy _c object and a custom Star_c object.\nAn app builder wants to create a roll-up summary field that counts the total number of Star_c records related\nto each Galaxy__c record.\nHow would the current configuration impact the ability to achieve the desired result?",options:{"A":"The roll-up summary can be achieved by creating a formula field on the Galaxy__c object.", "B":"The lookup relationship will need to be converted to a master-detail relationship before a roll-up summary field can be created.", "C":"The roll-up summary can be achieved by creating a formula field on the Star__c object.", "D":"A roll-up summary field will need to be created on the Galaxy__c object with a field filter that select all related Star_c records"},correct:["B"],explanation:"The lookup relationship will need to be converted to a master-detail relationship before a roll-up summary\nfield can be created. This is correct because roll-up summary fields are only available on the master object in\na master-detail relationship, and a lookup relationship does not establish a parent-child hierarchy between the\nobjects",category:"Data Modeling and Management"},
  {id:293,question:"An app builder wants to add the option to 'Send New Email' from Leads, Contacts and Accounts for users on\nmobile.\nWhat is the benefit of using global actions to accomplish this?",options:{"A":"Global actions can be accessed anywhere actions are pages, feed and Chatter groups,", "B":"Salesforce Lightning Component Library houses existing global actions prebuild for use.", "C":"The global action's layout automatically clones the default page layout.", "D":"Global actions are record-specific and are available when searching that particular"},correct:["A"],explanation:"Global actions can be accessed anywhere actions are pages, feed and Chatter groups. This is correct because\nglobal actions are not tied to a specific object, and they can be added to any page that supports actions, such\nas record pages, home pages, feed pages, and Chatter groups.",category:"User Interface"},
  {id:294,question:"The developer at Universal Containers wants to test code in a sandbox environment. In order to ensure the\ncode works properly, the sandbox needs to have at least half a gigabyte of data. The sandbox will need to be\nrefreshed after each three-day sprint.\nWhat type of sandbox should the App Builder provision to the developer?",options:{"A":"Developer", "B":"Full Copy", "C":"Developer Pro", "D":"Partial Data"},correct:["D"],explanation:"The app builder should provision a Partial Data sandbox to the developer. A Partial Data sandbox can have up\nto 5 GB of data, which meets the requirement of having at least half a gigabyte of data. A Partial Data\nsandbox can also be refreshed every 5 days, which meets the requirement of refreshing after each three-day\nsprint. Option A is incorrect because a Developer sandbox can only have up to 200 MB of data, which does\nnot meet the requirement. Option B is incorrect because a Full Copy sandbox can only be refreshed every 29\ndays, which does not meet the requirement. Option C is incorrect because a Developer Pro sandbox can only\nhave up to 1 GB of data, which may not be enough for the requirement.",category:"User Interface"},
  {id:295,question:"universal containers is migrating its sales operations from a legacy system that was used. opportunities need\nto be imported with the proper country currency. Which two steps should an app builder configure to meet\nthese requirements?\nChoose 2 answers.",options:{"A":"Include the currency ISO code in all currency fields in the import file.", "B":"Use Data Loader to import the records.", "C":"Include the currency ISO Code Column in the import file.", "D":"Use import the currency ISO Code Column in the import file.", "E":"Use Import Wizard to import the records."},correct:["A", "B"],explanation:"To import opportunities with the proper country currency, the app builder needs to include the currency ISO\ncode in all currency fields in the import file, and use Data Loader to import the records. Data Loader supports\nimporting multiple currencies, while Import Wizard does not. The currency ISO code column in the import\nfile specifies the currency for each record",category:"User Interface"},
  {id:296,question:"Universal Containers deployed an app in a large change set from a Developer Sandbox to a Developer Pro\nSandbox used for testing. After testing, changes had to be made to several of the components in the change set.\nHow should an app builder move the new changes to the Developer Pro Sandbox?",options:{"A":"Refresh the text sandbox and re_display the change set.", "B":"Clone the change set and re_display", "C":"Rename the change set, add the changes and re_display", "D":"Update the change set and re_display"},correct:["D"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:297,question:"The appraisal team at DreamHouse Realty wants to leverage Salesforce mobile app.\nWhat are three things an app builder should do to optimize mobile experience?\nChoose 3 answers",options:{"A":"Use Global Actions to make it easy to perform vital functionality on mobile.", "B":"Avoid using default field values so that the user is required to fill in all fields on the screen.", "C":"Minimize the amount of formula fields and lookup fields to reduce page load time.", "D":"Create individual customized layouts for different phone operating systems.", "E":"Put the most important fields in the compact layout so they are easy to find."},correct:["A", "C", "E"],explanation:"The app builder should do three things to optimize mobile experience:\nUse Global Actions to make it easy to perform vital functionality on mobile: Global actions are actions\nthat allow users to create records or perform tasks from anywhere in Salesforce. They are displayed in\nvarious places in Salesforce mobile app, such as action bar, action menu, or publisher. By using global\nactions, the app builder can make it easy for the appraisal team to perform common tasks on mobile,\nsuch as creating a new appraisal record or logging a call.\nMinimize the amount of formula fields and lookup fields to reduce page load time: Formula fields and\nlookup fields are types of fields that can affect the performance of Salesforce mobile app. Formula\nfields are fields that calculate a value based on an expression or formula. Lookup fields are fields that\ncreate a relationship between two objects and allow users to select a value from a list of records. Both\ntypes of fields can increase the page load time on mobile devices, especially if they are complex or\nreference many other fields. By minimizing the amount of formula fields and lookup fields, the app\nbuilder can optimize the mobile experience for the appraisal team.\nPut the most important fields in the compact layout so they are easy to find: Compact layouts are\nlayouts that display a record’s key information at a glance. They are used in various places in Salesforce\nmobile app, such as record highlights, list views, related lists, and lookup dialogs. By putting the most\nimportant fields in the compact layout, the app builder can ensure that the appraisal team can easily find\n\nthe information they need on mobile devices. Option B and D are not things that an app builder should\ndo to optimize mobile experience.",category:"User Interface"},
  {id:298,question:"Which two places can an app builder go to see a list of available Custom Lightning components in their org?\nChoose 2 answers",options:{"A":"Visualforce components in Setup", "B":"Lightning component Generator", "C":"Lightning App Builder", "D":"Lightning components in Setup"},correct:["C", "D"],explanation:"An app builder can go to two places to see a list of available custom Lightning components in their org:\nLightning App Builder: This is a tool that allows an app builder to create and customize Lightning\npages using drag-and-drop components. The app builder can see the list of custom Lightning\ncomponents in the Custom section of the Lightning Components pane1.\nLightning Components in Setup: This is a setup menu that allows an app builder to view, create, edit,\nand delete custom Lightning components in their org. The app builder can see the list of custom\nLightning components in the Lightning Components section of the Setup menu2. Option A and B are\nnot places where an app builder can see a list of custom Lightning components.",category:"User Interface"},
  {id:299,question:"The convert button on leads should NOT appear until the lead status picklist is set to a qualified. What should\nan app builder suggest to meet these requirements?",options:{"A":"Picklist dependency, page layouts, record types", "B":"Custom button, validation rule, record types", "C":"Process builder field update, quick action, record type", "D":"Page layout, record types, process builder field update"},correct:["B"],explanation:"A custom button, a validation rule, and record types can be used to meet the requirement of hiding the\nconvert button on leads until the lead status picklist is set to qualified. The custom button can replace the\nstandard convert button and invoke a validation rule that checks the lead status. The record types can be used\nto assign different page layouts with different buttons for different lead statuses",category:"User Interface"},
  {id:300,question:"Cloud Kicks is implementing an approval process for opportunities that requires managers to approve all\nopportunities above $50,000 before they can be\nmarked as Closed Won.\nWhich two delivery methods can a manager utilize to respond to approval requests in the Salesforce mobile\napp?\nChoose 2 answers",options:{"A":"Home Screen", "B":"In-App Notification", "C":"Record Detail", "D":"Navigation Menu"},correct:["B", "C"],explanation:"For managers to respond to approval requests for opportunities above $50,000 in the Salesforce mobile app:\nB. In-App Notification: Managers receive notifications within the Salesforce mobile app when there is\nan approval request, allowing them to approve or reject directly from the notification.\nC. Record Detail: Managers can access the approval request directly from the Opportunity's detail page\nin the mobile app, where they can review and respond to the request.\nSteps to configure approval process notifications:\nNavigate to Setup # Approval Processes # select the relevant approval process.\nEnsure the process is active and configured to send notifications to approvers.\nManagers need to have the Salesforce mobile app configured to receive notifications.\nFor best practices on managing approvals in Salesforce, see Approvals in Salesforce.",category:"Business Logic and Process Automation"},
  {id:301,question:"Which three standard component types are available in the Lightning App Builder?\nChoose 3 answers",options:{"A":"Plain text", "B":"Rich text", "C":"Filter list", "D":"Report details", "E":"Recent items"},correct:["B", "D", "E"],explanation:"In the Lightning App Builder, the following standard components can be used to enhance the functionality of\nLightning pages:\nB. Rich text: Allows the inclusion of formatted text, links, and images on a page.\nD. Report details: Enables embedding of specific report details directly on a page.\nE. Recent items: Displays a list of recently accessed items relevant to the user.\nSteps to add these components:\nOpen the Lightning App Builder via Setup # Edit Page or when creating a new Lightning page.\nDrag and drop the Rich text, Report details, and Recent items components from the standard\ncomponents section onto the page layout.\nConfigure each component as needed (e.g., selecting a specific report for the Report details component).\nFor more on using these components, refer to Salesforce's guide on Standard Lightning Components.",category:"User Interface"},
  {id:302,question:"Northern Trail Outfitters wants to broadcast an email to 7,000 contacts Salesforce on a regular basis but\nrealizes Salesforce is mass functionality has a limitation on the number erf emails that can be sent each day.\nWhat action should the app builder take?",options:{"A":"Request Salesforce increase the number of maximum daily emails.", "B":"Develop Apex code and bghtnrrvg web component to send dairy emails", "C":"Research and evaluate products available on AppExchange to send mass emails.", "D":"Export Contacts to a CSV file and use an email client to send the emails."},correct:["C"],explanation:"Research and evaluate products available on AppExchange to send mass emails is the action that the app\nbuilder should take to meet the requirement of broadcasting an email to 7,000 contacts in Salesforce on a\nregular basis. AppExchange is a marketplace where app builders can find products or solutions that can\nextend Salesforce functionality. There are many products on AppExchange that can send mass emails without\nhitting the Salesforce limit. Request Salesforce increase the number of maximum daily emails, develop Apex\ncode and Lightning web component to send daily emails, and export Contacts to a CSV file and use an email\nclient to send the emails are not valid or recommended actions.",category:"User Interface"},
  {id:303,question:"Cloud Kicks (CK) increased its Salesforce development efforts so that it now has multiple custom\ndevelopment efforts happening in parallel. CK's developers and admins perform the custom (rations and have\ncomplained that working in one sandbox has led to many problems. They requested a solution in which they\ncan work in at least 20 different sandboxes at once, that all start with the same base configuration and data.\nWhat should an app builder use to solve the problem?",options:{"A":"Sandbox refreshes", "B":"Full copy sandboxes", "C":"Partial copy sandboxes", "D":"Sandbox during"},correct:["C"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:304,question:"Universal Containers uses a private sharing model on Accounts. User A and user B both own Accounts of\ntheir own and have both been sent a new account record in an email owned by user C to take a look at. User A\nis able to open and view the record but user B receives an insufficient privileges error. User A and user B\nhave the same role in the role hierarchy as user.\nWhat are the three reasons user A has access but user B is unable to access the record? Choose 3 answers",options:{"A":"User A is on the same account team as user C.", "B":"User A and user B have different profiles.", "C":"User C has manually shared the record with user A.", "D":"User A was granted an additional permission set.", "E":"User A is in a public group that has access via a sharing rule."},correct:["A", "C", "E"],explanation:"The three reasons user A has access but user B is unable to access the record are:\nUser A is on the same account team as user C. Account teams are groups of users who work together on\nan account. Users who are on an account team can have access to the account and related records\nowned by other team members.\nUser C has manually shared the record with user A. Manual sharing is a way of granting access to\nindividual users or groups by the record owner or someone above them in the role hierarchy.\nUser A is in a public group that has access via a sharing rule. Public groups are groups of users who can\nbe used to share data or assign permissions. Sharing rules are automatic rules that grant access to groups\nof users based on certain criteria. Option B and D are not reasons for user A’s access.",category:"Security"},
  {id:305,question:"A new field is being created on a custom object. However, the app builder does not want the field to show up\non pre-existing custom report\ntypes.\nWhat should the app builder do on the custom field setup to fulfill this requirement?",options:{"A":"Remove the new field from all page layouts.", "B":"Remove visibility to all report profiles.", "C":"Grant read-only access to all report profiles.", "D":"Deselect auto add to custom report type."},correct:["D"],explanation:"When creating a new field, if an app builder does not want the field to be automatically added to pre-existing\ncustom report types, the step to take is:\n\nDeselect 'Add Field to Custom Report Types' (D). This option is available when creating or editing a\ncustom field and ensures that the field is not automatically included in report types where\n'Automatically add new custom fields to report type layouts' is enabled.\nRemoving the field from page layouts (A) affects the visibility on record pages but not reports. Adjusting\nvisibility (B) or setting read-only access (C) for report profiles affects user permissions to see the field in\nreports, but does not remove the field from report types if it was previously added.\nReference for managing fields in custom report types:\nCustom Report Types and Fields: https://help.salesforce.com/articleView?\nid=reports_report_type_layouts.htm&type=5",category:"Data Modeling and Management"},
