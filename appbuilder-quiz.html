  {id:112,question:"An App Builder is loading the data into salesforce. To link the new records back to the legacy system, a field\nwill be used to track the legacy ID on the account object. For future data loads this ID will be used when\nupserting records. Which field attribute should be selected? Choose 2 answers",options:{"A":"Unique", "B":"Required", "C":"External ID", "D":"Text (encrypted)"},correct:["A", "C"],explanation:"The field attribute that should be selected are Unique and External ID. Unique means that the field will not\nallow duplicate values. External ID means that the field can be used as a foreign key for data imports and\nupserts. Option B is incorrect because Required means that the field must have a value and cannot be left\nblank, which is not necessary for this requirement. Option D is incorrect because Text (encrypted) means that\nthe field will store sensitive data in an encrypted format, which is not necessary for this requirement.",category:"Data Modeling and Management"},
  {id:113,question:"An app builder at Northern Trad Outfitters created a sandbox template for Accounts, Projects, and Project\nMilestones to reconfigure some flows for the project management app.\nWhich type of testing environment should the app builder create?",options:{"A":"Developer", "B":"Partial Copy", "C":"Developer Pro", "D":"Scratch Org"},correct:["B"],explanation:"Partial Copy is the type of testing environment that the app builder should create to use a sandbox template\nfor Accounts, Projects, and Project Milestones. According to the Salesforce documentation, “Partial Copy\nsandboxes copy your production org’s configuration (metadata) and some of your production org’s data as\ndefined by a sandbox template.” Developer, Developer Pro, and Scratch Org are not types of testing\nenvironments that support sandbox templates.",category:"Business Logic and Process Automation"},
  {id:114,question:"The app builder at Cloud Kicks has created a custom object named Delivery__c to track the details of\nproducts shipped to customers.\nWhich two actions should the app builder take to prevent users in the shipping department from deleting\ndelivery records?\nChoose 2 answers",options:{"A":"Remove the Delete permission from the Shipper profile.", "B":"Change the organization-wide default of deliveries to Private.", "C":"Remove the delete button from the Delivery page layout.", "D":"Use a permission set to remove the Delete permission."},correct:["A", "D"],explanation:"Removing the Delete permission from the Shipper profile and using a permission set to remove the Delete\npermission are both valid ways to prevent users from deleting delivery records. Removing the delete button\nfrom the Delivery page layout will not prevent users from deleting records using other methods, such as list\nviews or reports. Changing the organization-wide default of deliveries to Private will not affect the delete\npermission, but only the sharing settings.",category:"Data Modeling and Management"},
  {id:115,question:"An app builder needs to create new automation on an object.\nWhat best practice should the app builder follow when building out automation?",options:{"A":"One Workflow rule per object.", "B":"One Flow per object.", "C":"One invocable process per object.", "D":"One record change process per object."},correct:["D"],explanation:"The best practice that the app builder should follow when building out automation is one record change\nprocess per object. A record change process is a type of process in Process Builder that starts when a record is\ncreated or updated. Having one record change process per object can avoid conflicts or errors when multiple\nprocesses try to update the same record at the same time. Option A is incorrect because one workflow rule per\nobject is not a best practice, as workflow rules are considered legacy tools and have limitations compared to\nProcess Builder. Option B is incorrect because one flow per object is not a best practice, as flows are more\ncomplex and require more resources than processes. Option C is incorrect because one invocable process per\nobject is not a best practice, as invocable processes are used to invoke other processes from within a process\nor a flow.",category:"Data Modeling and Management"},
  {id:116,question:"Cloud Kicks works on an annual subscription model. When a sales rep marks an opportunity as closed won, a\nnew opportunity should automatically be created for the renewal. The contracts team works outside of\nSalesforce but also needs to be notified about closed deals in order to initiate the contract process with the\ncustomer.\nWhich automation solution would meet these requirements?",options:{"A":"Approval Process", "B":"Validation Rule", "C":"Process Builder", "D":"Workflow Rule"},correct:["C"],explanation:"The automation solution that would meet these requirements is Process Builder. Process Builder is a tool that\ncan create and update records, send email alerts, submit records for approval, invoke flows, call Apex classes,\nand post to Chatter based on certain criteria and actions. The app builder can use Process Builder to create a\nprocess that starts when an opportunity is marked as closed won, creates a new opportunity record for the\nrenewal with pre-populated fields, and sends an email alert to the contracts team. Option A is incorrect\nbecause an approval process is not suitable for this requirement, as approval processes are used to define the\nsteps and criteria for approving records. Option B is incorrect because a validation rule is not suitable for this\nrequirement, as validation rules are used to enforce data quality and prevent users from saving invalid records.\nOption D is incorrect because a workflow rule is not suitable for this requirement, as workflow rules are\nconsidered legacy tools and have limitations compared to Process Builder.",category:"Business Logic and Process Automation"},
  {id:117,question:"The VP of sales at AW Computing would like a Roll-Up Summary field on the Account object to aggregate\nthe amount of opportunities related to an Account. The app builder is unable to implement this change.\nWhy is the app builder unable to fulfill the request?",options:{"A":"Currency fields are unable to be referenced in Roll-Up Summary fields.", "B":"The organization has Advanced Currency Management enabled", "C":"Roll-Up Summary fields are unavailable on the Account object.", "D":"The default currency is not an active currency in the organization,"},correct:["B"],explanation:"The inability to create a Roll-Up Summary field in this context can be attributed to:\nB. The organization has Advanced Currency Management enabled. When Advanced Currency\nManagement (ACM) is enabled, it affects how currency data is managed and aggregated, impacting the\nfunctionality of roll-up summary fields that involve currency amounts across different records.\nTo address this limitation, consider using custom reporting or a custom solution like a trigger or a scheduled\nbatch class to manually calculate and update the total.\n\nFor more information on limitations with ACM, consult Salesforce's help article on Advanced Currency\nManagement.",category:"Data Modeling and Management"},
  {id:118,question:"Universal Containers (UC) delivers purchased containers to remote construction sites. Customers supply UC\nwith crossroads or location markers.\nWhich field type should the app builder use to capture this information?",options:{"A":"Number", "B":"Geolocation", "C":"Reference", "D":"External Lookup"},correct:["B"],explanation:"The best choice for capturing geographic location data, such as crossroads or location markers provided by\ncustomers, is the Geolocation field type. This field type stores latitude and longitude data, allowing accurate\npinpointing of locations on a map. Geolocation fields are suitable for any application that needs to handle\ncoordinates for mapping and proximity calculations.\nA: Number field is not specific enough for geographical coordinates.\nC: Reference fields link to other records, not geographical data.\nReference: Geolocation Custom Fields on Salesforce Help",category:"Data Modeling and Management"},
  {id:119,question:"DreamHouse Realty wants to track how many lifts are being installed into customer garages. The To Be\nInstalled custom checkbox field on the custom Lift object should be checked and an external system should be\nnotified via an outbound message the next day when a lift is sold.\nWhat automation tool should be used to complete this task?",options:{"A":"Approval process", "B":"Workflow", "C":"Flow", "D":"Process Builder"},correct:["C"],explanation:"As of the Winter '24 release, Salesforce introduced the ability to send outbound messages directly from Flow.\nThis makes Flow the best choice for automating the notification to an external system when a lift is sold,\nfulfilling the need for both checking the custom To Be Installed checkbox and sending the notification the\nnext day.\nFlow: With this new functionality, Flow is now the most versatile automation tool for this use case.\nYou can:\nCreate a scheduled path that triggers the next day after the lift is sold (e.g., when a record meets\nthe criteria such as the checkbox being checked).\nSend the outbound message to notify the external system about the lift installation.\nPerform all of this declaratively, replacing the need for Workflow, which previously was the goto for outbound messages.\nWhy not Workflow anymore? Although Workflow still supports outbound messages, Flow is the\npreferred tool now, as Salesforce is deprecating Workflow rules and Process Builder in favor of Flow.\nFlow also allows for more complex logic and actions, providing flexibility in future-proofing\nautomation.\nWinter '24 Flow Outbound Message",category:"Data Modeling and Management"},
  {id:120,question:"The Recruiting ream at AW Computing captures thejob acceptance and date of hire of a candidate on the Job\nApplication custom object. Once the candidate accepts the recruiter s job offer, the date of hire should be\nentered and not be changed on subsequent cecord edit.\nWhich validation formula should the app builder use?",options:{"A":"NOT(ISCLANK(Job_Accepted_c)) && ISCHANGED(Hire_Date_c)", "B":"(ISBLANK(Job_Accepted_c) II NOT(lSCMANGED(Mire_Daie_c))", "C":"NOT{IS&lANK(Job_Accepted_c)) II ISCHANGED(Hire_Date_c)", "D":"(lSBLANK(Job_Accepted_c) && NOT(lSCHANGED(Hire_Date_c))"},correct:["A"],explanation:"NOT(ISBLANK(Job_Accepted__c)) && ISCHANGED(Hire_Date__c) is the validation formula that the app\nbuilder should use to meet the requirement of preventing changes to Hire Date after Job Accepted is entered.\n\nThis formula will return TRUE if Job Accepted is not blank and Hire Date is changed, which will display an\nerror message and prevent saving the record. The other formulas are not correct or valid.",category:"Data Modeling and Management"},
  {id:121,question:"The app builder at AW Computing has been asked to track the number of times a case has been reopened.\nWhich solution should the app builder utilize to help with this request?",options:{"A":"Scheduled Triggered flow", "B":"Screw flow", "C":"Process Builder", "D":"Apex Trigger"},correct:["A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:122,question:"An app builder has deployed a change set from a sandbox to production. There is a long delay in the\ndeployment.\nWhat can be causing the delay?",options:{"A":"Profiles are included in the change set.", "B":"A field type change is included in the change set.", "C":"Dependent fields are included in the change set.", "D":"Roles are included in the change set."},correct:["B"],explanation:"The app builder should know that a field type change is included in the change set and that it can cause a\ndelay in the deployment. A field type change is a change that modifies the data type of an existing field, such\nas changing a text field to a number field. A field type change can affect many aspects of Salesforce\nfunctionality, such as validation rules, formulas, workflows, reports, dashboards, and more. Therefore,\ndeploying a change set that contains a field type change can take longer than usual and require more testing\nand verification. Option A, C, and D are not changes that can cause a delay in the deployment.",category:"User Interface"},
  {id:123,question:"When an opportunity close date is delayed by more than 60 days, the manager and the VP sales must approve\nthe change. How can this requirement be met? Choose 2 answers",options:{"A":"Build an approval process that requires unanimous approval from the manager and VP of sales.", "B":"Create a workflow rule that checks for close date less than 60 days and add an email alert.", "C":"Create a lightning process builder flow that submits the record for an approval process", "D":"Build a validation rule that does not allow a user to save the opportunity record."},correct:["A", "C"],explanation:"The requirement can be met by using a combination of process builder and approval process. The process\nbuilder can be used to trigger the approval process when the close date is delayed by more than 60 days. The\napproval process can be configured to require unanimous approval from the manager and VP of sales.",category:"Data Modeling and Management"},
  {id:124,question:"Universal Containers’ app builder has been tasked with replacing workflow rules and Apex triggers with\nProcess Builders where possible.\nWhat are two important considerations an app builder should know before the project is started?\nChoose 2 answers",options:{"A":"Avoid generating infinite loops.", "B":"Apex has a different SOQL query limit than Flow.", "C":"Create a process for each workflow rule.", "D":"Combine actions when possible."},correct:["A", "D"],explanation:"Before replacing workflow rules and Apex triggers with Process Builders, the app builder should consider\navoiding generating infinite loops and combining actions when possible. Infinite loops can occur when a\nprocess updates a record that causes another process to run on the same record, and so on. Combining actions\ncan reduce the number of processes and improve performance and maintainability",category:"Business Logic and Process Automation"},
  {id:125,question:"Universal Containers created a custom object called Component to capture details about products sold.\nWhat approach should an app builder take to show Component as a related list on Product?",options:{"A":"Create a master-detail relationship on Product to Component. Add the Component related list to the Product page layout.", "B":"Create a junction object to relate Component and Product. Add the Component related list to the Product page layout.", "C":"Create a roll-up on Product. Add the Component related list to the Product page layout.", "D":"Create a lookup relationship on Component to Product. Add the Component related list to the Product page layout."},correct:["D"],explanation:"To show Component as a related list on Product, a lookup relationship on Component to Product should be\ncreated. A lookup relationship creates a loose association between two objects and allows users to relate\nrecords from one object to another. A lookup relationship also allows users to add the related list of the child\nobject to the parent object’s page layout.",category:"Data Modeling and Management"},
  {id:126,question:"Universal Containers wants users to have access to the pricing guidelines document when viewing a Contract\nrelated to an Account.\nWhat feature should an app builder use to create easy access to the document?",options:{"A":"Quick Action on the Contracts object", "B":"Quick Action on the Account object", "C":"A custom detail page link on the Account object", "D":"A custom detail page link on the Contract object"},correct:["D"],explanation:"The feature that the app builder should use to create easy access to the document is a custom detail page link\non the Contract object. A custom detail page link is a type of custom button or link that can display a URL or\nexecute JavaScript when clicked. The app builder can create a custom detail page link on the Contract object\nthat displays the pricing guidelines document in a new window or tab. Option A is incorrect because a quick\naction on the Contracts object is not suitable for this requirement, as quick actions are used to create or update\n\nrecords, log calls, send emails, or launch flows. Option B is incorrect because a quick action on the Account\nobject is not suitable for this requirement, as quick actions are not related to the Contract object. Option C is\nincorrect because a custom detail page link on the Account object is not suitable for this requirement, as\ncustom detail page links are not related to the Contract object.",category:"User Interface"},
  {id:127,question:"An app builder wants to limit the number of fields users are required to fill out when creating a new\nOpportunity. Once they fill out the required fields and save, the full record page with additional fields relevant\nto the Opportunity type becomes available.\nHow could this be accomplished?",options:{"A":"Make the Opportunity type a required field on the initial Opportunity page layout and use automation to fill in the type field to a record type.", "B":"Use different page layouts for Opportunity types based on the user profile.", "C":"Once the required fields are populated, use a sharing rule to share the new fields with the user.", "D":"Hide additional sections on the page layout and show the users how to manually expand them when they want to fill in the fields in the hidden sections."},correct:["A"],explanation:"Making the Opportunity type a required field on the initial Opportunity page layout and using automation to\nfill in the type field to a record type is a way to limit the number of fields users are required to fill out when\ncreating a new Opportunity. This way, the app builder can assign different page layouts for different record\ntypes based on the Opportunity type. The other options are not feasible or effective",category:"Data Modeling and Management"},
  {id:128,question:"The CFO of Cloud Kicks needs a way for new vendors to accept terms on agreements for any new major\nretail store lease before the opportunity can be closed.\nWhich feature should be used to handle this requirement?",options:{"A":"Email Alert", "B":"Dynamic Action", "C":"Approval Process", "D":"Validation Rule"},correct:["C"],explanation:"An Approval Process is the appropriate feature to manage and enforce that new vendors accept terms on\nagreements before an opportunity can be closed. This process can be configured to require approvals from\ndesignated approvers when certain conditions are met, ensuring that all necessary agreements are in place and\nvalidated before proceeding.\nA: Email Alert cannot enforce acceptance of terms.\nB: Dynamic Action primarily adjusts the user interface based on field values, not process management.\nReference: Approval Processes in Salesforce Documentation",category:"Data Modeling and Management"},
  {id:129,question:"Ursa Major Solar wants to provide sales console users with an Incredible experience, with the most-used\ncomponents easily accessible at all times.\nWhat solution can enable reps to see and access these components from anywhere within the app without\nleaving the pages where the team is working?",options:{"A":"Favorites", "B":"Home page", "C":"Global actions", "D":"Utility bar"},correct:["D"],explanation:"The best solution to enable reps to see and access the most-used components from anywhere within the app\nwithout leaving the page they are working on is Utility bar. This is a footer that can be added to any Lightning\napp and can contain tools such as history, notes, or softphone. Favorites, home page, and global actions are\nnot solutions that provide access to components from anywhere within the app. See [this article] for more\ninformation on Utility bar.",category:"Data Modeling and Management"},
  {id:130,question:"The Universal Containers data manager has been complaining about the\nlack of data integrity on Contact records.\nSales reps have not been filling out the Region field. The data manager wants the\nRegion field filled out only for Contacts that are associated to Accounts that have been\n\nmarked as ‘High Priority’ on the Customer Status field.\nWhat can the app builder do to fulfill this requirement?",options:{"A":"Make the Region field required on Contact.", "B":"Create a validation rule on Contact.", "C":"Create 4 validation rule on Account.", "D":"Make the Customer Status field required or Account."},correct:["B"],explanation:"To ensure data integrity where the Region field on the Contact object needs to be filled out conditionally\nbased on the parent Account's status, a validation rule on the Contact is the most effective method:\nB. Create a validation rule on Contact. This rule can enforce that the Region field must be filled out for\nContacts related to Accounts marked as 'High Priority'.\nSteps to create this validation rule:\nNavigate to Setup # Object Manager # Contact # Validation Rules.\nCreate a new validation rule.\nIn the formula, use:\nAND(\nISPICKVAL(Account.Customer_Status__c, 'High Priority'),\nISBLANK(Region__c)\n))\nProvide an error message to display when the rule is violated.\nSave and activate the rule.\nThis validation rule checks that if a Contact is associated with an Account marked 'High Priority', the Region\nfield cannot be blank.\nFor further detail, Salesforce's Validation Rule Considerations provides additional guidance.",category:"Data Modeling and Management"},
  {id:131,question:"DreamHouse Realty (DR) has many properties for sale and wants to identify the highest value of all Offer__c\nrecords on each Property__c record.\nWhat solution should the app builder use to meet DreamHouse Realty's needs?",options:{"A":"Master-Detail Child Object", "B":"Text Area (Long)", "C":"Multi-select Picklist", "D":"Lookup Object"},correct:["A"],explanation:"The solution that the app builder should use to meet DreamHouse Realty’s needs is Master-Detail Child\nObject. A master-detail relationship can be used to create a parent-child relationship between two objects,\nwhere the child records inherit the sharing and security settings of their parent record. The app builder can\ncreate a roll-up summary field on the parent object to calculate the highest value of all child records. Option B\nis incorrect because Text Area (Long) is a field type that allows users to enter up to 131,072 characters on one\nline, which is not suitable for this requirement. Option C is incorrect because Multi-select Picklist is a field\ntype that allows users to select multiple values from a predefined list, which is not suitable for this\nrequirement. Option D is incorrect because Lookup Object is not a valid term, but rather Lookup\nRelationship, which is a type of relationship that links two objects together, but does not support roll-up\nsummary fields.",category:"User Interface"},
  {id:132,question:"Sales reps at Cloud Kicks (CK) forget to submit for approval when CK needs orders reviewed before close\nwon. CK wants to automatically submit opportunities into the Secure Commitment Stage to eliminate manual\nsubmission.\nWhich three features would meet the business requirements?\nChoose 3 answers",options:{"A":"Workflow", "B":"Process Builder", "C":"Apex", "D":"Chatter action", "E":"Flow"},correct:["B", "C", "E"],explanation:"The app builder should use three features to meet the business requirements:\nProcess Builder: This is a type of automation tool that can execute actions based on certain criteria. In\nthis case, the process builder can have a criteria that evaluates if an opportunity is in the Secure\nCommitment Stage, and then execute an action that submits it for approval.\nApex: This is a programming language that allows developers to execute complex logic on the\nSalesforce platform. Apex can be used to create triggers that run before or after certain events, such as\ninsert, update, delete, or undelete of records. In this case, Apex can be used to create a trigger that runs\nbefore an opportunity is updated and submits it for approval if it is in the Secure Commitment Stage.\nFlow: This is another type of automation tool that can guide users through a series of screens and\nperform actions based on user input. Flow can also be triggered by certain events, such as when a\nrecord is created or updated. In this case, Flow can be used to create a record-triggered flow that runs\nafter an opportunity is updated and submits it for approval if it is in the Secure Commitment Stage.\nOption A and D are not features that can meet the business requirements.",category:"Data Modeling and Management"},
  {id:133,question:"Universal Containers conduct evaluations of their sales reps using a custom object consisting of numerical\nscores and executive comments. The company wants to ensure that only the sales reps, and their manager's\nexecutive can view the rep's evaluation record but the reps should not be able to view the executive comment\nfield on their review. How can these requirement be met?",options:{"A":"Use a private sharing model granting record access using hierarchy; manage field access with record types and field-level security", "B":"Use a private sharing model granting record access using custom setting; manage field access with page layouts and field level security", "C":"Use a private sharing model granting record access using hierarchy; manage field access with fieldlevel security", "D":"Use a private sharing model granting record access using custom setting; manage field access with record types and page layouts"},correct:["C"],explanation:"To ensure that only the sales reps and their manager’s executive can view the rep’s evaluation record but the\nreps should not be able to view the executive comment field on their review, a private sharing model granting\nrecord access using hierarchy and field-level security should be used. A private sharing model means that\nonly the owner of a record and users above them in the role hierarchy can view the record by default. Record\naccess can be granted to other users using manual sharing, sharing rules, or Apex sharing. Field-level security\ncontrols which fields are visible or editable for different profiles or permission sets.",category:"Data Modeling and Management"},
  {id:134,question:"An app builder at Cloud Kicks created accustom object and related fields in the schema builder.\nWhat next steps should the app build take to ensure users can access the new object and fields?",options:{"A":"Create a permission set for access to the object and fields.", "B":"Allow reporting for the object and fields.", "C":"Assign data types to the fields on the object.", "D":"Add the fields to the page layout on the object."},correct:["D"],explanation:"The app builder should add the fields to the page layout on the object to ensure users can access the new\nobject and fields. The page layout determines which fields are visible and editable on the record detail page.\nOption A, B, and C are not necessary for this purpose.",category:"Data Modeling and Management"},
  {id:135,question:"Universal Containers uses a custom picklist called Account_Region__c on the Account object. The vice\npresident of\nsales has asked that the value of this field is visible on Opportunities.\nHow should an app builder create this solution?",options:{"A":"Lookup field", "B":"Field-level security", "C":"Field history tacking", "D":"Cross-object formula field"},correct:["D"],explanation:"A cross-object formula field is a formula field that references fields from another object. This can be used to\ndisplay the value of the Account_Region__c field on Opportunities, as long as there is a relationship between\nthe two objects. Option A, B, and C are not relevant for this requirement.",category:"Data Modeling and Management"},
  {id:136,question:"DreamHouse Realty wants to display a weather map component on a Lightning record page when a house is\nscheduled for a showing.\nHow should the app builder meet the requirement?",options:{"A":"Component visibility", "B":"Field-level security", "C":"Field-level field", "D":"Sharing rules"},correct:["A"],explanation:"To display a weather map component on a Lightning record page conditionally:\nA. Component visibility should be used. This feature in the Lightning App Builder allows components\non a Lightning page to be displayed based on specific criteria, such as field values or user attributes. In\nthis case, the app builder can set the visibility of the weather map component to only appear when a\nhouse is scheduled for a showing based on the relevant field values.\nFor more details on setting up conditional component visibility, review the guide on Dynamic Lightning\nPages.",category:"User Interface"},
  {id:137,question:"Universal Containers needs the 18-digit record ID from Opportunity records when exporting data to Excel in\norder to ensure each record is treated uniquely.\nWhat formula should an app builder use to create this new field?",options:{"A":"ISNUMBER(Id)", "B":"CASESAFEID(Id)", "C":"TEXT(Id)", "D":"VALUE(Id)"},correct:["B"],explanation:"The app builder should use the CASESAFEID(Id) formula to create this new field. The CASESAFEID\nfunction returns the 18-digit case-insensitive version of the record ID, which is unique for each record in\nSalesforce. The 18-digit record ID is useful for exporting data to external systems that require case-sensitive\nIDs1. Option A, C, and D are not formulas that can return the 18-digit record ID.",category:"Data Modeling and Management"},
  {id:138,question:"Shipments at Cloud Kicks (CK) are created and updated by the warehouse staff in a shipping application. The\nInformation needs to be pushed into Salesforce on a regular basis. CK's app builder creates a custom object\ncalled Delivery_c to track the information.\nHow can the app builder prevent creating duplicate delivery records and update the correct existing records\nwhen migrating data from the shipping application?",options:{"A":"Use the Import Wizard and match on the tracking number.", "B":"Create a unique External ID field and use Dataloader.", "C":"Use the Import Wizard and match on the Salesforce ID.", "D":"Create a duplicate match rule and use Dataloader."},correct:["B"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Data Modeling and Management"},
  {id:139,question:"Universal Containers wants to match Opportunity data from Salesforce to the records in a financial database.\nWhat is required to configure an indirect lookup relationship in Salesforce between the Salesforce\nOpportunity records and those in a financial database?",options:{"A":"Salesforce Record ID", "B":"TEXT(Id)", "C":"External ID", "D":"CASESAFE(Id)"},correct:["C"],explanation:"An indirect lookup relationship is a custom relationship between two objects that are linked by an external ID\nfield. The external ID field must be a custom field on the parent object that has the “External ID” attribute\nenabled. The child object must be a standard or custom object that is on the detail side of a master-detail or\nlookup relationship.",category:"Data Modeling and Management"},
  {id:140,question:"Cloud Kicks Is redefining its entire business process to convert the Manager Notes field from a long text area\nfiles. The goal is to encourage managers to be more concise In their comments and stay at 255 characters or\nless. There is preexisting information In the Manager Notes field that often is well beyond the character limit.\nWhat would happen to any existing information if the app builder tries to convert a preexisting long text area\nfield to text area'",options:{"A":"Preexisting information will truncate to the first 255 characters.", "B":"Preexisting Information in the field will be completely lost.", "C":"Preexisting information will remain even if it was over 255 characters.", "D":"Preexisting information will cause an error message to pop up."},correct:["C"],explanation:"Preexisting information will remain even if it was over 255 characters if the app builder tries to convert a\npreexisting long text area field to text area. However, users will not be able to edit or save records with more\nthan 255 characters in that field until they reduce the number of characters. Preexisting information will not\ntruncate, be lost, or cause an error message.",category:"Data Modeling and Management"},
  {id:141,question:"Northern Trail Outfitters (NTO) has created the custom objects Trail and Park in Salesforce to track trails and\nparks respectively. NTO wants to\ntrack the total number of trails a park has on the park record without writing any code.\nWhich two actions should an app builder take to accomplish this requirement?\nChoose 2 answers",options:{"A":"Use a formula field on the Park record to show the total number of trails.", "B":"Use a roll-up summary field on the Park record to show the total number of Trails.", "C":"Use a master-detail relationship between the Park and Trail objects.", "D":"Use a lookup relationship between the Park and Trail objects."},correct:["B", "C"],explanation:"To track the total number of trails associated with a park without writing code, the correct actions to take are:\nUse a roll-up summary field on the Park record to show the total number of Trails (B). Roll-up\nsummary fields calculate and display a value in a master record based on the values of fields in a detail\nrecord. They are used to count, sum, average, or get the minimum/maximum of values in related detail\nrecords.\nUse a master-detail relationship between the Park and Trail objects (C). Master-detail relationships are\nnecessary for roll-up summary fields as they allow the master object to control certain behaviors of the\ndetail object and summarize data from those detail records.\nA formula field (A) cannot dynamically count related records unless those records are linked via a masterdetail relationship, and it cannot alone handle counts across related records without such a relationship. A\nlookup relationship (D) does not support roll-up summaries unless combined with additional tools like\ntriggers or third-party apps, which involve coding or extra configuration outside standard object setup.\nFor more details, refer to the Salesforce Help documentation on master-detail relationships and roll-up\nsummary fields:\nMaster-Detail Relationship: https://help.salesforce.com/articleView?id=relationships_considerations.\nhtm&type=5\nRoll-Up Summary Fields: https://help.salesforce.com/articleView?\nid=fields_about_roll_up_summary_fields.htm&type=5",category:"Data Modeling and Management"},
  {id:142,question:"Universal Containers (UC) has several picklist fields on the Account object whose values are routinely\nmodified to meet changing business requirements. Due to\nthese revolving changes, UC has a high number of inactive picklist values that are impacting system\nperformance and user experience.\nWhat can the app builder do to alleviate this issue?",options:{"A":"Establish upper bound on existing picklists in Picklist Settings.", "B":"Set up Global Values in Picklist Value Sets.", "C":"Remove upper bound on inactive picklist values in Picklist Settings.", "D":"Convert the picklist fields to a different field type that will still meet the business requirements."},correct:["B"],explanation:"To manage frequently changing picklist values effectively:\nB. Set up Global Values in Picklist Value Sets. This approach allows for centralized management of\npicklist values that can be reused across multiple fields and objects. By using global value sets, inactive\nvalues can be efficiently managed and deactivated without impacting fields that use these sets.\nFor further information on managing picklists, check Salesforce's Picklist Management guide.",category:"Data Modeling and Management"},
  {id:143,question:"After universal containers converted qualified leads. Sales reps need to be able to report on converted leads.\nHow should an app builder support for this requirement?",options:{"A":"Enable preserve lead status in the lead conversion settings", "B":"Assign the representative view and edit converted leads permission", "C":"Ensure the representative has read access to the original lead records", "D":"Create a custom report type with converted leads as the primary object"},correct:["D"],explanation:"The solution that an app builder should use to meet this requirement is creating a custom report type with\nconverted leads as the primary object. A custom report type is a template that defines the objects and fields\nthat are available for a report. The app builder can create a custom report type that has converted leads as the\nprimary object and includes fields from related objects, such as accounts, contacts, and opportunities. This\nway, sales reps can create reports on converted leads and see their related information. Option A is incorrect\nbecause enabling preserve lead status in the lead conversion settings does not affect the reporting on\nconverted leads, but rather allows users to retain the original lead status after conversion. Option B is\nincorrect because assigning the representative view and edit converted leads permission does not affect the\nreporting on converted leads, but rather allows users to view and edit converted lead records. Option C is\nincorrect because ensuring the representative has read access to the original lead records does not affect the\nreporting on converted leads, but rather allows users to view the original lead records.",category:"User Interface"},
  {id:144,question:"An app builder notices several Accounts converted from Leads are missing information they expected to be\ncaught via Account validation rules.\nWhat could be the source of this issue?",options:{"A":"The lead settings are unchecked to require validation for converted leads.", "B":"Account validation rules fail to validate on records converted from a lead.", "C":"The lead settings are allowing users to intentionally bypass validation rules.", "D":"Lead validation rules fail to validate on records when they are being converted."},correct:["A"],explanation:"The lead settings have an option to require validation for converted leads. If this option is unchecked, then the\nAccount validation rules will not be enforced when a lead is converted to an Account. This could result in\nmissing or incorrect information on the Account records",category:"Business Logic and Process Automation"},
  {id:145,question:"Cloud Kicks wants to set up a new opportunity approval process and execute various action items based on\nthe initial submission.\nWhich three action types should an app builder use in the approval process?\nChoose 3 answers",options:{"A":"Email Alert", "B":"Outbound Message", "C":"Task", "D":"Invocable Flow", "E":"Invocable Process Builder"},correct:["A", "C", "D"],explanation:"Email alert, task, and invocable flow are three action types that can be used in an approval process. Email\nalert can send an email message to one or more recipients. Task can assign a task to a user or\nqueue. Invocable flow can launch a flow that performs complex logic and actions",category:"Business Logic and Process Automation"},
  {id:146,question:"When a sales rep submits an account for approval, Universal Containers wants the user to answer additional\nquestions via a popup window to populate additional record fields.\nWhat should an app builder use to achieve the desired result?",options:{"A":"Process Builder and Flow", "B":"Lightning component and Process Builder", "C":"Custom picklist field and Process Builder", "D":"Custom button and Flow"},correct:["D"],explanation:"The app builder should use a custom button and Flow to achieve the desired result. A custom button is a\nbutton that can invoke custom logic or actions when clicked by a user. A Flow is a type of automation tool\nthat can guide users through a series of screens and perform actions based on user input. In this case, the app\nbuilder can create a custom button on the Account object that launches a Flow when clicked by a user. The\nFlow can display a popup window with questions for the user to answer and populate additional fields on the\nAccount record based on the user input4. Option A, B, and C are not tools that can achieve this result.",category:"Data Modeling and Management"},
  {id:147,question:"Cloud Kicks (CK) wants to set up a custom child object to track gift cards issued to a customer. A key\nrequirement is to track the total number of gift cards opened and gift cards issued on an Account. CK wants to\npermanently ensure the gift cards are unable to be moved across any other Account once it is created.\nOn the gift card object, what type of field should be created to support this requirement?",options:{"A":"Master-detail relationship", "B":"Roll-up summary", "C":"Formula", "D":"Lookup relationship"},correct:["A"],explanation:"The app builder should create a master-detail relationship field on the gift card object to support the\nrequirement. A master-detail relationship field creates a parent-child relationship between two objects, where\nthe master record controls certain behaviors of the detail record. In this case, the Account object would be the\nmaster and the gift card object would be the detail. By creating a master-detail relationship field, the app\nbuilder can meet these requirements:\nTrack the total number of gift cards opened and gift cards issued on an Account: This can be done by\ncreating roll-up summary fields on the Account object that count or sum up the values from the gift\ncard records related to each account.\n\nPermanently ensure the gift cards are unable to be moved across any other Account once it is created:\nThis can be done by making the master-detail relationship field required on the gift card object, which\nmeans that every gift card record must be associated with an account record and cannot be changed\nonce set. Option B, C, and D are not types of fields that can support this requirement.",category:"Data Modeling and Management"},
  {id:148,question:"A new field has been added to the Applicant object that is part of an unmanaged package. A recruiter ran the\nPosition with or without Applicants report and noticed that the new field was missing as an option to add as a\ncolumn.\nHow should an app builder troubleshoot this issue?",options:{"A":"Adjust the field level security to include in the report type.", "B":"Check Allow Reports for the position and applicant objects.", "C":"Add the field to the custom report type field layout.", "D":"Update the profile with the Manage Public Reports permission."},correct:["C"],explanation:"The app builder should add the field to the custom report type field layout to troubleshoot this issue. A custom\nreport type is a type of report that defines which objects and fields are available for reporting. The app builder\ncan customize which fields are included in each custom report type by editing its field layout. If a new field is\nadded to an object that is part of an unmanaged package, it will not be automatically added to the custom\nreport type field layout. The app builder needs to manually add it to make it available as an option to add as a\ncolumn in reports based on that custom report type. Option A, B, and D are not steps that can troubleshoot\nthis issue.",category:"Data Modeling and Management"},
  {id:149,question:"Universal Containers is adding drone delivery to service offerings, and the developer has written and tested\ncode prior to deployment to production, and the change set is ready to go. The deployment window will occur\nwhen the developer is on vacation.\nWhat can the app builder do to ensure a smooth deployment to production?",options:{"A":"Remove Apex classes from Abound change set.", "B":"Validate the inbound change set.", "C":"Use a metadata package set.", "D":"Validate the outbound change set."},correct:["B"],explanation:"The app builder should validate the inbound change set to ensure a smooth deployment to production.\nValidating an inbound change set allows the app builder to test whether the change set can be deployed\nwithout errors in the target org. Validating an inbound change set does not affect any data or metadata in the\ntarget org.",category:"User Interface"},
  {id:150,question:"A Service Coordinator (SC) for Ursa Major Solar (UMS) does a final review of work orders owned by a\ntechnician for a specific region before the records are submitted for an invoice. Beforeclosing out the work\norder, the SC needs to modify data or remove attachments that were added by mistake. The SC also needs\naccess to any other related records owned by the technician.\nWhat solution would provide the required access, given a private data model?",options:{"A":"Give the SC a permission set with the Modify All Data system permission.", "B":"Put the SC in the role hierarchy above the technicians whose work orders they review.", "C":"Create a workflow rule that updates records owned by technicians in that regionwith the SC.", "D":"Change work order access on the SC's profile to 'Modify AIl."},correct:["B"],explanation:"Putting the SC in the role hierarchy above the technicians whose work orders they review will provide the\nrequired access, given a private data model. The role hierarchy determines how users can access records they\ndo not own. Users at any given role level can view, edit, and report on all data owned by or shared with users\nbelow them in the role hierarchy.",category:"Security"},
  {id:151,question:"Universal containers wants to ensure that they are accepting clean data from their users and verify that\nimportant fields are entered. What should an app builder recommend to meet this requirement?",options:{"A":"Update the important fields to be required on the page layout", "B":"Make a formula field to check the format of the important fields", "C":"Create a workflow rule to check the fields are formatted correctly", "D":"Configure a validation to require a field for a specific record type"},correct:["D"],explanation:"Configuring a validation rule to require a field for a specific record type is the best way to ensure that\nimportant fields are entered and formatted correctly. Updating the important fields to be required on the page\nlayout will not prevent users from entering invalid data using other methods, such as data loader or quick\nactions. Making a formula field to check the format of the important fields will not prevent users from\nentering invalid data, but only display a message or an indicator. Creating a workflow rule to check the fields\nare formatted correctly will not prevent users from entering invalid data, but only trigger an action after the\ndata is saved.",category:"Data Modeling and Management"},
  {id:152,question:"A new app builder on the Cloud Kicks team is getting familiar with relationships in the data model.\nWhat functionality would present the app builder a comprehensive view of all relationships in one pi",options:{"A":"Schema Builder", "B":"Lightning Object Creator", "C":"Object Manager", "D":"Lightning Record Page"},correct:["A"],explanation:"Schema Builder is a tool that presents a comprehensive view of all relationships in one place. It allows app\nbuilders to see how objects are connected and create new relationships. Lightning Object Creator, Object\nManager, and Lightning Record Page are not tools for viewing relationships, but for creating objects,\nmanaging fields, and customizing record pages respectively.",category:"Data Modeling and Management"},
  {id:153,question:"The app builder needs to change the data types of new custom fields. The app builder is not able to delete and\nrecreate any of the fields, nor modify any apex code. Which data type change will require the app builder to\nperform the additional steps in order to retain existing functionalities?",options:{"A":"Changing the data type of a field used in an apex class from number to text.", "B":"Changing the data type of a field used in a report from a text to an encrypted field", "C":"Changing the data type of a field used as an external id from number to text.", "D":"Changing the data type of a field used in lead conversion from number to text"},correct:["A"],explanation:"Changing the data type of a field used in an apex class from number to text will require the app builder to\nperform additional steps in order to retain existing functionalities. This is because changing the data type of a\nfield may affect the apex code that references or manipulates the field value, and may cause compilation\nerrors or unexpected results. The app builder will need to update the apex code to handle the new data type\nand ensure that the logic and calculations are still correct. Option B is incorrect because changing the data\ntype of a field used in a report from a text to an encrypted field will not require additional steps, as encrypted\nfields can still be used in reports with some limitations. Option C is incorrect because changing the data type\nof a field used as an external id from number to text will not require additional steps, as external id fields can\nbe either number or text. Option D is incorrect because changing the data type of a field used in lead\nconversion from number to text will not require additional steps, as lead conversion fields can be mapped\nregardless of their data types.",category:"Data Modeling and Management"},
  {id:154,question:"Ursa Major Solar (UMS) is looking to hire some new employees. UMS wants to allow the same applicant to\napply for multiple open positions using a single application.\nWhat should an app builder recommend to meet these requirements?",options:{"A":"Create a master-detail relationship on Open_Position__c to Application__c", "B":"Create a master-detail relationship held on Applicant__c to Application__c", "C":"Create a master-detailrelationship field on Application__c to Open.Position__c", "D":"Create a master-detail relationship field on Applicant__c to Apphcabon_c"},correct:["D"],explanation:"Create a master-detail relationship field on Applicant__c to Application__c is what the app builder should\nrecommend to meet the requirements of allowing the same applicant to apply for multiple open positions\nusing a single application. This will create a many-to-many relationship between Applicant__c and\nOpen_Position__c using Application__c as a junction object. Create a master-detail relationship on\nOpen_Position__c to Application__c, create a master-detail relationship field on Application__c to\nOpen_Position__c, and create a lookup relationship field on Applicant__c to Application__c are not valid or\ncorrect ways to create a many-to-many relationship.",category:"User Interface"},
  {id:155,question:"An app builder needs to deploy a new account detail page layout from sandbox to production.\n\nWhich three components should an app builder include in the Change Set to ensure it deploys successfully\nand visually as expected?\nChoose 3 answers",options:{"A":"Detail page layout", "B":"Custom fields", "C":"Custom actions", "D":"Lightning App Builder", "E":"System administrator profile"},correct:["A", "B", "C"],explanation:"To deploy a new account detail page layout from sandbox to production, an app builder should include three\ncomponents in the change set:\nDetail page layout: The page layout defines the arrangement of fields, buttons, related lists, and other\ncomponents on a record detail or edit page. It also controls which fields are required or read-only for\nusers. Source\nCustom fields: Custom fields are fields that are created by users to store additional information on\nstandard or custom objects. Custom fields can have different data types, such as text, number, date,\npicklist, etc. Source\nCustom actions: Custom actions are actions that are created by users to extend the functionality of\nstandard or custom objects. Custom actions can be global or object-specific, and they can invoke\ndifferent tools such as Lightning components, Visualforce pages, flows, etc. [Source]",category:"User Interface"},
  {id:156,question:"An app builder at Cloud Kicks has been working on changes to a custom Shoe Sales app in a sandbox and is\nready to deploy their changes to production with a change set. Part of the work included updates to a\npermission set.\nWhat should the app builder take into consideration when deploying the change set to production?",options:{"A":"The deployed permission set will only contain changes related to the change set.", "B":"Change to field-level security in the permission set will not be applied.", "C":"The deployed permission set will manage with the existing permission set.", "D":"The existing permission set will be completely overwritten."},correct:["A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:157,question:"The app builder at Northern Trail Outfitters created a report type for opportunities with or without shipments.\nThe operations team wants to see the account rating Information on the report.\nWhat should the app builder do to fulfill this request?",options:{"A":"Change the primary object of the custom type to the Account object.", "B":"Add the Account Rating field to the opportunity record page.", "C":"Use add fields related via lookup with the view set to opportunities.", "D":"Change the account/opportunity relationship to a master/detail relationship."},correct:["C"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:158,question:"The Director of customer service wants to receive a notification when a case stays in the '' new'' status for\nmore than four business hours.\nWhich two automation processes should be used to accomplish this?\nChoose 2 answers",options:{"A":"Escalation rules", "B":"Flow Builder", "C":"Process Builder", "D":"Scheduled Apex"},correct:["A", "C"],explanation:"Escalation rules and Process Builder are two automation processes that can be used to send a notification\nwhen a case stays in the ‘’ new’’ status for more than four business hours. Escalation rules can define criteria\nand actions for escalating cases based on time or other factors. Process Builder can create a time-based action\nthat triggers an email alert when the case status is ‘’ new’’ for more than four business hours. Flow Builder\nand Scheduled Apex are not necessary for this requirement.",category:"Business Logic and Process Automation"},
  {id:159,question:"Universal Containers (UC) has several large customers that sell their products through dealers. UC identifies\nand works with a single individual at each customer and at each dealer. Separate bills are sent to each\ncustomer and each dealer. These details need to be stored in a format that clearly displays the business entities\nand their appropriate representatives.\nHow should an app builder Implement these regalements?",options:{"A":"Create a single parent record, add each rep as a contact to the parent account and add each dealer as a child record.", "B":"Create both customer and dealer as accounts, create account teams on each account and associate the dealer records with the parent account.", "C":"Create a single account record, add each rep as a contact and create a custom dealer object.", "D":"Create both customer and dealer as accounts, add each rep as a contact on the corresponding account and create an account hierarchy."},correct:["D"],explanation:"See official Salesforce Platform App Builder documentation.",category:"User Interface"},
  {id:160,question:"What is one limitation of using schema builder when creating a field?",options:{"A":"Cannot create formula fields.", "B":"Cannot see existing relationships between objects.", "C":"Cannot add fields to page layouts.", "D":"Cannot create lookup relationships."},correct:["C"],explanation:"One of the limitations when using the Schema Builder for creating fields is:\nC. Cannot add fields to page layouts. While Schema Builder allows for easy visualization and creation\nof fields and objects, it does not support placing these fields onto specific page layouts directly from the\nSchema Builder interface.\nTo place fields on page layouts, you need to:\nNavigate to Setup # Object Manager # select your object.\nClick on Page Layouts, choose the appropriate layout, and manually add the newly created fields.\nThis step is necessary to ensure fields are visible and properly arranged on user interfaces.\nFor more details, Salesforce's Schema Builder documentation outlines its capabilities and limitations.",category:"Data Modeling and Management"},
  {id:161,question:"An app builder wants to create a custom Sync button on Account that will call a Lightning Web Component\nthat connects with an external system. This action should only be available If the custom Status field is set to\nReady to Sync.\nWhat should an app builder use to add this functionality to an Account record page?",options:{"A":"Formula field", "B":"Dynamic action", "C":"AppExchange product", "D":"Custom link"},correct:["B"],explanation:"Dynamic actions are a new feature that allow app builders to create custom buttons or actions that can call\nLightning Web Components and display them conditionally based on field values or other criteria. Formula\nfields, AppExchange products, and custom links are not able to call Lightning Web Components.",category:"Data Modeling and Management"},
  {id:162,question:"Sales reps at Universal Containers create multiple quotes per opportunity.\nWhat automation tool should an app builder recommend to delete rejected quotes?",options:{"A":"Approval process", "B":"Validation rule", "C":"Workflow rule", "D":"Flow"},correct:["D"],explanation:"A flow is a powerful automation tool that can perform complex logic and data manipulation. A flow can be\nused to delete rejected quotes by using a record-triggered flow that runs when a quote is updated, or by using\na scheduled flow that runs at a specified time.",category:"Business Logic and Process Automation"},
  {id:163,question:"Ursa Major Solar (UMS) uses Cases to track customer complaints, an Issue__c object to represent known\nproblems with its solar panels, and a\nCase_Issue__c junction object to relate known problems to customer complaints.\nPeriodically, UMS conducts audits which require the auditing users to view Case _Issue__c records.\nWhich access levels must be configured to allow UMS users to access Case _Issue_c records?",options:{"A":"Read-Only access or issue_c and_issue_c", "B":"Read-Only access of Case issue =", "C":"Read Only access on Case and case_issue__o", "D":"Read-Only access on Case and issue__c"},correct:["D"],explanation:"To ensure auditing users can access records in the Case_Issue__c junction object, the correct data permissions\non related records must be established:\nD. Read-Only access on Case and Issue__c. Users need read-only access to both Case and Issue__c\nobjects to view associated Case_Issue__c junction object records properly. This is because access to\njunction object records in Salesforce is determined by the user's access levels to the parent records in a\nrelationship.\nSteps to configure access:\nNavigate to Setup # Profiles or Permission Sets.\nSelect the profile or permission set of the auditing users.\n\nUnder Object Settings, adjust the permissions for Case and Issue__c to at least 'Read-Only'.\nEnsure that users have visibility to the Case_Issue__c object itself.\nThis configuration allows users to view the details of cases and issues as they audit the junction object records.",category:"Data Modeling and Management"},
  {id:164,question:"Universal Containers require different fields to be filled out at each stage of the Opportunity sates process.\nWhat configuration steps can an app builder use to meet this requirement?",options:{"A":"Set page layout required fields based on the current stage.", "B":"Create a Process Builder to prompt the User for field information.", "C":"Define record types and page layouts for each stage.", "D":"Add the Path component to the Lightning record page."},correct:["D"],explanation:"The app builder should use the Path component to meet the requirement of tracking different fields at each\nstage of the Opportunity sales process. The Path component is a Lightning component that displays the key\nfields and guidance for each stage of a standard or custom picklist field, such as the Opportunity Stage\nfield. The app builder can configure the Path component to show the fields that need to be filled out and\nprovide recommendations and sales strategies for each stage3. Option A, B, and C are not configuration steps\nthat can meet this requirement.",category:"Data Modeling and Management"},
  {id:165,question:"Cloud Kicks (CK) captures all shipping information in a custom object called Shipments__c. CK's app builder\nis tasked with creating an approval process to ensure department members can approve all overnight\nshipments.\nWhere should the app builder route the approval request?",options:{"A":"Hierarchy field", "B":"Role", "C":"Public group", "D":"Queue"},correct:["C"],explanation:"Public group is the best option to route the approval request for overnight shipments. Public groups can\ninclude users, roles, or other groups. Queues are used to assign ownership of records to a group of users, not\nfor approval processes. Hierarchy field and role are not flexible enough to include only the department\nmembers.",category:"Data Modeling and Management"},
  {id:166,question:"The CFO of Cloud Kicks needs to sign off on any major show retail deal that has a discount of more than\n30% before the deal can be closed.\nWhat feature would be used to handle this requirement?",options:{"A":"Approval Process", "B":"Email Alert", "C":"Field Update", "D":"Workflow Rule"},correct:["A"],explanation:"Approval Process is the feature that would be used to handle the requirement of signing off on major show\nretail deals with more than 30% discount. According to the Salesforce documentation, “An approval process\nautomates how Salesforce records are approved in your org.” Email Alert, Field Update, and Workflow Rule\nare actions that can be triggered by an approval process, but they are not features for handling approvals.",category:"Data Modeling and Management"},
  {id:167,question:"The app builder at Ursa Major Solar created a master-detail relationship between a parent object Galaxy__c\nand child object Star__c.\nWhat is the effect of creating this type of relationship if users want to report on Galaxy__c with Star__c?",options:{"A":"A Galaxy__c with Star__c report type will be automatically created.", "B":"A Star__c report type with Galaxy__c as a field will be automatically created.", "C":"A new custom report type will need to be created for Star__c with lookup fields from Galaxy__c.", "D":"A new custom report type will need to be created for Galaxy__c with Star__c."},correct:["A"],explanation:"When a master-detail relationship is created between two objects, Salesforce automatically creates a standard\nreport type that allows users to report on the parent and child together.\nWhy A (Galaxy__c with Star__c) is correct:Exact Extract:“When you create a master-detail\nrelationship, Salesforce automatically creates a primary report type that includes records from both the\nmaster and its detail.” — Salesforce Help | Standard Report TypesTherefore, a “Galaxy__c with\nStar__c” report type is automatically generated, allowing users to create reports showing all child\nrecords (Star__c) related to each parent (Galaxy__c).\nWhy A (Galaxy__c with Star__c) is correct:Exact Extract:“When you create a master-detail\nrelationship, Salesforce automatically creates a primary report type that includes records from both the\nmaster and its detail.” — Salesforce Help | Standard Report TypesTherefore, a “Galaxy__c with\nStar__c” report type is automatically generated, allowing users to create reports showing all child\nrecords (Star__c) related to each parent (Galaxy__c).\nWhy not B:The parent-to-child relationship drives the report type. A “Star__c with Galaxy__c” type is\nnot automatically created.\nWhy not C or D:Custom report types are only needed if you want to include additional related objects\nor modify relationships; Salesforce automatically provides one for master-detail pairs.\nReferences:\nSalesforce Help | Standard Report Types\nSalesforce Platform App Builder Exam Guide | Data Modeling and Management",category:"Data Modeling and Management"},
  {id:168,question:"An app builder has a custom component they want to make available on the utility bar, but the component is\nunavailable.\nHow should the component be tagged?",options:{"A":"For use on record pages.", "B":"For use in Lightning App Builder.", "C":"For use on the utility bar.", "D":"For use in App Manager."},correct:["C"],explanation:"To make a custom component available for the utility bar in Salesforce, the component needs to be explicitly\ntagged for use in the utility bar. Salesforce components require specific configurations to be available in\ndifferent parts of the application, such as the utility bar, record pages, or app pages.\nOption C: For use on the utility bar: When a custom Lightning component is developed, it must include\na specific target tag in its .js-meta.xml configuration file that marks it as usable in the utility bar. This is\ndone by setting the target to \"lightning__UtilityBar\". Without this tag, the component will not appear as\nan option to add to the utility bar in the App Manager.\nExample of how the component is tagged in the meta.xml file:\nxml\nCopy code\n<targets>\n<target>lightning__UtilityBar</target>\n</targets>\nUtility Bar Components Documentation\nOption A: For use on record pages: This tag makes the component available only on record pages, but not the\nutility bar. The component would have a target for lightning__RecordPage in this case.\nOption B: For use in Lightning App Builder: This option would allow the component to be used in the\nLightning App Builder, but it wouldn't make the component available for the utility bar. App Builder\nplacement is typically for page layouts.\nOption D: For use in App Manager: This is incorrect, as App Manager is used for managing apps and not for\ntagging components for availability.\nIn summary, to make the component available for the utility bar, it needs to be specifically tagged for that\npurpose using the lightning__UtilityBar target in the component's metadata file.\nReference:Utility Bar Metadata Configuration",category:"User Interface"},
  {id:169,question:"An app builder received a request to extend record access beyond the organization-wide defaults configured.\nWhich two features satisfy this requirement?\nChoose 2 answers",options:{"A":"Sharing Rules", "B":"Public Groups", "C":"Permission Set Groups", "D":"Manual Sharing Rules"},correct:["A", "D"],explanation:"Sharing rules and manual sharing are two features that can extend record access beyond the organization-wide\ndefaults. Sharing rules are automatic rules that grant access to groups of users based on certain criteria, such\nas role, public group, or territory. Manual sharing is a manual way of granting access to individual users or\ngroups by the record owner or someone above them in the role hierarchy. Option B and C are not features that\nextend record access.",category:"User Interface"},
  {id:170,question:"An app builder is tasked with adding key performance indicators on client pages. They want to see a summary\nof the number of open Opportunities and the number of won Opportunities for each Account.\nWhere should the app builder go to build these new rollups?",options:{"A":"Lightning App Builder", "B":"Account Object", "C":"Lightning Object Creator", "D":"Opportunity Object"},correct:["B"],explanation:"The app builder should go to the Account object to build these new rollups. A roll-up summary field is a type\nof field that can aggregate numeric values from child records related to a parent record by a master-detail\nrelationship. The app builder can create two roll-up summary fields on the Account object that count the\nnumber of open Opportunities and the number of won Opportunities related to each Account. Lightning App\nBuilder is not a place where the app builder can build these new rollups. Lightning App Builder is a tool that\nallows the app builder to customize the layout and components of Lightning pages, such as record pages,\nhome pages, or app pages. It cannot create new fields or relationships on objects. Lightning Object Creator is\nnot a place where the app builder can build these new rollups. Lightning Object Creator is a tool that allows\nthe app builder to create custom objects from spreadsheet data by uploading a file and mapping columns to\nfields. It cannot create roll-up summary fields or relationships on existing objects. Opportunity object is not a\nplace where the app builder can build these new rollups. The Opportunity object is the child object in the\nrelationship with the Account object, and roll-up summary fields can only be created on the parent object.",category:"User Interface"},
  {id:171,question:"Sales Managers want to be automatically notified any time there is a change to an Opportunity Close Date and\nwant these changes to be tracked on the Opportunity.\nWhich two configurations should an app builder recommend?",options:{"A":"Enable Feed Tracking on Opportunities.", "B":"Create an Opportunity outbound message.", "C":"Use a record-triggered flow on Opportunity and a Chatter post action.", "D":"Activate Historical Trending for Opportunities."},correct:["A", "C", "A"],explanation:"See official Salesforce Platform App Builder documentation.",category:"Business Logic and Process Automation"},
  {id:172,question:"SERVICE AGENTS ARE REQUIRED TO CONFIRM A USER IDENTITY BEFORE PROVIDING\nSUPPORT INFORMATION OVER THE PHONE. WHAT FEATURE CAN AN APP BUILDER USE TO\nHELP AGENTS MEET THIS REQUIREMENT?",options:{"A":"Include Surveys as a Case related list", "B":"Case Validation Rules", "C":"Add Path to the top of the Case layout", "D":"Guided Action Flows on the record page"},correct:["D"],explanation:"Guided Action Flows on the record page can help service agents meet the requirement of confirming a user\nidentity before providing support information over the phone. Guided Action Flows are a series of screens\nthat guide agents through a predefined process, such as verifying user information, collecting case details, or\nresolving issues",category:"User Interface"},
  {id:173,question:"Cloud Kicks wants to display 12 key fields at once in a separate section at the top of opportunity records on\nthe desktop.\nWhich component should an app builder add to the record page to enable this functionality?",options:{"A":"Highlights Panel", "B":"Path", "C":"Custom Lightning Web Component", "D":"Accordion"},correct:["A"],explanation:"The Highlights Panel in the Lightning Record Page displays key fields and record actions prominently at the\ntop of the page, exactly as described in the requirement.\nWhy A (Highlights Panel) is correct:Exact Extract:“The highlights panel displays important fields and\nkey record actions at the top of the record page in Lightning Experience.” — Salesforce Help |\nHighlights Panel\nWhy not B:Path is used to visualize progress through stages (e.g., Opportunity Stage), not display\nmultiple fields.\nWhy not C:A custom component is unnecessary since the standard Highlights Panel fulfills the\nrequirement.\nWhy not D:Accordion is used to organize information in collapsible sections, not display key fields at\nthe top.\nReferences:\nSalesforce Help | Highlights Panel\n\nSalesforce Platform App Builder Exam Guide | User Interface",category:"User Interface"},
  {id:174,question:"An app builder has modified a Lightning record page for a case and has added an email button item to the\npage layout; however, users are unable to see the new item on the layout.\nWhat are two potential reasons why users are unable to view the item on the Case Lightning record page?\nChoose 2 answers",options:{"A":"The page layout includes the case feed component.", "B":"The email button contains JavaScript.", "C":"The case page layout also contains custom buttons.", "D":"The page layout excludes the case feed component."},correct:["A", "B"],explanation:"The email button item will not be visible on the Lightning record page if the page layout includes the case\nfeed component or if the email button contains JavaScript. The case feed component replaces the standard\nbuttons on the page layout with actions in the feed. The email button item will not work if it contains\nJavaScript because JavaScript buttons are not supported in Lightning Experience.",category:"User Interface"},
  {id:175,question:"Cloud Kicks has a shipment date on each shipment that is sent out. Dispatchers need more details on the day\nand time the shipment was sent out. The app builder needs to change the current field type that is used from\nDate to Date/Time.\nWhat should the app builder be aware of when it comes to data already in the system?",options:{"A":"The change will be instant", "B":"Historical data will be updated to 12:00 timestamp.", "C":"The field name will change.", "D":"Data loss will be experienced."},correct:["B"],explanation:"Historical data will be updated to 12:00 timestamp when changing a Date field to Date/Time field. According\nto the Salesforce documentation, “When you convert a Date field to Date/Time, Salesforce appends “12:00”\nto existing data in your records.” The change will not be instant, but will require some time for processing.\nThe field name will not change unless specified by the app builder. Data loss will not be experienced, but data\naccuracy might be affected.",category:"Data Modeling and Management"},
  {id:176,question:"DreamHouse Realty (DR) asks for some improvements in case management. They want to enforce process\ncompliance so that cases are unable\nto be reverted to an earlier case status, and to ensure that certain fields are required when specific case criteria\nare met.\nWhich solution should an app builder implement to meet these requirements?",options:{"A":"Configure validation rules with help text.", "B":"Create dependent picklist fields and set them as required.", "C":"Use an approval process to check field criteria are met.", "D":"Make the fields required on the page layout."},correct:["A"],explanation:"To ensure process compliance where cases cannot revert to an earlier status and certain fields are required\nbased on specific case criteria, the recommended solution is:\nConfigure validation rules with help text (A). Validation rules enforce data integrity and business\nprocesses by preventing users from saving records if certain conditions are not met. For instance, a\nvalidation rule can prevent the status of a case from being changed back to an earlier status and can\nconditionally require fields based on other field values on the case.\nDependent picklists (B) ensure field values depend on another field’s value but do not enforce the inability to\nrevert status. Approval processes (C) are used for step-by-step record approval and are not designed to\nprevent status reversion or conditionally require fields. Making fields required on the page layout (D) ensures\nthey are always required when accessing the record through that layout but does not enforce conditional\nrequirements based on other criteria.\nReference for creating validation rules in Salesforce:\nValidation Rules: https://help.salesforce.com/articleView?id=sf.validation_rules.htm&type=5",category:"Data Modeling and Management"},
  {id:177,question:"When an opportunity is closed date is pushed more than 30days, manager approval is required. An approval\nprocess is in place but reps frequently forget to submit for approval to run the process.\nHow can an app builder ensure that these opportunities are submitted into the approval process?",options:{"A":"Change the entry criteria on the approval process to criteria are met and lock the record on initial submission.", "B":"Use a validation rule and an email alert to the manager requesting approval.", "C":"Submit the record for approval from an automated process.", "D":"Give the manager the \"API Enabled\" permission to permit approval responses by email."},correct:["C"],explanation:"To ensure that opportunities are submitted into the approval process when their close date is pushed more than\n30 days, an app builder should use an automated process to submit the record for approval. An automated\nprocess can be created using tools such as Process Builder or Flow Builder, and it can define the criteria and\nactions for submitting a record for approval. [Source]",category:"Business Logic and Process Automation"},
  {id:178,question:"A production org includes custom objects containing confidential Information. A sandbox h needed that\nIncludes data records, excludes all of the confidential objects, and can be refreshed weekly the confidential\nobjects, and can be refreshed weekly.\nWhat steps should an App Builder take to meet these requirements?",options:{"A":"Create a Full Sandbox and use a sandbox template", "B":"Create a Developer Pro Sandbox and schedule Data loader to download selected object data weekly.", "C":"Create a Partial Copy Sandbox and use a sandbox template.", "D":"Create a Developer Sandbox and schedule Data loader to download selected object data weekly."},correct:["C"],explanation:"The steps that the app builder should take to meet these requirements are creating a Partial Copy Sandbox and\nusing a sandbox template. A Partial Copy Sandbox can include data records, exclude confidential objects, and\nbe refreshed weekly. A sandbox template can specify which objects and data are copied from the production\norg to the sandbox org. Option A is incorrect because creating a Full Sandbox and using a sandbox template is\nnot necessary for this requirement, as Full Sandboxes copy all data and metadata from the production org and\ncan only be refreshed every 29 days. Option B is incorrect because creating a Developer Pro Sandbox and\n\nscheduling Data Loader to download selected object data weekly is not feasible for this requirement, as\nDeveloper Pro Sandboxes do not include data records by default and Data Loader cannot be scheduled to run\nweekly. Option D is incorrect because creating a Developer Sandbox and scheduling Data Loader to\ndownload selected object data weekly is not feasible for this requirement, as Developer Sandboxes do not\ninclude data records by default and Data Loader cannot be scheduled to run weekly.",category:"Data Modeling and Management"},
